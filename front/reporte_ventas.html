<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="./src/logger.js"></script>
<title>El Rey · Ventas</title>
<style>
  :root{
    --paper:#FBF9F2; --ink:#1C2B27; --ink-soft:#5B665F;
    --line:#E4DECF;  --line-soft:#EEEADD;
    --gold:#A9760E;  --gold-dk:#8A5F09; --gold-lt:#F5E9D0;
    --green-bg:#E7F0E8; --green-tx:#2C6B3F;
    --amber-bg:#FDF2DC; --amber-tx:#8A5F09;
    --red-bg:#F6E5E2;   --red-tx:#A8392B;
    --blue-bg:#E8F0FB;  --blue-tx:#2A4E9A;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{overscroll-behavior-y:contain;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px;line-height:1.4}
  body{max-width:480px;margin:0 auto;padding-bottom:40px}

  .hdr{display:flex;align-items:center;padding:14px 18px;
    border-bottom:1px solid var(--line);background:var(--paper);
    position:sticky;top:0;z-index:20;gap:10px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:600}
  .crown{color:var(--gold);font-size:20px}
  .brand small{display:block;font-size:11px;font-weight:500;color:var(--ink-soft);
    letter-spacing:.06em;text-transform:uppercase}

  .periodo-wrap{padding:14px 18px;border-bottom:1px solid var(--line-soft);
    background:var(--paper);position:sticky;top:57px;z-index:19}
  .periodo-chips{display:flex;gap:6px;overflow-x:auto;margin-bottom:10px}
  .periodo-chips::-webkit-scrollbar{display:none}
  .pchip{padding:7px 14px;border-radius:999px;font-size:14px;font-weight:600;
    border:1px solid var(--line);background:var(--card);color:var(--ink-soft);
    white-space:nowrap;cursor:pointer;flex-shrink:0}
  .pchip.active{background:var(--gold);color:#fff;border-color:var(--gold)}
  .date-range{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .date-range input{width:100%;padding:9px 12px;border:1px solid var(--line);
    border-radius:10px;font-size:14px;font-family:inherit;color:var(--ink);background:var(--card)}
  .date-range input:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:transparent}

  .tabs{display:flex;border-bottom:2px solid var(--line);background:var(--paper);
    position:sticky;top:155px;z-index:18}
  .tab{flex:1;padding:11px 6px;text-align:center;font-size:13px;font-weight:600;
    color:var(--ink-soft);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold)}

  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 18px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
  .kpi .num{font-size:24px;font-weight:700;line-height:1;letter-spacing:-.01em}
  .kpi .num.gold{color:var(--gold)}
  .kpi .num.green{color:var(--green-tx)}
  .kpi .lbl{font-size:12px;color:var(--ink-soft);font-weight:500;margin-top:4px}
  .kpi .delta{font-size:11px;font-weight:700;margin-top:4px;display:inline-block}
  .kpi .delta.up{color:var(--green-tx)}
  .kpi .delta.down{color:var(--red-tx)}
  .kpi .delta.flat{color:var(--ink-soft)}
  .kpi.wide{grid-column:span 2;display:flex;justify-content:space-between;align-items:center}
  .kpi.wide .num{font-size:28px}

  .chart-wrap{padding:0 18px 18px}
  .chart-title{font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
    color:var(--ink-soft);margin-bottom:12px}
  .bars{display:flex;align-items:flex-end;gap:4px;height:120px}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
  .bar-col .b{width:100%;background:var(--gold);border-radius:4px 4px 0 0;min-height:3px}
  .bar-col .b.dim{background:var(--line)}
  .bar-col .x{font-size:10px;color:var(--ink-soft);text-align:center;line-height:1.2}
  .bar-col .tip{font-size:10px;color:var(--ink-soft);font-weight:600}

  .section-lbl{font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
    color:var(--ink-soft);padding:14px 18px 8px}
  .rank-item{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:12px 14px;margin:0 18px 10px}
  .rank-item .top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:7px}
  .rank-item .nm{font-size:15px;font-weight:600;flex:1}
  .rank-item .val{font-size:14px;font-weight:700;white-space:nowrap}
  .rank-item .sub{font-size:12px;color:var(--ink-soft);margin-bottom:6px}
  .bar-track{height:6px;background:var(--line-soft);border-radius:999px;overflow:hidden}
  .bar-fill{height:100%;border-radius:999px;background:var(--gold)}
  .num-badge{display:inline-flex;align-items:center;justify-content:center;
    width:22px;height:22px;border-radius:50%;background:var(--gold-lt);
    color:var(--gold-dk);font-size:12px;font-weight:700;flex-shrink:0}
  .num-badge.top1{background:var(--gold);color:#fff}

  .prev-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 18px}
  .prev-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
  .prev-card .name{font-size:15px;font-weight:700;margin-bottom:10px;
    display:flex;align-items:center;gap:6px}
  .prev-dot{width:8px;height:8px;border-radius:50%}
  .prev-stat{margin-bottom:7px}
  .prev-stat .k{font-size:11px;color:var(--ink-soft);font-weight:500;
    text-transform:uppercase;letter-spacing:.05em}
  .prev-stat .v{font-size:18px;font-weight:700;line-height:1.2}
  .prev-bar-wrap{margin-top:12px}
  .prev-bar-lbl{display:flex;justify-content:space-between;font-size:11px;
    color:var(--ink-soft);margin-bottom:4px}
  .prev-bar-track{height:8px;background:var(--line-soft);border-radius:999px;overflow:hidden}
  .prev-bar-fill{height:100%;border-radius:999px}
  .share-card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px 18px;margin:0 18px 14px}
  .share-title{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:var(--ink-soft);margin-bottom:10px}
  .share-bar{height:18px;border-radius:999px;overflow:hidden;display:flex}
  .share-seg{height:100%;display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:700;color:#fff;transition:width .4s ease}
  .share-legend{display:flex;gap:16px;margin-top:8px}
  .sl{display:flex;align-items:center;gap:5px;font-size:13px}
  .sl-dot{width:10px;height:10px;border-radius:50%}

  .loading{text-align:center;padding:48px 18px;color:var(--ink-soft);font-size:15px}
  .err-box{margin:18px;padding:14px;background:var(--red-bg);border:1px solid var(--red-tx);
    border-radius:12px;color:var(--red-tx);font-size:14px}
  .empty{text-align:center;padding:40px 18px;color:var(--ink-soft);font-size:15px}

  @media(prefers-reduced-motion:no-preference){
    .kpi,.rank-item{animation:fd .15s ease}
    @keyframes fd{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  }
</style>
</head>
<body>
<div id="root"><div class="loading">Cargando…</div></div>

<script type="module">
import { supabase } from './src/supabase.js';
import { requireSession, tienePermiso } from './src/auth.js';
import { exportCSV, imprimirPagina } from './src/utils.js?v=2';

// ── AUTH + PERMISOS ────────────────────────────────────────────────────────
const { usuario } = await requireSession();
if (!tienePermiso('ventas_totales')) { location.href = './login_home.html'; }

// ── HELPERS ────────────────────────────────────────────────────────────────
const ars = n => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(n);
const arsK = n => n >= 1000000 ? '$' + (n / 1000000).toFixed(1) + 'M' : n >= 1000 ? '$' + Math.round(n / 1000) + 'k' : '$' + n;

function formatFecha(s) {
  const [y, m, d] = s.split('-');
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(d)} ${meses[parseInt(m)-1]} ${y}`;
}

const _fmtArg = d => new Intl.DateTimeFormat('en-CA', { timeZone: 'America/Argentina/Cordoba' }).format(d);
function isoHoy() { return _fmtArg(new Date()); }
function isoOffset(days) { return _fmtArg(new Date(Date.now() + days * 86400000)); }
function inicioMes() { return isoHoy().slice(0,8) + '01'; }

const COLORES_PREV = ['#A9760E', '#2A4E9A', '#2C6B3F', '#A8392B', '#5E3A98', '#1A7A6E'];

// ── ESTADO ─────────────────────────────────────────────────────────────────
let periodo = 'mes';
let desde = inicioMes();
let hasta = isoHoy();
let tab = 'resumen';
let todosPedidos = [];  // cache full dataset
let gastosCache  = []; // [{ fecha, total_gastos }]
let gastosFijosCache = []; // [{ monto_mensual, vigente_desde, vigente_hasta, activo }]
let comisionesCache = []; // [{ id, nombre, comision_tipo, comision_valor }]

// ── CARGA ──────────────────────────────────────────────────────────────────
async function cargarPedidos() {
  // load last 6 months; filter client-side for speed
  const hace180 = isoOffset(-180);
  const [{ data, error }, { data: gas }, { data: gfij }, { data: us }] = await Promise.all([
    supabase.from('pedidos')
      .select(`
        id, fecha, estado, descuento, usuario_id,
        usuarios!pedidos_usuario_id_fkey(nombre),
        pedido_items(cantidad, precio_unit, descuento, es_bulto, u_por_bulto, costo_unit_snapshot, productos(nombre, costo, proveedores(nombre)))
      `)
      .eq('empresa_id', usuario.empresa_id)
      .in('estado', ['confirmado', 'entregado'])
      .gte('fecha', hace180)
      .order('fecha', { ascending: false }),
    supabase.from('hojas_ruta')
      .select('fecha, total_gastos')
      .eq('empresa_id', usuario.empresa_id)
      .gte('fecha', hace180.slice(0,10)),
    supabase.from('gastos_fijos')
      .select('monto_mensual, vigente_desde, vigente_hasta, activo')
      .eq('empresa_id', usuario.empresa_id)
      .eq('activo', true),
    supabase.from('usuarios')
      .select('id, nombre, comision_tipo, comision_valor')
      .eq('empresa_id', usuario.empresa_id),
  ]);

  if (error) {
    document.getElementById('root').innerHTML =
      `<div class="err-box">Error al cargar pedidos: ${error.message}</div>`;
    return;
  }
  todosPedidos = data || [];
  gastosCache  = gas || [];
  gastosFijosCache = gfij || [];
  comisionesCache = us || [];
  render();
}

// Calcula la comision total del periodo + desglose por preventista.
// Para 'porcentaje': sobre las ventas del usuario en el rango (con desc generales aplicados).
// Para 'fijo': prorratea por dias corridos del rango sobre 30.
function calcularComisiones(pf, d1, d2) {
  const ventasPorUsuario = {};
  pf.forEach(p => {
    if (!p.usuario_id) return;
    const sub = (p.pedido_items || []).reduce((s, it) =>
      s + it.cantidad * it.precio_unit * (1 - (it.descuento || 0) / 100), 0);
    const tot = sub * (1 - (p.descuento || 0) / 100);
    ventasPorUsuario[p.usuario_id] = (ventasPorUsuario[p.usuario_id] || 0) + tot;
  });
  const diasRango = (new Date(d2 + 'T00:00:00') - new Date(d1 + 'T00:00:00')) / 86400000 + 1;
  const desglose = [];
  let total = 0;
  for (const u of comisionesCache) {
    const ventas = ventasPorUsuario[u.id] || 0;
    let monto = 0;
    if (u.comision_tipo === 'porcentaje' && ventas > 0) {
      monto = ventas * Number(u.comision_valor || 0) / 100;
    } else if (u.comision_tipo === 'fijo' && Number(u.comision_valor) > 0) {
      monto = Number(u.comision_valor) * diasRango / 30;
    }
    if (monto > 0) {
      desglose.push({ nombre: u.nombre, tipo: u.comision_tipo, valor: u.comision_valor, ventas, monto });
      total += monto;
    }
  }
  return { total, desglose };
}

// Prorrateo de gastos fijos por dias corridos en [d1, d2].
// Para cada gasto: dias_intersec / 30 * monto_mensual.
function prorrateoGastosFijos(d1, d2) {
  if (!gastosFijosCache.length) return 0;
  const t1 = new Date(d1 + 'T00:00:00').getTime();
  const t2 = new Date(d2 + 'T00:00:00').getTime();
  let total = 0;
  for (const g of gastosFijosCache) {
    const gd = new Date(g.vigente_desde + 'T00:00:00').getTime();
    const gh = g.vigente_hasta
      ? new Date(g.vigente_hasta + 'T00:00:00').getTime()
      : Infinity;
    const a = Math.max(t1, gd);
    const b = Math.min(t2, gh);
    if (a > b) continue;
    const dias = Math.round((b - a) / 86400000) + 1;
    total += Number(g.monto_mensual) * dias / 30;
  }
  return total;
}

function totalPedido(p) {
  // cantidad ya esta en unidades sueltas (bulto de 12 = cantidad 12)
  const sub = (p.pedido_items || []).reduce((s, it) =>
    s + it.cantidad * it.precio_unit * (1 - (it.descuento || 0) / 100), 0);
  return sub * (1 - (p.descuento || 0) / 100);
}

function pedidosFiltrados() {
  return todosPedidos.filter(p => {
    const d = (p.fecha || '').slice(0, 10);
    return d >= desde && d <= hasta;
  });
}

// Periodo anterior de igual longitud (en dias corridos)
function rangoAnterior() {
  const d1 = new Date(desde + 'T00:00:00');
  const d2 = new Date(hasta + 'T00:00:00');
  const dias = Math.round((d2 - d1) / 86400000) + 1;
  const a2 = new Date(d1); a2.setDate(a2.getDate() - 1);
  const a1 = new Date(a2); a1.setDate(a1.getDate() - (dias - 1));
  return { desde: a1.toISOString().slice(0,10), hasta: a2.toISOString().slice(0,10) };
}
function pedidosFiltradosPrev() {
  const { desde: d1, hasta: d2 } = rangoAnterior();
  return todosPedidos.filter(p => {
    const d = (p.fecha || '').slice(0, 10);
    return d >= d1 && d <= d2;
  });
}
function gastosPrev() {
  const { desde: d1, hasta: d2 } = rangoAnterior();
  return gastosCache.filter(g => g.fecha >= d1 && g.fecha <= d2)
    .reduce((s, g) => s + (Number(g.total_gastos) || 0), 0);
}

// Devuelve {pct, dir, html} comparando actual vs anterior
function delta(actual, anterior) {
  if (anterior === 0 && actual === 0) return { html: '' };
  if (anterior === 0) return { html: `<span class="delta up">nuevo</span>` };
  const pct = (actual - anterior) / Math.abs(anterior) * 100;
  const dir = Math.abs(pct) < 0.5 ? 'flat' : (pct > 0 ? 'up' : 'down');
  const sig = pct > 0 ? '+' : '';
  return { html: `<span class="delta ${dir}">${sig}${pct.toFixed(0)}% vs anterior</span>` };
}

// ── RENDER PRINCIPAL ───────────────────────────────────────────────────────
function render() {
  const el = document.getElementById('root');
  const pf = pedidosFiltrados();
  const totalVentas = pf.reduce((s, p) => s + totalPedido(p), 0);
  const cantPedidos = pf.length;
  const ticket = cantPedidos ? Math.round(totalVentas / cantPedidos) : 0;

  el.innerHTML = `
    <div class="hdr">
      <div class="brand"><span class="crown">&#9818;</span>
        <div>El Rey<small>Ventas</small></div>
      </div>
      <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
        <button style="background:var(--gold-lt);border:1px solid var(--gold);color:var(--gold-dk);padding:5px 11px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit"
          onclick="window._exportar()" title="Exportar CSV">⬇ CSV</button>
        <button style="background:none;border:none;font-size:13px;color:var(--gold);font-weight:600;cursor:pointer;font-family:inherit"
          onclick="location.href='./login_home.html'">Inicio ›</button>
      </div>
    </div>

    <div class="periodo-wrap">
      <div class="periodo-chips">
        ${[['hoy','Hoy'],['semana','Esta semana'],['mes','Este mes'],['rango','Rango libre']].map(([id, lbl]) =>
          `<div class="pchip ${periodo === id ? 'active' : ''}" onclick="window._setPeriodo('${id}')">${lbl}</div>`
        ).join('')}
      </div>
      ${periodo === 'rango' ? `
        <div class="date-range">
          <input type="date" value="${desde}" onchange="window._setDesde(this.value)">
          <input type="date" value="${hasta}" onchange="window._setHasta(this.value)">
        </div>` : `
        <div style="font-size:13px;color:var(--ink-soft);padding-top:2px">
          ${desde === hasta ? formatFecha(desde) : `${formatFecha(desde)} → ${formatFecha(hasta)}`}
        </div>`}
    </div>

    <div class="tabs">
      ${[['resumen','Resumen'],['productos','Productos'],['proveedores','Proveedores'],['preventistas','Preventistas'],['ganancia','Ganancia']].map(([id, lbl]) =>
        `<div class="tab ${tab === id ? 'active' : ''}" onclick="window._setTab('${id}')">${lbl}</div>`
      ).join('')}
    </div>

    <div id="content"></div>`;

  const pfPrev = pedidosFiltradosPrev();
  const ventasPrev = pfPrev.reduce((s, p) => s + totalPedido(p), 0);
  const pedidosPrev = pfPrev.length;
  const ticketPrev = pedidosPrev ? Math.round(ventasPrev / pedidosPrev) : 0;
  const prev = { pfPrev, ventasPrev, pedidosPrev, ticketPrev };

  if (tab === 'resumen')          renderResumen(pf, totalVentas, cantPedidos, ticket, prev);
  else if (tab === 'productos')   renderProductos(pf);
  else if (tab === 'proveedores') renderProveedoresTab(pf, totalVentas);
  else if (tab === 'ganancia')    renderGanancia(pf, totalVentas, prev);
  else                            renderPreventistas(pf, totalVentas);
}

// ── TAB PROVEEDORES ────────────────────────────────────────────────────────
function renderProveedoresTab(pf, totalVentas) {
  const box = document.getElementById('content');
  const mapa = {};
  pf.forEach(ped => {
    const descGral = 1 - (ped.descuento || 0) / 100;
    (ped.pedido_items || []).forEach(it => {
      const prov = it.productos?.proveedores?.nombre || 'Sin proveedor';
      const costoUnit = it.costo_unit_snapshot != null
        ? Number(it.costo_unit_snapshot)
        : Number(it.productos?.costo || 0);
      const ingreso = it.cantidad * it.precio_unit * (1 - (it.descuento || 0) / 100) * descGral;
      const costo   = it.cantidad * costoUnit;
      if (!mapa[prov]) mapa[prov] = { prov, ingreso: 0, costo: 0, u: 0, pedidos: new Set() };
      mapa[prov].ingreso += ingreso;
      mapa[prov].costo   += costo;
      mapa[prov].u       += it.cantidad;
      mapa[prov].pedidos.add(ped.id);
    });
  });
  const lista = Object.values(mapa).map(x => ({
    ...x,
    ganancia: x.ingreso - x.costo,
    margen:   x.ingreso > 0 ? (x.ingreso - x.costo) / x.ingreso * 100 : 0,
    share:    totalVentas > 0 ? x.ingreso / totalVentas * 100 : 0,
    cantPed:  x.pedidos.size,
  })).sort((a, b) => b.ingreso - a.ingreso);

  if (!lista.length) { box.innerHTML = `<div class="empty">Sin ventas en el período.</div>`; return; }
  const maxIng = lista[0].ingreso || 1;
  box.innerHTML = `
    <div class="section-lbl">Ranking por ventas</div>
    ${lista.map((p, i) => `
      <div class="rank-item">
        <div class="top">
          <span class="num-badge ${i === 0 ? 'top1' : ''}">${i + 1}</span>
          <span class="nm">${p.prov}</span>
          <span class="val">${ars(p.ingreso)}</span>
        </div>
        <div class="sub">${p.u} u · ${p.cantPed} pedidos · ${p.share.toFixed(0)}% · margen ${p.margen.toFixed(0)}% · ganancia ${ars(p.ganancia)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(p.ingreso / maxIng * 100)}%"></div></div>
      </div>`).join('')}`;
}

// ── TAB GANANCIA ───────────────────────────────────────────────────────────
function renderGanancia(pf, totalVentas, prev) {
  const box = document.getElementById('content');

  // Costo de lo vendido: snapshot si existe (preciso), sino costo actual (aprox)
  const calcCosto = (pedidos) => {
    let costo = 0;
    pedidos.forEach(ped => {
      (ped.pedido_items || []).forEach(it => {
        const costoUnit = it.costo_unit_snapshot != null
          ? Number(it.costo_unit_snapshot)
          : Number(it.productos?.costo || 0);
        costo += it.cantidad * costoUnit;
      });
    });
    return costo;
  };
  const costoPrev = calcCosto(prev?.pfPrev || []);
  const r = rangoAnterior();
  const fijosPrev = prorrateoGastosFijos(r.desde, r.hasta);
  const comPrev = calcularComisiones(prev?.pfPrev || [], r.desde, r.hasta);
  const gastosPrevTotal = gastosPrev() + fijosPrev + comPrev.total;
  const gananciaBrutaPrev = (prev?.ventasPrev || 0) - costoPrev;
  const gananciaNetaPrev = gananciaBrutaPrev - gastosPrevTotal;

  let costoTotal = 0;
  let sinSnapshot = 0;
  pf.forEach(ped => {
    const descGral = 1 - (ped.descuento || 0) / 100;
    (ped.pedido_items || []).forEach(it => {
      const costoUnit = it.costo_unit_snapshot != null
        ? Number(it.costo_unit_snapshot)
        : Number(it.productos?.costo || 0);
      if (it.costo_unit_snapshot == null) sinSnapshot += 1;
      costoTotal += it.cantidad * costoUnit;
      // descGral usado solo para info de ventas, no afecta costo
      void descGral;
    });
  });

  const gastosHojas = gastosCache
    .filter(g => g.fecha >= desde && g.fecha <= hasta)
    .reduce((s, g) => s + (Number(g.total_gastos) || 0), 0);
  const gastosFijosTotal = prorrateoGastosFijos(desde, hasta);
  const com = calcularComisiones(pf, desde, hasta);
  const totalGastos = gastosHojas + gastosFijosTotal + com.total;

  const gananciaBruta = totalVentas - costoTotal;
  const margenPct = totalVentas > 0 ? gananciaBruta / totalVentas * 100 : 0;
  const gananciaNeta = gananciaBruta - totalGastos;

  // Top productos por ganancia aportada
  const mapa = {};
  pf.forEach(ped => {
    const descGral = 1 - (ped.descuento || 0) / 100;
    (ped.pedido_items || []).forEach(it => {
      const nom = it.productos?.nombre || '(sin nombre)';
      const costoUnit = it.costo_unit_snapshot != null
        ? Number(it.costo_unit_snapshot)
        : Number(it.productos?.costo || 0);
      const ingreso = it.cantidad * it.precio_unit * (1 - (it.descuento || 0) / 100) * descGral;
      const costo   = it.cantidad * costoUnit;
      const gan     = ingreso - costo;
      if (!mapa[nom]) mapa[nom] = { nom, ingreso: 0, costo: 0, ganancia: 0, u: 0 };
      mapa[nom].ingreso  += ingreso;
      mapa[nom].costo    += costo;
      mapa[nom].ganancia += gan;
      mapa[nom].u        += it.cantidad;
    });
  });
  const ranking = Object.values(mapa).sort((a, b) => b.ganancia - a.ganancia);
  const maxGan = ranking[0]?.ganancia || 1;

  // Productos vendidos con margen < 20% (sospechosos)
  const bajoMargen = ranking
    .filter(p => p.ingreso > 0 && (p.ganancia / p.ingreso * 100) < 20)
    .slice(0, 10);

  const dNeta = delta(gananciaNeta, gananciaNetaPrev);
  const dBruta = delta(gananciaBruta, gananciaBrutaPrev);
  const dVentas = delta(totalVentas, prev?.ventasPrev || 0);
  box.innerHTML = `
    <div class="kpis">
      <div class="kpi wide">
        <div>
          <div class="num green">${ars(gananciaNeta)}</div>
          <div class="lbl">Ganancia neta (después de gastos)</div>
          ${dNeta.html}
        </div>
      </div>
      <div class="kpi">
        <div class="num gold">${ars(gananciaBruta)}</div>
        <div class="lbl">Ganancia bruta</div>
        ${dBruta.html}
      </div>
      <div class="kpi">
        <div class="num">${margenPct.toFixed(1)}%</div>
        <div class="lbl">Margen global</div>
      </div>
      <div class="kpi">
        <div class="num">${ars(totalVentas)}</div>
        <div class="lbl">Ventas</div>
        ${dVentas.html}
      </div>
      <div class="kpi">
        <div class="num" style="color:var(--red-tx)">−${ars(costoTotal)}</div>
        <div class="lbl">Costo de lo vendido</div>
      </div>
      ${gastosHojas > 0 ? `
        <div class="kpi wide">
          <div>
            <div class="num" style="color:var(--red-tx)">−${ars(gastosHojas)}</div>
            <div class="lbl">Gastos del período (hojas cerradas)</div>
          </div>
        </div>` : ''}
      ${gastosFijosTotal > 0 ? `
        <div class="kpi wide">
          <div>
            <div class="num" style="color:var(--red-tx)">−${ars(gastosFijosTotal)}</div>
            <div class="lbl">Gastos fijos prorrateados</div>
          </div>
        </div>` : ''}
      ${com.total > 0 ? `
        <div class="kpi wide">
          <div>
            <div class="num" style="color:var(--red-tx)">−${ars(com.total)}</div>
            <div class="lbl">Comisiones de preventistas</div>
            <div style="margin-top:6px;font-size:12px;color:var(--ink-soft);font-weight:500;line-height:1.5">
              ${com.desglose.map(d => `${d.nombre}: ${ars(d.monto)} <span style="opacity:.7">(${d.tipo === 'porcentaje' ? d.valor + '% s/ ' + ars(d.ventas) : ars(d.valor) + '/mes'})</span>`).join('<br>')}
            </div>
          </div>
        </div>` : ''}
    </div>
    ${sinSnapshot > 0 ? `
      <div style="margin:0 18px 14px;padding:10px 12px;background:var(--amber-bg);border:1px solid var(--amber-tx);border-radius:10px;font-size:12px;color:var(--amber-tx);line-height:1.4">
        ⚠ ${sinSnapshot} ítem${sinSnapshot===1?'':'s'} sin snapshot de costo — para esos uso el costo actual del producto. Pedidos cargados antes del cambio.
      </div>` : ''}
    ${ranking.length ? `
      <div class="section-lbl">Top productos por ganancia aportada</div>
      ${ranking.slice(0, 10).map((p, i) => `
        <div class="rank-item">
          <div class="top">
            <span class="num-badge ${i === 0 ? 'top1' : ''}">${i + 1}</span>
            <span class="nm">${p.nom}</span>
            <span class="val" style="color:var(--green-tx)">${ars(p.ganancia)}</span>
          </div>
          <div class="sub">${p.u} u · ${ars(p.ingreso)} venta · margen ${(p.ingreso > 0 ? p.ganancia/p.ingreso*100 : 0).toFixed(0)}%</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.max(0, Math.round(p.ganancia / maxGan * 100))}%"></div></div>
        </div>`).join('')}` : ''}
    ${bajoMargen.length ? `
      <div class="section-lbl" style="margin-top:8px">⚠ Vendidos con margen &lt; 20%</div>
      ${bajoMargen.map(p => {
        const m = p.ganancia / p.ingreso * 100;
        return `<div class="rank-item">
          <div class="top">
            <span class="nm">${p.nom}</span>
            <span class="val" style="color:${m<0?'var(--red-tx)':'var(--amber-tx)'}">${m.toFixed(0)}%</span>
          </div>
          <div class="sub">${ars(p.ganancia)} de ganancia en ${p.u} u vendidas</div>
        </div>`;
      }).join('')}` : ''}
  `;
}

// ── TAB RESUMEN ────────────────────────────────────────────────────────────
function renderResumen(pf, totalVentas, cantPedidos, ticket, prev) {
  const box = document.getElementById('content');
  const dV = delta(totalVentas, prev.ventasPrev);
  const dP = delta(cantPedidos, prev.pedidosPrev);
  const dT = delta(ticket, prev.ticketPrev);
  box.innerHTML = `
    <div class="kpis">
      <div class="kpi wide">
        <div>
          <div class="num gold">${ars(totalVentas)}</div>
          <div class="lbl">Total vendido</div>
          ${dV.html}
        </div>
      </div>
      <div class="kpi">
        <div class="num">${cantPedidos}</div>
        <div class="lbl">Pedidos</div>
        ${dP.html}
      </div>
      <div class="kpi">
        <div class="num green">${ars(ticket)}</div>
        <div class="lbl">Ticket promedio</div>
        ${dT.html}
      </div>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">Ventas por día</div>
      <div id="chart"></div>
    </div>`;
  renderChart(pf);
}

function renderChart(pf) {
  const box = document.getElementById('chart'); if (!box) return;
  const d1 = new Date(desde), d2 = new Date(hasta);
  const dias = [];
  for (let d = new Date(d1); d <= d2; d.setDate(d.getDate() + 1)) {
    dias.push(d.toISOString().slice(0, 10));
  }
  if (dias.length > 31) {
    box.innerHTML = `<div style="font-size:13px;color:var(--ink-soft)">Seleccioná un rango menor a 31 días para ver el gráfico.</div>`;
    return;
  }
  const porDia = dias.map(f => ({
    f, total: pf.filter(p => p.fecha === f).reduce((s, p) => s + totalPedido(p), 0)
  }));
  const max = Math.max(...porDia.map(d => d.total), 1);
  const mostrar = (i, total) => total <= 10 || i % (Math.ceil(total / 7)) === 0;
  box.innerHTML = `<div class="bars">
    ${porDia.map((d, i) => {
      const h = Math.round(d.total / max * 110);
      return `<div class="bar-col">
        <span class="tip" style="visibility:${d.total ? 'visible' : 'hidden'};font-size:${porDia.length > 14 ? '9px' : '10px'}">${d.total ? arsK(d.total) : ''}</span>
        <div class="b ${d.total ? '' : 'dim'}" style="height:${Math.max(h, d.total ? 4 : 3)}px"></div>
        <span class="x">${mostrar(i, porDia.length) ? d.f.slice(8) : ''}</span>
      </div>`;
    }).join('')}
  </div>`;
}

// ── TAB PRODUCTOS ──────────────────────────────────────────────────────────
function renderProductos(pf) {
  const box = document.getElementById('content');
  const mapa = {};
  pf.forEach(ped => {
    const descGral = 1 - (ped.descuento || 0) / 100;
    (ped.pedido_items || []).forEach(it => {
      const nom = it.productos?.nombre || '(sin nombre)';
      if (!mapa[nom]) mapa[nom] = { nom, u: 0, monto: 0 };
      mapa[nom].u += it.cantidad;
      mapa[nom].monto += it.cantidad * it.precio_unit * (1 - (it.descuento || 0) / 100) * descGral;
    });
  });
  const lista = Object.values(mapa).sort((a, b) => b.monto - a.monto);
  if (!lista.length) { box.innerHTML = `<div class="empty">Sin ventas en este período.</div>`; return; }
  const maxMonto = lista[0].monto || 1;
  const maxU = Math.max(...lista.map(p => p.u), 1);
  box.innerHTML = `
    <div class="section-lbl">Por monto vendido</div>
    ${lista.map((p, i) => `
      <div class="rank-item">
        <div class="top">
          <span class="num-badge ${i === 0 ? 'top1' : ''}">${i + 1}</span>
          <span class="nm">${p.nom}</span>
          <span class="val">${ars(p.monto)}</span>
        </div>
        <div class="sub">${p.u} unidades</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(p.monto / maxMonto * 100)}%"></div></div>
      </div>`).join('')}
    <div class="section-lbl" style="margin-top:8px">Por unidades</div>
    ${[...lista].sort((a, b) => b.u - a.u).map((p, i) => `
      <div class="rank-item">
        <div class="top">
          <span class="num-badge ${i === 0 ? 'top1' : ''}">${i + 1}</span>
          <span class="nm">${p.nom}</span>
          <span class="val">${p.u} u</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(p.u / maxU * 100)}%"></div></div>
      </div>`).join('')}`;
}

// ── TAB PREVENTISTAS ───────────────────────────────────────────────────────
function renderPreventistas(pf, totalVentas) {
  const box = document.getElementById('content');
  // derive preventistas from data
  const nombresSet = new Set(pf.map(p => p.usuarios?.nombre).filter(Boolean));
  const preventistas = [...nombresSet].map((nombre, i) => ({ nombre, color: COLORES_PREV[i % COLORES_PREV.length] }));

  if (!preventistas.length) { box.innerHTML = `<div class="empty">Sin datos de preventistas en este período.</div>`; return; }

  const stats = preventistas.map(prev => {
    const mis = pf.filter(p => p.usuarios?.nombre === prev.nombre);
    const monto = mis.reduce((s, p) => s + totalPedido(p), 0);
    const cant = mis.length;
    const ticket = cant ? Math.round(monto / cant) : 0;
    const share = totalVentas ? Math.round(monto / totalVentas * 100) : 0;
    return { ...prev, monto, cant, ticket, share };
  });

  box.innerHTML = `
    <div class="section-lbl">Participación en ventas</div>
    <div class="share-card">
      <div class="share-bar">
        ${stats.map(s => `<div class="share-seg" style="width:${s.share}%;background:${s.color}">
          ${s.share > 8 ? s.share + '%' : ''}</div>`).join('')}
      </div>
      <div class="share-legend">
        ${stats.map(s => `<div class="sl">
          <div class="sl-dot" style="background:${s.color}"></div>
          <span>${s.nombre} ${s.share}%</span>
        </div>`).join('')}
      </div>
    </div>
    <div class="prev-cards">
      ${stats.map(s => `<div class="prev-card">
        <div class="name">
          <div class="prev-dot" style="background:${s.color}"></div>${s.nombre}
        </div>
        <div class="prev-stat"><div class="k">Vendido</div>
          <div class="v" style="color:${s.color}">${ars(s.monto)}</div></div>
        <div class="prev-stat"><div class="k">Pedidos</div><div class="v">${s.cant}</div></div>
        <div class="prev-stat"><div class="k">Ticket prom.</div><div class="v">${ars(s.ticket)}</div></div>
        <div class="prev-bar-wrap">
          <div class="prev-bar-lbl"><span>Participación</span><span>${s.share}%</span></div>
          <div class="prev-bar-track">
            <div class="prev-bar-fill" style="width:${s.share}%;background:${s.color}"></div>
          </div>
        </div>
      </div>`).join('')}
    </div>`;
}

// ── WINDOW EXPOSURE ────────────────────────────────────────────────────────
window._exportar = () => {
  const pf = pedidosFiltrados();
  const nombre = `ventas_${desde}_${hasta}`;
  if (tab === 'productos' || tab === 'resumen') {
    const mapa = {};
    pf.forEach(ped => {
      const descGral = 1 - (ped.descuento || 0) / 100;
      (ped.pedido_items || []).forEach(it => {
        const nom = it.productos?.nombre || '(sin nombre)';
        const monto = it.cantidad * it.precio_unit * (1 - (it.descuento || 0) / 100) * descGral;
        if (!mapa[nom]) mapa[nom] = { producto: nom, unidades: 0, monto: 0 };
        mapa[nom].unidades += it.cantidad;
        mapa[nom].monto    += monto;
      });
    });
    const filas = Object.values(mapa).sort((a,b) => b.monto - a.monto);
    exportCSV(nombre, [
      { key: 'producto', label: 'Producto' },
      { key: 'unidades', label: 'Unidades' },
      { key: 'monto', label: 'Monto', format: v => Math.round(v) },
    ], filas);
  } else if (tab === 'proveedores') {
    const mapa = {};
    pf.forEach(ped => {
      const descGral = 1 - (ped.descuento || 0) / 100;
      (ped.pedido_items || []).forEach(it => {
        const prov = it.productos?.proveedores?.nombre || 'Sin proveedor';
        const ingreso = it.cantidad * it.precio_unit * (1 - (it.descuento || 0) / 100) * descGral;
        const cu = it.costo_unit_snapshot != null ? Number(it.costo_unit_snapshot) : Number(it.productos?.costo || 0);
        const costo = it.cantidad * cu;
        if (!mapa[prov]) mapa[prov] = { proveedor: prov, unidades: 0, ingreso: 0, costo: 0 };
        mapa[prov].unidades += it.cantidad;
        mapa[prov].ingreso  += ingreso;
        mapa[prov].costo    += costo;
      });
    });
    const filas = Object.values(mapa).map(r => ({ ...r, ganancia: r.ingreso - r.costo,
      margen: r.ingreso > 0 ? (r.ingreso - r.costo) / r.ingreso * 100 : 0
    })).sort((a,b) => b.ingreso - a.ingreso);
    exportCSV(nombre + '_proveedores', [
      { key: 'proveedor', label: 'Proveedor' },
      { key: 'unidades', label: 'Unidades' },
      { key: 'ingreso', label: 'Ingreso', format: v => Math.round(v) },
      { key: 'costo', label: 'Costo', format: v => Math.round(v) },
      { key: 'ganancia', label: 'Ganancia', format: v => Math.round(v) },
      { key: 'margen', label: 'Margen %', format: v => v.toFixed(1) },
    ], filas);
  } else if (tab === 'preventistas') {
    const mapa = {};
    pf.forEach(ped => {
      const nom = ped.usuarios?.nombre || '(sin)';
      const t = totalPedido(ped);
      if (!mapa[nom]) mapa[nom] = { preventista: nom, pedidos: 0, monto: 0 };
      mapa[nom].pedidos += 1;
      mapa[nom].monto   += t;
    });
    exportCSV(nombre + '_preventistas', [
      { key: 'preventista', label: 'Preventista' },
      { key: 'pedidos', label: 'Pedidos' },
      { key: 'monto', label: 'Monto', format: v => Math.round(v) },
    ], Object.values(mapa).sort((a,b) => b.monto - a.monto));
  } else {
    // ganancia → por producto
    const mapa = {};
    pf.forEach(ped => {
      const descGral = 1 - (ped.descuento || 0) / 100;
      (ped.pedido_items || []).forEach(it => {
        const nom = it.productos?.nombre || '(sin nombre)';
        const ingreso = it.cantidad * it.precio_unit * (1 - (it.descuento || 0) / 100) * descGral;
        const cu = it.costo_unit_snapshot != null ? Number(it.costo_unit_snapshot) : Number(it.productos?.costo || 0);
        const costo = it.cantidad * cu;
        if (!mapa[nom]) mapa[nom] = { producto: nom, unidades: 0, ingreso: 0, costo: 0 };
        mapa[nom].unidades += it.cantidad;
        mapa[nom].ingreso  += ingreso;
        mapa[nom].costo    += costo;
      });
    });
    const filas = Object.values(mapa).map(r => ({ ...r, ganancia: r.ingreso - r.costo }))
      .sort((a,b) => b.ganancia - a.ganancia);
    exportCSV(nombre + '_ganancia', [
      { key: 'producto', label: 'Producto' },
      { key: 'unidades', label: 'Unidades' },
      { key: 'ingreso', label: 'Ingreso', format: v => Math.round(v) },
      { key: 'costo', label: 'Costo', format: v => Math.round(v) },
      { key: 'ganancia', label: 'Ganancia', format: v => Math.round(v) },
    ], filas);
  }
};

// Semana = sábado a viernes. Devuelve el sábado mas reciente <= hoy.
function inicioSemana() {
  const t = isoHoy();
  const [y, m, d] = t.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d, 12));
  const dow = dt.getUTCDay();           // 0=dom..6=sab
  const diff = (dow - 6 + 7) % 7;       // dias desde el ultimo sabado
  dt.setUTCDate(dt.getUTCDate() - diff);
  return dt.toISOString().slice(0, 10);
}

window._setPeriodo = (p) => {
  periodo = p;
  const hoy = isoHoy();
  if (p === 'hoy')    { desde = hoy;          hasta = hoy; }
  if (p === 'semana') { desde = inicioSemana(); hasta = hoy; }
  if (p === 'mes')    { desde = inicioMes();   hasta = hoy; }
  render();
};
window._setDesde = v => { desde = v; render(); };
window._setHasta = v => { hasta = v; render(); };
window._setTab   = v => { tab = v; render(); };

// ── INIT ───────────────────────────────────────────────────────────────────
await cargarPedidos();
</script>
