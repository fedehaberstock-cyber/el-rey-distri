<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="./src/logger.js"></script>
<title>El Rey · Catálogo y precios</title>
<style>
  :root{
    --paper:#FBF9F2; --ink:#1C2B27; --ink-soft:#5B665F;
    --line:#E4DECF;  --line-soft:#EEEADD;
    --gold:#A9760E;  --gold-dk:#8A5F09; --gold-lt:#F5E9D0;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{overscroll-behavior-y:contain;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px;line-height:1.4;min-height:100vh}
  body{max-width:480px;margin:0 auto}

  .hdr{display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:1px solid var(--line);background:var(--paper);
    position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:8px;font-weight:600}
  .crown{color:var(--gold);font-size:20px}
  .brand small{display:block;font-size:11px;font-weight:500;color:var(--ink-soft);
    letter-spacing:.06em;text-transform:uppercase}
  .back{background:none;border:none;font-size:13px;color:var(--gold);font-weight:600;
    cursor:pointer;font-family:inherit}

  .home-body{padding:20px 18px}
  .sec-title{font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
    color:var(--ink-soft);margin-bottom:10px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .action-card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:18px 16px;cursor:pointer;display:flex;flex-direction:column;gap:8px}
  .action-card:active{background:var(--line-soft)}
  .action-card .icon{font-size:26px;line-height:1}
  .action-card .ac-title{font-size:15px;font-weight:700}
  .action-card .ac-desc{font-size:13px;color:var(--ink-soft);line-height:1.3}

  @media(prefers-reduced-motion:no-preference){
    .action-card{animation:fd .15s ease}
    @keyframes fd{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  }
</style>
</head>
<body>
<div id="root"><div style="padding:40px;text-align:center;color:var(--ink-soft)">Cargando…</div></div>

<script type="module">
import { requireSession, tienePermiso } from './src/auth.js';

await requireSession();
if (!tienePermiso('catalogo')) { location.href = './login_home.html'; throw new Error('sin permiso'); }

document.getElementById('root').innerHTML = `
  <div class="hdr">
    <div class="brand"><span class="crown">&#9818;</span>
      <div>El Rey<small>Catálogo y precios</small></div>
    </div>
    <button class="back" onclick="location.href='./login_home.html'">Inicio ›</button>
  </div>
  <div class="home-body">
    <div class="sec-title">Catálogo</div>
    <div class="grid" style="margin-bottom:22px">
      <div class="action-card" onclick="location.href='./catalogo.html'">
        <div class="icon">🗂️</div><div class="ac-title">Productos</div>
        <div class="ac-desc">Catálogo completo, alta y baja</div>
      </div>
      <div class="action-card" onclick="location.href='./subcategorias.html'">
        <div class="icon">🏷️</div><div class="ac-title">Subcategorías</div>
        <div class="ac-desc">Agrupar por laboratorio/marca</div>
      </div>
    </div>

    <div class="sec-title">Precios</div>
    <div class="grid">
      <div class="action-card" onclick="location.href='./ajustar_precios.html'">
        <div class="icon">📈</div><div class="ac-title">Ajuste de precios</div>
        <div class="ac-desc">Masivo por inflación</div>
      </div>
      <div class="action-card" onclick="location.href='./markups.html'">
        <div class="icon">📊</div><div class="ac-title">Markups</div>
        <div class="ac-desc">Margen objetivo por producto</div>
      </div>
      <div class="action-card" onclick="location.href='./descuentos.html'">
        <div class="icon">🏷️</div><div class="ac-title">Plantillas de descuento</div>
        <div class="ac-desc">Reglas reutilizables por cliente</div>
      </div>
      <div class="action-card" onclick="location.href='./historial_ingresos.html'">
        <div class="icon">📥</div><div class="ac-title">Historial de ingresos</div>
        <div class="ac-desc">Boletas de compra recibidas</div>
      </div>
    </div>
  </div>
`;
</script>
</body>
</html>
