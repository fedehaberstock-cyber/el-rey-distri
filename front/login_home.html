<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="./src/logger.js"></script>
<title>El Rey · Acceso</title>
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#1C2B27">
<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="El Rey">
<link rel="apple-touch-icon" href="./icons/icon-maskable.svg">
<script src="./src/register-sw.js"></script>
<style>
  :root{
    --paper:#FBF9F2; --ink:#1C2B27; --ink-soft:#5B665F;
    --line:#E4DECF;  --line-soft:#EEEADD;
    --gold:#A9760E;  --gold-dk:#8A5F09; --gold-lt:#F5E9D0;
    --green-bg:#E7F0E8; --green-tx:#2C6B3F;
    --amber-bg:#FDF2DC; --amber-tx:#8A5F09;
    --red-bg:#F6E5E2;   --red-tx:#A8392B;
    --blue-bg:#E8F0FB;  --blue-tx:#2A4E9A;
    --purple-bg:#F4EEFB;--purple-tx:#5E3A98;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px;line-height:1.4;min-height:100vh}
  body{max-width:480px;margin:0 auto}

  /* ── LOGIN ─────────────────────────────────────────────────────── */
  .login-wrap{min-height:100vh;display:flex;flex-direction:column;
    justify-content:center;padding:32px 28px}
  .login-brand{text-align:center;margin-bottom:40px}
  .login-crown{font-size:52px;line-height:1;color:var(--gold)}
  .login-nombre{font-size:26px;font-weight:700;letter-spacing:-.01em;margin-top:6px}
  .login-sub{font-size:14px;color:var(--ink-soft);margin-top:2px;letter-spacing:.04em;text-transform:uppercase;font-weight:500}
  .login-form{display:flex;flex-direction:column;gap:14px}
  .fl{display:block;font-size:12px;font-weight:600;letter-spacing:.07em;
    text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
  .field{width:100%;padding:14px;border:1px solid var(--line);border-radius:12px;
    background:var(--card);font-size:16px;font-family:inherit;color:var(--ink)}
  .field:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:transparent}
  .login-btn{width:100%;padding:16px;border:none;border-radius:14px;
    background:var(--gold);color:#fff;font-size:17px;font-weight:600;
    cursor:pointer;font-family:inherit;margin-top:6px}
  .login-btn:active{background:var(--gold-dk)}
  .login-btn:disabled{background:var(--line);color:var(--ink-soft);cursor:not-allowed}
  .login-error{background:var(--red-bg);color:var(--red-tx);padding:12px 14px;
    border-radius:10px;font-size:14px;font-weight:600;text-align:center;display:none}
  .login-error.show{display:block}
  .demo-hint{text-align:center;font-size:13px;color:var(--ink-soft);margin-top:20px}
  .demo-chips{display:flex;justify-content:center;gap:8px;margin-top:8px;flex-wrap:wrap}
  .demo-chip{padding:6px 14px;border:1px solid var(--line);border-radius:999px;
    font-size:13px;font-weight:600;cursor:pointer;color:var(--ink-soft);background:var(--card)}
  .demo-chip:active{background:var(--line-soft)}

  /* ── HOME ──────────────────────────────────────────────────────── */
  .hdr{padding:16px 20px 14px;border-bottom:1px solid var(--line);
    background:var(--paper);display:flex;justify-content:space-between;align-items:center}
  .hdr-left .greeting{font-size:13px;color:var(--ink-soft);font-weight:500}
  .hdr-left .username{font-size:20px;font-weight:700;letter-spacing:-.01em}
  .hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
  .rol-badge{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}
  .rol-badge.admin      {background:var(--gold-lt);color:var(--gold-dk)}
  .rol-badge.preventista{background:var(--blue-bg);color:var(--blue-tx)}
  .rol-badge.deposito   {background:var(--green-bg);color:var(--green-tx)}
  .logout-btn{background:none;border:none;font-size:13px;color:var(--ink-soft);
    cursor:pointer;font-family:inherit;padding:0}

  .home-body{padding:20px 18px}

  /* fecha */
  .fecha-hoy{font-size:13px;color:var(--ink-soft);margin-bottom:16px}

  /* sección */
  .sec-title{font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
    color:var(--ink-soft);margin-bottom:10px}

  /* grid de acciones */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
  .grid.single{grid-template-columns:1fr}
  .action-card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:18px 16px;cursor:pointer;display:flex;flex-direction:column;gap:8px;
    transition:box-shadow .15s}
  .action-card:active{background:var(--line-soft)}
  .action-card .icon{font-size:26px;line-height:1}
  .action-card .ac-title{font-size:15px;font-weight:700}
  .action-card .ac-desc{font-size:13px;color:var(--ink-soft);line-height:1.3}
  .action-card.accent{border-color:var(--gold);background:var(--gold-lt)}
  .action-card.red{border-color:var(--red-tx);background:var(--red-bg)}
  .action-card.amber{border-color:var(--amber-tx);background:var(--amber-bg)}

  /* alertas */
  .alert-banner{display:flex;align-items:center;gap:10px;padding:12px 14px;
    border-radius:12px;font-size:14px;font-weight:600;margin-bottom:10px;cursor:pointer}
  .alert-banner.red{background:var(--red-bg);color:var(--red-tx)}
  .alert-banner.amber{background:var(--amber-bg);color:var(--amber-tx)}
  .alert-banner svg{width:18px;height:18px;flex-shrink:0}

  /* resumen rápido */
  .quick-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:22px}
  .qs{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:12px;text-align:center}
  .qs .num{font-size:22px;font-weight:700;line-height:1}
  .qs .num.red{color:var(--red-tx)}
  .qs .num.amber{color:var(--amber-tx)}
  .qs .num.gold{color:var(--gold)}
  .qs .lbl{font-size:11px;color:var(--ink-soft);margin-top:3px}

  @media(prefers-reduced-motion:no-preference){
    .action-card{animation:fd .15s ease}
    @keyframes fd{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  }

  /* Banner instalación iOS */
  .ios-install{position:fixed;bottom:14px;left:14px;right:14px;max-width:452px;
    margin:0 auto;background:var(--ink);color:var(--paper);border-radius:14px;
    padding:14px 16px;font-size:14px;line-height:1.45;z-index:60;
    box-shadow:0 8px 24px rgba(0,0,0,.18);display:flex;gap:12px;align-items:flex-start}
  .ios-install .ii-icon{font-size:24px;line-height:1;flex-shrink:0}
  .ios-install b{color:#fff}
  .ios-install .ii-x{background:none;border:none;color:var(--paper);opacity:.7;
    font-size:22px;line-height:1;cursor:pointer;padding:0 2px;font-family:inherit;flex-shrink:0}
  .ios-install .ii-share{display:inline-block;background:rgba(255,255,255,.18);
    padding:1px 6px;border-radius:5px;font-weight:600}
</style>
</head>
<body>
<div id="root"></div>
<div id="ios-install-banner"></div>
<script type="module">
import { login, logout as authLogout, requireSession, getSession, getUsuario, getPermisos, tienePermiso } from './src/auth.js'
import { cap, fechaLarga } from './src/utils.js'
import { supabase } from './src/supabase.js'
import { initSync, mountStatusBadge } from './src/sync.js'

let usuarioActual = null;

// ── HELPERS ────────────────────────────────────────────────────────────
const ROLES = {
  admin:       'Administrador',
  preventista: 'Preventista',
  deposito:    'Depósito',
};
const ALERTAS = []; // se puede poblar desde Supabase en el futuro
const hoyStr = () => cap(fechaLarga(new Date()));

// expongo handlers a los onclick inline del HTML
window.intentarLogin = intentarLogin;
window.logout = handleLogout;

// ── ARRANQUE ───────────────────────────────────────────────────────────
async function arrancar(){
  try {
    const session = await getSession();
    if (session) {
      // hay sesión persistida en localStorage
      usuarioActual = getUsuario();
      if (!usuarioActual) {
        // token válido pero falta cargar perfil → forzar logout para relogear limpio
        await authLogout();
      } else {
        initSync(supabase); // no await — corre en background
      }
    }
  } catch (e) {
    console.error('[arrancar] error:', e);
  }
  render();
}

// ── RENDER PRINCIPAL ───────────────────────────────────────────────────
function render(){
  if(!usuarioActual) renderLogin();
  else               renderHome();
}

// ── LOGIN ──────────────────────────────────────────────────────────────
function renderLogin(){
  document.getElementById('root').innerHTML = `
    <div class="login-wrap">
      <div class="login-brand">
        <div class="login-crown">&#9818;</div>
        <div class="login-nombre">El Rey</div>
        <div class="login-sub">Distribuidora</div>
      </div>
      <div class="login-form">
        <div>
          <label class="fl" for="email">Usuario</label>
          <input class="field" id="email" type="email" placeholder="tu@email.com"
            autocomplete="username" inputmode="email">
        </div>
        <div>
          <label class="fl" for="pass">Contraseña</label>
          <input class="field" id="pass" type="password" placeholder="••••••"
            autocomplete="current-password"
            onkeydown="if(event.key==='Enter') window.intentarLogin()">
        </div>
        <div id="err" class="login-error">Usuario o contraseña incorrectos</div>
        <button id="login-btn" class="login-btn" onclick="window.intentarLogin()">Ingresar</button>
      </div>
    </div>`;
}

async function intentarLogin(){
  const email = document.getElementById('email')?.value;
  const pass  = document.getElementById('pass')?.value;
  const errEl = document.getElementById('err');
  const btn   = document.getElementById('login-btn');
  errEl?.classList.remove('show');

  if (!email || !pass) {
    if (errEl) { errEl.textContent = 'Completá email y contraseña'; errEl.classList.add('show'); }
    return;
  }

  if (btn) { btn.disabled = true; btn.textContent = 'Ingresando…'; }
  try {
    const { usuario } = await login(email, pass);
    usuarioActual = usuario;
    initSync(supabase); // no await — corre en background
    render();
  } catch (e) {
    if (errEl) {
      errEl.textContent = e.message?.includes('Invalid login') ? 'Usuario o contraseña incorrectos' : e.message;
      errEl.classList.add('show');
    }
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Ingresar'; }
  }
}

async function handleLogout(){
  await authLogout();
  usuarioActual = null;
  render();
}

// ── HOME ───────────────────────────────────────────────────────────────
function renderHome(){
  const u = usuarioActual;
  const el = document.getElementById('root');

  el.innerHTML = `
    <div class="hdr">
      <div class="hdr-left">
        <div class="greeting">Bienvenido,</div>
        <div class="username">${u.nombre}</div>
      </div>
      <div class="hdr-right">
        <span class="rol-badge ${u.rol}">${ROLES[u.rol]}</span>
        <div id="sync-badge"></div>
        <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
      </div>
    </div>
    <div class="home-body">
      <div class="fecha-hoy">${hoyStr()}</div>
      <div id="home-content"></div>
    </div>`;

  // montar badge después de que el DOM esté listo
  const badgeEl = document.getElementById('sync-badge');
  if (badgeEl) mountStatusBadge(badgeEl);

  const perms = getPermisos();
  const esAdmin = u.rol === 'admin'
    || Object.values(perms).some(n => n && n !== 'ninguno');
  console.log('[home] rol=', u.rol, 'perms=', perms, 'esAdmin=', esAdmin);
  if (esAdmin) renderHomeAdmin();
  else         renderHomePreventista();
}

// ── HOME ADMIN ─────────────────────────────────────────────────────────
async function renderHomeAdmin(){
  const box = document.getElementById('home-content');
  const u = usuarioActual;

  // Resumen de hoy: pedidos de hoy + deudores
  const hoy = new Date().toISOString().slice(0, 10);
  const [pedResp, deuResp, comResp] = await Promise.all([
    supabase.from('pedidos')
      .select('id, pedido_items(cantidad, precio_unit, descuento, es_bulto, u_por_bulto)')
      .eq('empresa_id', u.empresa_id)
      .in('estado', ['confirmado', 'entregado'])
      .gte('fecha', hoy + 'T00:00:00')
      .lte('fecha', hoy + 'T23:59:59'),
    supabase.from('saldo_actual')
      .select('cliente_id, saldo')
      .gt('saldo', 0),
    supabase.from('sugerencia_compra')
      .select('producto_id', { count: 'exact', head: true })
      .eq('empresa_id', u.empresa_id),
  ]);
  window._compraBadge = (comResp && comResp.count) ? comResp.count : null;

  const pedidos = pedResp.data || [];
  const totalHoy = pedidos.reduce((s, p) =>
    s + (p.pedido_items || []).reduce((si, it) =>
      si + it.cantidad * it.precio_unit * (1 - (it.descuento||0)/100), 0), 0);
  const arsHoy = new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(totalHoy);
  const deudores = (deuResp.data || []).length;

  box.innerHTML = `
    <div class="sec-title">Resumen de hoy</div>
    <div class="quick-stats">
      <div class="qs"><div class="num gold">${arsHoy}</div><div class="lbl">Vendido hoy</div></div>
      <div class="qs"><div class="num">${pedidos.length}</div><div class="lbl">Pedidos</div></div>
      <div class="qs"><div class="num red">${deudores}</div><div class="lbl">Deudores</div></div>
    </div>

  `;

  // helper: arma un tile sólo si el usuario tiene acceso
  const tile = (modulo, html) =>
    (modulo === null || tienePermiso(modulo)) ? html : '';

  const opsTiles = [
    tile('hoja_ruta', `<div class="action-card accent" onclick="location.href='./hoja_ruta.html'">
      <div class="icon">🚚</div><div class="ac-title">Hoja de ruta</div>
      <div class="ac-desc">Reparto del día</div></div>`),
    tile('pedidos', `<div class="action-card" onclick="location.href='./pedido_preventista.html'">
      <div class="icon">📋</div><div class="ac-title">Nuevo pedido</div>
      <div class="ac-desc">Cargar pedido a un cliente</div></div>`),
    (tienePermiso('catalogo') && window._compraBadge) ? `<div class="action-card amber" onclick="location.href='./compras.html'">
      <div class="icon">🛒</div><div class="ac-title">Compras <span style="background:var(--red-tx);color:#fff;padding:1px 7px;border-radius:999px;font-size:11px;margin-left:4px">${window._compraBadge}</span></div>
      <div class="ac-desc">Productos para reponer</div></div>` : '',
    tile('clientes', `<div class="action-card" onclick="location.href='./clientes.html'">
      <div class="icon">👥</div><div class="ac-title">Clientes</div>
      <div class="ac-desc">Ver y gestionar clientes</div></div>`),
    tile('stock', `<div class="action-card" onclick="location.href='./stock.html'">
      <div class="icon">🏪</div><div class="ac-title">Stock</div>
      <div class="ac-desc">Estado del depósito</div></div>`),
    tile('pedidos', `<div class="action-card" onclick="location.href='./pedidos_dia.html'">
      <div class="icon">📝</div><div class="ac-title">Pedidos del día</div>
      <div class="ac-desc">Lo cargado hoy</div></div>`),
    tile('mis_numeros', `<div class="action-card" onclick="location.href='./mis_numeros.html'">
      <div class="icon">⭐</div><div class="ac-title">Mis números</div>
      <div class="ac-desc">Ventas, ticket y conversión</div></div>`),
  ].filter(Boolean).join('');

  const repTiles = [
    tile('ventas_totales', `<div class="action-card" onclick="location.href='./reporte_ventas.html'">
      <div class="icon">📈</div><div class="ac-title">Ventas</div>
      <div class="ac-desc">Por período y preventista</div></div>`),
    tile('deudores', `<div class="action-card red" onclick="location.href='./reporte_deudores.html'">
      <div class="icon">💸</div><div class="ac-title">Deudores</div>
      <div class="ac-desc">Clientes con saldo pendiente</div></div>`),
    tile('recaudacion', `<div class="action-card" onclick="location.href='./reporte_recaudacion.html'">
      <div class="icon">💵</div><div class="ac-title">Recaudación</div>
      <div class="ac-desc">Lo cobrado por preventista</div></div>`),
    tile('ventas_totales', `<div class="action-card" onclick="location.href='./historial_hojas.html'">
      <div class="icon">📅</div><div class="ac-title">Historial de hojas</div>
      <div class="ac-desc">Hojas pasadas y boletas</div></div>`),
  ].filter(Boolean).join('');

  const cfgTiles = [
    tile('proveedores', `<div class="action-card" onclick="location.href='./proveedores.html'">
      <div class="icon">🏭</div><div class="ac-title">Proveedores</div>
      <div class="ac-desc">Cargos y condiciones</div></div>`),
    tile('zonas', `<div class="action-card" onclick="location.href='./zonas.html'">
      <div class="icon">🗺️</div><div class="ac-title">Zonas</div>
      <div class="ac-desc">Orden de reparto</div></div>`),
    tile('catalogo', `<div class="action-card" onclick="location.href='./catalogo_hub.html'">
      <div class="icon">🗂️</div><div class="ac-title">Catálogo y precios</div>
      <div class="ac-desc">Productos, markups, ajustes</div></div>`),
    tile('usuarios_permisos', `<div class="action-card" onclick="location.href='./permisos.html'">
      <div class="icon">🔐</div><div class="ac-title">Permisos</div>
      <div class="ac-desc">Accesos del equipo</div></div>`),
    tile('usuarios_permisos', `<div class="action-card" onclick="location.href='./dispositivos.html'">
      <div class="icon">📱</div><div class="ac-title">Dispositivos</div>
      <div class="ac-desc">Equipos por cuenta</div></div>`),
  ].filter(Boolean).join('');

  box.innerHTML += `
    ${opsTiles ? `<div class="sec-title">Operaciones</div><div class="grid">${opsTiles}</div>` : ''}
    ${repTiles ? `<div class="sec-title">Reportes</div><div class="grid">${repTiles}</div>` : ''}
    ${cfgTiles ? `<div class="sec-title">Configuración</div><div class="grid">${cfgTiles}</div>` : ''}
  `;
}

// ── HOME PREVENTISTA ───────────────────────────────────────────────────
async function renderHomePreventista(){
  const box = document.getElementById('home-content');
  const u = usuarioActual;
  const arsP = n => new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(n);
  const horaArg = f => new Intl.DateTimeFormat('es-AR',{timeZone:'America/Argentina/Cordoba',hour:'2-digit',minute:'2-digit'}).format(new Date(f));

  const acciones = `
    <div class="sec-title">Acciones</div>
    <div class="grid">
      <div class="action-card accent" onclick="location.href='./pedido_preventista.html'">
        <div class="icon">🛒</div>
        <div class="ac-title">Nuevo pedido</div>
        <div class="ac-desc">Cargar pedido a un cliente</div>
      </div>
      <div class="action-card" onclick="location.href='./clientes.html'">
        <div class="icon">👥</div>
        <div class="ac-title">Clientes</div>
        <div class="ac-desc">Ver saldos y crear nuevos</div>
      </div>
      <div class="action-card" onclick="location.href='./pedidos_dia.html'">
        <div class="icon">📝</div>
        <div class="ac-title">Mis pedidos del día</div>
        <div class="ac-desc">Lo que cargué hoy</div>
      </div>
      ${tienePermiso('mis_numeros') ? `<div class="action-card" onclick="location.href='./mis_numeros.html'">
        <div class="icon">⭐</div>
        <div class="ac-title">Mis números</div>
        <div class="ac-desc">Ventas, ticket y conversión</div>
      </div>` : ''}
    </div>`;

  // skeleton inicial mientras carga
  box.innerHTML = `
    <div class="sec-title">Mis ventas de hoy</div>
    <div class="quick-stats">
      <div class="qs"><div class="num gold">…</div><div class="lbl">Vendido</div></div>
      <div class="qs"><div class="num">…</div><div class="lbl">Pedidos</div></div>
      <div class="qs"><div class="num">…</div><div class="lbl">Ticket prom.</div></div>
    </div>
    ${acciones}`;

  const hoy = new Date().toISOString().slice(0, 10);
  const { data: peds } = await supabase.from('pedidos')
    .select('id, fecha, clientes(nombre), pedido_items(cantidad, precio_unit, descuento)')
    .eq('empresa_id', u.empresa_id)
    .eq('usuario_id', u.id)
    .in('estado', ['confirmado', 'entregado'])
    .gte('fecha', hoy + 'T00:00:00').lte('fecha', hoy + 'T23:59:59')
    .order('fecha', { ascending: false });

  const pedidos = peds || [];
  const montoPed = p => (p.pedido_items || []).reduce((s, it) =>
    s + it.cantidad * it.precio_unit * (1 - (it.descuento||0)/100), 0);
  const total  = pedidos.reduce((s, p) => s + montoPed(p), 0);
  const ticket = pedidos.length ? total / pedidos.length : 0;

  box.innerHTML = `
    <div class="sec-title">Mis ventas de hoy</div>
    <div class="quick-stats">
      <div class="qs"><div class="num gold">${arsP(total)}</div><div class="lbl">Vendido</div></div>
      <div class="qs"><div class="num">${pedidos.length}</div><div class="lbl">Pedidos</div></div>
      <div class="qs"><div class="num">${arsP(ticket)}</div><div class="lbl">Ticket prom.</div></div>
    </div>
    ${acciones}
    <div class="sec-title">Mis pedidos de hoy</div>
    <div class="grid single">
      ${pedidos.length ? pedidos.map(p=>`

// ── Banner de instalación para iOS Safari ───────────────────────────────
// iOS Safari no expone API beforeinstallprompt. Mostramos guía manual.
function mostrarBannerIOS() {
  const ua = navigator.userAgent;
  const esIOS = /iPhone|iPad|iPod/i.test(ua) && !/CriOS|FxiOS|EdgiOS/i.test(ua);
  if (!esIOS) return;
  // ya está instalada (modo standalone)
  if (window.navigator.standalone === true) return;
  if (window.matchMedia('(display-mode: standalone)').matches) return;
  // descartado por el usuario en este dispositivo
  if (localStorage.getItem('elrey:ios-install-dismiss') === '1') return;

  const box = document.getElementById('ios-install-banner');
  if (!box) return;
  box.innerHTML = `
    <div class="ios-install">
      <span class="ii-icon">👑</span>
      <div style="flex:1">
        <div style="margin-bottom:4px"><b>Instalá El Rey en tu iPhone</b></div>
        <div style="opacity:.85">
          Tocá <span class="ii-share">⎙ Compartir</span> y elegí
          <b>"Agregar a pantalla de inicio"</b>.
        </div>
      </div>
      <button class="ii-x" onclick="window._cerrarBannerIOS()" aria-label="Cerrar">×</button>
    </div>`;
}
window._cerrarBannerIOS = () => {
  localStorage.setItem('elrey:ios-install-dismiss','1');
  document.getElementById('ios-install-banner').innerHTML = '';
};
mostrarBannerIOS();
</script>
