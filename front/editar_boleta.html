<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="./src/logger.js"></script>
<title>El Rey · Editar boleta</title>
<style>
  :root{
    --paper:#FBF9F2; --ink:#1C2B27; --ink-soft:#5B665F;
    --line:#E4DECF;  --line-soft:#EEEADD;
    --gold:#A9760E;  --gold-dk:#8A5F09; --gold-lt:#F5E9D0;
    --red-bg:#F6E5E2; --red-tx:#A8392B;
    --green-bg:#E7F0E8; --green-tx:#2C6B3F;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{overscroll-behavior-y:contain;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px;line-height:1.4}
  body{max-width:480px;margin:0 auto;padding-bottom:100px}
  .hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;
    border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;background:var(--paper)}
  .brand{display:flex;align-items:center;gap:8px;font-weight:600}
  .crown{color:var(--gold);font-size:20px}
  .brand small{display:block;font-size:11px;color:var(--ink-soft);
    text-transform:uppercase;letter-spacing:.06em}
  .hdr-btn{background:none;border:none;font-size:13px;color:var(--gold);
    font-weight:600;cursor:pointer;font-family:inherit}

  section{padding:14px 18px;border-bottom:1px solid var(--line-soft)}
  .lbl{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
    color:var(--ink-soft);margin-bottom:6px;display:flex;justify-content:space-between}
  .field{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;
    font-size:15px;font-family:inherit;color:var(--ink);background:var(--card)}
  .field:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:transparent}
  .row{display:flex;gap:8px;margin-bottom:8px}

  .item{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:10px 12px;margin-bottom:8px}
  .item-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
  .item-nm{font-weight:600;font-size:14px;flex:1}
  .item-rm{background:none;border:none;color:var(--red-tx);font-size:18px;
    cursor:pointer;font-family:inherit;padding:0 4px}
  .item-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
  .item-row label{font-size:10px;color:var(--ink-soft);font-weight:600;
    text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:2px}
  .item-row input{width:100%;padding:7px 8px;border:1px solid var(--line);
    border-radius:8px;font-size:13px;font-family:inherit;color:var(--ink);background:#fff}

  .bar{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;
    background:var(--paper);border-top:1px solid var(--line);padding:12px 18px 18px;
    z-index:20;display:flex;gap:10px}
  .bar-ghost{flex:1;padding:14px;border:1px solid var(--line);border-radius:12px;
    background:var(--card);font-size:15px;font-weight:600;color:var(--ink);
    cursor:pointer;font-family:inherit}
  .bar-btn{flex:2;padding:14px;border:none;border-radius:12px;background:var(--gold);
    color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
  .bar-btn:disabled{background:var(--line);color:var(--ink-soft);cursor:not-allowed}

  .add-btn{width:100%;padding:11px;border:1px dashed var(--gold);border-radius:10px;
    background:transparent;color:var(--gold);font-weight:600;cursor:pointer;font-family:inherit}
  .total-box{padding:14px 18px;background:var(--gold-lt);font-weight:700;
    display:flex;justify-content:space-between;font-size:16px}
  .err-box{margin:18px;padding:14px;background:var(--red-bg);border:1px solid var(--red-tx);
    border-radius:10px;color:var(--red-tx);font-size:14px}
  .loading{text-align:center;padding:48px 18px;color:var(--ink-soft)}
  .picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;
    display:flex;align-items:center;justify-content:center;padding:18px}
  .picker-box{background:var(--paper);border-radius:14px;width:100%;max-width:380px;
    max-height:75vh;display:flex;flex-direction:column;overflow:hidden}
  .picker-search{padding:12px;border-bottom:1px solid var(--line)}
  .picker-list{overflow-y:auto;flex:1}
  .picker-item{padding:10px 14px;border-bottom:1px solid var(--line-soft);cursor:pointer;
    display:flex;justify-content:space-between;align-items:center}
  .picker-item:hover{background:var(--gold-lt)}
</style>
</head>
<body>
<div id="root"><div class="loading">Cargando boleta…</div></div>

<script type="module">
import { supabase } from './src/supabase.js'
import { requireSession } from './src/auth.js'

const ars = n => new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(n)

const { usuario } = await requireSession()
const params = new URLSearchParams(location.search)
const boletaId = params.get('id')
if (!boletaId) { document.getElementById('root').innerHTML = `<div class="err-box">Falta ?id=UUID</div>`; throw new Error('sin id') }

let boleta = null
let pedido = null
let clientes = []
let productos = []
let items = []   // { producto_id, nombre, cantidad, precio_unit, descuento, es_bulto, u_por_bulto }
let cantOriginal = {} // producto_id → cantidad original al cargar (ya descontada del stock)
let stockMap = {}     // producto_id → stock_actual
let clienteId = ''
let descuento = 0
let fechaReparto = ''
let guardando = false
let pickerOpen = false
let pickerSearch = ''

async function cargar() {
  const [bResp, cResp, pResp, sResp] = await Promise.all([
    supabase.from('boletas').select(`
      id, total, saldo_anterior,
      pedidos (
        id, descuento, fecha_reparto, observaciones, cliente_id, usuario_id, hoja_ruta_id,
        pedido_items(producto_id, cantidad, precio_unit, descuento, es_bulto, u_por_bulto,
          productos(nombre))
      )
    `).eq('id', boletaId).single(),
    supabase.from('clientes').select('id, nombre').eq('activo', true).order('nombre'),
    supabase.from('productos').select('id, nombre, precio, u_bulto, desc_bulto').eq('activo', true).order('nombre'),
    supabase.from('stock_actual').select('producto_id, stock'),
  ])
  if (bResp.error) throw bResp.error
  if (cResp.error) throw cResp.error
  if (pResp.error) throw pResp.error
  if (sResp.error) throw sResp.error

  boleta = bResp.data
  pedido = boleta.pedidos
  clientes = cResp.data || []
  productos = pResp.data || []
  stockMap = Object.fromEntries((sResp.data || []).map(s => [s.producto_id, Number(s.stock) || 0]))

  clienteId = pedido.cliente_id
  descuento = Number(pedido.descuento || 0)
  fechaReparto = pedido.fecha_reparto
  items = (pedido.pedido_items || []).map(it => ({
    producto_id: it.producto_id,
    nombre: it.productos?.nombre || '?',
    cantidad: it.cantidad,
    precio_unit: Number(it.precio_unit),
    descuento: Number(it.descuento || 0),
    es_bulto: !!it.es_bulto,
    u_por_bulto: it.u_por_bulto || 1,
  }))
  cantOriginal = {}
  items.forEach(it => { cantOriginal[it.producto_id] = (cantOriginal[it.producto_id]||0) + it.cantidad })
}

// Stock disponible para un producto al editar:
// = stock_actual + lo que ya estaba en esta boleta (porque ya fue descontado)
//   − lo que actualmente hay en items (todas las líneas del mismo producto)
function maxCantParaItem(idx){
  const it = items[idx]
  const stock = stockMap[it.producto_id]
  if (stock == null) return Infinity
  const orig = cantOriginal[it.producto_id] || 0
  const enItems = items.reduce((s,o,j) => j===idx ? s : (o.producto_id===it.producto_id ? s + o.cantidad : s), 0)
  return stock + orig - enItems
}

function totalCalc() {
  const sub = items.reduce((s, it) =>
    s + it.cantidad * it.precio_unit * (1 - (it.descuento||0)/100), 0)
  return sub * (1 - descuento/100)
}

function render() {
  const el = document.getElementById('root')
  el.innerHTML = `
    <div class="hdr">
      <div class="brand"><span class="crown">&#9818;</span>
        <div>Editar boleta<small>#${boleta.id.slice(-4).toUpperCase()}</small></div>
      </div>
      <button class="hdr-btn" onclick="window._volver()">‹ Volver</button>
    </div>

    <section>
      <div class="lbl">Cliente</div>
      <select class="field" onchange="window._setCli(this.value)">
        ${clientes.map(c => `<option value="${c.id}" ${c.id===clienteId?'selected':''}>${c.nombre}</option>`).join('')}
      </select>
    </section>

    <section>
      <div class="row">
        <div style="flex:1">
          <div class="lbl">Fecha reparto</div>
          <input class="field" type="date" value="${fechaReparto}" onchange="window._setFR(this.value)">
        </div>
        <div style="flex:1">
          <div class="lbl">Desc. general (%)</div>
          <input class="field" type="number" min="0" max="100" value="${descuento}" onchange="window._setDG(this.value)">
        </div>
      </div>
    </section>

    <section>
      <div class="lbl">Items <span>${items.length}</span></div>
      <div id="items-box"></div>
      <button class="add-btn" onclick="window._openPicker()">+ Agregar producto</button>
    </section>

    <div class="total-box"><span>Total</span><span>${ars(totalCalc())}</span></div>

    <div class="bar">
      <button class="bar-ghost" onclick="window._volver()">Cancelar</button>
      <button class="bar-btn" ${guardando||!items.length?'disabled':''} onclick="window._guardar()">
        ${guardando ? 'Guardando…' : 'Guardar cambios'}
      </button>
    </div>
  `
  renderItems()
  if (pickerOpen) renderPicker()
}

function renderItems() {
  const box = document.getElementById('items-box')
  if (!box) return
  if (!items.length) { box.innerHTML = `<div style="color:var(--ink-soft);font-size:13px;padding:8px 0">Sin items.</div>`; return }
  box.innerHTML = items.map((it, i) => `
    <div class="item">
      <div class="item-top">
        <div class="item-nm">${it.nombre}${it.es_bulto?' <span style="font-size:11px;color:var(--gold-dk)">(bulto)</span>':''}</div>
        <button class="item-rm" onclick="window._rm(${i})">✕</button>
      </div>
      <div class="item-row">
        <div><label>Cantidad</label>
          <input type="number" min="1" value="${it.cantidad}" oninput="window._setC(${i},this.value)"></div>
        <div><label>Precio unit.</label>
          <input type="number" min="0" step="0.01" value="${it.precio_unit}" oninput="window._setP(${i},this.value)"></div>
        <div><label>Desc. %</label>
          <input type="number" min="0" max="100" value="${it.descuento}" oninput="window._setD(${i},this.value)"></div>
      </div>
    </div>
  `).join('')
}

function renderPicker() {
  let ov = document.getElementById('picker-ov')
  if (!ov) {
    ov = document.createElement('div')
    ov.id = 'picker-ov'
    ov.className = 'picker-overlay'
    document.body.appendChild(ov)
  }
  if (!ov.dataset.built) {
    ov.innerHTML = `
      <div class="picker-box">
        <div class="picker-search">
          <input class="field" placeholder="Buscar producto…" value="${pickerSearch}"
            oninput="window._pickSearch(this.value)" autofocus>
        </div>
        <div id="picker-list" class="picker-list"></div>
        <div style="padding:10px;border-top:1px solid var(--line);text-align:right">
          <button onclick="window._closePicker()"
            style="padding:8px 16px;border:1px solid var(--line);border-radius:8px;
              background:var(--card);font-weight:600;cursor:pointer;font-family:inherit">Cerrar</button>
        </div>
      </div>`
    ov.dataset.built = '1'
  }
  renderPickerList()
}

function renderPickerList() {
  const list = document.getElementById('picker-list')
  if (!list) return
  const term = pickerSearch.toLowerCase().trim()
  const matches = productos.filter(p => !term || p.nombre.toLowerCase().includes(term)).slice(0, 50)
  list.innerHTML = matches.map(p => `
    <div class="picker-item" onclick="window._pickAdd('${p.id}', false)">
      <div><div style="font-weight:600;font-size:14px">${p.nombre}</div>
        <div style="font-size:11px;color:var(--ink-soft)">${ars(p.precio)}</div></div>
      ${p.u_bulto > 1 ? `
        <button onclick="event.stopPropagation();window._pickAdd('${p.id}', true)"
          style="padding:5px 10px;border:1px solid var(--gold);border-radius:8px;
            background:var(--gold-lt);color:var(--gold-dk);font-size:12px;font-weight:600;
            cursor:pointer;font-family:inherit">+ Bulto</button>` : ''}
    </div>
  `).join('')
}

window._setCli = v => { clienteId = v }
window._setFR  = v => { fechaReparto = v }
window._setDG  = v => { descuento = Math.min(100, Math.max(0, +v||0)); render() }
window._setC   = (i,v) => {
  let n = Math.max(1, +v||1)
  const max = maxCantParaItem(i)
  if (n > max) { alert(`Stock insuficiente. Máximo: ${Math.max(1,max)} u.`); n = Math.max(1, max) }
  items[i].cantidad = n; render()
}
window._setP   = (i,v) => { items[i].precio_unit = Math.max(0, +v||0); render() }
window._setD   = (i,v) => { items[i].descuento = Math.min(100, Math.max(0, +v||0)); render() }
window._rm     = i => { items.splice(i,1); render() }
window._openPicker = () => { pickerOpen = true; pickerSearch = ''; render() }
window._closePicker = () => { pickerOpen = false; document.getElementById('picker-ov')?.remove() }
window._pickSearch = v => { pickerSearch = v; renderPickerList() }
window._pickAdd = (id, esBulto) => {
  const p = productos.find(x => x.id === id)
  if (!p) return
  const stock = stockMap[p.id]
  const orig = cantOriginal[p.id] || 0
  const enItems = items.filter(o => o.producto_id === p.id).reduce((s,o)=>s+o.cantidad, 0)
  const disponible = stock != null ? stock + orig - enItems : Infinity
  const cantAAgregar = esBulto ? (p.u_bulto || 1) : 1
  if (disponible < cantAAgregar) {
    alert(`Stock insuficiente. Disponible: ${Math.max(0,disponible)} u.`)
    return
  }
  const precio = esBulto && p.desc_bulto ? p.precio * (1 - p.desc_bulto/100) : p.precio
  items.push({
    producto_id: p.id, nombre: p.nombre, cantidad: cantAAgregar,
    precio_unit: precio, descuento: 0,
    es_bulto: esBulto, u_por_bulto: esBulto ? (p.u_bulto || 1) : 1,
  })
  window._closePicker()
  render()
}
window._volver = () => { history.back() }
window._guardar = async () => {
  if (guardando || !items.length) return
  guardando = true; render()
  const payload = {
    boleta_id: boletaId,
    cliente_id: clienteId,
    descuento, fecha_reparto: fechaReparto,
    items: items.map(it => ({
      producto_id: it.producto_id,
      cantidad: it.cantidad,
      precio_unit: it.precio_unit,
      descuento: it.descuento,
      es_bulto: it.es_bulto,
      u_por_bulto: it.u_por_bulto,
    })),
  }
  const { error } = await supabase.rpc('editar_boleta', { p_payload: payload })
  guardando = false
  if (error) { alert('Error: ' + error.message); render(); return }
  location.href = `./boleta.html?id=${boletaId}`
}

try {
  await cargar()
  render()
} catch (e) {
  document.getElementById('root').innerHTML = `<div class="err-box">Error: ${e.message || e}</div>`
}
</script>
</body>
</html>
