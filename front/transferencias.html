<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="./src/logger.js"></script>
<title>El Rey · Transferencias</title>
<style>
  :root{
    --paper:#FBF9F2; --ink:#1C2B27; --ink-soft:#5B665F;
    --line:#E4DECF;  --line-soft:#EEEADD;
    --gold:#A9760E;  --gold-dk:#8A5F09; --gold-lt:#F5E9D0;
    --green-bg:#E7F0E8; --green-tx:#2C6B3F;
    --amber-bg:#FDF2DC; --amber-tx:#8A5F09;
    --red-bg:#F6E5E2;   --red-tx:#A8392B;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{overscroll-behavior-y:contain;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px;line-height:1.4}
  body{max-width:560px;margin:0 auto;padding-bottom:40px}

  .hdr{display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:1px solid var(--line);background:var(--paper);
    position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:8px;font-weight:600}
  .crown{color:var(--gold);font-size:20px}
  .brand small{display:block;font-size:11px;font-weight:500;color:var(--ink-soft);
    letter-spacing:.06em;text-transform:uppercase}
  .back{background:none;border:none;font-size:13px;color:var(--gold);font-weight:600;cursor:pointer;font-family:inherit}

  .filters{padding:12px 18px;background:var(--paper);border-bottom:1px solid var(--line-soft)}
  .filters-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
  .filters input{padding:9px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:14px;background:var(--card)}
  .chips{display:flex;gap:6px}
  .chip{padding:5px 11px;border-radius:999px;font-size:12px;font-weight:600;
    border:1px solid var(--line);background:var(--card);color:var(--ink-soft);cursor:pointer}
  .chip.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}

  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 18px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 14px}
  .kpi .num{font-size:18px;font-weight:700;line-height:1.1}
  .kpi.amber{border-color:var(--amber-tx)}
  .kpi.amber .num{color:var(--amber-tx)}
  .kpi.green{border-color:var(--green-tx)}
  .kpi.green .num{color:var(--green-tx)}
  .kpi .lbl{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin-top:3px}

  .list{padding:6px 18px}
  .tr-card{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:10px 12px;margin-bottom:8px;display:flex;gap:10px;align-items:center;cursor:pointer}
  .tr-card.pendiente{border-left:4px solid var(--amber-tx)}
  .tr-card.conciliada{border-left:4px solid var(--green-tx);opacity:.85}
  .tr-thumb{width:54px;height:54px;border-radius:8px;background:var(--line-soft);
    background-size:cover;background-position:center;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--ink-soft)}
  .tr-info{flex:1;min-width:0}
  .tr-cli{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tr-meta{font-size:12px;color:var(--ink-soft);margin-top:1px}
  .tr-monto{font-size:15px;font-weight:700;color:var(--green-tx);white-space:nowrap}
  .badge{font-size:10px;font-weight:700;padding:1px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.04em;margin-left:6px}
  .badge.pend{background:var(--amber-bg);color:var(--amber-tx)}
  .badge.conc{background:var(--green-bg);color:var(--green-tx)}

  .empty{text-align:center;padding:40px 18px;color:var(--ink-soft);font-size:14px}
  .loading{text-align:center;padding:48px 18px;color:var(--ink-soft)}
  .err-box{margin:18px;padding:14px;background:var(--red-bg);border:1px solid var(--red-tx);
    border-radius:12px;color:var(--red-tx);font-size:14px}

  .overlay{position:fixed;inset:0;background:rgba(28,43,39,.75);z-index:30;
    display:flex;align-items:flex-end;max-width:560px;margin:0 auto}
  .panel{background:var(--paper);border-radius:22px 22px 0 0;
    padding:18px 18px 28px;width:100%;max-height:92vh;overflow-y:auto}
  .panel .handle{width:36px;height:4px;background:var(--line);border-radius:2px;margin:0 auto 14px}
  .panel h3{font-size:17px;font-weight:700;margin-bottom:4px}
  .panel .meta{font-size:12px;color:var(--ink-soft);margin-bottom:14px}
  .panel img{width:100%;max-height:55vh;object-fit:contain;border-radius:10px;background:var(--line-soft);display:block;margin:8px 0 12px}
  .det-row{display:flex;justify-content:space-between;font-size:14px;padding:6px 0;border-bottom:1px solid var(--line-soft)}
  .det-row:last-child{border-bottom:none}
  .det-row .k{color:var(--ink-soft)}
  .det-row .v{font-weight:600}
  .btns{display:flex;gap:10px;margin-top:14px}
  .btn-gold{flex:1;padding:13px;background:var(--gold);color:#fff;border:none;border-radius:10px;font-weight:600;cursor:pointer;font-family:inherit;font-size:14px}
  .btn-green{flex:1;padding:13px;background:var(--green-tx);color:#fff;border:none;border-radius:10px;font-weight:600;cursor:pointer;font-family:inherit;font-size:14px}
  .btn-ghost{flex:1;padding:13px;background:var(--card);border:1px solid var(--line);border-radius:10px;font-weight:600;cursor:pointer;font-family:inherit;font-size:14px;color:var(--ink)}
</style>
</head>
<body>
<div id="root"><div class="loading">Cargando…</div></div>

<script type="module">
import { supabase } from './src/supabase.js'
import { requireSession } from './src/auth.js'
import { ars } from './src/utils.js?v=2'

const { usuario } = await requireSession()
if (usuario.rol !== 'admin') { location.href = './login_home.html'; throw new Error('sin permiso') }

const _fmtArg = d => new Intl.DateTimeFormat('en-CA', { timeZone: 'America/Argentina/Cordoba' }).format(d)
const isoOffset = (days) => _fmtArg(new Date(Date.now() + days * 86400000))
const fmtFecha = s => new Date(s).toLocaleString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })

let transferencias = []
let desde = isoOffset(-30)
let hasta = isoOffset(0)
let filtro = 'pendientes'  // 'pendientes' | 'conciliadas' | 'todas'
let detalle = null
let guardando = false

async function cargar() {
  const { data, error } = await supabase
    .from('mov_cuenta')
    .select(`id, fecha, monto, comprobante_url, referencia_externa, conciliado, conciliado_en,
      clientes(nombre, telefono),
      usuarios:usuario_id(nombre),
      conciliador:conciliado_por(nombre)`)
    .eq('empresa_id', usuario.empresa_id)
    .eq('tipo', 'pago')
    .eq('forma_pago', 'transferencia')
    .gte('fecha', desde + 'T00:00:00')
    .lte('fecha', hasta + 'T23:59:59')
    .order('fecha', { ascending: false })
    .limit(500)
  if (error) {
    document.getElementById('root').innerHTML = `<div class="err-box">Error: ${error.message}</div>`
    return
  }
  transferencias = data || []
  render()
}

function listaFiltrada() {
  if (filtro === 'pendientes') return transferencias.filter(t => !t.conciliado)
  if (filtro === 'conciliadas') return transferencias.filter(t => t.conciliado)
  return transferencias
}

function totales() {
  const pend = transferencias.filter(t => !t.conciliado).reduce((s, t) => s + Math.abs(Number(t.monto)), 0)
  const conc = transferencias.filter(t => t.conciliado).reduce((s, t) => s + Math.abs(Number(t.monto)), 0)
  return { pend, conc }
}

function render() {
  const el = document.getElementById('root')
  const tot = totales()
  const lista = listaFiltrada()
  el.innerHTML = `
    <div class="hdr">
      <div class="brand"><span class="crown">&#9818;</span>
        <div>El Rey<small>Transferencias</small></div>
      </div>
      <button class="back" onclick="location.href='./login_home.html'">Inicio ›</button>
    </div>
    <div class="filters">
      <div class="filters-row">
        <input type="date" value="${desde}" onchange="window._setDesde(this.value)">
        <input type="date" value="${hasta}" onchange="window._setHasta(this.value)">
      </div>
      <div class="chips">
        <div class="chip ${filtro==='pendientes'?'active':''}" onclick="window._setFiltro('pendientes')">Pendientes</div>
        <div class="chip ${filtro==='conciliadas'?'active':''}" onclick="window._setFiltro('conciliadas')">Conciliadas</div>
        <div class="chip ${filtro==='todas'?'active':''}" onclick="window._setFiltro('todas')">Todas</div>
      </div>
    </div>
    <div class="kpis">
      <div class="kpi amber"><div class="num">${ars(tot.pend)}</div><div class="lbl">Pendientes de conciliar</div></div>
      <div class="kpi green"><div class="num">${ars(tot.conc)}</div><div class="lbl">Ya conciliado</div></div>
    </div>
    <div class="list">
      ${!lista.length ? `<div class="empty">Sin transferencias en este período.</div>` :
        lista.map(t => {
          const cls = t.conciliado ? 'conciliada' : 'pendiente'
          const cli = t.clientes?.nombre || '(sin cliente)'
          const monto = Math.abs(Number(t.monto))
          const thumb = t.comprobante_url
            ? `style="background-image:url('${t.comprobante_url}')"`
            : ''
          return `<div class="tr-card ${cls}" onclick="window._verDetalle('${t.id}')">
            <div class="tr-thumb" ${thumb}>${t.comprobante_url ? '' : '📄'}</div>
            <div class="tr-info">
              <div class="tr-cli">${cli}${t.conciliado ? '<span class="badge conc">conciliada</span>' : '<span class="badge pend">pendiente</span>'}</div>
              <div class="tr-meta">${fmtFecha(t.fecha)}${t.referencia_externa ? ' · ' + t.referencia_externa : ''}</div>
            </div>
            <div class="tr-monto">${ars(monto)}</div>
          </div>`
        }).join('')}
    </div>`
  if (detalle) renderDetalle()
}

function renderDetalle() {
  const t = transferencias.find(x => x.id === detalle); if (!t) return
  const monto = Math.abs(Number(t.monto))
  const ov = document.createElement('div')
  ov.className = 'overlay'
  ov.onclick = e => { if (e.target === ov) window._cerrar() }
  ov.innerHTML = `<div class="panel">
    <div class="handle"></div>
    <h3>${t.clientes?.nombre || '(sin cliente)'}</h3>
    <div class="meta">${fmtFecha(t.fecha)} · ${t.usuarios?.nombre || '—'}</div>
    ${t.comprobante_url
      ? `<img src="${t.comprobante_url}" alt="Comprobante" onclick="window.open('${t.comprobante_url}','_blank')">`
      : `<div style="background:var(--line-soft);padding:30px;text-align:center;color:var(--ink-soft);border-radius:10px;margin:8px 0 12px">Sin foto de comprobante</div>`}
    <div class="det-row"><span class="k">Monto</span><span class="v" style="color:var(--green-tx);font-size:18px">${ars(monto)}</span></div>
    ${t.referencia_externa ? `<div class="det-row"><span class="k">Referencia</span><span class="v">${t.referencia_externa}</span></div>` : ''}
    ${t.clientes?.telefono ? `<div class="det-row"><span class="k">Teléfono</span><span class="v">${t.clientes.telefono}</span></div>` : ''}
    <div class="det-row"><span class="k">Estado</span><span class="v">${t.conciliado ? '🟢 Conciliada' : '🟡 Pendiente'}</span></div>
    ${t.conciliado && t.conciliado_en ? `<div class="det-row"><span class="k">Conciliado</span><span class="v">${fmtFecha(t.conciliado_en)}${t.conciliador?.nombre ? ' · ' + t.conciliador.nombre : ''}</span></div>` : ''}
    <div class="btns">
      ${t.conciliado
        ? `<button class="btn-ghost" onclick="window._toggleConciliado('${t.id}', false)" ${guardando?'disabled':''}>↺ Marcar pendiente</button>`
        : `<button class="btn-green" onclick="window._toggleConciliado('${t.id}', true)" ${guardando?'disabled':''}>${guardando?'Guardando…':'✓ Marcar conciliada'}</button>`}
      <button class="btn-ghost" onclick="window._cerrar()">Cerrar</button>
    </div>
  </div>`
  document.getElementById('root').appendChild(ov)
}

window._setDesde = v => { desde = v; cargar() }
window._setHasta = v => { hasta = v; cargar() }
window._setFiltro = v => { filtro = v; render() }
window._verDetalle = id => { detalle = id; render() }
window._cerrar = () => { detalle = null; render() }
window._toggleConciliado = async (id, val) => {
  guardando = true; render()
  const upd = val
    ? { conciliado: true,  conciliado_en: new Date().toISOString(), conciliado_por: usuario.id }
    : { conciliado: false, conciliado_en: null, conciliado_por: null }
  const { error } = await supabase.from('mov_cuenta').update(upd).eq('id', id)
  guardando = false
  if (error) { alert('Error: ' + error.message); render(); return }
  await cargar()
  detalle = null; render()
}

await cargar()
</script>
</body>
</html>
