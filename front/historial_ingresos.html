<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="./src/logger.js"></script>
<title>El Rey · Historial de ingresos</title>
<style>
  :root{
    --paper:#FBF9F2; --ink:#1C2B27; --ink-soft:#5B665F;
    --line:#E4DECF;  --line-soft:#EEEADD;
    --gold:#A9760E;  --gold-dk:#8A5F09; --gold-lt:#F5E9D0;
    --green-bg:#E7F0E8; --green-tx:#2C6B3F;
    --amber-bg:#FDF2DC; --amber-tx:#8A5F09;
    --red-bg:#F6E5E2;   --red-tx:#A8392B;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px;line-height:1.4}
  body{max-width:720px;margin:0 auto;padding-bottom:40px}

  .hdr{display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:1px solid var(--line);background:var(--paper);
    position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:8px;font-weight:600}
  .crown{color:var(--gold);font-size:20px}
  .brand small{display:block;font-size:11px;font-weight:500;color:var(--ink-soft);
    letter-spacing:.06em;text-transform:uppercase}
  .back{background:none;border:none;font-size:13px;color:var(--gold);font-weight:600;cursor:pointer;font-family:inherit}

  section{padding:14px 18px}
  .lbl{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
    color:var(--ink-soft);margin-bottom:6px}
  .filters{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .field{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;
    background:var(--card);font-size:14px;font-family:inherit;color:var(--ink);appearance:none}

  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer}
  .card:active{filter:brightness(.98)}
  .card .top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .card .prov{font-size:15px;font-weight:700}
  .card .tot{font-size:16px;font-weight:700;color:var(--gold-dk);white-space:nowrap}
  .card .meta{font-size:12px;color:var(--ink-soft);margin-top:3px}
  .card .badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:5px;margin-left:6px;background:var(--amber-bg);color:var(--amber-tx)}
  .card .items-count{font-size:12px;color:var(--ink-soft);margin-top:5px}

  .diff-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;margin-left:6px}
  .diff-badge.ok{background:var(--green-bg);color:var(--green-tx)}
  .diff-badge.warn{background:var(--red-bg);color:var(--red-tx)}

  .empty{text-align:center;padding:40px 18px;color:var(--ink-soft)}
  .loading{text-align:center;padding:48px 18px;color:var(--ink-soft)}
  .err{margin:18px;padding:14px;background:var(--red-bg);border:1px solid var(--red-tx);border-radius:12px;color:var(--red-tx)}

  .overlay{position:fixed;inset:0;background:rgba(28,43,39,.5);z-index:30;
    display:flex;align-items:flex-end;max-width:720px;margin:0 auto}
  .panel{background:var(--paper);border-radius:22px 22px 0 0;padding:18px 18px 28px;width:100%;max-height:92vh;overflow-y:auto}
  .panel .handle{width:36px;height:4px;background:var(--line);border-radius:2px;margin:0 auto 14px}
  .panel h3{font-size:17px;font-weight:700}
  .panel .sub{font-size:13px;color:var(--ink-soft);margin-top:2px;margin-bottom:12px}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
  th,td{padding:7px 6px;text-align:left;border-bottom:1px solid var(--line-soft)}
  th{font-size:11px;color:var(--ink-soft);text-transform:uppercase;font-weight:700;letter-spacing:.04em}
  td.r,th.r{text-align:right}
  .cargos{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:10px;font-size:13px}
  .cargos b{font-weight:700}
  .close-btn{width:100%;margin-top:14px;padding:12px;border:1px solid var(--line);border-radius:10px;background:var(--card);font-weight:600;cursor:pointer;font-family:inherit;font-size:14px;color:var(--ink)}
</style>
</head>
<body>
<div id="root"><div class="loading">Cargando…</div></div>

<script type="module">
import { supabase } from './src/supabase.js'
import { requireSession, tienePermiso } from './src/auth.js'
import { ars } from './src/utils.js?v=2'

const { usuario } = await requireSession()
if (!tienePermiso('catalogo')) { location.href = './login_home.html'; throw new Error('sin permiso') }

const _fmtArg = d => new Intl.DateTimeFormat('en-CA', { timeZone: 'America/Argentina/Cordoba' }).format(d)
const isoOffset = d => _fmtArg(new Date(Date.now() + d * 86400000))
const fmtFecha = s => s ? s.slice(0,10).split('-').reverse().join('/') : ''

let ingresos = []
let proveedores = []
let desde = isoOffset(-90)
let hasta = isoOffset(0)
let filtroProv = ''
let detalle = null   // ingreso_id abierto
let itemsCache = {}  // ingreso_id -> [{producto, bultos, cantidad, costo_unit_neto, costo_unit_final}]

async function cargar() {
  const [{ data: ings, error: e1 }, { data: provs, error: e2 }] = await Promise.all([
    supabase.from('ingresos')
      .select('id, fecha, numero_boleta, total_declarado, total_calculado, cargos_aplicados, proveedor_id, proveedores(nombre), usuarios:usuario_id(nombre)')
      .eq('empresa_id', usuario.empresa_id)
      .gte('fecha', desde)
      .lte('fecha', hasta)
      .order('fecha', { ascending: false })
      .limit(500),
    supabase.from('proveedores').select('id, nombre').eq('empresa_id', usuario.empresa_id).eq('activo', true).order('nombre'),
  ])
  if (e1 || e2) {
    document.getElementById('root').innerHTML = `<div class="err">Error: ${(e1||e2).message}</div>`
    return
  }
  ingresos = ings || []
  proveedores = provs || []
  render()
}

async function cargarItems(ingresoId) {
  if (itemsCache[ingresoId]) return
  const { data, error } = await supabase.from('ingreso_items')
    .select('bultos, u_por_bulto, cantidad, costo_unit_neto, costo_unit_final, productos(nombre)')
    .eq('ingreso_id', ingresoId)
    .order('id')
  if (error) { itemsCache[ingresoId] = []; return }
  itemsCache[ingresoId] = data || []
}

function listaFiltrada() {
  return ingresos.filter(i => !filtroProv || i.proveedor_id === filtroProv)
}

function totalItems(items) {
  return items.reduce((s, it) => s + (Number(it.cantidad) || 0) * (Number(it.costo_unit_final) || 0), 0)
}

function render() {
  const el = document.getElementById('root')
  const lista = listaFiltrada()
  const totalPer = lista.reduce((s, i) => s + (Number(i.total_declarado) || 0), 0)
  el.innerHTML = `
    <div class="hdr">
      <div class="brand"><span class="crown">&#9818;</span>
        <div>El Rey<small>Historial de ingresos</small></div>
      </div>
      <button class="back" onclick="location.href='./login_home.html'">Inicio ›</button>
    </div>

    <section>
      <div class="filters">
        <div>
          <div class="lbl">Desde</div>
          <input class="field" type="date" value="${desde}" onchange="window._setDesde(this.value)">
        </div>
        <div>
          <div class="lbl">Hasta</div>
          <input class="field" type="date" value="${hasta}" onchange="window._setHasta(this.value)">
        </div>
      </div>
      <div style="margin-top:10px">
        <div class="lbl">Proveedor</div>
        <select class="field" onchange="window._setProv(this.value)">
          <option value="">Todos</option>
          ${proveedores.map(p => `<option value="${p.id}" ${filtroProv===p.id?'selected':''}>${p.nombre}</option>`).join('')}
        </select>
      </div>
      <div style="margin-top:12px;font-size:13px;color:var(--ink-soft)">
        <b style="color:var(--ink)">${lista.length}</b> ingreso${lista.length===1?'':'s'} · <b style="color:var(--ink)">${ars(totalPer)}</b> declarado
      </div>
    </section>

    <section style="padding-top:0">
      ${lista.length ? lista.map(renderCard).join('') : `<div class="empty">Sin ingresos en este período.</div>`}
    </section>
  `
  if (detalle) renderDetalle()
}

function renderCard(i) {
  const cargos = Array.isArray(i.cargos_aplicados) ? i.cargos_aplicados : []
  const totCargo = cargos.reduce((s, c) => s + (Number(c.pct) || 0), 0)
  const decl = Number(i.total_declarado) || 0
  const calc = Number(i.total_calculado) || 0
  const diff = Math.abs(decl - calc)
  const diffOk = diff < 1
  return `<div class="card" onclick="window._verDetalle('${i.id}')">
    <div class="top">
      <div>
        <div class="prov">${i.proveedores?.nombre || 'Sin proveedor'}${i.numero_boleta?`<span class="badge">N° ${i.numero_boleta}</span>`:''}</div>
        <div class="meta">${fmtFecha(i.fecha)}${i.usuarios?.nombre?' · '+i.usuarios.nombre:''}${totCargo?' · cargos +'+totCargo.toFixed(1)+'%':''}</div>
      </div>
      <div class="tot">${ars(decl)}<span class="diff-badge ${diffOk?'ok':'warn'}">${diffOk?'✓':'Δ '+ars(diff)}</span></div>
    </div>
  </div>`
}

function renderDetalle() {
  const i = ingresos.find(x => x.id === detalle); if (!i) return
  const items = itemsCache[i.id]
  const cargos = Array.isArray(i.cargos_aplicados) ? i.cargos_aplicados : []
  const totCalc = items ? totalItems(items) : 0
  const decl = Number(i.total_declarado) || 0
  const diff = decl - totCalc
  const ov = document.createElement('div')
  ov.className = 'overlay'
  ov.onclick = e => { if (e.target === ov) window._cerrar() }
  ov.innerHTML = `<div class="panel">
    <div class="handle"></div>
    <h3>${i.proveedores?.nombre || 'Sin proveedor'}${i.numero_boleta?' · N° '+i.numero_boleta:''}</h3>
    <div class="sub">${fmtFecha(i.fecha)}${i.usuarios?.nombre?' · '+i.usuarios.nombre:''}</div>

    ${cargos.length ? `<div class="cargos">
      <b>Cargos aplicados:</b> ${cargos.map(c => `${c.nombre} ${c.pct}%`).join(' · ')}
    </div>` : ''}

    ${items === undefined
      ? `<div class="loading">Cargando items…</div>`
      : items.length
        ? `<table>
            <thead>
              <tr>
                <th>Producto</th>
                <th class="r">Cant.</th>
                <th class="r">Costo neto</th>
                <th class="r">Costo final</th>
                <th class="r">Total</th>
              </tr>
            </thead>
            <tbody>
              ${items.map(it => {
                const cant = Number(it.cantidad) || 0
                const cn = Number(it.costo_unit_neto) || 0
                const cf = Number(it.costo_unit_final) || 0
                return `<tr>
                  <td>${it.productos?.nombre || '?'}${(it.u_por_bulto>1)?`<div style="font-size:11px;color:var(--ink-soft)">${it.bultos} × ${it.u_por_bulto}u</div>`:''}</td>
                  <td class="r">${cant}</td>
                  <td class="r">${ars(cn)}</td>
                  <td class="r">${ars(cf)}</td>
                  <td class="r"><b>${ars(cant*cf)}</b></td>
                </tr>`
              }).join('')}
            </tbody>
            <tfoot>
              <tr>
                <td colspan="4" class="r" style="font-weight:700;padding-top:10px">Total calculado</td>
                <td class="r" style="font-weight:700;padding-top:10px">${ars(totCalc)}</td>
              </tr>
              <tr>
                <td colspan="4" class="r" style="color:var(--ink-soft)">Total declarado</td>
                <td class="r" style="color:var(--ink-soft)">${ars(decl)}</td>
              </tr>
              ${Math.abs(diff) >= 1 ? `<tr>
                <td colspan="4" class="r" style="color:var(--red-tx);font-weight:700">Diferencia</td>
                <td class="r" style="color:var(--red-tx);font-weight:700">${ars(diff)}</td>
              </tr>` : ''}
            </tfoot>
          </table>`
        : `<div class="empty">Sin items en este ingreso.</div>`}

    <button class="close-btn" onclick="window._cerrar()">Cerrar</button>
  </div>`
  document.getElementById('root').appendChild(ov)
}

window._setDesde = v => { desde = v; cargar() }
window._setHasta = v => { hasta = v; cargar() }
window._setProv  = v => { filtroProv = v; render() }
window._verDetalle = async id => {
  detalle = id; render()
  await cargarItems(id)
  render()
}
window._cerrar = () => { detalle = null; render() }

await cargar()
</script>
</body>
</html>
