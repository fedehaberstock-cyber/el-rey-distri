<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="./src/logger.js"></script>
<title>El Rey · Historial de hojas</title>
<style>
  :root{
    --paper:#FBF9F2; --ink:#1C2B27; --ink-soft:#5B665F;
    --line:#E4DECF;  --line-soft:#EEEADD;
    --gold:#A9760E;  --gold-dk:#8A5F09; --gold-lt:#F5E9D0;
    --green-bg:#E7F0E8; --green-tx:#2C6B3F;
    --red-bg:#F6E5E2;   --red-tx:#A8392B;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{overscroll-behavior-y:contain;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px;line-height:1.4}
  body{max-width:480px;margin:0 auto;padding-bottom:40px}

  .hdr{display:flex;align-items:center;padding:14px 18px;
    border-bottom:1px solid var(--line);background:var(--paper);
    position:sticky;top:0;z-index:20;gap:10px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:600}
  .crown{color:var(--gold);font-size:20px}
  .brand small{display:block;font-size:11px;font-weight:500;color:var(--ink-soft);
    letter-spacing:.06em;text-transform:uppercase}
  .back{margin-left:auto;background:none;border:none;font-size:13px;color:var(--gold);
    font-weight:600;cursor:pointer;font-family:inherit}

  .hoja{background:var(--card);border:1px solid var(--line);border-radius:14px;
    margin:12px 18px;overflow:hidden}
  .hoja-top{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;
    cursor:pointer;gap:10px}
  .hoja-top:hover{background:var(--line-soft)}
  .hoja-fecha{font-size:15px;font-weight:700}
  .hoja-sub{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .hoja-estado{font-size:11px;padding:3px 8px;border-radius:999px;font-weight:600}
  .hoja-estado.cerrada{background:var(--green-bg);color:var(--green-tx)}
  .hoja-estado.pendiente{background:var(--line-soft);color:var(--ink-soft)}

  .ped-list{border-top:1px solid var(--line-soft);background:var(--paper)}
  .ped-row{display:flex;justify-content:space-between;align-items:center;
    padding:10px 14px;border-bottom:1px solid var(--line-soft);cursor:pointer;gap:8px}
  .ped-row:last-child{border-bottom:none}
  .ped-row:hover{background:var(--gold-lt)}
  .ped-cli{font-size:14px;font-weight:600}
  .ped-meta{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .ped-total{font-size:14px;font-weight:700;color:var(--gold);white-space:nowrap}

  .loading{text-align:center;padding:48px 18px;color:var(--ink-soft)}
  .empty{text-align:center;padding:40px 18px;color:var(--ink-soft);font-size:15px}
  .err-box{margin:18px;padding:14px;background:var(--red-bg);border:1px solid var(--red-tx);
    border-radius:12px;color:var(--red-tx);font-size:14px}
</style>
</head>
<body>
<div id="root"><div class="loading">Cargando…</div></div>

<script type="module">
import { supabase } from './src/supabase.js'
import { requireSession, tienePermiso } from './src/auth.js'

const { usuario } = await requireSession()
const esAdmin = usuario.rol === 'admin'
if (!tienePermiso('ventas_totales') && !tienePermiso('reportes_stock') && usuario.rol !== 'admin') {
  location.href = './login_home.html'
}

const ars = n => new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(n)
const fmtFecha = s => {
  const [y,m,d] = s.split('-')
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic']
  return `${parseInt(d)} ${meses[parseInt(m)-1]} ${y}`
}

let hojas = []      // [{id, fecha, estado, pedidos: [{id, cliente, total, boleta_id}]}]
let abierta = null  // id de hoja expandida

async function cargar() {
  const { data: hojasData, error: e1 } = await supabase
    .from('hojas_ruta')
    .select(`id, fecha, estado, total_efectivo, total_transf, total_cuenta, total_gastos,
             efectivo_entregado, faltante, observaciones,
             usuario_id, cerrada_por_usuario_id,
             asignado:usuario_id(nombre),
             cerrador:cerrada_por_usuario_id(nombre)`)
    .eq('empresa_id', usuario.empresa_id)
    .order('fecha', { ascending: false })
    .limit(60)
  if (e1) throw e1

  const hojaIds = (hojasData || []).map(h => h.id)
  if (!hojaIds.length) { hojas = []; return }

  const [{ data: peds, error: e2 }, { data: gas, error: e3 }] = await Promise.all([
    supabase.from('pedidos')
      .select('id, hoja_ruta_id, clientes(nombre), boletas(id, total)')
      .in('hoja_ruta_id', hojaIds),
    supabase.from('hoja_gastos')
      .select('hoja_id, concepto, monto')
      .in('hoja_id', hojaIds)
      .order('fecha', { ascending: true }),
  ])
  if (e2) throw e2
  if (e3) throw e3

  const mapPeds = new Map()
  for (const p of (peds || [])) {
    const arr = mapPeds.get(p.hoja_ruta_id) || []
    const bol = Array.isArray(p.boletas) ? p.boletas[0] : p.boletas
    arr.push({
      id:        p.id,
      cliente:   p.clientes?.nombre || '(sin cliente)',
      total:     Number(bol?.total) || 0,
      boleta_id: bol?.id || null,
    })
    mapPeds.set(p.hoja_ruta_id, arr)
  }

  const mapGas = new Map()
  for (const g of (gas || [])) {
    const arr = mapGas.get(g.hoja_id) || []
    arr.push({ concepto: g.concepto, monto: Number(g.monto) || 0 })
    mapGas.set(g.hoja_id, arr)
  }

  hojas = hojasData.map(h => ({
    ...h,
    pedidos: mapPeds.get(h.id) || [],
    gastos:  mapGas.get(h.id)  || [],
  }))
}

function render() {
  const el = document.getElementById('root')
  el.innerHTML = `
    <div class="hdr">
      <div class="brand"><span class="crown">&#9818;</span>
        <div>El Rey<small>Historial de hojas</small></div>
      </div>
      <button class="back" onclick="location.href='./login_home.html'">Inicio ›</button>
    </div>
    ${hojas.length === 0
      ? `<div class="empty">No hay hojas de ruta cargadas.</div>`
      : hojas.map(h => {
          const total = h.pedidos.reduce((s,p)=>s+p.total,0)
          const exp = abierta === h.id
          const totGastos = Number(h.total_gastos) || 0
          const totEf = Number(h.total_efectivo) || 0
          const falt = Number(h.faltante) || 0
          const cerradorNombre = h.cerrador?.nombre || (h.estado === 'cerrada' ? (h.asignado?.nombre || '—') : null)
          const badges = []
          if (h.estado === 'cerrada') badges.push(`<span style="font-size:11px;padding:3px 8px;border-radius:999px;background:var(--green-bg);color:var(--green-tx);font-weight:600">💵 efectivo ${ars(totEf)}</span>`)
          if (totGastos > 0) badges.push(`<span style="font-size:11px;padding:3px 8px;border-radius:999px;background:var(--gold-lt);color:var(--gold-dk);font-weight:600">💸 ${ars(totGastos)}</span>`)
          if (falt > 0.5)    badges.push(`<span style="font-size:11px;padding:3px 8px;border-radius:999px;background:var(--red-bg);color:var(--red-tx);font-weight:600">⚠ faltan ${ars(falt)}</span>`)
          if (falt < -0.5)   badges.push(`<span style="font-size:11px;padding:3px 8px;border-radius:999px;background:var(--green-bg);color:var(--green-tx);font-weight:600">+ sobra ${ars(-falt)}</span>`)
          return `
            <div class="hoja">
              <div class="hoja-top" onclick="window._toggle('${h.id}')">
                <div style="flex:1;min-width:0">
                  <div class="hoja-fecha">${fmtFecha(h.fecha)}</div>
                  <div class="hoja-sub">${h.pedidos.length} pedidos · ${ars(total)}${cerradorNombre ? ` · cerró ${cerradorNombre}` : ''}</div>
                  ${badges.length ? `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">${badges.join('')}</div>` : ''}
                </div>
                <span class="hoja-estado ${h.estado}">${h.estado}</span>
              </div>
              ${exp ? `
                <div class="ped-list">
                  <div style="padding:10px 14px;background:var(--paper);border-bottom:1px solid var(--line-soft)">
                    <button onclick="event.stopPropagation();location.href='./detalle_hoja.html?hoja_id=${h.id}'"
                      style="width:100%;padding:10px;border:1px solid var(--gold);border-radius:10px;
                        background:var(--gold-lt);color:var(--gold-dk);font-size:13px;font-weight:600;
                        cursor:pointer;font-family:inherit">
                      📋 Ver detalle completo
                    </button>
                  </div>
                  ${(h.gastos.length || h.observaciones || h.efectivo_entregado != null) ? `
                    <div style="padding:12px 14px;background:var(--paper);border-bottom:1px solid var(--line-soft)">
                      ${h.gastos.length ? `
                        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin-bottom:6px">Gastos</div>
                        ${h.gastos.map(g => `<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0">
                          <span>${g.concepto}</span><span style="font-weight:600;color:var(--red-tx)">−${ars(g.monto)}</span>
                        </div>`).join('')}` : ''}
                      ${h.efectivo_entregado != null ? `
                        <div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0;margin-top:6px;border-top:1px solid var(--line-soft)">
                          <span style="color:var(--ink-soft)">Efectivo entregado</span>
                          <span style="font-weight:600">${ars(Number(h.efectivo_entregado))}</span>
                        </div>` : ''}
                      ${h.observaciones ? `
                        <div style="margin-top:8px;padding:8px 10px;background:var(--card);border:1px solid var(--line);border-radius:8px;font-size:13px;color:var(--ink-soft);line-height:1.4">
                          📝 ${h.observaciones}
                        </div>` : ''}
                    </div>` : ''}
                  ${h.pedidos.length === 0 ? `<div style="padding:14px;color:var(--ink-soft);font-size:13px">Sin pedidos.</div>`
                    : h.pedidos.map(p => `
                      <div class="ped-row" onclick="window._verBoleta('${p.boleta_id || ''}')">
                        <div>
                          <div class="ped-cli">${p.cliente}</div>
                          <div class="ped-meta">#${p.id.slice(-4).toUpperCase()}${p.boleta_id ? '' : ' · sin boleta'}</div>
                        </div>
                        <div class="ped-total">${ars(p.total)}</div>
                      </div>`).join('')}
                  ${esAdmin && h.estado !== 'cerrada' ? `
                    <div style="padding:12px 14px;background:var(--paper);border-top:1px solid var(--line-soft);display:flex;flex-direction:column;gap:8px">
                      <button onclick="location.href='./hoja_ruta.html?hoja_id=${h.id}'"
                        style="width:100%;padding:11px;border:none;border-radius:10px;
                          background:var(--gold);color:#fff;font-size:14px;font-weight:600;
                          cursor:pointer;font-family:inherit">
                        Cerrar normal (registrar cobros y entregas)
                      </button>
                      <button onclick="window._cerrarHoja('${h.id}')"
                        style="width:100%;padding:11px;border:1px solid var(--red-tx);border-radius:10px;
                          background:transparent;color:var(--red-tx);font-size:13px;font-weight:600;
                          cursor:pointer;font-family:inherit">
                        Cerrar sin cobros (pedidos rollean al día siguiente)
                      </button>
                    </div>` : ''}
                </div>` : ''}
            </div>`
        }).join('')}
  `
}

window._toggle = (id) => {
  abierta = (abierta === id) ? null : id
  render()
}
window._verBoleta = (boletaId) => {
  if (!boletaId) { alert('Este pedido no tiene boleta asociada.'); return }
  window.open(`./boleta.html?id=${boletaId}`, '_blank')
}

window._cerrarHoja = async (hojaId) => {
  if (!esAdmin) return
  if (!confirm('¿Cerrar esta hoja? Los pedidos sin entregar pasan al día siguiente.')) return
  // marcar entregado=false en pedidos que no se procesaron, para que rolleen
  const { error: e1 } = await supabase.from('pedidos')
    .update({ entregado: false })
    .eq('hoja_ruta_id', hojaId)
    .is('entregado', null)
  if (e1) { alert('Error: ' + e1.message); return }
  const { error: e2 } = await supabase.rpc('cerrar_hoja_ruta', { p_hoja_id: hojaId })
  if (e2) { alert('Error al cerrar: ' + e2.message); return }
  await cargar()
  render()
}

try {
  await cargar()
  render()
} catch (e) {
  document.getElementById('root').innerHTML =
    `<div class="err-box">Error: ${e.message || e}</div>`
}
</script>
</body>
</html>
