<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="./src/logger.js"></script>
<title>El Rey · Stock</title>
<style>
  :root{
    --paper:#FBF9F2; --ink:#1C2B27; --ink-soft:#5B665F;
    --line:#E4DECF;  --line-soft:#EEEADD;
    --gold:#A9760E;  --gold-dk:#8A5F09; --gold-lt:#F5E9D0;
    --green-bg:#E7F0E8; --green-tx:#2C6B3F;
    --amber-bg:#FDF2DC; --amber-tx:#8A5F09;
    --red-bg:#F6E5E2;   --red-tx:#A8392B;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{overscroll-behavior-y:contain;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px;line-height:1.4}
  body{max-width:480px;margin:0 auto;padding-bottom:40px}

  /* HEADER */
  .hdr{display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:1px solid var(--line);background:var(--paper);
    position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:8px;font-weight:600}
  .crown{color:var(--gold);font-size:20px}
  .brand small{display:block;font-size:11px;font-weight:500;color:var(--ink-soft);
    letter-spacing:.06em;text-transform:uppercase}
  .back{display:flex;align-items:center;gap:6px;background:none;border:none;
    font-size:16px;font-weight:600;color:var(--gold);cursor:pointer;padding:0;font-family:inherit}
  .back svg{width:20px;height:20px}

  /* TABS PRINCIPALES */
  .main-tabs{display:flex;border-bottom:2px solid var(--line);background:var(--paper);
    position:sticky;top:57px;z-index:19;overflow-x:auto}
  .main-tab{flex:1;min-width:80px;padding:12px 8px;text-align:center;font-size:13px;
    font-weight:600;color:var(--ink-soft);cursor:pointer;border-bottom:2px solid transparent;
    margin-bottom:-2px;white-space:nowrap}
  .main-tab.active{color:var(--gold);border-bottom-color:var(--gold)}

  /* FILTROS */
  .filters{padding:12px 18px 8px;background:var(--paper);
    position:sticky;top:104px;z-index:18;border-bottom:1px solid var(--line-soft)}
  .search-input{width:100%;padding:11px 14px 11px 38px;border:1px solid var(--line);
    border-radius:10px;background:var(--card);font-size:15px;font-family:inherit;color:var(--ink);
    margin-bottom:8px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='none' stroke='%235B665F' stroke-width='2'><circle cx='7' cy='7' r='4'/><path d='M12 12l-2.5-2.5'/></svg>");
    background-repeat:no-repeat;background-position:12px center}
  .search-input:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:transparent}
  .chips{display:flex;gap:6px;flex-wrap:wrap;padding-bottom:2px}
  .chip{padding:6px 12px;border-radius:999px;font-size:13px;font-weight:600;
    border:1px solid var(--line);background:var(--card);color:var(--ink-soft);
    white-space:nowrap;cursor:pointer;flex-shrink:0}
  .chip.active{background:var(--gold);color:#fff;border-color:var(--gold)}

  /* BANNER NEGATIVOS */
  .neg-banner{margin:12px 18px 0;padding:12px 14px;background:var(--red-bg);
    border-radius:12px;display:flex;align-items:center;gap:10px;font-size:14px;
    color:var(--red-tx);font-weight:600;cursor:pointer}

  /* LISTA */
  .list{padding:12px 18px 100px}
  .prod-card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:13px 14px;margin-bottom:10px;cursor:pointer}
  .prod-card:active{filter:brightness(.98)}
  .prod-card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .prod-card .nm{font-size:15px;font-weight:600;flex:1}
  .prod-card .arr{color:var(--ink-soft);font-size:18px;align-self:center}
  .stock-badge{padding:5px 10px;border-radius:8px;font-size:15px;font-weight:700;white-space:nowrap}
  .stock-badge.neg {background:var(--red-bg);  color:var(--red-tx)}
  .stock-badge.zero{background:var(--red-bg);  color:var(--red-tx)}
  .stock-badge.bajo{background:var(--amber-bg);color:var(--amber-tx)}
  .stock-badge.ok  {background:transparent;    color:var(--ink);border:1px solid var(--line)}
  .margin-tag{font-size:12px;font-weight:700;padding:1px 7px;border-radius:6px;white-space:nowrap}
  .margin-tag.red{background:var(--red-bg);color:var(--red-tx)}
  .margin-tag.amber{background:var(--amber-bg);color:var(--amber-tx)}
  .margin-tag.ok{background:var(--green-bg);color:var(--green-tx)}
  .rest-tag{font-size:12px;font-weight:700;padding:1px 7px;border-radius:6px;white-space:nowrap}
  .rest-tag.rest-urg{background:var(--red-bg);color:var(--red-tx)}
  .rest-tag.rest-baja{background:var(--amber-bg);color:var(--amber-tx)}
  .rest-tag.rest-ok{background:var(--line-soft);color:var(--ink-soft)}
  .prod-card .meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:7px}
  .meta-tag{font-size:12px;color:var(--ink-soft);font-weight:500}
  .meta-tag b{color:var(--ink);font-weight:600}
  .alert-row{display:flex;align-items:center;gap:6px;margin-top:8px;
    padding:7px 10px;border-radius:8px;font-size:12px;font-weight:600}
  .alert-row.critical{background:var(--red-bg);color:var(--red-tx)}
  .alert-row.warn{background:var(--amber-bg);color:var(--amber-tx)}
  .alert-row svg{width:14px;height:14px;flex-shrink:0}

  /* DETALLE */
  .det-body{padding-bottom:130px}
  .stock-hero{margin:18px;background:var(--card);border:1px solid var(--line);
    border-radius:18px;padding:26px 20px;text-align:center}
  .stock-hero .lbl{font-size:11px;font-weight:600;letter-spacing:.08em;
    text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
  .stock-num{font-size:52px;font-weight:700;letter-spacing:-.03em;line-height:1}
  .stock-num.neg{color:var(--red-tx)} .stock-num.zero{color:var(--red-tx)}
  .stock-num.bajo{color:var(--amber-tx)} .stock-num.ok{color:var(--ink)}
  .stock-status{font-size:14px;font-weight:600;margin-top:6px}
  .stock-status.neg{color:var(--red-tx)} .stock-status.zero{color:var(--red-tx)}
  .stock-status.bajo{color:var(--amber-tx)} .stock-status.ok{color:var(--green-tx)}
  .det-meta{margin:0 18px 18px;display:flex;flex-direction:column;gap:7px}
  .det-meta .row{font-size:14px;color:var(--ink-soft)}
  .det-meta .row b{color:var(--ink);font-weight:600}
  .sec-lbl{padding:0 18px;font-size:12px;font-weight:600;letter-spacing:.07em;
    text-transform:uppercase;color:var(--ink-soft);margin-bottom:10px}
  .movs{padding:0 18px}
  .mov{display:flex;justify-content:space-between;align-items:flex-start;
    padding:12px 0;border-bottom:1px solid var(--line-soft)}
  .mov:last-child{border-bottom:none}
  .mov .left .desc{font-size:15px;font-weight:500}
  .mov .left .fecha{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .mov .cant{font-size:15px;font-weight:700}
  .mov .cant.pos{color:var(--green-tx)} .mov .cant.neg-m{color:var(--red-tx)}

  /* KPIs RESUMEN */
  .summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 18px 4px}
  .sum-card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px;text-align:center}
  .sum-card .num{font-size:28px;font-weight:700;line-height:1}
  .sum-card .num.red{color:var(--red-tx)} .sum-card .num.amber{color:var(--amber-tx)}
  .sum-card .lbl{font-size:12px;color:var(--ink-soft);font-weight:500;margin-top:4px}
  .rank-item{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:13px 14px;margin-bottom:10px}
  .rank-item .top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
  .rank-item .nm{font-size:15px;font-weight:600;flex:1}
  .rank-item .val{font-size:14px;font-weight:700;color:var(--ink-soft);white-space:nowrap}
  .bar-track{height:6px;background:var(--line-soft);border-radius:999px;overflow:hidden}
  .bar-fill{height:100%;border-radius:999px;background:var(--gold)}
  .bar-fill.red{background:var(--red-tx)} .bar-fill.amber{background:var(--amber-tx)}
  .section-lbl{font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
    color:var(--ink-soft);padding:14px 18px 6px}

  /* BARRA FIJA */
  .bar{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;
    background:var(--paper);border-top:1px solid var(--line);padding:12px 18px 18px;z-index:20}
  .bar-btn{width:100%;padding:15px;border:none;border-radius:14px;background:var(--gold);
    color:#fff;font-size:17px;font-weight:600;cursor:pointer;font-family:inherit}
  .bar-btn:active{background:var(--gold-dk)}
  .bar-2{display:flex;gap:10px}
  .bar-2 .bar-btn{flex:1}
  .bar-2 .ghost{flex:1;padding:15px;border:1px solid var(--line);border-radius:14px;
    background:var(--card);font-size:16px;font-weight:600;color:var(--ink);
    cursor:pointer;font-family:inherit}

  /* PANEL MODAL */
  .overlay{position:fixed;inset:0;background:rgba(28,43,39,.4);z-index:30;
    display:flex;align-items:flex-end;max-width:480px;margin:0 auto}
  .panel{background:var(--paper);border-radius:22px 22px 0 0;
    padding:24px 20px 32px;width:100%}
  .panel h3{font-size:18px;font-weight:700;margin-bottom:4px}
  .panel .sub{font-size:14px;color:var(--ink-soft);margin-bottom:18px}
  .fl{display:block;font-size:12px;font-weight:600;letter-spacing:.07em;
    text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px;margin-top:14px}
  .fl:first-of-type{margin-top:0}
  .field{width:100%;padding:14px;border:1px solid var(--line);border-radius:12px;
    background:var(--card);font-size:16px;font-family:inherit;color:var(--ink)}
  .field:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:transparent}
  .panel-btns{display:flex;gap:10px;margin-top:16px}
  .panel-btns .bar-btn{flex:2}
  .panel-btns .cancel{flex:1;padding:15px;border:1px solid var(--line);border-radius:14px;
    background:var(--card);font-size:16px;font-weight:600;cursor:pointer;
    color:var(--ink);font-family:inherit}
  .prod-results{margin-top:6px;border:1px solid var(--line);border-radius:12px;
    overflow:hidden;background:var(--card);max-height:180px;overflow-y:auto}
  .prod-results .pr-row{padding:13px 14px;border-bottom:1px solid var(--line-soft);
    cursor:pointer;font-size:15px}
  .prod-results .pr-row:last-child{border-bottom:none}
  .prod-results .pr-row:active{background:var(--line-soft)}

  .loading{text-align:center;padding:48px 18px;color:var(--ink-soft);font-size:15px}
  .err-box{margin:18px;padding:14px;background:var(--red-bg);border:1px solid var(--red-tx);
    border-radius:12px;color:var(--red-tx);font-size:14px}
  .empty{text-align:center;padding:40px 10px;color:var(--ink-soft);font-size:15px}

  @media(prefers-reduced-motion:no-preference){
    .prod-card,.rank-item,.panel{animation:fd .15s ease}
    @keyframes fd{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  }
</style>
</head>
<body>
<div id="root"><div class="loading">Cargando…</div></div>

<script type="module">
import { supabase } from './src/supabase.js';
import { requireSession, tienePermiso } from './src/auth.js';

// ── AUTH ───────────────────────────────────────────────────────────────────
const { usuario } = await requireSession();
if (!tienePermiso('stock') && !tienePermiso('reportes_stock')) { location.href = './login_home.html'; }

const puedeAjustar = tienePermiso('stock', 'editar');

// Tabs visibles — "Capital" (info financiera) solo para quien administra stock
const TABS = [['stock','Stock'],['sin_ingreso','Sin ingreso'],['precio','Precios'],['resumen','Resumen']];
if (puedeAjustar) TABS.push(['capital','Capital'], ['muerto','Muertos'], ['inactivos','Inactivos']);

// ── HELPERS ────────────────────────────────────────────────────────────────
const ars     = n => new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(n);
// formato compacto para cifras grandes (hero de Capital): $52,1M / $12k
const arsC    = n => {
  const a = Math.abs(n);
  if (a >= 1e6) return '$' + (n/1e6).toFixed(1).replace('.',',') + 'M';
  if (a >= 1e4) return '$' + Math.round(n/1e3) + 'k';
  return ars(n);
};
const margenPct  = p => p.precio > 0 ? (p.precio - p.costo) / p.precio * 100 : 0;
const claseMargen = m => m < 20 ? 'red' : m < 25 ? 'amber' : 'ok';
const HOY     = new Date();
const diasDesde = s => s ? Math.floor((HOY - new Date(s)) / 86400000) : 9999;
const claseStock  = n => n < 0 ? 'neg' : n === 0 ? 'zero' : n <= 5 ? 'bajo' : 'ok';
const labelStock  = n => n < 0 ? 'Negativo' : n === 0 ? 'Sin stock' : n <= 5 ? 'Stock bajo' : 'Normal';
const fmtFecha    = s => s ? s.slice(0,10).split('-').reverse().join('/') : '—';
const DIAS_ALERTA = 45;

// ── ESTADO ─────────────────────────────────────────────────────────────────
let productos  = [];
let productosInactivos = [];
let movs       = [];
let tab        = 'stock';
let vista      = 'lista';   // 'lista' | 'detalle'
let prodSelId  = null;
let filtroGrupo = 'todo';
let agrupar    = 'cat';
let busqueda   = '';
let panelOpen  = null;      // 'ingreso' | 'ajuste' | 'editar' | null
let pInput     = { prodId: '', busq: '', cant: '', motivo: '' };
let proveedores = [];
let edit       = null;      // {nombre, categoria, proveedor_id, costo, precio, u_bulto, desc_bulto, activo}

// ── CARGA ──────────────────────────────────────────────────────────────────
async function cargarTodo() {
  const [
    { data: prods, error: errP },
    { data: stocks },
    { data: ingresoItems },
    { data: provs },
    { data: velocidades },
    { data: ventas },
  ] = await Promise.all([
    supabase.from('productos')
      .select('id, nombre, categoria, costo, precio, updated_at, proveedor_id, u_bulto, desc_bulto, proveedores(nombre)')
      .eq('empresa_id', usuario.empresa_id).eq('activo', true).order('nombre'),
    supabase.from('stock_actual').select('producto_id, stock'),
    supabase.from('ingreso_items').select('producto_id, ingresos(fecha)').not('ingresos','is',null),
    supabase.from('proveedores').select('id, nombre').eq('activo', true).order('nombre'),
    supabase.from('velocidad_venta').select('producto_id, unidades_por_dia'),
    (() => {
      const hace65 = new Date(Date.now() - 65 * 86400000).toISOString().slice(0, 10);
      return supabase.from('mov_stock')
        .select('producto_id, fecha')
        .eq('tipo', 'venta')
        .gte('fecha', hace65)
        .limit(50000);
    })(),
  ]);
  const { data: provProds } = await supabase.from('producto_proveedor')
    .select('id, producto_id, proveedor_id, costo, observaciones, actualizado_en, proveedores(nombre)')
    .eq('empresa_id', usuario.empresa_id);
  window._provProds = provProds || [];
  proveedores = provs || [];

  const velMap = {};
  for (const v of (velocidades || [])) velMap[v.producto_id] = Number(v.unidades_por_dia) || 0;

  const ultVentaMap = {};
  for (const v of (ventas || [])) {
    if (!ultVentaMap[v.producto_id] || v.fecha > ultVentaMap[v.producto_id])
      ultVentaMap[v.producto_id] = v.fecha;
  }

  if (errP) {
    document.getElementById('root').innerHTML =
      `<div class="err-box">Error al cargar productos: ${errP.message}</div>`;
    return;
  }

  const stockMap = {};
  for (const s of (stocks || [])) stockMap[s.producto_id] = s.stock ?? 0;

  const ingresoMap = {};
  for (const ii of (ingresoItems || [])) {
    const f = ii.ingresos?.fecha;
    if (f && (!ingresoMap[ii.producto_id] || f > ingresoMap[ii.producto_id]))
      ingresoMap[ii.producto_id] = f;
  }

  productos = (prods || []).map(p => ({
    id: p.id,
    nombre: p.nombre,
    cat: p.categoria || 'Sin categoría',
    prov: p.proveedores?.nombre || 'Sin proveedor',
    proveedor_id: p.proveedor_id || null,
    costo: p.costo || 0,
    precio: p.precio || 0,
    u_bulto: p.u_bulto || 1,
    desc_bulto: p.desc_bulto || 0,
    stock: stockMap[p.id] ?? 0,
    velocidad: velMap[p.id] || 0,
    ultimo_ingreso: ingresoMap[p.id] || null,
    ultima_venta: ultVentaMap[p.id] || null,
    ultimo_cambio_costo: p.updated_at ? p.updated_at.slice(0, 10) : null,
  }));

  if (puedeAjustar) {
    const { data: inact } = await supabase.from('productos')
      .select('id, nombre, categoria, costo, precio, updated_at, proveedores(nombre)')
      .eq('empresa_id', usuario.empresa_id).eq('activo', false).order('nombre');
    productosInactivos = (inact || []).map(p => ({
      id: p.id, nombre: p.nombre,
      cat: p.categoria || 'Sin categoría',
      prov: p.proveedores?.nombre || 'Sin proveedor',
      costo: p.costo || 0, precio: p.precio || 0,
      eliminado: p.updated_at ? p.updated_at.slice(0, 10) : null,
    }));
  }
}

async function reactivarProducto(id) {
  const p = productosInactivos.find(x => x.id === id);
  if (!p) return;
  if (!confirm(`Reactivar "${p.nombre}"?\n\nVuelve a aparecer en stock y en pedidos.`)) return;
  const { error } = await supabase.from('productos').update({ activo: true }).eq('id', id);
  if (error) { alert('Error: ' + error.message); return; }
  await cargarTodo();
  render();
}
window._reactivarProducto = reactivarProducto;

window._editarProducto = (id) => {
  const p = productos.find(x => x.id === id); if (!p) return;
  edit = {
    nombre: p.nombre, categoria: p.cat === 'Sin categoría' ? '' : p.cat,
    proveedor_id: p.proveedor_id || '',
    costo: p.costo, precio: p.precio,
    u_bulto: p.u_bulto, desc_bulto: p.desc_bulto,
    activo: true,
  };
  panelOpen = 'editar';
  pInput.prodId = id;
  render();
};

async function guardarEdicion() {
  if (!edit || !pInput.prodId) return;
  const payload = {
    nombre: edit.nombre.trim(),
    categoria: edit.categoria.trim() || null,
    proveedor_id: edit.proveedor_id || null,
    costo: Number(edit.costo) || 0,
    precio: Number(edit.precio) || 0,
    u_bulto: Math.max(1, parseInt(edit.u_bulto) || 1),
    desc_bulto: Math.min(100, Math.max(0, Number(edit.desc_bulto) || 0)),
    activo: !!edit.activo,
  };
  const { error } = await supabase.from('productos').update(payload).eq('id', pInput.prodId);
  if (error) { alert('Error: ' + error.message); return; }
  panelOpen = null; edit = null;
  await cargarTodo();
  render();
}
window._guardarEdicion = guardarEdicion;
window._setEdit = (k, v) => { if (edit) edit[k] = v; };

async function cargarMovs(prodId) {
  const { data, error } = await supabase
    .from('mov_stock')
    .select('id, tipo, cantidad, referencia_tipo, fecha, usuarios(nombre)')
    .eq('producto_id', prodId)
    .order('fecha', { ascending: false })
    .limit(50);
  if (error) { movs = []; return; }
  movs = (data || []).map(m => ({
    tipo: m.tipo,
    cant: Number(m.cantidad),
    desc: m.referencia_tipo || m.tipo,
    fecha: (m.fecha || '').slice(0, 10),
  }));
}

// ── RENDER PRINCIPAL ───────────────────────────────────────────────────────
function render() {
  if (vista === 'detalle') { renderDetalle(); return; }

  const el = document.getElementById('root');
  el.innerHTML = `
    <div class="hdr">
      <div class="brand"><span class="crown">&#9818;</span>
        <div>El Rey<small>Stock</small></div>
      </div>
      <button style="background:none;border:none;font-size:13px;color:var(--gold);font-weight:600;cursor:pointer;font-family:inherit"
        onclick="location.href='./login_home.html'">Inicio ›</button>
    </div>
    <div class="main-tabs">
      ${TABS.map(([id,lbl]) =>
        `<div class="main-tab ${tab===id?'active':''}" onclick="window._setTab('${id}')">${lbl}</div>`
      ).join('')}
    </div>`;

  if (tab === 'stock')            renderTabStock(el);
  else if (tab === 'sin_ingreso') renderTabSinIngreso(el);
  else if (tab === 'precio')      renderTabPrecio(el);
  else if (tab === 'capital')     renderTabCapital(el);
  else if (tab === 'muerto')      renderTabMuerto(el);
  else if (tab === 'inactivos')   renderTabInactivos(el);
  else                            renderTabResumen(el);

  if (panelOpen) renderPanel();
}

// ── TAB STOCK ──────────────────────────────────────────────────────────────
function renderTabStock(el) {
  const gs = grupos();
  const negativos = productos.filter(p => p.stock < 0);
  el.innerHTML += `

function renderStockList() {
  const box = document.getElementById('stock-list'); if (!box) return;
  let lista = prodsFiltrados().sort((a, b) => a.nombre.localeCompare(b.nombre, 'es', { sensitivity: 'base' }));
  if (!lista.length) { box.innerHTML = `<div class="empty">Sin resultados.</div>`; return; }
  box.innerHTML = lista.map(p => {
    const cl = claseStock(p.stock);
    const diI = diasDesde(p.ultimo_ingreso);
    const alertaI = diI >= DIAS_ALERTA;
    const dRest = p.velocidad > 0 && p.stock > 0 ? Math.floor(p.stock / p.velocidad) : null;
    const dRestClass = dRest === null ? '' : dRest <= 3 ? 'rest-urg' : dRest <= 7 ? 'rest-baja' : 'rest-ok';
    return `<div class="prod-card" onclick="window._irDetalle('${p.id}')">
      <div class="top">
        <span class="nm">${p.nombre}</span>
        <span class="stock-badge ${cl}">${p.stock}</span>
        <span class="arr">›</span>

      <div class="meta">
        <span class="meta-tag">${p.cat}</span>
        <span class="meta-tag">·</span>

        <span class="meta-tag">·</span>
        <span class="meta-tag">Costo <b>${ars(p.costo)}</b></span>

        <span class="rest-tag ${dRestClass}">${dRest}d restan</span>` : ''}
        ${puedeAjustar ? `<span class="meta-tag">·</span>

}

  const conPref = lista.map(x => ({ ...x, esPref: x.proveedor_id === p.proveedor_id }));

  return `
    <div class="sec-lbl" style="margin-top:18px">Proveedores y precios</div>
    <div style="margin:0 18px 8px">
      ${conPref.length ? conPref.map(x => {
        const esMin = Number(x.costo) === minCosto && conPref.length > 1;
        return `<div style="background:var(--card);border:1px solid ${x.esPref?'var(--gold)':'var(--line)'};border-radius:12px;padding:10px 12px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
            <div style="font-weight:600;flex:1;min-width:0">
              ${x.proveedores?.nombre || '?'}
              ${x.esPref ? '<span style="font-size:11px;background:var(--gold-lt);color:var(--gold-dk);padding:2px 7px;border-radius:999px;margin-left:6px;font-weight:700">PREFERIDO</span>' : ''}
              ${esMin && !x.esPref ? '<span style="font-size:11px;background:var(--green-bg);color:var(--green-tx);padding:2px 7px;border-radius:999px;margin-left:6px;font-weight:700">MEJOR PRECIO</span>' : ''}
            </div>

          </div>
          <div style="font-size:12px;color:var(--ink-soft);margin-top:4px">Actualizado ${fmtFecha(x.actualizado_en)}${x.observaciones?` · ${x.observaciones}`:''}</div>
          <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
            ${!x.esPref ? `<button onclick="window._provAltPref('${x.id}','${x.proveedor_id}',${Number(x.costo)})" style="font-size:12px;padding:5px 10px;border:1px solid var(--gold);background:var(--gold-lt);color:var(--gold-dk);border-radius:8px;font-weight:600;cursor:pointer;font-family:inherit">Hacer preferido</button>` : ''}
            <button onclick="window._provAltEdit('${x.id}')" style="font-size:12px;padding:5px 10px;border:1px solid var(--line);background:var(--card);border-radius:8px;font-weight:600;cursor:pointer;font-family:inherit">Editar costo</button>
            ${!x.esPref ? `<button onclick="window._provAltDel('${x.id}')" style="font-size:12px;padding:5px 10px;border:1px solid var(--red-tx);background:var(--red-bg);color:var(--red-tx);border-radius:8px;font-weight:600;cursor:pointer;font-family:inherit">Eliminar</button>` : ''}
          </div>
        </div>`;
      }).join('') : `<div style="color:var(--ink-soft);font-size:13px;padding:6px 2px">Sin proveedores alternativos cargados.</div>`}
      <button onclick="window._provAltNuevo('${p.id}')"
        style="width:100%;padding:10px;border:1px dashed var(--gold);background:var(--gold-lt);color:var(--gold-dk);border-radius:10px;font-weight:600;cursor:pointer;font-family:inherit;font-size:13px">
        ＋ Agregar proveedor alternativo
      </button>
    </div>`;
}

window._provAltNuevo = async (prodId) => {
  const disponibles = proveedores.filter(pv =>
    !(window._provProds || []).some(x => x.producto_id === prodId && x.proveedor_id === pv.id));
  if (!disponibles.length) { alert('No quedan proveedores para agregar.'); return; }
  const opciones = disponibles.map((pv, i) => `${i+1}. ${pv.nombre}`).join('\n');
  const sel = prompt(`Elegí proveedor (1-${disponibles.length}):\n\n${opciones}`);
  const idx = parseInt(sel) - 1;
  if (isNaN(idx) || idx < 0 || idx >= disponibles.length) return;
  const costoStr = prompt(`Costo de "${disponibles[idx].nombre}":`);
  const costo = parseFloat(costoStr);
  if (!(costo >= 0)) { alert('Costo inválido.'); return; }
  const { error } = await supabase.from('producto_proveedor').insert({
    empresa_id: usuario.empresa_id,
    producto_id: prodId,
    proveedor_id: disponibles[idx].id,
    costo,
  });
  if (error) { alert('Error: ' + error.message); return; }
  await cargarTodo(); render();
};

window._provAltEdit = async (ppId) => {
  const x = (window._provProds || []).find(z => z.id === ppId);
  if (!x) return;
  const costoStr = prompt(`Nuevo costo para "${x.proveedores?.nombre}":`, x.costo);
  const costo = parseFloat(costoStr);
  if (!(costo >= 0)) return;
  const { error } = await supabase.from('producto_proveedor')
    .update({ costo, actualizado_en: new Date().toISOString().slice(0,10) })
    .eq('id', ppId);
  if (error) { alert('Error: ' + error.message); return; }
  await cargarTodo(); render();
};

window._provAltDel = async (ppId) => {
  if (!confirm('¿Eliminar este proveedor alternativo?')) return;
  const { error } = await supabase.from('producto_proveedor').delete().eq('id', ppId);
  if (error) { alert('Error: ' + error.message); return; }
  await cargarTodo(); render();
};

window._provAltPref = async (ppId, provId, costo) => {
  if (!confirm('¿Hacer este proveedor el preferido del producto? Se actualiza también el costo.')) return;
  const { error } = await supabase.from('productos')
    .update({ proveedor_id: provId, costo })
    .eq('id', prodSelId);
  if (error) { alert('Error: ' + error.message); return; }
  await cargarTodo(); render();
};

async function eliminarProducto() {
  if (!pInput.prodId) return;
  const p = productos.find(x => x.id === pInput.prodId);
  if (!p) return;
  if (!confirm(`Eliminar "${p.nombre}"?\n\nQueda inactivo y no aparece en pedidos ni en stock. El historial de movimientos se conserva.`)) return;
  const { error } = await supabase.from('productos').update({ activo: false }).eq('id', pInput.prodId);
  if (error) { alert('Error: ' + error.message); return; }
  panelOpen = null; edit = null;
  vista = 'lista'; prodSelId = null;
  await cargarTodo();
  render();
}

// ── TAB CAPITAL (solo admin) ───────────────────────────────────────────────
function renderTabCapital(el) {
  if (!puedeAjustar) { renderTabResumen(el); return; }

  const conStock  = productos.filter(p => p.stock > 0);
  const valCosto  = conStock.reduce((s,p) => s + p.stock*p.costo, 0);
  const valPrecio = conStock.reduce((s,p) => s + p.stock*p.precio, 0);
  const ganancia  = valPrecio - valCosto;
  const margenGlobal = valPrecio > 0 ? ganancia/valPrecio*100 : 0;

  // Rentabilidad
  const perdida    = productos.filter(p => p.precio > 0 && p.precio <= p.costo);
  const bajoMargen = productos.filter(p => p.precio > 0 && margenPct(p) > 0 && margenPct(p) < 20)
                              .sort((a,b) => margenPct(a) - margenPct(b));

  // ABC — productos ordenados por capital inmovilizado
  const ranked = [...conStock].sort((a,b) => b.stock*b.costo - a.stock*a.costo);
  let acum = 0, nA = 0;
  for (const p of ranked) { acum += p.stock*p.costo; nA++; if (acum >= valCosto*0.8) break; }
  const maxCap = ranked[0] ? ranked[0].stock*ranked[0].costo : 1;

  // Capital por categoría
  const catMap = {};
  for (const p of conStock) catMap[p.cat] = (catMap[p.cat]||0) + p.stock*p.costo;
  const cats = Object.entries(catMap).sort((a,b) => b[1]-a[1]);
  const maxCat = cats[0] ? cats[0][1] : 1;

  // Capital inactivo (rotación) — depende de ventas registradas
  const hayVentas  = productos.some(p => p.velocidad > 0);
  const inactivo   = conStock.filter(p => (p.velocidad||0) === 0)
                             .sort((a,b) => b.stock*b.costo - a.stock*a.costo);
  const capInactivo = inactivo.reduce((s,p) => s + p.stock*p.costo, 0);

  el.innerHTML += `
    <div class="summary">
      <div class="sum-card"><div class="num">${arsC(valCosto)}</div><div class="lbl">Capital a costo</div></div>
      <div class="sum-card"><div class="num">${arsC(valPrecio)}</div><div class="lbl">Venta potencial</div></div>
      <div class="sum-card"><div class="num" style="color:var(--green-tx)">${arsC(ganancia)}</div><div class="lbl">Ganancia potencial</div></div>
      <div class="sum-card"><div class="num">${margenGlobal.toFixed(0)}%</div><div class="lbl">Margen global</div></div>
    </div>

    <div class="section-lbl">Rentabilidad</div>
    <div class="summary" style="padding-top:0">
      <div class="sum-card"><div class="num ${perdida.length?'red':''}">${perdida.length}</div><div class="lbl">A pérdida (precio ≤ costo)</div></div>
      <div class="sum-card"><div class="num ${bajoMargen.length?'amber':''}">${bajoMargen.length}</div><div class="lbl">Margen bajo (&lt; 20%)</div></div>
    </div>
    ${bajoMargen.length ? `<div class="list" style="padding-top:8px">
      ${bajoMargen.slice(0,8).map(p => `<div class="rank-item">
        <div class="top"><span class="nm">${p.nombre}</span>
          <span class="margin-tag ${claseMargen(margenPct(p))}">${margenPct(p).toFixed(0)}%</span></div>
        <div style="margin-top:5px;font-size:12px;color:var(--ink-soft)">${p.prov} · costo ${ars(p.costo)} · precio ${ars(p.precio)}</div>
      </div>`).join('')}
    </div>` : ''}

    <div class="section-lbl">Concentración de capital (ABC)</div>
    <div style="padding:0 18px 8px;font-size:13px;color:var(--ink-soft)">
      <b style="color:var(--ink)">${nA} productos</b> (${Math.round(nA/(ranked.length||1)*100)}% del surtido) concentran el <b style="color:var(--ink)">80%</b> del capital.
    </div>
    <div class="list" style="padding-top:0">
      ${ranked.slice(0,10).map(p => {
        const v = p.stock*p.costo;
        return `<div class="rank-item">
          <div class="top"><span class="nm">${p.nombre}</span><span class="val">${ars(v)}</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/maxCap*100)}%"></div></div>
          <div style="margin-top:5px;font-size:12px;color:var(--ink-soft)">${p.stock} u · ${p.cat} · ${(v/valCosto*100).toFixed(1)}% del capital</div>
        </div>`;
      }).join('')}
    </div>

    <div class="section-lbl">Capital por categoría</div>
    <div class="list" style="padding-top:0">
      ${cats.map(([c,v]) => `<div class="rank-item">
        <div class="top"><span class="nm">${c}</span><span class="val">${ars(v)} · ${(v/valCosto*100).toFixed(0)}%</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/maxCat*100)}%"></div></div>
      </div>`).join('')}
    </div>

    <div class="section-lbl">Capital inactivo (sin rotación)</div>
    ${hayVentas ? `
      <div style="padding:0 18px 8px;font-size:13px;color:var(--ink-soft)">
        <b style="color:var(--red-tx)">${ars(capInactivo)}</b> parados en ${inactivo.length} producto${inactivo.length===1?'':'s'} con stock que no registran venta (últimas 4 sem).
      </div>
      <div class="list" style="padding-top:0;padding-bottom:30px">
        ${inactivo.slice(0,10).map(p => {
          const v = p.stock*p.costo;
          return `<div class="rank-item">
            <div class="top"><span class="nm">${p.nombre}</span><span class="val" style="color:var(--red-tx)">${ars(v)}</span></div>
            <div style="margin-top:5px;font-size:12px;color:var(--ink-soft)">${p.stock} u sin mover · ${p.cat} · ${p.prov}</div>
          </div>`;
        }).join('')}
      </div>`
    : `<div style="padding:4px 18px 40px;font-size:13px;color:var(--ink-soft);line-height:1.6">
        Se activa cuando haya ventas registradas. Va a mostrar la plata parada en
        productos con stock que no rotan — lo primero a ofertar o liquidar.
      </div>`}
  `;
}

// ── TAB MUERTO ─────────────────────────────────────────────────────────────
// Productos con stock > 0 y sin venta en >= 60 días.
function renderTabMuerto(el) {
  const muertos = productos
    .filter(p => p.stock > 0)
    .map(p => ({ ...p, diasSinVenta: p.ultima_venta ? diasDesde(p.ultima_venta) : 9999 }))
    .filter(p => p.diasSinVenta >= 60)
    .sort((a, b) => (b.stock * b.costo) - (a.stock * a.costo));

  const capital = muertos.reduce((s, p) => s + p.stock * p.costo, 0);

  if (!muertos.length) {
    el.innerHTML += `<div class="empty" style="padding-top:60px">Sin productos muertos. Todo el stock rotó en los últimos 60 días.</div>`;
    return;
  }
  el.innerHTML += `
    <div style="padding:12px 18px 4px">
      <div style="background:var(--amber-bg);border:1px solid var(--amber-tx);border-radius:12px;padding:12px 14px;margin-bottom:10px">
        <div style="font-size:20px;font-weight:700;color:var(--amber-tx);line-height:1">${ars(capital)}</div>
        <div style="font-size:12px;color:var(--amber-tx);font-weight:600;margin-top:2px">
          Capital inmovilizado en ${muertos.length} producto${muertos.length===1?'':'s'} sin venta hace 60+ días
        </div>
      </div>
    </div>
    <div class="list">
      ${muertos.map(p => `
        <div class="prod-card" onclick="window._irDetalle('${p.id}')">
          <div class="top">
            <span class="nm">${p.nombre}</span>
            <span class="stock-badge ok">${p.stock}</span>
            <span class="arr">›</span>
          </div>
          <div class="meta">
            <span class="meta-tag">${p.cat}</span>
            <span class="meta-tag">·</span>
            <span class="meta-tag">${p.prov}</span>
            <span class="meta-tag">·</span>
            <span class="meta-tag">Capital <b>${ars(p.stock * p.costo)}</b></span>
            <span class="meta-tag">·</span>
            <span class="rest-tag rest-baja">${p.diasSinVenta>=365?'365+':p.diasSinVenta}d sin vender</span>
          </div>
        </div>`).join('')}
    </div>`;
}

// ── TAB INACTIVOS ──────────────────────────────────────────────────────────
function renderTabInactivos(el) {
  if (!productosInactivos.length) {
    el.innerHTML += `<div class="empty" style="padding-top:60px">No hay productos eliminados.</div>`;
    return;
  }
  el.innerHTML += `
    <div style="padding:12px 18px 4px;font-size:13px;color:var(--ink-soft)">
      ${productosInactivos.length} producto${productosInactivos.length===1?'':'s'} eliminado${productosInactivos.length===1?'':'s'}. Reactivá para que vuelvan a aparecer en stock y pedidos.
    </div>
    <div class="list">
      ${productosInactivos.map(p => `
        <div class="prod-card" style="cursor:default">
          <div class="top">
            <span class="nm">${p.nombre}</span>
            <button onclick="window._reactivarProducto('${p.id}')"
              style="padding:7px 12px;border:1px solid var(--green-tx);border-radius:8px;
                background:var(--green-bg);color:var(--green-tx);font-size:13px;font-weight:600;
                cursor:pointer;font-family:inherit;white-space:nowrap">
              ↺ Reactivar
            </button>
          </div>
          <div class="meta">
            <span class="meta-tag">${p.cat}</span>
            <span class="meta-tag">·</span>
            <span class="meta-tag">${p.prov}</span>
            <span class="meta-tag">·</span>
            <span class="meta-tag">Costo <b>${ars(p.costo)}</b></span>
            <span class="meta-tag">·</span>
            <span class="meta-tag">Precio <b>${ars(p.precio)}</b></span>
          </div>
        </div>`).join('')}
    </div>`;
}

// ── TAB RESUMEN ────────────────────────────────────────────────────────────
function renderTabResumen(el) {
  const neg      = productos.filter(p => p.stock < 0).length;
  const sinStock = productos.filter(p => p.stock === 0).length;
  const bajo     = productos.filter(p => p.stock > 0 && p.stock <= 5).length;
  const sinI45   = productos.filter(p => diasDesde(p.ultimo_ingreso) >= 45).length;
  const sinP45   = productos.filter(p => diasDesde(p.ultimo_cambio_costo) >= 45).length;
  const top5I = [...productos].sort((a,b) => diasDesde(b.ultimo_ingreso) - diasDesde(a.ultimo_ingreso)).slice(0,5);
  const top5P = [...productos].sort((a,b) => diasDesde(b.ultimo_cambio_costo) - diasDesde(a.ultimo_cambio_costo)).slice(0,5);
  const maxI = diasDesde(top5I[0]?.ultimo_ingreso) || 1;
  const maxP = diasDesde(top5P[0]?.ultimo_cambio_costo) || 1;

  el.innerHTML += `
    <div class="summary">
      <div class="sum-card"><div class="num red">${neg+sinStock}</div><div class="lbl">Sin stock / negativos</div></div>
      <div class="sum-card"><div class="num amber">${bajo}</div><div class="lbl">Stock bajo (≤5)</div></div>
      <div class="sum-card"><div class="num red">${sinI45}</div><div class="lbl">Sin ingreso +45 días</div></div>
      <div class="sum-card"><div class="num amber">${sinP45}</div><div class="lbl">Precio +45d sin cambio</div></div>
    </div>
    <div class="section-lbl" style="margin-top:8px">Top 5 sin reingreso</div>
    <div class="list" style="padding-top:0">
      ${top5I.map(p => {
        const d = diasDesde(p.ultimo_ingreso);
        return `<div class="rank-item">
          <div class="top"><span class="nm">${p.nombre}</span>
            <span class="val" style="${d>=60?'color:var(--red-tx)':d>=45?'color:var(--amber-tx)':''}">${d===9999?'∞':d+'d'}</span></div>
          <div class="bar-track"><div class="bar-fill ${d>=60?'red':d>=45?'amber':''}" style="width:${Math.round(d/maxI*100)}%"></div></div>
        </div>`;
      }).join('')}
    </div>
    <div class="section-lbl">Top 5 precio sin cambio</div>
    <div class="list" style="padding-top:0;padding-bottom:20px">
      ${top5P.map(p => {
        const d = diasDesde(p.ultimo_cambio_costo);
        return `<div class="rank-item">
          <div class="top"><span class="nm">${p.nombre}</span>
            <span class="val" style="${d>=60?'color:var(--red-tx)':d>=45?'color:var(--amber-tx)':''}">${d}d</span></div>
          <div class="bar-track"><div class="bar-fill ${d>=60?'red':d>=45?'amber':''}" style="width:${Math.round(d/maxP*100)}%"></div></div>
          <div style="margin-top:5px;font-size:12px;color:var(--ink-soft)">${p.prov} · ${ars(p.costo)}</div>
        </div>`;
      }).join('')}
    </div>`;
}

// ── HELPERS FILTRO ─────────────────────────────────────────────────────────
const uniq = arr => [...new Set(arr)];
function grupos() {
  const vals = agrupar === 'cat'
    ? uniq(productos.map(p => p.cat)).sort()
    : uniq(productos.map(p => p.prov)).sort();
  return ['todo', ...vals];
}
function campoGrupo() { return agrupar === 'cat' ? 'cat' : 'prov'; }
function prodsFiltrados() {
  return productos.filter(p => {
    if (filtroGrupo !== 'todo' && p[campoGrupo()] !== filtroGrupo) return false;
    if (busqueda.trim() && !p.nombre.toLowerCase().includes(busqueda.toLowerCase())) return false;
    return true;
  });
}

// ── ACCIONES PANEL ─────────────────────────────────────────────────────────
async function confirmarPanel() {
  const cant = parseFloat(document.getElementById('pcant')?.value);
  if (!cant || isNaN(cant)) return;
  const prodId = pInput.prodId;
  if (!prodId) return;
  const motivo = document.getElementById('pmot')?.value.trim() || '';
  const tipo = panelOpen === 'ingreso' ? 'ingreso' : 'ajuste';
  const cantFinal = panelOpen === 'ingreso' ? Math.abs(cant) : cant;

  const btn = document.querySelector('.panel .bar-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando…'; }

  const { error } = await supabase.from('mov_stock').insert({
    empresa_id: usuario.empresa_id,
    producto_id: prodId,
    tipo,
    cantidad: cantFinal,
    referencia_tipo: 'ajuste_manual',
    usuario_id: usuario.id,
    ...(motivo ? { referencia: motivo } : {})
  });

  if (error) {
    if (btn) { btn.disabled = false; btn.textContent = 'Confirmar'; }
    alert('Error: ' + error.message);
    return;
  }

  await cargarTodo();
  await cargarMovs(prodId);
  panelOpen = null;
  prodSelId = prodId; vista = 'detalle'; render();
}

// ── WINDOW EXPOSURE ────────────────────────────────────────────────────────
window._setTab            = t  => { tab = t; filtroGrupo = 'todo'; busqueda = ''; vista = 'lista'; render(); };
window._setBusqueda       = v  => { busqueda = v; renderStockList(); };

// Genera texto WhatsApp con productos en stock agrupados por categoría.
// Si u_bulto > 1 usa el precio unitario final del bulto (con desc_bulto aplicado).
window._abrirListaPrecios = () => {
  const conStock = productos
    .filter(p => p.stock > 0 && p.precio > 0)
    .sort((a, b) => a.nombre.localeCompare(b.nombre, 'es', { sensitivity: 'base' }));
  if (!conStock.length) { alert('No hay productos con stock disponible.'); return; }

  const porCat = new Map();
  for (const p of conStock) {
    const arr = porCat.get(p.cat) || [];
    arr.push(p);
    porCat.set(p.cat, arr);
  }
  const cats = [...porCat.entries()].sort((a, b) => a[0].localeCompare(b[0], 'es', { sensitivity: 'base' }));

  const hoy = new Date().toLocaleDateString('es-AR', { timeZone: 'America/Argentina/Cordoba' });
  let txt = `*📋 Lista de precios — El Rey*\n${hoy}\n`;
  for (const [cat, lista] of cats) {
    txt += `\n*${cat}*\n`;
    for (const p of lista) {
      const precioFinal = p.u_bulto > 1
        ? Math.round(p.precio * (1 - (p.desc_bulto || 0) / 100))
        : p.precio;
      txt += `• ${p.nombre} — ${ars(precioFinal)}\n`;
    }
  }

  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.onclick = e => { if (e.target === ov) ov.remove(); };
  ov.innerHTML = `
    <div class="panel" style="max-height:85vh;display:flex;flex-direction:column">
      <h3>Lista para compartir</h3>
      <p class="sub">${conStock.length} productos con stock</p>
      <textarea id="lp-txt" readonly
        style="flex:1;min-height:280px;padding:12px;border:1px solid var(--line);border-radius:10px;
          font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;line-height:1.5;
          background:var(--card);color:var(--ink);resize:vertical">${txt}</textarea>
      <div class="panel-btns" style="margin-top:12px">
        <button class="cancel" onclick="document.querySelector('.overlay').remove()">Cerrar</button>
        <button class="bar-btn" onclick="window._copiarLista()">📋 Copiar</button>
        ${navigator.share ? `<button class="bar-btn" style="background:var(--green-tx)" onclick="window._compartirLista()">📤 Compartir</button>` : ''}
      </div>
    </div>`;
  document.getElementById('root').appendChild(ov);
};

window._copiarLista = async () => {
  const t = document.getElementById('lp-txt')?.value;
  if (!t) return;
  try { await navigator.clipboard.writeText(t); alert('Copiado al portapapeles ✓'); }
  catch { document.getElementById('lp-txt')?.select(); document.execCommand('copy'); alert('Copiado ✓'); }
};

window._compartirLista = async () => {
  const t = document.getElementById('lp-txt')?.value;
  if (!t || !navigator.share) return;
  try { await navigator.share({ text: t, title: 'Lista de precios — El Rey' }); }
  catch (e) { if (e.name !== 'AbortError') alert('No se pudo compartir: ' + e.message); }
};
window._setAgrupar        = v  => { agrupar = v; filtroGrupo = 'todo'; render(); };
window._setFiltroGrupo    = i  => { filtroGrupo = (window._gruposCache || grupos())[i]; render(); };
window._setFiltroGrupoFull= i  => { filtroGrupo = (window._gruposCache || grupos())[i]; render(); };
window._setBannerNeg      = () => { busqueda = ''; filtroGrupo = 'todo'; render(); /* negativos ya primeros por sort */ };
window._irDetalle         = async id => {
  prodSelId = id; vista = 'detalle'; movs = []; render();
  await cargarMovs(id); render();
};
window._irLista           = () => { vista = 'lista'; panelOpen = null; render(); };
window._abrirPanel        = (tipo, id) => {
  if (!puedeAjustar) return;
  panelOpen = tipo; pInput = { prodId: id || '', busq: '', cant: '', motivo: '' }; render();
};
window._cerrarPanel       = () => { panelOpen = null; edit = null; render(); };
window._confirmarPanel    = () => confirmarPanel();
window._selProd           = id => { pInput.prodId = id; pInput.busq = ''; window._rerenderPanel(); };
window._setPBusq          = v  => { pInput.busq = v; renderPbusqResults(); };
window._rerenderPanel     = () => {
  document.querySelector('.overlay')?.remove();
  renderPanel();
};
Object.defineProperty(window, 'pInput', { get: () => pInput, set: v => { pInput = v; } });

// ── INIT ───────────────────────────────────────────────────────────────────
await cargarTodo();
render();
</script>
</body>
</html>
