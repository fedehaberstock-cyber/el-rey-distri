<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>El Rey · Stock</title>
<style>
  :root{
    --paper:#FBF9F2; --ink:#1C2B27; --ink-soft:#5B665F;
    --line:#E4DECF; --line-soft:#EEEADD;
    --gold:#A9760E; --gold-dk:#8A5F09;
    --green-bg:#E7F0E8; --green-tx:#2C6B3F;
    --amber-bg:#FDF2DC; --amber-tx:#8A5F09;
    --red-bg:#F6E5E2; --red-tx:#A8392B;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px;line-height:1.4}
  body{max-width:480px;margin:0 auto}

  .hdr{display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:1px solid var(--line);background:var(--paper);
    position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:8px;font-weight:600;letter-spacing:.02em}
  .crown{color:var(--gold);font-size:20px;line-height:1}
  .brand small{display:block;font-size:11px;font-weight:500;color:var(--ink-soft);
    letter-spacing:.06em;text-transform:uppercase}
  .back{display:flex;align-items:center;gap:6px;background:none;border:none;
    font-size:16px;font-weight:600;color:var(--gold);cursor:pointer;padding:0}
  .back svg{width:20px;height:20px}
  .hdr-title{font-size:17px;font-weight:600;flex:1;text-align:center}
  .hdr-right{min-width:60px;display:flex;justify-content:flex-end}

  /* BUSCADOR + FILTROS */
  .sticky-top{position:sticky;top:57px;background:var(--paper);z-index:10;
    padding:12px 18px 8px;border-bottom:1px solid var(--line-soft)}
  .search-input{width:100%;padding:12px 14px 12px 40px;border:1px solid var(--line);
    border-radius:12px;background:var(--card);font-size:16px;font-family:inherit;color:var(--ink);
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' fill='none' stroke='%235B665F' stroke-width='2'><circle cx='8' cy='8' r='5'/><path d='M14 14l-3-3'/></svg>");
    background-repeat:no-repeat;background-position:13px center;margin-bottom:10px}
  .search-input:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:transparent}
  .tabs{display:flex;gap:8px}
  .tab{padding:7px 14px;border-radius:999px;font-size:14px;font-weight:600;cursor:pointer;
    border:1px solid var(--line);background:var(--card);color:var(--ink-soft)}
  .tab.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}

  /* BANNER NEGATIVOS */
  .neg-banner{margin:14px 18px 0;padding:12px 14px;background:var(--red-bg);
    border-radius:12px;display:flex;align-items:center;gap:10px;font-size:14px;
    color:var(--red-tx);font-weight:600;cursor:pointer}
  .neg-banner span{font-size:20px}

  /* LISTA */
  .prod-list{padding:14px 18px 120px}
  .prod-row{display:flex;align-items:center;gap:12px;background:var(--card);
    border:1px solid var(--line);border-radius:14px;padding:14px 16px;
    margin-bottom:10px;cursor:pointer}
  .prod-row:active{background:var(--line-soft)}
  .prod-info{flex:1;min-width:0}
  .prod-info .nm{font-size:15px;font-weight:600;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis}
  .prod-info .sub{font-size:13px;color:var(--ink-soft);margin-top:2px}
  .stock-badge{min-width:44px;text-align:center;padding:7px 10px;border-radius:10px;
    font-size:16px;font-weight:700}
  .stock-badge.neg{background:var(--red-bg);color:var(--red-tx)}
  .stock-badge.zero{background:var(--red-bg);color:var(--red-tx)}
  .stock-badge.bajo{background:var(--amber-bg);color:var(--amber-tx)}
  .stock-badge.ok{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .arr{color:var(--ink-soft);font-size:18px}

  /* DETALLE */
  .det-body{padding-bottom:130px}
  .stock-hero{margin:18px;background:var(--card);border:1px solid var(--line);
    border-radius:18px;padding:26px 20px;text-align:center}
  .stock-hero .lbl{font-size:11px;font-weight:600;letter-spacing:.08em;
    text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
  .stock-num{font-size:52px;font-weight:700;letter-spacing:-.03em;line-height:1}
  .stock-num.neg{color:var(--red-tx)}
  .stock-num.zero{color:var(--red-tx)}
  .stock-num.bajo{color:var(--amber-tx)}
  .stock-num.ok{color:var(--ink)}
  .stock-status{font-size:14px;font-weight:600;margin-top:6px}
  .stock-status.neg{color:var(--red-tx)}
  .stock-status.zero{color:var(--red-tx)}
  .stock-status.bajo{color:var(--amber-tx)}
  .stock-status.ok{color:var(--green-tx)}
  .det-meta{margin:0 18px 18px;display:flex;flex-direction:column;gap:7px}
  .det-meta .row{font-size:14px;color:var(--ink-soft)}
  .det-meta .row b{color:var(--ink);font-weight:600}
  .sec-lbl{padding:0 18px;font-size:12px;font-weight:600;letter-spacing:.07em;
    text-transform:uppercase;color:var(--ink-soft);margin-bottom:10px}
  .movs{padding:0 18px}
  .mov{display:flex;justify-content:space-between;align-items:flex-start;
    padding:12px 0;border-bottom:1px solid var(--line-soft)}
  .mov:last-child{border-bottom:none}
  .mov .left .desc{font-size:15px;font-weight:500}
  .mov .left .fecha{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .mov .cant{font-size:15px;font-weight:700}
  .mov .cant.pos{color:var(--green-tx)}
  .mov .cant.neg-m{color:var(--red-tx)}
  .no-movs{color:var(--ink-soft);font-size:14px;padding:8px 0}

  /* BARRA */
  .bar{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;
    background:var(--paper);border-top:1px solid var(--line);padding:12px 18px 18px;z-index:20}
  .bar-btn{width:100%;padding:15px;border:none;border-radius:14px;background:var(--gold);
    color:#fff;font-size:17px;font-weight:600;cursor:pointer;font-family:inherit}
  .bar-btn:active{background:var(--gold-dk)}
  .bar-2{display:flex;gap:10px}
  .bar-2 .bar-btn{flex:1}
  .bar-2 .ghost{flex:1;padding:15px;border:1px solid var(--line);border-radius:14px;
    background:var(--card);font-size:16px;font-weight:600;color:var(--ink);
    cursor:pointer;font-family:inherit}

  /* PANEL */
  .overlay{position:fixed;inset:0;background:rgba(28,43,39,.4);z-index:30;
    display:flex;align-items:flex-end;max-width:480px;margin:0 auto}
  .panel{background:var(--paper);border-radius:22px 22px 0 0;
    padding:24px 20px 32px;width:100%}
  .panel h3{font-size:18px;font-weight:700;margin-bottom:4px}
  .panel .sub{font-size:14px;color:var(--ink-soft);margin-bottom:18px}
  .fl{display:block;font-size:12px;font-weight:600;letter-spacing:.07em;
    text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px;margin-top:14px}
  .fl:first-of-type{margin-top:0}
  .field{width:100%;padding:14px;border:1px solid var(--line);border-radius:12px;
    background:var(--card);font-size:16px;font-family:inherit;color:var(--ink)}
  .field:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:transparent}
  .panel-btns{display:flex;gap:10px;margin-top:16px}
  .panel-btns .bar-btn{flex:2}
  .panel-btns .cancel{flex:1;padding:15px;border:1px solid var(--line);border-radius:14px;
    background:var(--card);font-size:16px;font-weight:600;cursor:pointer;
    color:var(--ink);font-family:inherit}
  .prod-results{margin-top:6px;border:1px solid var(--line);border-radius:12px;
    overflow:hidden;background:var(--card);max-height:180px;overflow-y:auto}
  .prod-results .pr-row{padding:13px 14px;border-bottom:1px solid var(--line-soft);
    cursor:pointer;font-size:15px}
  .prod-results .pr-row:last-child{border-bottom:none}
  .prod-results .pr-row:active{background:var(--line-soft)}

  @media(prefers-reduced-motion:no-preference){
    .prod-row,.panel{animation:fd .15s ease}
    @keyframes fd{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { supabase } from './src/supabase.js'
import { requireSession, tienePermiso } from './src/auth.js'
import { fechaCorta, mostrarError } from './src/utils.js'

const { usuario } = await requireSession()
const puedeAjustar = usuario.rol === 'admin' || usuario.rol === 'deposito' || tienePermiso('stock', 'editar')

let productos = []   // [{id, nombre, cat, proveedor, stock}]
let movs = []        // movimientos del producto seleccionado

async function cargarProductos() {
  const [{ data: prods, error: e1 }, { data: stocks, error: e2 }] = await Promise.all([
    supabase.from('productos')
      .select('id, nombre, categoria, proveedores(nombre)')
      .eq('empresa_id', usuario.empresa_id)
      .eq('activo', true)
      .order('nombre'),
    supabase.from('stock_actual').select('producto_id, stock')
  ])
  if (e1) throw e1; if (e2) throw e2
  const mapStock = new Map((stocks||[]).map(s => [s.producto_id, Number(s.stock)]))
  productos = (prods||[]).map(p => ({
    id: p.id,
    nombre: p.nombre,
    cat: p.categoria || '—',
    proveedor: p.proveedores?.nombre || '—',
    stock: mapStock.get(p.id) ?? 0,
  }))
}

async function cargarMovs(prodId) {
  const { data, error } = await supabase
    .from('mov_stock')
    .select('id, tipo, cantidad, referencia_tipo, fecha, usuarios(nombre)')
    .eq('producto_id', prodId)
    .order('fecha', { ascending: false })
    .limit(50)
  if (error) { mostrarError(error.message); movs = []; return }
  movs = (data||[]).map(m => ({
    id: m.id,
    prodId,
    tipo: m.tipo,
    cant: Number(m.cantidad),
    desc: m.referencia_tipo || m.tipo,
    fecha: (m.fecha || '').slice(0,10),
    usuario: m.usuarios?.nombre || '',
  }))
}


// ── ESTADO ────────────────────────────────────────────────────────────
let vista      = 'lista';
let filtro     = 'todo';
let busqueda   = '';
let prodSelId  = null;
let panelOpen  = null;   // 'ingreso' | 'ajuste' | null
let pInput     = { prodId:'', busq:'', cant:'', motivo:'' };
let nextId     = 200;

// ── HELPERS ───────────────────────────────────────────────────────────
const stockDe = id => { const p = productos.find(x=>x.id===id); return p ? p.stock : 0 };
const claseStock = n => n < 0 ? 'neg' : n === 0 ? 'zero' : n <= 5 ? 'bajo' : 'ok';
const labelStock = n => n < 0 ? 'Negativo' : n === 0 ? 'Sin stock' : n <= 5 ? 'Stock bajo' : 'Normal';
const fmtFecha = s => { const [y,mo,d]=s.split('-'); return `${d}/${mo}/${y}`; };
const hoy = () => new Date().toISOString().slice(0,10);

// ── RENDER ────────────────────────────────────────────────────────────
function render(){
  document.getElementById('root').innerHTML = '';
  if(vista==='lista')   renderLista();
  else                  renderDetalle();
  if(panelOpen)         renderPanel();
}

// ── LISTA ─────────────────────────────────────────────────────────────
function renderLista(){
  const negativos = productos.filter(p=>stockDe(p.id)<0);
  const q = busqueda.trim().toLowerCase();

  let lista = productos.filter(p=>{
    if(q && !p.nombre.toLowerCase().includes(q) && !p.cat.toLowerCase().includes(q)
         && !p.proveedor.toLowerCase().includes(q)) return false;
    const s = stockDe(p.id);
    if(filtro==='bajo')     return s >= 0 && s <= 5;
    if(filtro==='negativo') return s < 0;
    return true;
  });
  // ordenar: negativos primero, luego bajo, luego ok
  lista.sort((a,b)=>{
    const sa=stockDe(a.id), sb=stockDe(b.id);
    if(sa<0 && sb>=0) return -1; if(sb<0 && sa>=0) return 1;
    return sa-sb;
  });

  const el = document.getElementById('root');
  el.innerHTML = `
    <div class="hdr">
      <div class="brand"><span class="crown">&#9818;</span>
        <div>El Rey<small>Stock</small></div>
      </div>
      <div class="hdr-right"></div>
    </div>
    <div class="sticky-top">
      <input class="search-input" placeholder="Buscar producto…" value="${busqueda}"
        oninput="busqueda=this.value;render()" autocomplete="off">
      <div class="tabs">
        <div class="tab ${filtro==='todo'?'active':''}"     onclick="filtro='todo';render()">Todo</div>
        <div class="tab ${filtro==='bajo'?'active':''}"     onclick="filtro='bajo';render()">Bajo ≤5</div>
        <div class="tab ${filtro==='negativo'?'active':''}" onclick="filtro='negativo';render()">Negativos</div>
      </div>
    </div>
    ${negativos.length && filtro!=='negativo'
      ? `<div class="neg-banner" onclick="filtro='negativo';render()">
           <span>&#9888;</span>${negativos.length} producto${negativos.length>1?'s':''} con stock negativo &nbsp;›
         </div>` : ''}
    <div class="prod-list">
      ${lista.length ? lista.map(p=>{
        const s=stockDe(p.id), cl=claseStock(s);
        return `<div class="prod-row" onclick="irDetalle('${p.id}')">
          <div class="prod-info">
            <div class="nm">${p.nombre}</div>
            <div class="sub">${p.proveedor} · ${p.cat}</div>
          </div>
          <div class="stock-badge ${cl}">${s}</div>
          <div class="arr">›</div>
        </div>`;
      }).join('') : `<div style="text-align:center;padding:40px 10px;color:var(--ink-soft);font-size:15px">Sin resultados.</div>`}
    </div>`;

  const bar = document.createElement('div');
  bar.className = 'bar';
  bar.innerHTML = puedeAjustar
    ? `<button class="bar-btn" onclick="abrirPanel('ingreso',null)">Registrar ingreso</button>`
    : '';
  el.appendChild(bar);
}

// ── DETALLE ───────────────────────────────────────────────────────────
function renderDetalle(){
  const p = productos.find(x=>x.id===prodSelId);
  const s = stockDe(p.id);
  const cl = claseStock(s);
  const movsP = [...movs].sort((a,b)=>b.fecha.localeCompare(a.fecha));

  const el = document.getElementById('root');
  el.innerHTML = `
    <div class="hdr">
      <button class="back" onclick="irLista()">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M12 5l-5 5 5 5"/>
        </svg>
      </button>
      <span class="hdr-title" style="font-size:15px">${p.nombre}</span>
      <div class="hdr-right"></div>
    </div>
    <div class="det-body">
      <div class="stock-hero">
        <div class="lbl">Stock actual</div>
        <div class="stock-num ${cl}">${s}</div>
        <div class="stock-status ${cl}">${labelStock(s)}</div>
      </div>
      <div class="det-meta">
        <div class="row">Proveedor: <b>${p.proveedor}</b></div>
        <div class="row">Categoría: <b>${p.cat}</b></div>
      </div>
      <div class="sec-lbl">Movimientos</div>
      <div class="movs">
        ${movsP.length ? movsP.map(m=>{
          const pos = m.cant > 0;
          const tipos = {ingreso:'Ingreso',venta:'Venta',ajuste:'Ajuste',devolucion:'Devolución'};
          return `<div class="mov">
            <div class="left">
              <div class="desc">${tipos[m.tipo]||m.tipo} — ${m.desc}</div>
              <div class="fecha">${fmtFecha(m.fecha)}</div>
            </div>
            <div class="cant ${pos?'pos':'neg-m'}">${pos?'+':''}${m.cant}</div>
          </div>`;
        }).join('') : `<div class="no-movs">Sin movimientos todavía.</div>`}
      </div>
    </div>`;

  const bar = document.createElement('div');
  bar.className='bar';
  bar.innerHTML = puedeAjustar
    ? `<div class="bar-2">
         <button class="ghost" onclick="abrirPanel('ajuste','${p.id}')">Ajuste</button>
         <button class="bar-btn" onclick="abrirPanel('ingreso','${p.id}')">Registrar ingreso</button>
       </div>`
    : '';
  el.appendChild(bar);
}

// ── PANEL ─────────────────────────────────────────────────────────────
function renderPanel(){
  const esIngreso = panelOpen==='ingreso';
  const prodPrefill = pInput.prodId ? productos.find(p=>p.id===pInput.prodId) : null;
  const busqMatch = pInput.busq.trim().length>1
    ? productos.filter(p=>p.nombre.toLowerCase().includes(pInput.busq.toLowerCase())).slice(0,5)
    : [];

  const ov = document.createElement('div');
  ov.className='overlay';
  ov.onclick = e => { if(e.target===ov) cerrarPanel(); };

  ov.innerHTML = `
    <div class="panel">
      <h3>${esIngreso ? 'Registrar ingreso' : 'Ajuste de stock'}</h3>
      <p class="sub">${esIngreso ? 'El stock sube con el ingreso registrado.'
                                 : 'Corrección manual. Se registra como ajuste.'}</p>
      ${prodPrefill
        ? `<div style="background:var(--card);border:1px solid var(--line);border-radius:12px;
               padding:12px 14px;margin-bottom:14px;font-size:15px;font-weight:600">
             ${prodPrefill.nombre}
           </div>`
        : `<label class="fl">Producto</label>
           <input class="field" id="pbusq" placeholder="Buscar producto…"
             value="${pInput.busq}" oninput="pInput.busq=this.value;rerenderPanel()"
             autocomplete="off">
           ${busqMatch.length ? `<div class="prod-results">
             ${busqMatch.map(p=>`<div class="pr-row" onclick="selProd('${p.id}')">${p.nombre}</div>`).join('')}
           </div>` : ''}`}
      <label class="fl">${esIngreso ? 'Cantidad a ingresar' : 'Cantidad (negativo para restar)'}</label>
      <input class="field" id="pcant" type="number"
        placeholder="${esIngreso?'Ej: 12':'Ej: 5 ó -3'}"
        value="${pInput.cant}" oninput="pInput.cant=this.value" inputmode="numeric">
      ${!esIngreso ? `<label class="fl">Motivo (opcional)</label>
        <input class="field" id="pmot" placeholder="Ej: error de conteo"
          value="${pInput.motivo}" oninput="pInput.motivo=this.value">` : ''}
      <div class="panel-btns">
        <button class="cancel" onclick="cerrarPanel()">Cancelar</button>
        <button class="bar-btn" onclick="confirmarPanel()">Confirmar</button>
      </div>
    </div>`;
  document.getElementById('root').appendChild(ov);
  setTimeout(()=>{
    const f = document.getElementById('pbusq') || document.getElementById('pcant');
    if(f) f.focus();
  },50);
}

function selProd(id){ pInput.prodId=id; pInput.busq=''; rerenderPanel(); }
function rerenderPanel(){
  const ov = document.querySelector('.overlay');
  if(ov) ov.remove();
  renderPanel();
}

function abrirPanel(tipo, id){
  if (!puedeAjustar) return
  panelOpen=tipo;
  pInput = { prodId:id||'', busq:'', cant:'', motivo:'' };
  render();
}
function cerrarPanel(){ panelOpen=null; render(); }

async function confirmarPanel(){
  const cant = parseFloat(document.getElementById('pcant')?.value);
  if(!cant || isNaN(cant)) return;
  const prodId = pInput.prodId;
  if(!prodId) return;
  const motivo = document.getElementById('pmot')?.value.trim() || '';
  const tipo = panelOpen==='ingreso' ? 'ingreso' : 'ajuste';
  const cantFinal = panelOpen==='ingreso' ? Math.abs(cant) : cant;

  const btn = document.querySelector('.panel .bar-btn');
  if(btn){ btn.disabled = true; btn.textContent = 'Guardando…'; }

  const { error } = await supabase.from('mov_stock').insert({
    empresa_id: usuario.empresa_id,
    producto_id: prodId,
    tipo,
    cantidad: cantFinal,
    referencia_tipo: 'ajuste_manual',
    usuario_id: usuario.id,
    ...(motivo ? { referencia: motivo } : {})
  })
  if (error) { mostrarError(error.message); if(btn){ btn.disabled=false; btn.textContent='Confirmar'; } return; }

  await cargarProductos()
  await cargarMovs(prodId)
  panelOpen = null
  prodSelId = prodId; vista = 'detalle'; render();
}

// ── NAVEGACIÓN ────────────────────────────────────────────────────────
function irLista() { vista='lista'; panelOpen=null; render(); }

async function irDetalle(id){
  prodSelId = id; vista = 'detalle';
  render(); // render inmediato con movs vacíos
  await cargarMovs(id);
  render(); // re-render con movs cargados
}

// ── INIT ──────────────────────────────────────────────────────────────
// Exponer al DOM (módulo ES no hace auto-global)
Object.assign(window, { render, irLista, irDetalle, abrirPanel, cerrarPanel,
                         confirmarPanel, selProd, rerenderPanel,
                         busqueda: undefined, filtro: undefined });

// Parchear referencias inline a variables globales
Object.defineProperty(window, 'busqueda', {
  get: () => busqueda, set: v => { busqueda = v; }
});
Object.defineProperty(window, 'filtro', {
  get: () => filtro, set: v => { filtro = v; }
});

document.getElementById('root').innerHTML =
  `<div style="text-align:center;padding:60px 20px;color:var(--ink-soft)">Cargando stock…</div>`;
try {
  await cargarProductos();
  render();
} catch(e) {
  mostrarError('Error cargando stock: ' + e.message);
}
</script>
</body>
</html>
