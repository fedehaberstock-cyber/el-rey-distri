<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="./src/logger.js"></script>
<title>El Rey · Productos</title>
<style>
  :root{
    --paper:#FBF9F2; --ink:#1C2B27; --ink-soft:#5B665F;
    --line:#E4DECF; --line-soft:#EEEADD;
    --gold:#A9760E; --gold-dk:#8A5F09; --gold-lt:#F5E9D0;
    --green-bg:#E7F0E8; --green-tx:#2C6B3F;
    --amber-bg:#FDF2DC; --amber-tx:#8A5F09;
    --red-bg:#F6E5E2; --red-tx:#A8392B;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px;line-height:1.4}
  body{max-width:480px;margin:0 auto}

  /* HEADER */
  .hdr{display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:1px solid var(--line);background:var(--paper);
    position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:8px;font-weight:600;letter-spacing:.02em}
  .crown{color:var(--gold);font-size:20px;line-height:1}
  .brand small{display:block;font-size:11px;font-weight:500;color:var(--ink-soft);
    letter-spacing:.06em;text-transform:uppercase}
  .back{display:flex;align-items:center;gap:8px;background:none;border:none;
    font-size:16px;font-weight:600;color:var(--gold);cursor:pointer;padding:0}
  .back svg{width:20px;height:20px}
  .hdr-title{font-size:17px;font-weight:600;flex:1;text-align:center}
  .hdr-right{min-width:60px;display:flex;justify-content:flex-end}
  .add-btn{background:none;border:none;color:var(--gold);font-size:28px;
    line-height:1;cursor:pointer;padding:0}

  /* SEARCH */
  .search-wrap{padding:14px 18px 8px;position:sticky;top:57px;background:var(--paper);z-index:10}
  .search-input{width:100%;padding:13px 14px 13px 40px;border:1px solid var(--line);
    border-radius:12px;background:var(--card);font-size:16px;font-family:inherit;color:var(--ink);
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' fill='none' stroke='%235B665F' stroke-width='2'><circle cx='8' cy='8' r='5'/><path d='M14 14l-3-3'/></svg>");
    background-repeat:no-repeat;background-position:13px center}
  .search-input:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:transparent}

  /* LISTA */
  .pr-list{padding:0 18px 100px}
  .pr-row{display:flex;justify-content:space-between;align-items:center;
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;margin-bottom:10px;cursor:pointer;gap:10px}
  .pr-row:active{background:var(--line-soft)}
  .pr-row .info{flex:1;min-width:0}
  .pr-row .nm{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pr-row .meta{font-size:13px;color:var(--ink-soft);margin-top:2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pr-row.inactivo{opacity:.55}
  .pr-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
  .pr-price{font-size:16px;font-weight:700;color:var(--gold)}
  .chip{padding:5px 10px;border-radius:999px;font-size:12px;font-weight:700;white-space:nowrap}
  .chip.stock-ok{background:var(--green-bg);color:var(--green-tx)}
  .chip.stock-bajo{background:var(--amber-bg);color:var(--amber-tx)}
  .chip.stock-neg{background:var(--red-bg);color:var(--red-tx)}
  .empty{text-align:center;padding:40px 10px;color:var(--ink-soft);font-size:15px}

  /* FORM */
  .form-body{padding:18px;padding-bottom:120px}
  label.fl{display:block;font-size:12px;font-weight:600;letter-spacing:.07em;
    text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px;margin-top:18px}
  label.fl:first-child{margin-top:0}
  .field{width:100%;padding:14px;border:1px solid var(--line);border-radius:12px;
    background:var(--card);font-size:16px;font-family:inherit;color:var(--ink)}
  .field:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:transparent}
  select.field{appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' fill='none' stroke='%235B665F' stroke-width='2.2'><path d='M3 5l4 4 4-4'/></svg>");
    background-repeat:no-repeat;background-position:right 14px center;padding-right:40px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .switch-row{display:flex;align-items:center;justify-content:space-between;
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;margin-top:18px}
  .switch-row .sw-lbl{font-size:15px;font-weight:600}
  .switch{position:relative;width:50px;height:28px;background:var(--line);
    border-radius:999px;cursor:pointer;transition:background .15s}
  .switch.on{background:var(--gold)}
  .switch::after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;
    background:#fff;border-radius:50%;transition:left .15s}
  .switch.on::after{left:25px}
  .err{color:var(--red-tx);font-size:13px;margin-top:14px;display:none}
  .err.show{display:block}

  /* BARRA INFERIOR */
  .bar{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;
    background:var(--paper);border-top:1px solid var(--line);padding:12px 18px 18px;z-index:20}
  .bar-btn{width:100%;padding:16px;border:none;border-radius:14px;background:var(--gold);
    color:#fff;font-size:17px;font-weight:600;cursor:pointer}
  .bar-btn:active{background:var(--gold-dk)}
  .bar-btn:disabled{background:var(--line);color:var(--ink-soft)}
  .ghost{width:100%;padding:15px;border:1px solid var(--line);border-radius:14px;
    background:var(--card);font-size:16px;font-weight:600;color:var(--ink);cursor:pointer;margin-top:10px}

  @media(prefers-reduced-motion:no-preference){
    .pr-row{animation:fd .15s ease}
    @keyframes fd{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { supabase } from './src/supabase.js'
import { requireSession, getUsuario } from './src/auth.js'
import { ars, mostrarError } from './src/utils.js'

// ── ESTADO ────────────────────────────────────────────────────────────
let vista = 'lista';     // lista | form
let editId = null;       // null = nuevo, uuid = editar
let busqueda = '';
let cargando = false;

let productos = [];      // {id, nombre, categoria, costo, precio, u_bulto, desc_bulto, proveedor_id, activo, stock}
let proveedores = [];    // {id, nombre}
let form = nuevoForm();

function nuevoForm(){
  return {
    nombre: '', categoria: '',
    costo: '', precio: '',
    u_bulto: '12', desc_bulto: '0',
    proveedor_id: '', activo: true,
  };
}

// expongo handlers
Object.assign(window, {
  irLista, irNuevo, irEditar, guardar, toggleActivo,
  setBusqueda: v => { busqueda = v; renderListaBody(); },
  setForm: (k, v) => { form[k] = v; },
  toggleSwitch: () => { form.activo = !form.activo; render(); },
});

// ── DATOS ─────────────────────────────────────────────────────────────
async function cargarTodo(){
  cargando = true;
  const usr = getUsuario();
  const esAdmin = usr?.rol === 'admin';

  const cols = esAdmin
    ? 'id, nombre, categoria, costo, precio, u_bulto, desc_bulto, proveedor_id, activo'
    : 'id, nombre, categoria, precio, u_bulto, desc_bulto, proveedor_id, activo';

  const [prodResp, provResp, stkResp] = await Promise.all([
    supabase.from('productos').select(cols).order('nombre'),
    supabase.from('proveedores').select('id, nombre').eq('activo', true).order('nombre'),
    supabase.from('stock_actual').select('producto_id, stock'),
  ]);
  cargando = false;

  if (prodResp.error) return mostrarError('Error cargando productos: ' + prodResp.error.message);
  if (provResp.error) return mostrarError('Error cargando proveedores: ' + provResp.error.message);
  if (stkResp.error)  return mostrarError('Error cargando stock: ' + stkResp.error.message);

  const stkMap = Object.fromEntries((stkResp.data || []).map(s => [s.producto_id, Number(s.stock) || 0]));
  proveedores = provResp.data || [];
  productos = (prodResp.data || []).map(p => ({ ...p, stock: stkMap[p.id] ?? 0 }));
}

// ── RENDER PRINCIPAL ──────────────────────────────────────────────────
function render(){
  document.getElementById('root').innerHTML = '';
  if (vista === 'lista') renderLista();
  else                   renderForm();
}

// ── LISTA ─────────────────────────────────────────────────────────────
function renderLista(){
  const el = document.getElementById('root');
  const hdr = document.createElement('div');
  hdr.innerHTML = `
    <div class="hdr">
      <div class="brand"><span class="crown">&#9818;</span>
        <div>El Rey<small>Productos</small></div>
      </div>
      <div class="hdr-right">
        <button class="add-btn" onclick="irNuevo()" aria-label="Nuevo producto">+</button>
      </div>
    </div>
    <div class="search-wrap">
      <input class="search-input" placeholder="Buscar producto o categoría…" value="${busqueda}"
        oninput="window.setBusqueda(this.value)" autocomplete="off">
    </div>
    <div id="pr-list-body" class="pr-list"></div>`;
  el.appendChild(hdr);
  renderListaBody();
}

function renderListaBody(){
  const body = document.getElementById('pr-list-body');
  if (!body) return;
  const q = busqueda.trim().toLowerCase();
  const lista = productos.filter(p =>
    !q || p.nombre.toLowerCase().includes(q) || (p.categoria || '').toLowerCase().includes(q)
  );
  body.innerHTML = '';
  if (cargando) {
    body.innerHTML = `<div class="empty">Cargando…</div>`;
    return;
  }
  if (!lista.length) {
    body.innerHTML = busqueda
      ? `<div class="empty">Sin resultados para "${busqueda}"</div>`
      : `<div class="empty">No hay productos todavía.<br>Tocá + para crear el primero.</div>`;
    return;
  }
  lista.forEach(p => {
    const stockClass = p.stock < 0 ? 'stock-neg' : p.stock <= 5 ? 'stock-bajo' : 'stock-ok';
    const stockTxt = p.stock < 0 ? `${p.stock}` : `${p.stock} un.`;
    const prov = proveedores.find(x => x.id === p.proveedor_id);
    const row = document.createElement('div');
    row.className = 'pr-row' + (p.activo ? '' : ' inactivo');
    row.innerHTML = `
      <div class="info">
        <div class="nm">${p.nombre}</div>
        <div class="meta">${[p.categoria, prov?.nombre].filter(Boolean).join(' · ') || '—'}</div>
      </div>
      <div class="pr-right">
        <div class="pr-price">${ars(p.precio)}</div>
        <span class="chip ${stockClass}">${stockTxt}</span>
      </div>`;
    row.onclick = () => irEditar(p.id);
    body.appendChild(row);
  });
}

// ── FORM (nuevo/editar) ───────────────────────────────────────────────
function renderForm(){
  const esEdicion = !!editId;
  const titulo = esEdicion ? 'Editar producto' : 'Nuevo producto';

  const el = document.getElementById('root');
  const hdr = document.createElement('div');
  hdr.innerHTML = `
    <div class="hdr">
      <button class="back" onclick="irLista()">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M12 5l-5 5 5 5"/>
        </svg>
      </button>
      <span class="hdr-title">${titulo}</span>
      <div class="hdr-right"></div>
    </div>`;
  el.appendChild(hdr);

  const body = document.createElement('div');
  body.className = 'form-body';
  body.innerHTML = `
    <label class="fl">Nombre *</label>
    <input class="field" type="text" placeholder="Ej: Coca Cola 2L"
      value="${escapeAttr(form.nombre)}" oninput="window.setForm('nombre', this.value)">

    <label class="fl">Categoría</label>
    <input class="field" type="text" placeholder="Ej: Gaseosa"
      value="${escapeAttr(form.categoria)}" oninput="window.setForm('categoria', this.value)">

    <label class="fl">Proveedor</label>
    <select class="field" oninput="window.setForm('proveedor_id', this.value || null)">
      <option value="">— sin proveedor —</option>
      ${proveedores.map(p => `
        <option value="${p.id}" ${p.id === form.proveedor_id ? 'selected' : ''}>${p.nombre}</option>
      `).join('')}
    </select>

    <div class="row2">
      <div>
        <label class="fl">Costo *</label>
        <input class="field" type="number" step="0.01" min="0" inputmode="decimal" placeholder="0"
          value="${form.costo}" oninput="window.setForm('costo', this.value)">
      </div>
      <div>
        <label class="fl">Precio *</label>
        <input class="field" type="number" step="0.01" min="0" inputmode="decimal" placeholder="0"
          value="${form.precio}" oninput="window.setForm('precio', this.value)">
      </div>
    </div>

    <div class="row2">
      <div>
        <label class="fl">Un. x bulto *</label>
        <input class="field" type="number" min="1" inputmode="numeric"
          value="${form.u_bulto}" oninput="window.setForm('u_bulto', this.value)">
      </div>
      <div>
        <label class="fl">Desc. bulto %</label>
        <input class="field" type="number" step="0.1" min="0" max="100" inputmode="decimal"
          value="${form.desc_bulto}" oninput="window.setForm('desc_bulto', this.value)">
      </div>
    </div>

    <div class="switch-row">
      <div class="sw-lbl">Activo</div>
      <div class="switch ${form.activo ? 'on' : ''}" onclick="window.toggleSwitch()"></div>
    </div>

    <div id="form-err" class="err"></div>`;
  el.appendChild(body);

  const bar = document.createElement('div');
  bar.className = 'bar';
  bar.innerHTML = `
    <button id="save-btn" class="bar-btn" onclick="guardar()">
      ${esEdicion ? 'Guardar cambios' : 'Crear producto'}
    </button>
    <button class="ghost" onclick="irLista()">Cancelar</button>`;
  el.appendChild(bar);
}

// ── ACCIONES ──────────────────────────────────────────────────────────
function irLista(){ vista='lista'; editId=null; render(); }

function irNuevo(){
  editId = null;
  form = nuevoForm();
  vista = 'form';
  render();
}

function irEditar(id){
  const p = productos.find(x => x.id === id);
  if (!p) return;
  editId = id;
  form = {
    nombre: p.nombre || '',
    categoria: p.categoria || '',
    costo: p.costo ?? '',
    precio: p.precio ?? '',
    u_bulto: p.u_bulto ?? 12,
    desc_bulto: p.desc_bulto ?? 0,
    proveedor_id: p.proveedor_id || '',
    activo: p.activo !== false,
  };
  vista = 'form';
  render();
}

async function guardar(){
  const errEl = document.getElementById('form-err');
  const btn = document.getElementById('save-btn');
  const showErr = (m) => { if (errEl) { errEl.textContent = m; errEl.classList.add('show'); } };

  // validación mínima
  if (!form.nombre.trim())            return showErr('El nombre es obligatorio');
  const costo = parseFloat(form.costo);
  const precio = parseFloat(form.precio);
  const u_bulto = parseInt(form.u_bulto, 10);
  const desc_bulto = parseFloat(form.desc_bulto || 0);
  if (Number.isNaN(costo) || costo < 0)   return showErr('Costo inválido');
  if (Number.isNaN(precio) || precio < 0) return showErr('Precio inválido');
  if (!u_bulto || u_bulto < 1)            return showErr('Unidades por bulto debe ser ≥ 1');

  btn.disabled = true; btn.textContent = 'Guardando…';

  const usr = getUsuario();
  const payload = {
    nombre: form.nombre.trim(),
    categoria: form.categoria.trim() || null,
    costo, precio,
    u_bulto, desc_bulto,
    proveedor_id: form.proveedor_id || null,
    activo: form.activo,
  };

  let resp;
  if (editId) {
    resp = await supabase.from('productos').update(payload).eq('id', editId).select('id').single();
  } else {
    payload.empresa_id = usr.empresa_id;
    resp = await supabase.from('productos').insert(payload).select('id').single();
  }

  if (resp.error) {
    btn.disabled = false; btn.textContent = editId ? 'Guardar cambios' : 'Crear producto';
    return showErr(resp.error.message);
  }

  await cargarTodo();
  irLista();
}

async function toggleActivo(id){
  const p = productos.find(x => x.id === id);
  if (!p) return;
  await supabase.from('productos').update({ activo: !p.activo }).eq('id', id);
  await cargarTodo();
  render();
}

// ── HELPERS ───────────────────────────────────────────────────────────
function escapeAttr(s){ return String(s ?? '').replace(/"/g, '&quot;'); }

// ── ARRANQUE ──────────────────────────────────────────────────────────
async function arrancar(){
  await requireSession();
  render();
  await cargarTodo();
  render();
}
arrancar();
</script>
</body>
</html>
