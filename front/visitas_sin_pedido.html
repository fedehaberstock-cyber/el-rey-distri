<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="./src/logger.js"></script>
<title>El Rey · Visitas sin pedido</title>
<style>
  :root{
    --paper:#FBF9F2; --ink:#1C2B27; --ink-soft:#5B665F;
    --line:#E4DECF;  --line-soft:#EEEADD;
    --gold:#A9760E;  --gold-dk:#8A5F09; --gold-lt:#F5E9D0;
    --green-bg:#E7F0E8; --green-tx:#2C6B3F;
    --amber-bg:#FDF2DC; --amber-tx:#8A5F09;
    --red-bg:#F6E5E2;   --red-tx:#A8392B;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{overscroll-behavior-y:contain;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px;line-height:1.4}
  body{max-width:560px;margin:0 auto;padding-bottom:40px}

  .hdr{display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:1px solid var(--line);background:var(--paper);
    position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:8px;font-weight:600}
  .crown{color:var(--gold);font-size:20px}
  .brand small{display:block;font-size:11px;font-weight:500;color:var(--ink-soft);
    letter-spacing:.06em;text-transform:uppercase}
  .back{background:none;border:none;font-size:13px;color:var(--gold);font-weight:600;cursor:pointer;font-family:inherit}

  .filters{padding:12px 18px;background:var(--paper);border-bottom:1px solid var(--line-soft)}
  .filters-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
  .filters input,.filters select{padding:9px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:14px;background:var(--card)}
  .search{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:14px;background:var(--card)}

  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 18px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 14px}
  .kpi .num{font-size:20px;font-weight:700;line-height:1.1;color:var(--ink)}
  .kpi .lbl{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin-top:3px}

  .list{padding:6px 18px}
  .v-card{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:10px 12px;margin-bottom:8px}
  .v-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:4px}
  .v-cli{font-size:14px;font-weight:700}
  .v-fecha{font-size:12px;color:var(--ink-soft);white-space:nowrap}
  .v-prev{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .v-motivo{background:var(--gold-lt);color:var(--gold-dk);padding:6px 10px;
    border-radius:8px;font-size:13px;margin-top:6px;line-height:1.35;white-space:pre-wrap}
  .v-sin{font-size:12px;color:var(--ink-soft);margin-top:6px;font-style:italic}

  .empty{text-align:center;padding:40px 18px;color:var(--ink-soft);font-size:14px}
  .loading{text-align:center;padding:48px 18px;color:var(--ink-soft)}
  .err-box{margin:18px;padding:14px;background:var(--red-bg);border:1px solid var(--red-tx);
    border-radius:12px;color:var(--red-tx);font-size:14px}
</style>
</head>
<body>
<div id="root"><div class="loading">Cargando…</div></div>

<script type="module">
import { supabase } from './src/supabase.js'
import { requireSession, tienePermiso } from './src/auth.js'

const { usuario } = await requireSession()
if (!tienePermiso('mis_numeros') && usuario.rol !== 'admin') {
  location.href = './login_home.html'; throw new Error('sin permiso')
}

const _fmtArg = d => new Intl.DateTimeFormat('en-CA', { timeZone: 'America/Argentina/Cordoba' }).format(d)
const isoOffset = (days) => _fmtArg(new Date(Date.now() + days * 86400000))
const fmtFecha = s => new Date(s).toLocaleString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })

let visitas = []
let preventistas = []
let desde = isoOffset(-14)
let hasta = isoOffset(0)
let filtroPrev = ''
let busqueda = ''

async function cargar() {
  const [{ data, error }, { data: prevs }] = await Promise.all([
    supabase.from('visitas_clientes')
      .select(`id, fecha, resultado, motivo,
        clientes(nombre, telefono),
        usuarios:usuario_id(nombre)`)
      .eq('empresa_id', usuario.empresa_id)
      .eq('resultado', 'sin_pedido')
      .gte('fecha', desde)
      .lte('fecha', hasta + 'T23:59:59')
      .order('fecha', { ascending: false })
      .limit(500),
    supabase.from('usuarios')
      .select('id, nombre, rol').eq('empresa_id', usuario.empresa_id)
      .eq('activo', true).in('rol', ['preventista','admin']).order('nombre'),
  ])
  if (error) {
    document.getElementById('root').innerHTML = `<div class="err-box">Error: ${error.message}</div>`
    return
  }
  visitas = data || []
  preventistas = prevs || []
  render()
}

function filtradas() {
  let r = visitas
  if (filtroPrev) r = r.filter(v => v.usuarios?.nombre === filtroPrev)
  if (busqueda.trim()) {
    const q = busqueda.toLowerCase()
    r = r.filter(v => (v.clientes?.nombre || '').toLowerCase().includes(q) ||
                      (v.motivo || '').toLowerCase().includes(q))
  }
  return r
}

function render() {
  const el = document.getElementById('root')
  const lista = filtradas()
  const conMotivo = visitas.filter(v => v.motivo).length
  el.innerHTML = `
    <div class="hdr">
      <div class="brand"><span class="crown">&#9818;</span>
        <div>El Rey<small>Visitas sin pedido</small></div>
      </div>
      <button class="back" onclick="location.href='./login_home.html'">Inicio ›</button>
    </div>
    <div class="filters">
      <div class="filters-row">
        <input type="date" value="${desde}" onchange="window._setDesde(this.value)">
        <input type="date" value="${hasta}" onchange="window._setHasta(this.value)">
      </div>
      <div class="filters-row" style="margin-bottom:0">
        <select onchange="window._setPrev(this.value)">
          <option value="">Todos los preventistas</option>
          ${preventistas.map(p => `<option value="${p.nombre}" ${filtroPrev===p.nombre?'selected':''}>${p.nombre}</option>`).join('')}
        </select>
        <input class="search" placeholder="Buscar cliente o motivo…" value="${busqueda}" oninput="window._setBusq(this.value)">
      </div>
    </div>
    <div class="kpis">
      <div class="kpi"><div class="num">${visitas.length}</div><div class="lbl">Total visitas</div></div>
      <div class="kpi"><div class="num">${conMotivo}</div><div class="lbl">Con motivo cargado</div></div>
    </div>
    <div class="list">
      ${!lista.length ? `<div class="empty">${visitas.length ? 'Sin resultados.' : 'Sin visitas sin pedido en este período.'}</div>` :
        lista.map(v => `<div class="v-card">
          <div class="v-top">
            <span class="v-cli">${v.clientes?.nombre || '(sin cliente)'}</span>
            <span class="v-fecha">${fmtFecha(v.fecha)}</span>
          </div>
          <div class="v-prev">Preventista: <b>${v.usuarios?.nombre || '—'}</b>${v.clientes?.telefono ? ` · ${v.clientes.telefono}` : ''}</div>
          ${v.motivo ? `<div class="v-motivo">📝 ${v.motivo}</div>` : `<div class="v-sin">Sin motivo cargado.</div>`}
        </div>`).join('')}
    </div>`
}

window._setDesde = v => { desde = v; cargar() }
window._setHasta = v => { hasta = v; cargar() }
window._setPrev = v => { filtroPrev = v; render() }
window._setBusq = v => { busqueda = v; render() }

await cargar()
</script>
</body>
</html>
