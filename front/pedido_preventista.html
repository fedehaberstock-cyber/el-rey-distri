<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="./src/logger.js"></script>
<title>El Rey · Cargar pedido</title>
<style>
  :root{
    --paper:#FBF9F2; --ink:#1C2B27; --ink-soft:#5B665F;
    --line:#E4DECF; --line-soft:#EEEADD;
    --gold:#A9760E; --gold-dk:#8A5F09;
    --green-bg:#E7F0E8; --green-tx:#2C6B3F;
    --red-bg:#F6E5E2; --red-tx:#A8392B;
    --card:#FFFFFF; --bulto-bg:#FDF2DC; --bulto-tx:#8A5F09;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px;line-height:1.4;
    overscroll-behavior-y:contain}  /* evita pull-to-refresh que borra el pedido */
  body{max-width:480px;margin:0 auto;padding-bottom:140px}

  .hdr{display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:1px solid var(--line);background:var(--paper)}
  .brand{display:flex;align-items:center;gap:8px;font-weight:600;letter-spacing:.02em}
  .crown{color:var(--gold);font-size:20px;line-height:1}
  .brand small{display:block;font-size:11px;font-weight:500;color:var(--ink-soft);
    letter-spacing:.06em;text-transform:uppercase}
  .user{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--ink-soft)}
  .user b{color:var(--ink);font-weight:600}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}

  section{padding:18px}
  .lbl{font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
    color:var(--ink-soft);margin-bottom:8px;display:flex;justify-content:space-between;align-items:baseline}
  .lbl span{font-weight:500;letter-spacing:0;text-transform:none}
  select,input,button{font-family:inherit;font-size:16px;color:var(--ink)}
  .field{width:100%;padding:14px;border:1px solid var(--line);border-radius:12px;
    background:var(--card);appearance:none}
  .field:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:transparent}
  select.field{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' fill='none' stroke='%235B665F' stroke-width='2'><path d='M5 8l5 5 5-5'/></svg>");
    background-repeat:no-repeat;background-position:right 14px center;padding-right:42px}
  .saldo{margin-top:10px;display:inline-flex;align-items:center;gap:8px;
    padding:7px 12px;border-radius:999px;font-size:14px;font-weight:600}
  .saldo.deudor{background:var(--red-bg);color:var(--red-tx)}
  .saldo.aldia{background:var(--green-bg);color:var(--green-tx)}
  .divider{height:1px;background:var(--line-soft);margin:0 18px}

  /* BÚSQUEDA */
  .search-wrap{position:relative}
  /* cuando el input está enfocado, fijar la sección arriba */
  section.search-wrap:focus-within,
  section.search-wrap.has-items{position:sticky;top:0;background:var(--paper);z-index:15;padding-top:10px;padding-bottom:6px;box-shadow:0 2px 4px rgba(0,0,0,.04)}
  section.search-wrap.has-items #res{max-height:55vh;overflow-y:auto}
  section.search-wrap.has-items > .lbl{display:none}
  .last-card{margin-top:6px;background:var(--gold-lt);border:1px solid var(--gold);border-radius:12px;padding:8px 10px}
  .last-card .ttl{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--gold-dk);margin-bottom:4px}
  .last-card .row1{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:4px}
  .last-card .nm{font-size:14px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .last-card .x{background:none;border:none;color:var(--ink-soft);font-size:18px;cursor:pointer;font-family:inherit;padding:0 4px;line-height:1}
  .last-card .ctrls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .last-card .stepper{display:flex;align-items:center;gap:4px}
  .last-card .stepper button{width:30px;height:30px;border:1px solid var(--gold);border-radius:8px;background:#fff;font-size:16px;font-weight:700;color:var(--ink);font-family:inherit;cursor:pointer}
  .last-card .stepper input{width:50px;text-align:center;border:1px solid var(--gold);border-radius:8px;padding:4px;font-size:14px;font-weight:700;font-family:inherit;background:#fff;color:var(--ink)}
  .last-card .disc{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--ink-soft)}
  .last-card .disc input{width:46px;padding:5px 6px;border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:12px;font-weight:600;text-align:right;background:#fff;color:var(--ink)}
  .last-card .lt{font-size:13px;font-weight:700;color:var(--gold-dk);margin-left:auto}
  .results{margin-top:6px;border:1px solid var(--line);border-radius:12px;
    overflow:hidden;background:var(--card)}
  .results .row{padding:0;border-bottom:1px solid var(--line-soft)}
  .results .row:last-child{border-bottom:none}
  .results .row-main,
  .results button{touch-action:manipulation;user-select:none}
  .results .row-main{display:flex;justify-content:space-between;align-items:center;
    padding:12px 14px;cursor:pointer}
  .results .row-main:active{background:var(--line-soft)}
  .results .row-main .nm{font-size:15px;flex:1}
  .results .row-main .pr{font-size:14px;color:var(--ink-soft);font-weight:600}
  /* botones bulto en resultado */
  .res-btns{display:flex;border-top:1px solid var(--line-soft)}
  .res-btn{flex:1;padding:10px 8px;background:none;border:none;cursor:pointer;
    font-size:13px;font-weight:600;color:var(--ink-soft)}
  .res-btn:first-child{border-right:1px solid var(--line-soft)}
  .res-btn.bulto{color:var(--bulto-tx);background:var(--bulto-bg)}
  .res-btn:active{filter:brightness(.95)}
  .empty-res{padding:14px;color:var(--ink-soft);font-size:14px}

  /* ITEMS */
  .item{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:13px 14px;margin-bottom:10px}
  .item.es-bulto{border-color:var(--bulto-tx);border-width:1.5px}
  .item .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .item .nm{font-size:15px;font-weight:600;flex:1}
  .item .lt{font-size:16px;font-weight:700;white-space:nowrap}
  .item .x{border:none;background:none;color:var(--ink-soft);font-size:20px;
    line-height:1;padding:0 0 0 6px;cursor:pointer}
  .bulto-tag{display:inline-flex;align-items:center;gap:5px;margin-top:6px;
    padding:4px 9px;background:var(--bulto-bg);color:var(--bulto-tx);
    border-radius:999px;font-size:12px;font-weight:600}
  .item .ctrls{display:flex;align-items:center;gap:12px;margin-top:10px;flex-wrap:wrap}
  .stepper{display:flex;align-items:center;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .stepper button{width:38px;height:38px;border:none;background:var(--card);font-size:20px;
    color:var(--gold);cursor:pointer}
  .stepper button:active{background:var(--line-soft)}
  .stepper .qty{min-width:34px;text-align:center;font-weight:600;font-size:16px}
  .unit-info{font-size:13px;color:var(--ink-soft)}
  .disc{display:flex;align-items:center;gap:5px;font-size:14px;color:var(--ink-soft)}
  .disc input{width:48px;padding:7px 8px;border:1px solid var(--line);border-radius:8px;text-align:center}
  .empty-order{text-align:center;color:var(--ink-soft);font-size:15px;
    padding:30px 10px;border:1px dashed var(--line);border-radius:14px}

  .genrow{display:flex;align-items:center;justify-content:space-between;
    background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px}
  .genrow label{font-size:15px}
  .genrow .disc input{width:56px}

  .bar{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;
    background:var(--paper);border-top:1px solid var(--line);padding:12px 18px 18px;z-index:20}
  .bar .tot{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .bar .tot .k{font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft)}
  .bar .tot .v{font-size:28px;font-weight:700;letter-spacing:-.01em}
  .confirm{width:100%;padding:16px;border:none;border-radius:14px;background:var(--gold);
    color:#fff;font-size:17px;font-weight:600;cursor:pointer;letter-spacing:.01em}
  .confirm:active{background:var(--gold-dk)}
  .confirm:disabled{background:var(--line);color:var(--ink-soft);cursor:not-allowed}

  .done{text-align:center;padding:40px 24px}
  .done .check{width:64px;height:64px;border-radius:50%;background:var(--green-bg);
    color:var(--green-tx);font-size:34px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
  .done h2{font-size:20px;font-weight:600;margin-bottom:6px}
  .done p{color:var(--ink-soft);font-size:15px;margin-bottom:4px}
  .done .rules{background:var(--card);border:1px solid var(--line);border-radius:14px;
    text-align:left;padding:14px 16px;margin:22px 0;font-size:14px}
  .done .rules div{display:flex;gap:9px;padding:4px 0;color:var(--green-tx)}
  .done .rules b{color:var(--ink);font-weight:600}
  .ghost{width:100%;padding:15px;border:1px solid var(--line);border-radius:14px;
    background:var(--card);font-size:16px;font-weight:600;color:var(--ink);cursor:pointer}

  /* PANEL COBRO */
  .cb-overlay{position:fixed;inset:0;background:rgba(28,43,39,.4);z-index:50;
    display:flex;align-items:flex-end;max-width:480px;margin:0 auto}
  .cb-panel{background:var(--paper);border-radius:22px 22px 0 0;width:100%;
    padding:22px 20px 28px;animation:slideUp .18s ease}
  @keyframes slideUp{from{transform:translateY(20px);opacity:.5}to{transform:none;opacity:1}}
  .cb-panel h3{font-size:18px;font-weight:700;margin-bottom:4px}
  .cb-panel .cb-sub{font-size:13px;color:var(--ink-soft);margin-bottom:18px}
  .cb-panel .cb-lbl{display:block;font-size:12px;font-weight:600;letter-spacing:.07em;
    text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px;margin-top:14px}
  .cb-panel .cb-lbl:first-of-type{margin-top:0}
  .cb-panel .cb-formas{display:flex;gap:8px}
  .cb-panel .cb-formas label{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
    padding:12px;border:1px solid var(--line);border-radius:12px;background:var(--card);
    font-size:14px;font-weight:600;cursor:pointer;user-select:none}
  .cb-panel .cb-formas label.sel{border-color:var(--gold);background:var(--gold-lt,#F5E9D0);color:var(--gold-dk)}
  .cb-panel .cb-btns{display:flex;gap:10px;margin-top:18px}
  .cb-panel .cb-cancel{flex:1;padding:14px;border:1px solid var(--line);border-radius:12px;
    background:var(--card);font-size:15px;font-weight:600;cursor:pointer;color:var(--ink);font-family:inherit}
  .cb-panel .cb-ok{flex:2;padding:14px;border:none;border-radius:12px;background:var(--gold);
    color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
  .cb-panel .cb-ok:disabled{background:var(--line);color:var(--ink-soft);cursor:not-allowed}

  /* LISTA DEL DÍA */
  .hoy-box{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:12px 14px;margin-bottom:12px}
  .hoy-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .hoy-hdr .ti{font-size:13px;font-weight:700;color:var(--gold-dk);
    letter-spacing:.05em;text-transform:uppercase}
  .hoy-hdr .ct{font-size:12px;color:var(--ink-soft)}
  .hoy-row{display:flex;align-items:center;gap:8px;padding:8px 0;
    border-top:1px solid var(--line-soft)}
  .hoy-row:first-of-type{border-top:none}
  .hoy-row.done{opacity:.55}
  .hoy-row .nm{flex:1;font-size:14px;font-weight:600}
  .hoy-row .meta{font-size:11px;color:var(--ink-soft);margin-top:2px;font-weight:500}
  .hoy-row .meta.deb{color:var(--red-tx)}
  .hoy-row .b-ped,.hoy-row .b-sin{border:none;padding:8px 10px;border-radius:8px;
    font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
  .hoy-row .b-ped{background:var(--gold);color:#fff}
  .hoy-row .b-sin{background:var(--card);border:1px solid var(--line);color:var(--ink-soft)}
  .hoy-row .b-ped:active{background:var(--gold-dk)}
  .hoy-row .badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px}
  .hoy-row .badge.ped{background:var(--green-bg);color:var(--green-tx)}
  .hoy-row .badge.sin{background:var(--line-soft);color:var(--ink-soft)}

  @media(prefers-reduced-motion:no-preference){
    .item,.results{animation:fade .18s ease}
    @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  }

  /* ─ Sugerencias ─────────────────────────────────────────────────────── */
  .sug-loading{padding:10px 18px;color:var(--ink-soft);font-size:13px;text-align:center}
  .sug-sec{padding:8px 18px 6px;border-top:1px solid var(--line-soft)}
  .sug-hdr{display:flex;justify-content:space-between;align-items:center;
    padding:6px 0;cursor:pointer;font-size:13px;font-weight:700;
    text-transform:uppercase;letter-spacing:.05em;color:var(--ink)}
  .sug-caret{font-size:11px;color:var(--ink-soft)}
  .sug-body{margin-top:4px}
  .sug-row{display:flex;justify-content:space-between;align-items:center;
    gap:10px;padding:9px 10px;background:var(--card);border:1px solid var(--line);
    border-radius:10px;margin-bottom:6px;cursor:pointer}
  .sug-row:active{background:var(--line-soft)}
  .sug-info{flex:1;min-width:0}
  .sug-nm{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .sug-sub{font-size:11px;color:var(--ink-soft);margin-top:2px;line-height:1.3}
  .sug-add{flex-shrink:0;background:var(--gold);color:#fff;font-size:12px;font-weight:700;
    padding:5px 10px;border-radius:7px;white-space:nowrap}
  .sug-add.ghost{background:var(--gold-lt,#F5E9D0);color:var(--gold-dk,#8A5F09)}
  .sug-tag{font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px;
    letter-spacing:.03em;text-transform:uppercase;line-height:1.5}
  .sug-tag.urg{background:#F6E5E2;color:#A8392B}
  .sug-tag.oferta{background:#FDF2DC;color:#8A5F09}
  .sug-tag.nuevo{background:#E7F0E8;color:#2C6B3F}
  .sug-tag.prod{background:#E8F0FB;color:#2A4E9A}
  .sug-gap-row{background:var(--gold-lt,#F5E9D0);border-color:var(--gold,#A9760E)}
  .sug-gap-prods{padding-left:14px;margin-bottom:6px}
  .sug-gap-prods .sug-row{background:#fff;border-color:var(--line-soft)}
</style>
</head>
<body>
<div id="app"></div>
<div class="bar" id="bar"></div>

<script src="./src/register-sw.js"></script>
<script type="module">
import { supabase } from './src/supabase.js'
import { requireSession, getUsuario, tienePermiso } from './src/auth.js'
import { ars, mostrarError } from './src/utils.js?v=2'
import { db } from './src/db.js'
import { initSync, pushOp, mountStatusBadge } from './src/sync.js'

const ROLES = { admin:'admin', preventista:'preventista', deposito:'depósito' };

// Datos desde Supabase
let clientes = [];   // {id, nombre, saldo, zona_id}  saldo>0 = debe, saldo<0 = a favor
let productos = []; // {id, nombre, precio, u_bulto, desc_bulto}
let zonas = [];     // {id, nombre, dia_semana}
let visitasHoy = {};// { cliente_id: 'pedido' | 'sin_pedido' }
const DIAS_NOMBRE = ['—','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
function _dowCordoba(){
  // 1=Lunes ... 7=Domingo en zona Córdoba
  // Vista previa: ?dia=1..7 fuerza un día (para ver la lista de otro día)
  const ov = new URLSearchParams(location.search).get('dia');
  if (ov) return Math.min(7, Math.max(1, parseInt(ov) || 1));
  const wd = new Intl.DateTimeFormat('en-US',{timeZone:'America/Argentina/Cordoba',weekday:'short'}).format(new Date());
  return ({Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6,Sun:7})[wd] || 1;
}
const _esPreviewDia = !!new URLSearchParams(location.search).get('dia');
function _hoyArg(){
  return new Intl.DateTimeFormat('en-CA',{timeZone:'America/Argentina/Cordoba'}).format(new Date());
}

// orden: { productoId, cant, disc, esBulto, uPorBulto }
let clienteId = '';
let busquedaCli = '';
let orden = [];
let descGeneral = 0;
// fecha de reparto — por defecto mañana (zona Córdoba)
function _mañanaArg(){
  const fmt = new Intl.DateTimeFormat('en-CA',{timeZone:'America/Argentina/Cordoba'})
  const partes = fmt.format(new Date()).split('-')
  const d = new Date(Date.UTC(+partes[0], +partes[1]-1, +partes[2]))
  d.setUTCDate(d.getUTCDate() + 1)
  return d.toISOString().slice(0,10)
}
let fechaReparto = _mañanaArg();
let busqueda = '';
let confirmado = false;
let confirmando = false;
let confirmadoData = null;     // {pedido_id, boleta_id, total, saldo_anterior, total_a_cobrar}
let expandido = null;          // id producto con opciones abiertas en el buscador
let pendienteSync = false;     // true cuando confirmado offline y aún no se sincronizó

// Sugerencias por cliente (RPC rpc_sugerencias_cliente)
let sugerencias = null;
let sugFetching = false;
let sugSec = { ofertas: true, siempre: true, gap: false, novedades: false };
let gapAbierto = null;         // clave del gap expandido (productos visibles)
let buscadorFocus = false;     // input de buscar producto enfocado (oculta sugerencias)

// Observaciones del pedido (texto libre, se imprime en la boleta)
let observaciones = '';
// Descuentos automáticos por cliente (se carga en setCliente)
let descuentosCliente = [];  // [{alcance, alcance_valor, porcentaje, excluye}]
// Panel de cobro inline (registra pago al cliente seleccionado, queda en recaudación del preventista)
let cobroOpen   = false;
let cobroMonto  = '';
let cobroForma  = 'efectivo';
let cobroFotoFile = null;
let cobroFotoPreview = '';
let cobroRef = '';
let cobroBeneficiario = '';
let beneficiariosList = [];
let cobroSaving = false;

// expongo handlers
Object.assign(window, {
  addUnidad, addBulto, setCant, setCantDirecto, setDisc, quitar,
  toggleExpandido, confirmar, nuevo, render,
  setCliente: v => { clienteId = v; busquedaCli = ''; sugerencias = null; gapAbierto = null; render(); cargarSugerencias(v); cargarDescuentosCliente(v); },
  setBusquedaCli: v => { busquedaCli = v; renderCliResults(); },
  limpiarCliente: () => { clienteId = ''; busquedaCli = ''; sugerencias = null; gapAbierto = null; render(); },
  toggleSug: id => { sugSec[id] = !sugSec[id]; renderSugerencias(); },
  toggleGap: clave => { gapAbierto = gapAbierto === clave ? null : clave; renderSugerencias(); },
  addProdCant: (id, cant) => addProductoCant(id, cant),
  aplicarOfertaId: id => {
    const of = window._ofertasCache?.[id];
    if (of) aplicarOferta(of);
  },
  setBusqueda: v => { busqueda = v; expandido = null; renderResults(); renderSugerencias(); },
  setBusqFocus: v => { buscadorFocus = !!v; renderSugerencias(); },
  setObservaciones: v => { observaciones = v; },
  irInicio: () => salirAInicio(),
  scrollAProductos: () => {
    setTimeout(() => {
      const input = document.querySelector('.search-wrap input.field');
      if (!input) return;
      const top = input.getBoundingClientRect().top + window.scrollY;
      window.scrollTo({ top: top - 6, behavior:'smooth' });
    }, 350);
  },
  setDescGeneral: v => { descGeneral = Math.min(100, Math.max(0, +v || 0)); renderBar(); },
  setFechaReparto: v => { fechaReparto = v; },
  abrirCobro: () => {
    if (!clienteId) return;
    cobroOpen = true; cobroMonto = ''; cobroForma = 'efectivo'; cobroSaving = false;
    cobroFotoFile = null; cobroFotoPreview = ''; cobroRef = ''; cobroBeneficiario = '';
    render();
    setTimeout(() => document.getElementById('cb-monto')?.focus(), 80);
  },
  cerrarCobro: () => {
    cobroOpen = false;
    cobroFotoFile = null; cobroFotoPreview = ''; cobroRef = ''; cobroBeneficiario = '';
    render();
  },
  setCobroMonto: v => { cobroMonto = v; const b = document.getElementById('cb-ok'); if (b) b.disabled = !(parseFloat(v) > 0) || cobroSaving; },
  setCobroForma: v => { cobroForma = v; render(); },
  setCobroRef: v => { cobroRef = v; },
  setCobroBeneficiario: v => { cobroBeneficiario = v; },
  setCobroFoto: file => {
    if (!file) return;
    cobroFotoFile = file;
    const r = new FileReader();
    r.onload = e => { cobroFotoPreview = e.target.result; render(); };
    r.readAsDataURL(file);
  },

async function cargarTodo(){
  if (!navigator.onLine) {
    return cargarDesdeLocal();
  }
  const usr = getUsuario && getUsuario();
  const hoy = _hoyArg();
  // Auto sin_pedido: marca clientes de los ultimos 3 dias sin acción (idempotente).
  // Cubre que el preventista no abra la app varios dias (ej. viernes->martes).
  // No bloquea — si falla, seguimos con la carga normal.
  supabase.rpc('cerrar_dia_anterior_visitas', { p_dias: 3 }).then(({ error }) => {
    if (error) console.warn('[auto sin_pedido]', error.message);
  });
  // beneficiarios se cargan en paralelo pero no bloquea si falla
  supabase.from('beneficiarios_transferencia')
    .select('id, nombre, tipo, activo')
    .eq('empresa_id', usr?.empresa_id)
    .eq('activo', true)
    .order('nombre')
    .then(({ data }) => { beneficiariosList = data || []; })
    .catch(() => { beneficiariosList = []; });
  const [cliResp, salResp, prodResp, stkResp, zonResp, visResp] = await Promise.all([
    supabase.from('clientes')
      .select('id, nombre, zona_id')
      .eq('activo', true)
      .order('nombre'),
    supabase.from('saldo_actual').select('cliente_id, saldo'),
    supabase.from('productos')
      .select('id, nombre, precio, u_bulto, desc_bulto, categoria, subcategoria')
      .eq('activo', true)
      .order('nombre'),
    supabase.from('stock_actual').select('producto_id, stock'),
    supabase.from('zonas').select('id, nombre, dias_semana, usuarios_ids').eq('activa', true),
    usr?.id
      ? supabase.from('visitas_clientes')
          .select('cliente_id, resultado')
          .eq('usuario_id', usr.id).eq('fecha', hoy)
      : Promise.resolve({ data: [] }),
  ]);
  // si la red falló en el intento, caer a local silenciosamente
  if (cliResp.error || salResp.error || prodResp.error) {
    console.warn('[pedido] red falló, usando datos locales');
    return cargarDesdeLocal();
  }

  const saldoMap = Object.fromEntries((salResp.data || []).map(s => [s.cliente_id, Number(s.saldo) || 0]));
  const stockMap = Object.fromEntries((stkResp.data || []).map(s => [s.producto_id, Number(s.stock) || 0]));
  clientes  = (cliResp.data || []).map(c => ({ ...c, saldo: saldoMap[c.id] || 0 }));
  productos = (prodResp.data || []).map(p => ({
    ...p,
    precio: Number(p.precio) || 0,
    u_bulto: p.u_bulto || 1,
    desc_bulto: Number(p.desc_bulto) || 0,
    stock: stockMap[p.id] ?? 0,  // si no hay fila en stock_actual → asumir 0 (no Infinity)
  }));
  zonas = (zonResp?.data || []);
  visitasHoy = {};
  for (const v of (visResp?.data || [])) {
    // 'pedido' gana sobre 'sin_pedido' si hay ambos
    if (visitasHoy[v.cliente_id] !== 'pedido') visitasHoy[v.cliente_id] = v.resultado;
  }
}

  const [cliRows, salRows, prodRows, stkRows] = await Promise.all([
    db.clientes.where('activo').equals(1).sortBy('nombre'),
    db.saldo_actual.toArray(),

  ]);

  const stockMap = Object.fromEntries(stkRows.map(s => [s.producto_id, Number(s.stock) || 0]));
  clientes  = cliRows.map(c => ({ ...c, saldo: saldoMap[c.id] || 0 }));
  productos = prodRows.map(p => ({

function cantEnOrden(id){
  return orden.filter(o => o.productoId === id).reduce((s,o) => s + o.cant, 0);
}
function disponible(id){
  const p = prod(id); if (!p || p.stock == null) return Infinity;
  return p.stock - cantEnOrden(id);
}

function addUnidad(id){
  const p = prod(id);
  if (p && p.stock != null && p.stock <= 0) { alert('Sin stock disponible.'); return; }
  if (disponible(id) < 1) { alert(`Stock insuficiente. Disponible: ${p.stock} u.`); return; }
  const ex = orden.find(o=>o.productoId===id && !o.esBulto);
  if(ex){ ex.cant++; }
  else {
    const auto = resolverDescuento(p);
    orden.push({productoId:id, cant:1, disc:auto.pct, discAuto:auto.esAuto, esBulto:false, uPorBulto:1});
  }
  busqueda=''; expandido=null;
  const inp = document.querySelector('.search-wrap input.field');
  if (inp) inp.value = '';
  refrescarItems();
  // Devolver foco al input — como esto se dispara desde un user gesture (tap),
  // Chrome reabre el teclado en lugar de cerrarlo.
  if (inp) inp.focus();
}

// Agregar producto con cantidad arbitraria (usado desde sugerencias).
function addProductoCant(id, cant) {
  cant = Math.max(1, parseInt(cant) || 1);
  const p = prod(id);
  if (p && p.stock != null && p.stock <= 0) { alert('Sin stock disponible.'); return; }
  const disp = disponible(id);
  if (disp < cant) {
    if (disp <= 0) { alert(`Sin stock disponible (${p?.stock || 0} u).`); return; }
    cant = disp; // ajustar a lo disponible
  }
  const ex = orden.find(o => o.productoId === id && !o.esBulto);
  if (ex) { ex.cant += cant; }
  else {
    const auto = resolverDescuento(p);
    orden.push({ productoId: id, cant, disc: auto.pct, discAuto: auto.esAuto, esBulto: false, uPorBulto: 1 });
  }
  refrescarItems();
  renderSugerencias();
  // Toast de feedback rapido
  mostrarToast(`✓ ${cant}u ${p?.nombre || ''}`);
}

// Aplicar una oferta: agrega N unidades del principal con precio de oferta
// (y % de bulto si aplica) + M unidades del regalo con descuento 100%.
function aplicarOferta(oferta) {
  const p = prod(oferta.producto_id);
  if (!p) { alert('Producto no disponible.'); return; }
  const cantReq = Math.max(1, parseInt(oferta.cantidad_min) || 1);
  const disp = disponible(oferta.producto_id);
  if (disp < cantReq) { alert(`Stock insuficiente. Disponible: ${disp} u, requiere ${cantReq} u.`); return; }
  const precioOferta = oferta.precio_oferta != null ? Number(oferta.precio_oferta) : null;
  const precioNormal = Number(oferta.precio_normal) || p.precio;
  // Descuento equivalente al precio de oferta
  let descTotal = 0;
  if (precioOferta && precioNormal > 0 && precioOferta < precioNormal) {
    descTotal = Math.round((1 - precioOferta / precioNormal) * 100);
  }
  // Sumar desc de bulto si corresponde
  if (oferta.aplica_desc_bulto && oferta.u_bulto > 1 && cantReq >= oferta.u_bulto) {
    // Aplicamos multiplicativamente para respetar el matemático real:
    // combinado% = 1 − (1−a)(1−b)
    const a = descTotal / 100;
    const b = (Number(oferta.desc_bulto) || 0) / 100;
    descTotal = Math.round((1 - (1 - a) * (1 - b)) * 100);
  }
  // Agregar producto principal (siempre nueva línea para distinguir la oferta)
  orden.push({
    productoId: oferta.producto_id, cant: cantReq,
    disc: descTotal, discAuto: false,
    esBulto: false, uPorBulto: 1,
    precioOverride: precioNormal,  // guardamos el precio normal, el desc hace el resto
    esOferta: true, ofertaId: oferta.oferta_id || oferta.id,
  });
  // Agregar regalo si aplica
  if (oferta.regalo_producto_id && oferta.regalo_cantidad > 0) {
    const pr = prod(oferta.regalo_producto_id);
    if (!pr) {
      alert('El producto de regalo no está cargado en el catálogo. Se agregó solo el principal.');
    } else {
      const dispR = disponible(oferta.regalo_producto_id);
      if (dispR < oferta.regalo_cantidad) {
        alert(`Sin stock del regalo (${oferta.regalo_nombre || 'regalo'}). Se agregó solo el principal.`);
      } else {
        orden.push({
          productoId: oferta.regalo_producto_id, cant: oferta.regalo_cantidad,
          disc: 100, discAuto: false,
          esBulto: false, uPorBulto: 1,
          esOferta: true, ofertaId: oferta.oferta_id || oferta.id, esRegalo: true,
        });
      }
    }
  }
  refrescarItems();
  renderSugerencias();
  mostrarToast(`✓ Oferta aplicada — ${cantReq}u ${p.nombre}${oferta.regalo_producto_id?' + regalo':''}`);
}

function mostrarToast(msg) {
  let t = document.getElementById('sug-toast');
  if (t) t.remove();
  t = document.createElement('div');
  t.id = 'sug-toast';
  t.textContent = msg;
  t.style.cssText = 'position:fixed;left:50%;bottom:90px;transform:translateX(-50%);'
    + 'background:var(--ink);color:#fff;padding:9px 15px;border-radius:999px;'
    + 'font-size:13px;font-weight:600;z-index:50;max-width:90%;'
    + 'white-space:nowrap;overflow:hidden;text-overflow:ellipsis';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 1800);
}

async function cargarDescuentosCliente(cliId) {

      .select('plantilla_id').eq('cliente_id', cliId);
    if (e1) throw e1;

    // 2) reglas de esas plantillas

      .select('alcance, alcance_valor, porcentaje, excluye')

    if (e2) throw e2;

    console.warn('[descuentos_cliente] error:', e.message || e);
    descuentosCliente = [];
  }
}

// Resuelve el % de descuento automático para un producto.
// Prioridad de alcance: producto > subcategoria > categoria > todo.
// Si en un mismo nivel hay varias reglas (varias plantillas), gana:
//   - Exclusión > cualquier % (exclusión bloquea)
//   - Mayor porcentaje (más beneficio al cliente)
function resolverDescuento(p) {
  if (!p || !descuentosCliente.length) return { pct: 0, esAuto: false };
  const cat = (p.categoria || '').trim();
  const sub = (p.subcategoria || '').trim();
  const pid = String(p.id);
  const buscarNivel = (alcance, valor) =>
    descuentosCliente.filter(d =>
      d.alcance === alcance &&
      (alcance === 'todo' || (d.alcance_valor || '').trim() === valor));
  const elegirMejor = arr => {
    if (!arr.length) return null;
    if (arr.some(d => d.excluye)) return { pct: 0, esAuto: true };
    const pct = Math.max(...arr.map(d => Number(d.porcentaje) || 0));
    return { pct, esAuto: true };
  };
  let res = elegirMejor(buscarNivel('producto', pid));
  if (!res && sub) res = elegirMejor(buscarNivel('subcategoria', sub));
  if (!res && cat) res = elegirMejor(buscarNivel('categoria', cat));
  if (!res)         res = elegirMejor(buscarNivel('todo', ''));
  return res || { pct: 0, esAuto: false };
}

function renderSugerencias() {
  const box = document.getElementById('sug-box');
  if (!box) return;
  if (!clienteId) { box.innerHTML = ''; return; }
  if (sugFetching) {
    box.innerHTML = `<div class="sug-loading">Buscando sugerencias…</div>`;
    return;
  }
  if (!sugerencias) { box.innerHTML = ''; return; }

  const ofertas   = sugerencias.ofertas || [];
  const siempre   = sugerencias.lo_de_siempre || [];
  const gap       = sugerencias.gap_sugeridos || [];
  const novedades = sugerencias.novedades || [];

  if (!ofertas.length && !siempre.length && !gap.length && !novedades.length) {
    box.innerHTML = `<div class="sug-loading">Sin sugerencias para este cliente.</div>`;
    return;
  }

  box.innerHTML = `
    ${ofertas.length   ? sugSection('ofertas',   '🔥 Ofertas',         ofertas.length,   renderSugOfertas(ofertas))     : ''}
    ${siempre.length   ? sugSection('siempre',   '📦 Lo de siempre',   siempre.length,   renderSugSiempre(siempre))     : ''}
    ${gap.length       ? sugSection('gap',       '💡 Le podés ofrecer', gap.length,       renderSugGap(gap))             : ''}
    ${novedades.length ? sugSection('novedades', '🆕 Novedades',       novedades.length, renderSugNovedades(novedades)) : ''}
  `;
}

function sugSection(id, titulo, count, contenido) {
  // Mientras se busca o el input de busqueda esta enfocado (teclado abierto),
  // las secciones se colapsan visualmente para no molestar el listado de
  // resultados. El estado real de sugSec[id] se preserva.
  const buscando = (busqueda && busqueda.trim() !== '') || buscadorFocus;
  const open = !buscando && sugSec[id];
  return `<section class="sug-sec">
    <div class="sug-hdr" onclick="window.toggleSug('${id}')">
      <span>${titulo} <span style="opacity:.6;font-weight:500">(${count})</span></span>
      <span class="sug-caret">${open ? '▲' : '▼'}</span>
    </div>
    ${open ? `<div class="sug-body">${contenido}</div>` : ''}
  </section>`;
}

function sugRow(prodId, cant, nombre, sub, badge, sinStock) {
  const tap = sinStock ? '' :
    `onpointerdown="event.preventDefault();this.dataset.sy=event.clientY"
     onpointerup="if(Math.abs(event.clientY-(this.dataset.sy||0))<8)window.addProdCant('${prodId}', ${cant})"`;
  return `<div class="sug-row" ${tap} ${sinStock ? 'style="opacity:.55"' : ''}>
    <div class="sug-info">
      <div class="sug-nm">${nombre}${badge || ''}</div>
      <div class="sug-sub">${sub}${sinStock ? ' · <b style="color:var(--red-tx)">SIN STOCK</b>' : ''}</div>
    </div>
    ${sinStock ? '' : `<span class="sug-add">+${cant}</span>`}
  </div>`;
}

function renderSugSiempre(items) {
  return items.map(it => {
    const badge = it.urgente ? ' <span class="sug-tag urg">⚠ atrasado</span>' : '';
    const sub = `compró ${it.veces}x · hace ${it.dias_ultima}d${it.frec_dias ? ` · cada ~${it.frec_dias}d` : ''}`;
    return sugRow(it.producto_id, it.cantidad_tipica, it.nombre, sub, badge, (it.stock || 0) <= 0);
  }).join('');
}

function renderSugOfertas(items) {
  return items.map((it, i) => {
    const ahorroPct = (it.precio_normal && it.precio_oferta && it.precio_oferta < it.precio_normal)
      ? Math.round((1 - it.precio_oferta / it.precio_normal) * 100) : null;
    const badge = ahorroPct ? ` <span class="sug-tag oferta">−${ahorroPct}%</span>` : ' <span class="sug-tag oferta">OFERTA</span>';
    const cantReq = it.cantidad_min || 1;
    const partes = [];
    if (cantReq > 1) partes.push(`Llevá ${cantReq}u`);
    if (it.regalo_producto_id && it.regalo_cantidad) partes.push(`+ ${it.regalo_cantidad}u ${it.regalo_nombre || 'regalo'} gratis`);
    if (it.aplica_desc_bulto && it.u_bulto > 1) partes.push(`incluye desc. bulto ${it.desc_bulto || 0}%`);
    if (it.descripcion) partes.push(it.descripcion);
    if (it.vigente_hasta) partes.push(`hasta ${it.vigente_hasta}`);
    if (it.stock_maximo != null) {
      const rest = Math.max(0, (it.stock_maximo || 0) - (it.stock_vendido || 0));
      partes.push(`${rest}u restantes de la promo`);
    }
    const sub = partes.join(' · ');
    const sinStock = (it.stock || 0) <= 0;
    // Guardamos la oferta en un slot global para poder recuperarla por índice
    window._ofertasCache ||= {};
    window._ofertasCache[it.oferta_id] = it;
    const nombre = cantReq > 1 ? `${cantReq}u ${it.nombre}` : it.nombre;
    return `<div class="sug-row ${sinStock?'sinstock':''}"
      onpointerdown="event.preventDefault();this.dataset.sy=event.clientY"
      onpointerup="if(Math.abs(event.clientY-(this.dataset.sy||0))<8)window.aplicarOfertaId('${it.oferta_id}')">
      <div class="sug-nm">${nombre}${badge}</div>
      ${sub ? `<div class="sug-sub">${sub}</div>` : ''}
      ${sinStock ? `<div class="sug-sub" style="color:var(--red-tx)">Sin stock</div>` : ''}
    </div>`;
  }).join('');
}

function renderSugGap(items) {
  return items.map(g => {

    const subInfo = `${g.penetracion_pct}% de tus clientes (${g.clientes})`;
    // Si es producto suelto, sin expandir — agrega directo.
    if (esProd) {

      return sugRow(p.producto_id, 1, g.clave, subInfo, ' <span class="sug-tag prod">PRODUCTO</span>', (p.stock || 0) <= 0);
    }
    // Subcategoría: chip "Ofrecer ›" que expande sus productos.

      <span class="sug-add ghost">${open ? '▲' : 'Ofrecer ›'}</span>
    </div>
    ${open ? `<div class="sug-gap-prods">
      ${(g.productos || []).map(p => sugRow(p.producto_id, 1, p.nombre, ars(p.precio || 0), '', (p.stock || 0) <= 0)).join('')}
    </div>` : ''}`;
  }).join('');
}

function setCant(i,d){
  const it = orden[i];
  const step = it.esBulto ? it.uPorBulto : 1;
  const minimo = it.esBulto ? it.uPorBulto : 1;
  let nuevo = Math.max(minimo, it.cant + d*step);
  const p = prod(it.productoId);
  if (p && p.stock != null && d > 0) {
    const otros = orden.filter((o,j) => j!==i && o.productoId===it.productoId).reduce((s,o)=>s+o.cant, 0);
    const max = p.stock - otros;
    if (nuevo > max) { alert(`Stock insuficiente. Disponible: ${Math.max(0,max)} u.`); return; }
  }
  it.cant = nuevo;
  refrescarItems();
}
function setCantDirecto(i, v){
  const it = orden[i];
  const n = Math.max(1, parseInt(v) || 1);
  let nuevo = it.esBulto ? n * it.uPorBulto : n;
  const p = prod(it.productoId);
  if (p && p.stock != null) {
    const otros = orden.filter((o,j) => j!==i && o.productoId===it.productoId).reduce((s,o)=>s+o.cant, 0);
    const max = p.stock - otros;
    if (nuevo > max) {
      alert(`Stock insuficiente. Disponible: ${Math.max(0,max)} u.`);
      nuevo = Math.max(it.esBulto ? it.uPorBulto : 1, max);
    }
  }
  it.cant = nuevo;
  refrescarItems();
}
function setDisc(i,v){ orden[i].disc=Math.min(100,Math.max(0,+v||0)); orden[i].discAuto=false; refrescarItems(); }
function quitar(i){ orden.splice(i,1); refrescarItems(); }
function toggleExpandido(id){ expandido = expandido===id ? null : id; renderResults(); }

// ── CONFIRMAR (RPC atómica, con fallback offline) ─────────────────────
async function confirmar(){
  if (!clienteId || !orden.length || confirmando) return;
  confirmando = true;
  renderBar();

  const payload = {
    cliente_id: clienteId,
    descuento: descGeneral,
    observaciones: observaciones && observaciones.trim() ? observaciones.trim() : null,
    fecha_reparto: fechaReparto,
    items: orden.map(it => ({
      producto_id: it.productoId,
      cantidad: it.cant,
      precio_unit: it.precioOverride ?? prod(it.productoId).precio,
      descuento: it.disc,
      es_bulto: it.esBulto,
      u_por_bulto: it.uPorBulto,
      oferta_id: it.ofertaId || null,
      es_regalo: !!it.esRegalo,
    })),
  };

  if (!navigator.onLine) {
    // guardar en cola local y marcar como pendiente de sync
    await pushOp('confirmar_pedido', payload);
    confirmando = false;
    pendienteSync = true;
    confirmadoData = null;
    confirmado = true;
    render();
    return;
  }

  // supabase-js normalmente no lanza; pero fetch abortado en Safari sí puede lanzar
  // TypeError ("Load failed"). Envolvemos para no dejar el pedido en limbo.
  let data = null, error = null;
  try {
    const resp = await supabase.rpc('confirmar_pedido', { p_payload: payload });
    data  = resp.data;
    error = resp.error;
  } catch (e) {
    error = e;
  }
  confirmando = false;

  if (error) {
    const msg = String(error.message || error || '').toLowerCase();
    // Detectar fallas de red: fetch (Chrome/FF), Load failed (Safari), NetworkError,
    // aborted, timeout, y también offline detectado por el navegador.
    const esFalloRed = !navigator.onLine
      || msg.includes('fetch')
      || msg.includes('load failed')
      || msg.includes('network')
      || msg.includes('timeout')
      || msg.includes('abort');
    if (esFalloRed) {
      // encolar para reintentar cuando vuelva la conexión
      await pushOp('confirmar_pedido', payload);
      pendienteSync = true;
      confirmadoData = null;
      confirmado = true;
      render();
    } else {
      mostrarError('Error al confirmar el pedido: ' + (error.message || error));
      renderBar();
    }
    return;
  }

  confirmadoData = data;
  pendienteSync = false;
  confirmado = true;
  render();
}

function renderListaDelDia(){

  // cada preventista ve solo las zonas asignadas a él; admin ve todas

const _norm = s => (s || '').toLowerCase()
  .normalize('NFD').replace(/[̀-ͯ]/g, '');

  const box = document.getElementById('res'); if(!box) return;
  const partes = _norm(busqueda).split(/\s+/).filter(Boolean);
  if(!partes.length){
    if (orden.length) {
      const i = orden.length - 1;
      const it = orden[i];
      const p = prod(it.productoId);
      const bultos = it.esBulto ? it.cant / it.uPorBulto : null;

      // del buscador pierda el foco -> el teclado del cel no se cierra al usar +/-.
      box.innerHTML = `
        <div class="last-card">
          <div class="ttl">Último agregado</div>

                onpointerdown="event.preventDefault();window.setCant(${i},-1)"

                value="${it.esBulto ? bultos : it.cant}"

                onchange="window.setCantDirecto(${i}, this.value)">

            </div>
          </div>
        </div>`;
    } else {
      box.innerHTML = '';
    }

  }
  const m = productos.filter(p => {
    const nom = _norm(p.nombre);

    const auto = clienteId ? resolverDescuento(p) : { pct: 0, esAuto: false };
    const tieneAuto = auto.esAuto && auto.pct > 0;
    const precioFinal = tieneAuto ? Math.round(p.precio * (1 - auto.pct / 100)) : p.precio;
    const precioHtml = tieneAuto

    return `<div class="row" ${sinStock?'style="opacity:.55"':''}>
      <div class="row-main" ${tapAttrs}>
        <span class="nm">${p.nombre}${tieneBulto ? ` <span style="font-size:12px;color:var(--ink-soft);font-weight:500">· bulto ${p.u_bulto}u</span>` : ''}</span>

          onpointerdown="event.preventDefault();this.dataset.sy=event.clientY;event.stopPropagation()"
          onpointerup="event.stopPropagation();if(Math.abs(event.clientY-(this.dataset.sy||0))<8)window.addBulto('${p.id}')"
          style="display:block;width:100%;padding:8px;background:var(--gold-lt);border:none;border-top:1px solid var(--line-soft);
            font-size:12px;font-weight:600;color:var(--gold-dk);cursor:pointer;font-family:inherit">
          📦 Agregar como bulto (${p.u_bulto}u · −${p.desc_bulto}%)
        </button>` : ''}
      ${sinStock ? `<div style="padding:6px 10px;font-size:11px;color:var(--red-tx);font-weight:600;text-align:center;background:var(--red-bg)">Sin stock</div>` : ''}
    </div>`;
  }).join('')}</div>`;
}

function renderItems(){
  const box = document.getElementById('items'); if(!box) return;
  if(!orden.length){
    box.innerHTML=`<div class="empty-order">Todavía no agregaste productos.<br>Buscalos arriba para sumarlos.</div>`;
    return;
  }
  box.innerHTML = orden.map((it,i)=>({it,i})).reverse().map(({it,i})=>{
    const p = prod(it.productoId);
    const bultos = it.esBulto ? it.cant / it.uPorBulto : null;
    return `<div class="item ${it.esBulto?'es-bulto':''}">
      <div class="top">
        <span class="nm">${p.nombre}</span>
        <span class="lt">${ars(lineTotal(it))}</span>
        <button class="x" onclick="window.quitar(${i})" aria-label="Quitar">&times;</button>
      </div>
      ${it.esBulto ? `<div><span class="bulto-tag">📦 Bulto</span></div>` : ''}
      <div class="ctrls">
        <div class="stepper">
          <button onclick="window.setCant(${i},-1)" aria-label="Menos">&minus;</button>
          <input class="qty" type="number" min="1" inputmode="numeric"
            value="${it.esBulto ? bultos : it.cant}"
            onfocus="this.select()"
            onchange="window.setCantDirecto(${i}, this.value)"
            style="width:60px;text-align:center;border:1px solid var(--line);border-radius:8px;padding:4px;font-size:15px;font-weight:700;font-family:inherit;background:#fff;color:var(--ink)">
          <button onclick="window.setCant(${i},1)" aria-label="Más">+</button>
        </div>
        <span class="unit-info">
          ${it.esBulto
            ? `${bultos} bulto${bultos!==1?'s':''} × ${it.uPorBulto}u = ${it.cant}u · ${ars(p.precio)}/u`
            : `× ${ars(p.precio)}`}
        </span>
        <div class="disc">
          <input type="number" min="0" max="100" value="${it.disc}"
            oninput="window.setDisc(${i},this.value)"> % desc.
          ${it.discAuto ? `<span style="margin-left:6px;font-size:10px;background:#E7EEF7;color:#2A5A8A;padding:2px 6px;border-radius:999px;font-weight:700">AUTO</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderBar(){
  const bar = document.getElementById('bar');
  if(confirmado){ bar.innerHTML=''; return; }
  const puede = clienteId && orden.length>0 && !confirmando;
  const label = confirmando ? 'Guardando…'
              : clienteId ? (orden.length ? 'Confirmar pedido' : 'Agregá un producto')
              : 'Elegí un cliente';
  bar.innerHTML = `
    <div class="tot"><span class="k">Total</span><span class="v">${ars(total())}</span></div>
    <button class="confirm" ${puede?'':'disabled'} onclick="window.confirmar()">${label}</button>`;
}

function renderDone(app){
  const cli = clientes.find(c=>c.id===clienteId);
  const bultos = orden.filter(o=>o.esBulto).length;
  const d = confirmadoData || {};
  const totalNum = Number(d.total) || total();
  const saldoAnt = Number(d.saldo_anterior) || 0;
  const totalCob = Number(d.total_a_cobrar) || totalNum;

  if (pendienteSync) {
    app.innerHTML=`
      <div class="done">
        <div class="check" style="background:var(--bulto-bg);color:var(--bulto-tx)">⏳</div>
        <h2>Pedido guardado</h2>
        <p>${cli?.nombre || ''}</p>
        <p>${orden.length} ${orden.length===1?'ítem':'ítems'} · ${ars(totalNum)}</p>
        <div class="rules" style="border-color:var(--bulto-tx)">
          <div style="color:var(--bulto-tx)">⚡&nbsp; <b>Sin conexión</b> — pedido en cola local</div>
          <div style="color:var(--bulto-tx)">🔄&nbsp; Se enviará al servidor al <b>reconectar</b></div>
        </div>
        <button class="ghost" onclick="window.nuevo()">Cargar otro pedido</button>
      </div>`;
    return;
  }

  app.innerHTML=`
    <div class="done">
      <div class="check">&#10003;</div>
      <h2>Pedido confirmado</h2>
      <p>${cli?.nombre || ''}</p>
      <p>${orden.length} ${orden.length===1?'ítem':'ítems'} · ${ars(totalNum)}</p>
      ${saldoAnt > 0 ? `<p style="color:var(--red-tx);font-weight:600;margin-top:8px">
        Saldo anterior: ${ars(saldoAnt)} · Total a cobrar: ${ars(totalCob)}
      </p>` : ''}
      <div class="rules">
        <div>&#10003;&nbsp; <b>Stock descontado</b> al confirmar</div>
        <div>&#10003;&nbsp; <b>Cargo en cuenta</b> de ${cli?.nombre || ''}</div>
        ${bultos ? `<div>&#10003;&nbsp; <b>${bultos} ítem${bultos>1?'s':''} por bulto</b> con descuento aplicado</div>` : ''}
        <div>&#10003;&nbsp; Boleta generada para Seba</div>
      </div>
      <button class="ghost" onclick="window.nuevo()">Cargar otro pedido</button>
    </div>`;
}

async function nuevo(){
  clienteId=''; orden=[]; descGeneral=0; busqueda=''; observaciones='';
  confirmado=false; confirmadoData=null; expandido=null; pendienteSync=false;
  sugerencias=null; gapAbierto=null;
  // refrescar datos (saldos pueden haber cambiado, stock también)
  await cargarTodo();
  render();
}

// ── BACK GESTURE TRAP + INICIO ──────────────────────────────────────────
// Cuando hay trabajo en curso (cliente, items u observaciones), interceptamos
// el gesto/boton de atras del navegador para evitar perder el pedido sin querer.
let _backTrapInstalado = false;
function hayTrabajoEnCurso() {
  return clienteId || orden.length > 0 || (observaciones && observaciones.trim());
}
function instalarBackTrap() {
  if (_backTrapInstalado) return;
  _backTrapInstalado = true;
  history.pushState({ trap: 1 }, '', location.href);
  window.addEventListener('popstate', onBackTrap);
}
function onBackTrap() {
  if (!hayTrabajoEnCurso()) {
    // dejar salir sin preguntar
    window.removeEventListener('popstate', onBackTrap);
    _backTrapInstalado = false;
    history.back();
    return;
  }
  if (confirm('Si salís ahora se pierde el pedido en curso. ¿Confirmás salir?')) {
    window.removeEventListener('popstate', onBackTrap);
    _backTrapInstalado = false;
    location.href = './login_home.html';
  } else {
    // mantener en la pagina re-pusheando estado
    history.pushState({ trap: 1 }, '', location.href);
  }
}
function salirAInicio() {
  if (hayTrabajoEnCurso() && !confirm('Si salís ahora se pierde el pedido en curso. ¿Confirmás salir?')) return;
  window.removeEventListener('popstate', onBackTrap);
  _backTrapInstalado = false;
  location.href = './login_home.html';
}

// ── ARRANQUE ──────────────────────────────────────────────────────────
async function arrancar(){
  await requireSession();
  if (!tienePermiso('pedidos', 'crear')) { location.href = './login_home.html'; return; }
  initSync(supabase); // no await — corre en background
  instalarBackTrap();
  render();           // muestra UI con listas vacías mientras carga
  await cargarTodo();
  render();
}
arrancar();
</script>
