<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="./src/logger.js"></script>
<title>El Rey · Clientes</title>
<style>
  :root{
    --paper:#FBF9F2; --ink:#1C2B27; --ink-soft:#5B665F;
    --line:#E4DECF; --line-soft:#EEEADD;
    --gold:#A9760E; --gold-dk:#8A5F09;
    --green-bg:#E7F0E8; --green-tx:#2C6B3F;
    --red-bg:#F6E5E2; --red-tx:#A8392B;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{overscroll-behavior-y:contain;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px;line-height:1.4}
  body{max-width:480px;margin:0 auto}

  /* HEADER */
  .hdr{display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:1px solid var(--line);background:var(--paper);
    position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:8px;font-weight:600;letter-spacing:.02em}
  .crown{color:var(--gold);font-size:20px;line-height:1}
  .brand small{display:block;font-size:11px;font-weight:500;color:var(--ink-soft);
    letter-spacing:.06em;text-transform:uppercase}
  .back{display:flex;align-items:center;gap:8px;background:none;border:none;
    font-size:16px;font-weight:600;color:var(--gold);cursor:pointer;padding:0}
  .back svg{width:20px;height:20px}
  .hdr-title{font-size:17px;font-weight:600;flex:1;text-align:center}
  .hdr-right{min-width:60px;display:flex;justify-content:flex-end}
  .add-btn{background:none;border:none;color:var(--gold);font-size:28px;
    line-height:1;cursor:pointer;padding:0}

  /* SEARCH */
  .search-wrap{padding:14px 18px 8px;position:sticky;top:57px;background:var(--paper);z-index:10}
  .search-input{width:100%;padding:13px 14px 13px 40px;border:1px solid var(--line);
    border-radius:12px;background:var(--card);font-size:16px;font-family:inherit;color:var(--ink);
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' fill='none' stroke='%235B665F' stroke-width='2'><circle cx='8' cy='8' r='5'/><path d='M14 14l-3-3'/></svg>");
    background-repeat:no-repeat;background-position:13px center}
  .search-input:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:transparent}

  /* LISTA */
  .cli-list{padding:0 18px 100px}
  .cli-row{display:flex;justify-content:space-between;align-items:center;
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:15px 16px;margin-bottom:10px;cursor:pointer;gap:10px}
  .cli-row:active{background:var(--line-soft)}
  .cli-row .info{flex:1;min-width:0}
  .cli-row .nm{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cli-row .addr{font-size:13px;color:var(--ink-soft);margin-top:2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chip{padding:6px 11px;border-radius:999px;font-size:13px;font-weight:700;white-space:nowrap}
  .chip.deudor{background:var(--red-bg);color:var(--red-tx)}
  .chip.aldia{background:var(--green-bg);color:var(--green-tx)}
  .chip.inact{background:var(--red-bg);color:var(--red-tx);margin-left:6px;font-size:11px;padding:3px 8px}
  .arr{color:var(--ink-soft);font-size:18px;margin-left:4px}
  .empty{text-align:center;padding:40px 10px;color:var(--ink-soft);font-size:15px}

  /* DETALLE */
  .det{padding-bottom:120px}
  .saldo-card{margin:18px;background:var(--card);border:1px solid var(--line);
    border-radius:18px;padding:22px 20px;text-align:center}
  .saldo-lbl{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    color:var(--ink-soft);margin-bottom:6px}
  .saldo-amt{font-size:38px;font-weight:700;letter-spacing:-.02em}
  .saldo-amt.deudor{color:var(--red-tx)}
  .saldo-amt.aldia{color:var(--green-tx)}
  .saldo-sub{font-size:14px;font-weight:600;margin-top:4px}
  .saldo-sub.deudor{color:var(--red-tx)}
  .saldo-sub.aldia{color:var(--green-tx)}
  .meta{margin:0 18px 18px;display:flex;flex-direction:column;gap:8px}
  .meta-row{display:flex;align-items:center;gap:10px;font-size:15px;color:var(--ink-soft)}
  .meta-row b{color:var(--ink);font-weight:600}
  .sec-lbl{padding:0 18px;font-size:12px;font-weight:600;letter-spacing:.07em;
    text-transform:uppercase;color:var(--ink-soft);margin-bottom:10px}
  .movs{padding:0 18px}
  .mov{display:flex;justify-content:space-between;align-items:flex-start;
    padding:12px 0;border-bottom:1px solid var(--line-soft)}
  .mov:last-child{border-bottom:none}
  .mov .left .desc{font-size:15px;font-weight:500}
  .mov .left .fecha{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .mov .monto{font-size:15px;font-weight:700}
  .mov .monto.cargo{color:var(--red-tx)}
  .mov .monto.pago{color:var(--green-tx)}
  .no-movs{color:var(--ink-soft);font-size:14px;padding:8px 0}

  /* BARRA INFERIOR */
  .bar{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;
    background:var(--paper);border-top:1px solid var(--line);padding:12px 18px 18px;z-index:20}
  .bar-btn{width:100%;padding:16px;border:none;border-radius:14px;background:var(--gold);
    color:#fff;font-size:17px;font-weight:600;cursor:pointer}
  .bar-btn:active{background:var(--gold-dk)}
  .ghost{width:100%;padding:15px;border:1px solid var(--line);border-radius:14px;
    background:var(--card);font-size:16px;font-weight:600;color:var(--ink);cursor:pointer;margin-top:10px}

  /* PANEL COBRO */
  .overlay{position:fixed;inset:0;background:rgba(28,43,39,.4);z-index:30;
    display:flex;align-items:flex-end;max-width:480px;margin:0 auto}
  .cobro-panel{background:var(--paper);border-radius:22px 22px 0 0;padding:24px 20px 30px;width:100%}
  .cobro-panel h3{font-size:18px;font-weight:700;margin-bottom:6px}
  .cobro-panel p{font-size:14px;color:var(--ink-soft);margin-bottom:20px}
  .field{width:100%;padding:14px;border:1px solid var(--line);border-radius:12px;
    background:var(--card);font-size:18px;font-family:inherit;color:var(--ink);margin-bottom:14px}
  .field:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:transparent}
  .cobro-btns{display:flex;gap:10px}
  .cobro-btns .bar-btn{flex:2}
  .cobro-btns .cancel{flex:1;padding:15px;border:1px solid var(--line);border-radius:14px;
    background:var(--card);font-size:16px;font-weight:600;cursor:pointer;color:var(--ink)}

  /* NUEVO CLIENTE */
  .form-body{padding:18px;padding-bottom:100px}
  label.fl{display:block;font-size:12px;font-weight:600;letter-spacing:.07em;
    text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px;margin-top:18px}
  label.fl:first-child{margin-top:0}
  input.field{font-size:16px}

  @media(prefers-reduced-motion:no-preference){
    .cli-row,.cobro-panel{animation:fd .15s ease}
    @keyframes fd{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { supabase } from './src/supabase.js'
import { requireSession, tienePermiso, getUsuario } from './src/auth.js'
import { ars as arsFmt, fechaCorta, mostrarError } from './src/utils.js?v=2'

// expongo handlers a onclick inline
Object.assign(window, {
  irLista, irDetalle, irNuevo, abrirCobro, cerrarCobro, confirmarCobro, guardarCliente,
  eliminarCliente: async () => {
    const c = clientes.find(x => x.id === cliSelId);
    if (!c) return;
    if (!confirm(`Eliminar a "${c.nombre}"?`)) return;
    try {
      // ids de pedidos del cliente
      const { data: peds, error: ePeds } = await supabase
        .from('pedidos').select('id').eq('cliente_id', c.id);
      if (ePeds) throw ePeds;
      const pedIds = (peds || []).map(p => p.id);
      // boletas
      if (pedIds.length) {
        const { error } = await supabase.from('boletas').delete().in('pedido_id', pedIds);
        if (error) throw error;
      }
      // mov_cuenta
      { const { error } = await supabase.from('mov_cuenta').delete().eq('cliente_id', c.id);
        if (error) throw error; }
      // pedidos (pedido_items cae por CASCADE)
      { const { error } = await supabase.from('pedidos').delete().eq('cliente_id', c.id);
        if (error) throw error; }
      // cliente (visitas_clientes cae por CASCADE)
      { const { error } = await supabase.from('clientes').delete().eq('id', c.id);
        if (error) throw error; }
      alert('✓ Cliente eliminado');
      clientes = clientes.filter(x => x.id !== c.id);
      cliSelId = null;
      irLista();
    } catch (e) {
      alert('Error al eliminar: ' + (e.message || e));
    }
  },
});

// ── ESTADO ────────────────────────────────────────────────────────────
let vista = 'lista';   // lista | detalle | nuevo
let cliSelId = null;
let busqueda = '';
let cobroOpen = false;
let cobroMonto = '';
let cobroFormaPago = 'efectivo';
let cobroFotoFile = null;     // File seleccionado para subir como comprobante
let cobroFotoPreview = '';    // dataURL para preview local
let cobroRef = '';            // referencia externa (Nº op, banco, etc)
let cobroTipo = 'pago';      // 'pago' = ingreso de dinero, 'cargo' = registrar deuda
let cobroMotivo = '';

let clientes = [];       // {id, nombre, direccion, telefono, saldo}
let movsCache = {};      // cliId -> [{id, tipo, monto, descripcion, fecha, forma_pago}]
let boletasCache = {};   // cliId -> [{id, fecha, total, estado}]
let cargando = false;

let nuevoForm = {nombre:'', dir:'', tel:'', zona_id:'', posicion_zona:''};
let zonasList = [];
let editandoZona = false; // panel editar zona/posición de un cliente

// ── HELPERS ───────────────────────────────────────────────────────────
// adapter al formato del mockup: pago se muestra como negativo
const ars = n => {
  const abs = Math.abs(n);
  return (n < 0 ? '−' : '') + arsFmt(abs);
};
const fmtFecha = d => fechaCorta(d);

// descripción de un mov_cuenta — la tabla no tiene columna `descripcion`,
// la derivamos del tipo + referencia_tipo + forma_pago.
function descripcionMov(m){
  if (m.tipo === 'pago') {
    return m.forma_pago === 'transferencia' ? 'Pago por transferencia'
         : m.forma_pago === 'efectivo'      ? 'Pago en efectivo'
         : 'Pago';
  }
  if (m.tipo === 'cargo') {
    return m.referencia_tipo === 'pedido' ? 'Cargo por pedido'
         : m.referencia_tipo === 'hoja_ruta' ? 'Cargo en hoja de ruta'
         : 'Cargo';
  }
  return m.tipo;
}

// ── DATOS ─────────────────────────────────────────────────────────────
async function cargarClientes(){
  cargando = true;
  const hace180 = new Date(Date.now() - 180*86400000).toISOString().slice(0,10);
  const [{ data: cli, error: e1 }, { data: sal, error: e2 }, { data: zon, error: e3 }, { data: peds }] = await Promise.all([
    supabase.from('clientes')
      .select('id, nombre, direccion, telefono, zona_id, posicion_zona, activo')
      .eq('activo', true)
      .order('nombre'),
    supabase.from('saldo_actual').select('cliente_id, saldo'),
    supabase.from('zonas').select('id, nombre, orden, activa').order('orden'),
    supabase.from('pedidos')
      .select('cliente_id, fecha')
      .neq('estado', 'anulado')
      .gte('fecha', hace180),
  ]);
  cargando = false;
  if (e1) { mostrarError('Error cargando clientes: ' + e1.message); return; }
  if (e2) { mostrarError('Error cargando saldos: ' + e2.message); return; }
  if (e3) { mostrarError('Error cargando zonas: ' + e3.message); return; }

  zonasList = zon || [];
  const saldoMap = Object.fromEntries((sal || []).map(s => [s.cliente_id, Number(s.saldo) || 0]));

  // Inactividad: si un cliente tuvo >=2 pedidos en 180d, calcular frecuencia
  // promedio y marcar inactivo si dias_desde_ult > 3 * frecuencia (min 30d).
  const pedsPorCli = {};
  for (const p of (peds || [])) {
    if (!p.cliente_id) continue;
    (pedsPorCli[p.cliente_id] ||= []).push(new Date(p.fecha).getTime());
  }
  const inactMap = {};
  const HOY_T = Date.now();
  for (const [cliId, fechas] of Object.entries(pedsPorCli)) {
    fechas.sort((a,b) => a - b);
    const diasUlt = Math.floor((HOY_T - fechas[fechas.length - 1]) / 86400000);
    if (fechas.length < 2) { inactMap[cliId] = { diasUlt, freq: null, inactivo: false }; continue; }
    const freq = ((fechas[fechas.length - 1] - fechas[0]) / 86400000) / (fechas.length - 1);
    const umbral = Math.max(30, freq * 3);
    inactMap[cliId] = { diasUlt, freq, inactivo: diasUlt > umbral };
  }

  clientes = (cli || []).map(c => ({
    id: c.id,
    nombre: c.nombre,
    direccion: c.direccion || '',
    telefono: c.telefono || '',
    zona_id: c.zona_id || null,
    posicion_zona: c.posicion_zona ?? 999,
    saldo: saldoMap[c.id] || 0,
    inact: inactMap[c.id] || null,
  }));
}

const esAdminUsr = () => usuarioActual?.rol === 'admin';
let usuarioActual = null;
let editandoMovId = null;

async function cargarMovimientos(cliId){
  const { data, error } = await supabase
    .from('mov_cuenta')
    .select('id, tipo, monto, forma_pago, referencia_tipo, fecha')
    .eq('cliente_id', cliId)
    .order('fecha', { ascending: false })
    .limit(100);
  if (error) { mostrarError('Error cargando movimientos: ' + error.message); return; }
  movsCache[cliId] = (data || []).map(m => ({
    ...m,
    monto: Number(m.monto) || 0,
    descripcion: descripcionMov(m),
  }));
}

// expongo cambios de input a window para los oninput inline
window.setBusqueda = (v) => { busqueda = v; renderCliList(); };
window.setNuevoCampo = (k, v) => { nuevoForm[k] = v; };
window.setCobroMonto = (v) => { cobroMonto = v; };
window.setCobroForma = (v) => { cobroFormaPago = v; render(); };
window.setCobroRef = (v) => { cobroRef = v; };
window.setFotoCobro = (file) => {
  if (!file) return;
  cobroFotoFile = file;
  const r = new FileReader();
  r.onload = e => { cobroFotoPreview = e.target.result; render(); };
  r.readAsDataURL(file);
};
window.limpiarFotoCobro = () => { cobroFotoFile = null; cobroFotoPreview = ''; render(); };
window.setCobroMotivo = (v) => { cobroMotivo = v; };

// ── RENDER PRINCIPAL ──────────────────────────────────────────────────
function render(){
  document.getElementById('root').innerHTML = '';
  if(vista==='lista')   renderLista();
  else if(vista==='detalle') renderDetalle();
  else if(vista==='nuevo')   renderNuevo();
  if(cobroOpen) renderCobro();
  if(editandoZona) renderEditarZona();
}

// ── LISTA ─────────────────────────────────────────────────────────────
function renderLista(){
  const q = busqueda.trim().toLowerCase();
  const lista = clientes.filter(c => !q || c.nombre.toLowerCase().includes(q));

  const el = document.getElementById('root');
  const hdr = document.createElement('div');
  hdr.innerHTML = `
    <div class="hdr">
      <div class="brand"><span class="crown">&#9818;</span>
        <div>El Rey<small>Clientes</small></div>
      </div>
      <div class="hdr-right">
        <button class="add-btn" onclick="irNuevo()" aria-label="Nuevo cliente">+</button>
      </div>
    </div>
    <div class="search-wrap">
      <input class="search-input" placeholder="Buscar cliente…" value="${busqueda}"
        oninput="window.setBusqueda(this.value)" autocomplete="off">
    </div>`;
  el.appendChild(hdr);

  const body = document.createElement('div');
  body.className = 'cli-list';
  body.id = 'cli-list';
  el.appendChild(body);
  renderCliList();
}

function renderCliList(){
  const body = document.getElementById('cli-list');
  if (!body) return;
  const q = busqueda.trim().toLowerCase();
  const lista = clientes.filter(c => !q || c.nombre.toLowerCase().includes(q));

  if (cargando) {
    body.innerHTML = `<div class="empty">Cargando…</div>`;
    return;
  }
  if (!lista.length) {
    body.innerHTML = busqueda
      ? `<div class="empty">Sin resultados para "${busqueda}"</div>`
      : `<div class="empty">No hay clientes todavía.<br>Tocá + para crear el primero.</div>`;
    return;
  }
  body.innerHTML = '';
  lista.forEach(c => {
    const s = c.saldo;
    const esDeudor = s > 0;
    const chipTxt = esDeudor ? arsFmt(s) : (s < 0 ? 'A favor ' + arsFmt(-s) : 'Al día');
    const chipClass = esDeudor ? 'deudor' : 'aldia';
    const row = document.createElement('div');
    row.className = 'cli-row';
    row.innerHTML = `
      <div class="info">
        <div class="nm">${c.nombre}${c.inact?.inactivo ? `<span class="chip inact" title="Cliente que dejó de comprar">⚠ ${c.inact.diasUlt}d sin comprar</span>` : ''}</div>
        ${c.direccion ? `<div class="addr">&#128205; ${c.direccion}</div>` : ''}
      </div>
      <span class="chip ${chipClass}">${chipTxt}</span>
      <span class="arr">&#8250;</span>`;
    row.onclick = () => irDetalle(c.id);
    body.appendChild(row);
  });
}

// ── DETALLE ───────────────────────────────────────────────────────────
function renderDetalle(){
  const c = clientes.find(x=>x.id===cliSelId);
  if (!c) { irLista(); return; }
  const s = c.saldo;
  const esDeudor = s > 0;
  const movsCli = movsCache[c.id] || [];

  const el = document.getElementById('root');

  const hdr = document.createElement('div');
  hdr.innerHTML = `
    <div class="hdr">
      <button class="back" onclick="irLista()">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M12 5l-5 5 5 5"/>
        </svg>
      </button>
      <span class="hdr-title">${c.nombre}</span>
      <div class="hdr-right">
        ${esAdminUsr() ? `<button onclick="window.eliminarCliente()" title="Eliminar cliente"
          style="background:none;border:none;color:var(--red-tx,#A8392B);font-size:20px;cursor:pointer;padding:4px 8px;font-family:inherit">🗑</button>` : ''}
      </div>
    </div>`;
  el.appendChild(hdr);

  const body = document.createElement('div');
  body.className = 'det';
  body.innerHTML = `
    <div class="saldo-card">
      <div class="saldo-lbl">Saldo actual</div>
      <div class="saldo-amt ${esDeudor?'deudor':'aldia'}">${arsFmt(Math.abs(s))}</div>
      <div class="saldo-sub ${esDeudor?'deudor':'aldia'}">
        ${esDeudor ? 'Debe' : (s<0 ? 'A favor' : 'Al día')}
      </div>
    </div>
    <div class="meta">
      ${c.telefono ? `<div class="meta-row">&#128222; <b>${c.telefono}</b></div>` : ''}
      ${c.direccion ? `<div class="meta-row">&#128205; <span>${c.direccion}</span></div>` : ''}
      <div class="meta-row" style="justify-content:space-between">
        <span>🗺️ ${zonasList.find(z=>z.id===c.zona_id)?.nombre || 'Sin zona'}${c.posicion_zona < 999 ? ` · pos ${c.posicion_zona}` : ''}</span>
        <button onclick="window.abrirEditarZona()" style="background:none;border:none;color:var(--gold);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">✏ Editar</button>
      </div>
    </div>
    <div class="sec-lbl">Boletas</div>
    <div class="movs">
      ${(boletasCache[c.id] || []).length ? boletasCache[c.id].map(b => `
        <div class="mov" style="cursor:pointer" onclick="location.href='./boleta.html?id=${b.id}'">
          <div class="left">
            <div class="desc">Boleta #${b.id.slice(-4).toUpperCase()} <span style="font-size:11px;color:var(--ink-soft)">· ${b.estado}</span></div>
            <div class="fecha">${fmtFecha(b.fecha)}</div>
          </div>
          <div class="monto cargo">${ars(b.total)}</div>
        </div>`).join('')
      : `<div class="no-movs">${boletasCache[c.id] ? 'Sin boletas todavía.' : 'Cargando…'}</div>`}
    </div>

    <div class="sec-lbl">Movimientos</div>
    <div class="movs">
      ${movsCli.length ? movsCli.map(m=>{
        const editable = tienePermiso('clientes', 'admin') && (m.tipo === 'pago' || (m.tipo === 'cargo' && m.referencia_tipo === 'ajuste_manual'));
        return `
        <div class="mov">
          <div class="left">
            <div class="desc">${m.descripcion}</div>
            <div class="fecha">${fmtFecha(m.fecha)}</div>
          </div>
          <div class="monto ${m.tipo}">${m.tipo==='cargo'?'+':''} ${ars(m.monto)}</div>
          ${editable ? `<button onclick="window.editarMov('${m.id}')" style="background:none;border:none;color:var(--gold);font-size:18px;cursor:pointer;padding:0 6px;font-family:inherit" title="Editar">✏</button>` : ''}
        </div>`}).join('')
      : `<div class="no-movs">Sin movimientos todavía.</div>`}
    </div>`;
  el.appendChild(body);

  if (tienePermiso('clientes', 'admin')) {
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.innerHTML = `
      <div style="display:flex;gap:8px;width:100%">
        <button class="bar-btn" style="flex:1" onclick="abrirCobro('pago')">+ Cobro</button>
        <button class="bar-btn" style="flex:1;background:var(--card);color:var(--ink);border:1px solid var(--line)" onclick="abrirCobro('cargo')">+ Deuda</button>
      </div>`;
    el.appendChild(bar);
  }
}

// ── PANEL COBRO ───────────────────────────────────────────────────────
function renderCobro(){
  const c = clientes.find(x=>x.id===cliSelId);
  const ov = document.createElement('div');
  ov.className = 'overlay';
  const esCargo = cobroTipo === 'cargo';
  const titulo = editandoMovId
    ? (esCargo ? 'Editar deuda' : 'Editar cobro')
    : (esCargo ? 'Registrar deuda' : 'Registrar cobro');
  ov.innerHTML = `
    <div class="cobro-panel">
      <h3>${titulo}</h3>
      <p>${c.nombre}</p>
      <input id="cobro-input" class="field" type="number" min="1" placeholder="Monto en $"
        value="${cobroMonto}" oninput="window.setCobroMonto(this.value)" inputmode="numeric">
      ${esCargo ? `
        <input class="field" placeholder="Motivo (opcional)" value="${cobroMotivo}"
          oninput="window.setCobroMotivo(this.value)" style="margin-bottom:14px">
      ` : `
        <div style="display:flex;gap:8px;margin-bottom:14px">
          <label style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
            padding:12px;border:1px solid var(--line);border-radius:12px;background:var(--card);cursor:pointer;
            ${cobroFormaPago==='efectivo'?'border-color:var(--gold);background:var(--card)':''}">
            <input type="radio" name="fp" value="efectivo" ${cobroFormaPago==='efectivo'?'checked':''}
              onchange="window.setCobroForma('efectivo');" style="accent-color:var(--gold)">
            Efectivo
          </label>
          <label style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
            padding:12px;border:1px solid var(--line);border-radius:12px;background:var(--card);cursor:pointer;
            ${cobroFormaPago==='transferencia'?'border-color:var(--gold)':''}">
            <input type="radio" name="fp" value="transferencia" ${cobroFormaPago==='transferencia'?'checked':''}
              onchange="window.setCobroForma('transferencia');" style="accent-color:var(--gold)">
            Transferencia
          </label>
        </div>
        ${cobroFormaPago === 'transferencia' ? `
          <div style="background:var(--card);border:1px dashed var(--line);border-radius:12px;padding:12px;margin-bottom:14px">
            <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin-bottom:6px">Comprobante (opcional)</div>
            ${cobroFotoPreview ? `
              <img src="${cobroFotoPreview}" style="width:100%;max-height:200px;object-fit:contain;border-radius:8px;background:var(--line-soft);margin-bottom:8px">
              <button onclick="window.limpiarFotoCobro()" style="width:100%;padding:8px;border:1px solid var(--red-tx);background:var(--red-bg);color:var(--red-tx);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:8px">Quitar foto</button>
            ` : `
              <label style="display:block;width:100%;padding:14px;border:1px solid var(--gold);background:var(--gold-lt,#F5E9D0);color:var(--gold-dk);border-radius:8px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px">
                📷 Tomar / subir foto
                <input type="file" accept="image/*" capture="environment" style="display:none"
                  onchange="window.setFotoCobro(this.files[0])">
              </label>`}
            <input class="field" placeholder="N° de operación o banco (opcional)"
              value="${cobroRef}" oninput="window.setCobroRef(this.value)" style="font-size:14px">
          </div>` : ''}
      `}
      <div id="cobro-err" class="" style="color:var(--red-tx);font-size:13px;text-align:center;margin-bottom:8px;display:none"></div>
      <div class="cobro-btns">
        <button class="cancel" onclick="cerrarCobro()">Cancelar</button>
        ${editandoMovId ? `<button id="cobro-anular" class="cancel" style="color:var(--red-tx);border-color:var(--red-tx)" onclick="window.anularMov()">Anular</button>` : ''}
        <button id="cobro-confirm" class="bar-btn" onclick="confirmarCobro()">${editandoMovId ? 'Guardar' : (esCargo ? 'Confirmar deuda' : 'Confirmar cobro')}</button>
      </div>
    </div>`;
  document.getElementById('root').appendChild(ov);
  setTimeout(()=>{ const i=document.getElementById('cobro-input'); if(i) i.focus(); },50);
}

function abrirCobro(tipo='pago'){
  editandoMovId=null; cobroOpen=true; cobroTipo=tipo;
  cobroMonto=''; cobroMotivo=''; cobroFormaPago='efectivo';
  cobroFotoFile=null; cobroFotoPreview=''; cobroRef='';
  render();
}
function cerrarCobro(){
  cobroOpen=false; editandoMovId=null;
  cobroFotoFile=null; cobroFotoPreview=''; cobroRef='';
  render();
}

function renderEditarZona(){
  const c = clientes.find(x=>x.id===cliSelId); if(!c) return;
  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.innerHTML = `
    <div class="cobro-panel" style="max-height:88vh;overflow-y:auto">
      <h3>Editar cliente</h3>
      <label class="fl" style="display:block;font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px">Nombre</label>
      <input id="ez-nombre" class="field" type="text" value="${(c.nombre||'').replace(/"/g,'&quot;')}" style="margin-bottom:12px">
      <label class="fl" style="display:block;font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px">Teléfono</label>
      <input id="ez-tel" class="field" type="tel" inputmode="tel" value="${(c.telefono||'').replace(/"/g,'&quot;')}" placeholder="Ej: 3547 123456" style="margin-bottom:12px">
      <label class="fl" style="display:block;font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px">Dirección</label>
      <input id="ez-dir" class="field" type="text" value="${(c.direccion||'').replace(/"/g,'&quot;')}" placeholder="Ej: Belgrano 1240" style="margin-bottom:12px">
      <label class="fl" style="display:block;font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px">Zona</label>
      <select id="ez-zona" class="field" style="margin-bottom:12px">
        <option value="">— Sin zona —</option>
        ${zonasList.filter(z=>z.activa || z.id===c.zona_id).map(z =>
          `<option value="${z.id}" ${c.zona_id===z.id?'selected':''}>${z.nombre}</option>`).join('')}
      </select>
      <label class="fl" style="display:block;font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px">Posición</label>
      <input id="ez-pos" class="field" type="number" min="0" value="${c.posicion_zona ?? 999}" style="margin-bottom:14px">
      <div class="cobro-btns">
        <button class="cancel" onclick="window.cerrarEditarZona()">Cancelar</button>
        <button class="bar-btn" onclick="window.guardarZonaCliente()">Guardar</button>
      </div>
    </div>`;
  document.getElementById('root').appendChild(ov);
}
window.abrirEditarZona = () => { editandoZona = true; render(); };
window.cerrarEditarZona = () => { editandoZona = false; render(); };
window.guardarZonaCliente = async () => {
  const nombre = document.getElementById('ez-nombre')?.value.trim() || '';
  const tel = document.getElementById('ez-tel')?.value.trim() || '';
  const dir = document.getElementById('ez-dir')?.value.trim() || '';
  const zid = document.getElementById('ez-zona')?.value || null;
  const pos = parseInt(document.getElementById('ez-pos')?.value);
  if (!nombre) { alert('El nombre es obligatorio.'); return; }
  const { error } = await supabase.from('clientes')
    .update({
      nombre,
      telefono: tel || null,
      direccion: dir || null,
      zona_id: zid,
      posicion_zona: Number.isFinite(pos) ? pos : 999,
    })
    .eq('id', cliSelId);
  if (error) { alert('Error: ' + error.message); return; }
  editandoZona = false;
  await cargarClientes();
  render();
};

window.editarMov = (movId) => {
  const cli = clientes.find(x=>x.id===cliSelId);
  const m = (movsCache[cliSelId]||[]).find(x => x.id === movId);
  if (!m) return;
  editandoMovId = movId;
  cobroTipo = m.tipo === 'cargo' ? 'cargo' : 'pago';
  cobroMonto = String(Math.abs(Number(m.monto) || 0));
  cobroFormaPago = (m.forma_pago && m.forma_pago !== 'cuenta_corriente') ? m.forma_pago : 'efectivo';
  cobroMotivo = '';
  cobroOpen = true;
  render();
};

window.anularMov = async () => {
  if (!editandoMovId) return;
  if (!confirm('¿Anular este cobro? El saldo del cliente se ajusta de inmediato.')) return;
  const btn = document.getElementById('cobro-anular');
  if (btn) { btn.disabled = true; btn.textContent = 'Anulando…'; }
  const { error } = await supabase.from('mov_cuenta').delete().eq('id', editandoMovId);
  if (error) { alert('Error: ' + error.message); if (btn) { btn.disabled=false; btn.textContent='Anular'; } return; }
  await Promise.all([cargarClientes(), cargarMovimientos(cliSelId)]);
  cobroOpen=false; editandoMovId=null; cobroMonto=''; render();
};

async function confirmarCobro(){
  const n = parseFloat(cobroMonto);
  const errEl = document.getElementById('cobro-err');
  const btn = document.getElementById('cobro-confirm');
  if(!n || n<=0) {
    if (errEl) { errEl.textContent = 'Ingresá un monto válido'; errEl.style.display='block'; }
    return;
  }

  btn.disabled = true; btn.textContent = 'Guardando…';

  const esCargo = cobroTipo === 'cargo';
  const monto = esCargo ? n : -n;
  const forma = esCargo ? 'cuenta_corriente' : cobroFormaPago;

  // Foto de comprobante OBLIGATORIA para transferencias nuevas.
  if (!esCargo && forma === 'transferencia' && !editandoMovId && !cobroFotoFile) {
    btn.disabled = false; btn.textContent = 'Confirmar cobro';
    if (errEl) { errEl.textContent = 'Es obligatorio adjuntar la foto del comprobante.'; errEl.style.display='block'; }
    return;
  }

  // Si es transferencia y hay foto, subirla al storage primero.
  let comprobante_url = null;
  if (!esCargo && forma === 'transferencia' && cobroFotoFile) {
    btn.textContent = 'Subiendo foto…';
    const ext = (cobroFotoFile.name.split('.').pop() || 'jpg').toLowerCase();
    const path = `${cliSelId}/${Date.now()}_${crypto.randomUUID().slice(0,8)}.${ext}`;
    const up = await supabase.storage.from('comprobantes')
      .upload(path, cobroFotoFile, { upsert: false, contentType: cobroFotoFile.type || 'image/jpeg' });
    if (up.error) {
      btn.disabled = false; btn.textContent = editandoMovId ? 'Guardar' : 'Confirmar cobro';
      if (errEl) { errEl.textContent = 'Error subiendo foto: ' + up.error.message; errEl.style.display='block'; }
      return;
    }
    comprobante_url = supabase.storage.from('comprobantes').getPublicUrl(path).data.publicUrl;
    btn.textContent = 'Guardando…';
  }
  const referencia_externa = (forma === 'transferencia' && cobroRef.trim()) ? cobroRef.trim() : null;

  let error;
  if (editandoMovId) {
    const upd = { monto, forma_pago: forma };
    if (comprobante_url) upd.comprobante_url = comprobante_url;
    if (referencia_externa) upd.referencia_externa = referencia_externa;
    ({ error } = await supabase.from('mov_cuenta').update(upd).eq('id', editandoMovId));
  } else {
    const { data: { user } } = await supabase.auth.getUser();
    const { data: usr } = await supabase.from('usuarios')
      .select('id, empresa_id').eq('auth_id', user.id).single();
    ({ error } = await supabase.from('mov_cuenta').insert({
      empresa_id: usr.empresa_id,
      cliente_id: cliSelId,
      tipo: esCargo ? 'cargo' : 'pago',
      monto,
      forma_pago: forma,
      referencia_tipo: 'ajuste_manual',
      usuario_id: usr.id,
      comprobante_url,
      referencia_externa,
    }));
  }

  if (error) {
    btn.disabled = false; btn.textContent = editandoMovId ? 'Guardar' : 'Confirmar cobro';
    if (errEl) { errEl.textContent = error.message; errEl.style.display='block'; }
    return;
  }

  await Promise.all([cargarClientes(), cargarMovimientos(cliSelId)]);
  cobroOpen=false; editandoMovId=null; cobroMonto='';
  cobroFotoFile=null; cobroFotoPreview=''; cobroRef='';
  render();
}

// ── NUEVO CLIENTE ─────────────────────────────────────────────────────

async function guardarCliente(){
  const nom = document.getElementById('fn')?.value.trim();
  const errEl = document.getElementById('nuevo-err');
  const btn = document.getElementById('nuevo-save');
  if(!nom) {
    if (errEl) { errEl.textContent = 'El nombre es obligatorio'; errEl.style.display='block'; }
    return;
  }

  btn.disabled = true; btn.textContent = 'Guardando…';

  const { data: { user } } = await supabase.auth.getUser();
  const { data: usr } = await supabase.from('usuarios')
    .select('empresa_id').eq('auth_id', user.id).single();

  const posParse = parseInt(document.getElementById('fp')?.value);
  const { data, error } = await supabase.from('clientes').insert({
    empresa_id: usr.empresa_id,
    nombre: nom,
    direccion: document.getElementById('fd')?.value.trim() || null,
    telefono: document.getElementById('ft')?.value.trim() || null,
    zona_id: document.getElementById('fz')?.value || null,
    posicion_zona: Number.isFinite(posParse) ? posParse : 999,
    activo: true,
  }).select('id').single();

  if (error) {
    btn.disabled = false; btn.textContent = 'Guardar cliente';
    if (errEl) { errEl.textContent = error.message; errEl.style.display='block'; }
    return;
  }

  nuevoForm = {nombre:'', dir:'', tel:'', zona_id:'', posicion_zona:''};
  await cargarClientes();
  irDetalle(data.id);
}

// ── NAVEGACIÓN ────────────────────────────────────────────────────────
function irLista()          { vista='lista'; cobroOpen=false; busqueda=''; render(); }
async function irDetalle(id){
  cliSelId=id; vista='detalle'; render();
  const tareas = []
  if (!movsCache[id]) tareas.push(cargarMovimientos(id))
  if (!boletasCache[id]) tareas.push(cargarBoletasCliente(id))
  if (tareas.length) {
    await Promise.all(tareas)
    if (vista==='detalle' && cliSelId===id) render();
  }
}

async function cargarBoletasCliente(cliId) {
  const { data, error } = await supabase
    .from('boletas')
    .select('id, fecha, total, estado, pedidos!inner(cliente_id)')
    .eq('pedidos.cliente_id', cliId)
    .order('fecha', { ascending: false })
    .limit(100)
  if (error) { boletasCache[cliId] = []; return }
  boletasCache[cliId] = (data || []).map(b => ({
    id: b.id, fecha: b.fecha, total: Number(b.total) || 0, estado: b.estado,
  }))
}
function irNuevo()          { nuevoForm={nombre:'',dir:'',tel:''}; vista='nuevo'; render(); }

// ── ARRANQUE ──────────────────────────────────────────────────────────
async function arrancar(){
  await requireSession();
  if (!tienePermiso('clientes')) { location.href = './login_home.html'; return; }
  usuarioActual = getUsuario();
  render();   // muestra "Cargando…"
  await cargarClientes();
  render();
}
arrancar();
