<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="./src/logger.js"></script>
<title>El Rey · Hoja de ruta</title>
<style>
  :root{
    --paper:#FBF9F2; --ink:#1C2B27; --ink-soft:#5B665F;
    --line:#E4DECF;  --line-soft:#EEEADD;
    --gold:#A9760E;  --gold-dk:#8A5F09; --gold-lt:#F5E9D0;
    --green-bg:#E7F0E8; --green-tx:#2C6B3F;
    --amber-bg:#FDF2DC; --amber-tx:#8A5F09;
    --red-bg:#F6E5E2;   --red-tx:#A8392B;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px;line-height:1.4}
  body{max-width:480px;margin:0 auto;padding-bottom:100px}

  .hdr{display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:1px solid var(--line);background:var(--paper);
    position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:8px;font-weight:600}
  .crown{color:var(--gold);font-size:20px}
  .brand small{display:block;font-size:11px;font-weight:500;color:var(--ink-soft);
    letter-spacing:.06em;text-transform:uppercase}
  .hdr-right{display:flex;gap:8px;align-items:center}
  .hdr-btn{padding:7px 13px;border:1px solid var(--line);border-radius:999px;
    background:var(--card);font-size:13px;font-weight:600;cursor:pointer;
    font-family:inherit;color:var(--ink)}
  .hdr-btn.gold{background:var(--gold);color:#fff;border-color:var(--gold)}

  .tabs{display:flex;border-bottom:2px solid var(--line);background:var(--paper);
    position:sticky;top:57px;z-index:19}
  .tab{flex:1;padding:11px 6px;text-align:center;font-size:13px;font-weight:600;
    color:var(--ink-soft);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold)}

  /* HOJA */
  .zona-hdr{display:flex;align-items:center;gap:10px;padding:14px 18px 6px;
    font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-soft)}
  .zona-hdr::after{content:'';flex:1;height:1px;background:var(--line)}

  .ped-card{margin:0 18px 10px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;overflow:hidden}
  .ped-main{padding:13px 14px}
  .ped-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .ped-num{font-size:12px;font-weight:600;color:var(--ink-soft)}
  .ped-nm{font-size:15px;font-weight:700;margin-top:2px}
  .ped-dir{font-size:13px;color:var(--ink-soft);margin-top:3px}
  .ped-items{font-size:13px;color:var(--ink-soft);margin-top:5px}
  .pos-badge{display:inline-flex;padding:3px 8px;background:var(--line-soft);
    border-radius:999px;font-size:11px;font-weight:600;color:var(--ink-soft);margin-top:5px}

  /* totales del pedido en hoja */
  .ped-totales{padding:10px 14px;border-top:1px solid var(--line-soft);
    display:flex;flex-direction:column;gap:4px}
  .ped-tot-row{display:flex;justify-content:space-between;font-size:13px}
  .ped-tot-row .k{color:var(--ink-soft)}
  .ped-tot-row .v{font-weight:600}
  .ped-tot-row.saldo .k{color:var(--red-tx);font-weight:600}
  .ped-tot-row.saldo .v{color:var(--red-tx);font-weight:700}
  .ped-tot-row.cobrar{padding-top:6px;border-top:1px solid var(--line-soft)}
  .ped-tot-row.cobrar .k{font-weight:700;color:var(--ink)}
  .ped-tot-row.cobrar .v{font-size:15px;font-weight:700;color:var(--gold)}

  /* RESUMEN HOJA */
  .resumen-hoja{margin:14px 18px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:14px 16px}
  .rh-title{font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
    color:var(--ink-soft);margin-bottom:10px}
  .rh-row{display:flex;justify-content:space-between;padding:4px 0;font-size:14px;
    border-bottom:1px solid var(--line-soft)}
  .rh-row:last-child{border-bottom:none}
  .rh-row .k{color:var(--ink-soft)}
  .rh-row .v{font-weight:600}
  .rh-row.total .k{font-weight:700;color:var(--ink)}
  .rh-row.total .v{font-size:18px;color:var(--gold)}

  .qr-wrap{margin:14px 18px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:20px;text-align:center}
  .qr-wrap p{font-size:13px;color:var(--ink-soft);margin-top:10px}
  .qr-code{font-size:12px;font-family:monospace;color:var(--ink-soft);margin-top:4px}

  /* CIERRE */
  .prog-bar-wrap{padding:12px 18px 6px}
  .prog-lbl{font-size:13px;color:var(--ink-soft);margin-bottom:6px}
  .prog-track{height:6px;background:var(--line-soft);border-radius:999px;overflow:hidden}
  .prog-fill{height:100%;border-radius:999px;background:var(--gold);transition:width .3s}

  .cierre-card{margin:0 18px 14px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;overflow:hidden}
  .cierre-card.ok {border-color:var(--green-tx)}
  .cierre-card.no {border-color:var(--red-tx)}
  .cierre-hdr{padding:12px 14px;border-bottom:1px solid var(--line-soft)}
  .cierre-hdr .nm{font-size:15px;font-weight:700}
  .cierre-hdr .sub{font-size:13px;color:var(--ink-soft);margin-top:2px}
  .cierre-hdr .montos{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap}
  .monto-tag{font-size:12px;font-weight:600}
  .monto-tag.pedido{color:var(--ink-soft)}
  .monto-tag.saldo{color:var(--red-tx)}
  .monto-tag.cobrar{color:var(--gold);font-size:13px}
  .estado-chip{display:inline-block;padding:4px 10px;border-radius:999px;
    font-size:12px;font-weight:600;margin-top:6px}
  .estado-chip.ok  {background:var(--green-bg);color:var(--green-tx)}
  .estado-chip.no  {background:var(--red-bg);color:var(--red-tx)}
  .estado-chip.pend{background:var(--line-soft);color:var(--ink-soft)}

  .cierre-body{padding:12px 14px}

  .op-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
  .op-btn{display:flex;flex-direction:column;align-items:center;gap:5px;
    padding:11px 8px;border:1.5px solid var(--line);border-radius:12px;
    background:var(--paper);cursor:pointer}
  .op-btn.sel{border-color:var(--gold);background:var(--gold-lt)}
  .op-btn.sel-red{border-color:var(--red-tx);background:var(--red-bg)}
  .op-btn:active{filter:brightness(.97)}
  .op-icon{font-size:20px;line-height:1}
  .op-lbl{font-size:12px;font-weight:600;color:var(--ink-soft);text-align:center}
  .op-btn.sel .op-lbl{color:var(--gold-dk)}
  .op-btn.sel-red .op-lbl{color:var(--red-tx)}

  .monto-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .monto-lbl{font-size:13px;font-weight:600;color:var(--ink-soft);min-width:110px}
  .monto-input{flex:1;padding:9px 12px;border:1px solid var(--line);border-radius:10px;
    font-size:15px;font-weight:600;text-align:right;font-family:inherit;color:var(--ink);
    background:var(--card)}
  .monto-input:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:transparent}
  .motivo-input{width:100%;padding:9px 12px;border:1px solid var(--line);
    border-radius:10px;font-size:14px;font-family:inherit;background:var(--card);margin-top:4px}

  /* imputación visual */
  .imput-wrap{margin-top:8px;padding:10px 12px;background:var(--line-soft);
    border-radius:8px;font-size:12px;color:var(--ink-soft);line-height:1.6}
  .imput-wrap b{color:var(--ink)}
  .imput-wrap .ok-line{color:var(--green-tx);font-weight:600}
  .imput-wrap .warn-line{color:var(--amber-tx);font-weight:600}

  .saldo-row{display:flex;justify-content:space-between;align-items:baseline;
    padding:7px 10px;border-radius:8px;font-size:13px;margin-top:6px}
  .saldo-row.ok  {background:var(--green-bg);color:var(--green-tx)}
  .saldo-row.warn{background:var(--amber-bg);color:var(--amber-tx)}

  /* resumen cierre */
  .resumen-cierre{margin:0 18px 14px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:14px 16px}
  .rc-title{font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
    color:var(--ink-soft);margin-bottom:10px}
  .rc-row{display:flex;justify-content:space-between;align-items:baseline;
    padding:5px 0;border-bottom:1px solid var(--line-soft)}
  .rc-row:last-child{border-bottom:none}
  .rc-row .k{font-size:14px;color:var(--ink-soft)}
  .rc-row .v{font-size:15px;font-weight:700}
  .rc-row.total .k{font-size:14px;font-weight:700;color:var(--ink)}
  .rc-row.total .v{font-size:20px;color:var(--gold)}

  .bar{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;
    background:var(--paper);border-top:1px solid var(--line);padding:12px 18px 18px;z-index:20}
  .bar-btn{width:100%;padding:15px;border:none;border-radius:14px;background:var(--gold);
    color:#fff;font-size:17px;font-weight:600;cursor:pointer;font-family:inherit}
  .bar-btn:active{background:var(--gold-dk)}
  .bar-btn:disabled{background:var(--line);color:var(--ink-soft);cursor:not-allowed}

  .done{text-align:center;padding:50px 24px}
  .done .check{width:64px;height:64px;border-radius:50%;background:var(--green-bg);
    color:var(--green-tx);font-size:34px;display:flex;align-items:center;
    justify-content:center;margin:0 auto 18px}
  .done h2{font-size:20px;font-weight:600;margin-bottom:6px}
  .done p{color:var(--ink-soft);font-size:15px;margin-bottom:4px}
  .done .rules{background:var(--card);border:1px solid var(--line);border-radius:14px;
    text-align:left;padding:14px 16px;margin:20px 0;font-size:14px}
  .done .rules div{display:flex;gap:9px;padding:4px 0;color:var(--green-tx)}
  .done .rules b{color:var(--ink)}
  .ghost{width:100%;padding:14px;border:1px solid var(--line);border-radius:14px;
    background:var(--card);font-size:16px;font-weight:600;color:var(--ink);
    cursor:pointer;font-family:inherit}

  .print-line{display:none}
  .print-header{display:none}
  @media print{
    @page{margin:12mm}
    .tabs,.bar,.no-print,.ped-items,.pos-badge,.ped-totales,.resumen-hoja,.qr-wrap{display:none!important}
    html,body{background:#fff;max-width:100%;font-size:11px;padding:0}
    .print-header{display:block!important;text-align:center;border-bottom:2px solid #000;padding-bottom:6px;margin-bottom:8px}
    .print-header h1{font-size:14px;font-weight:700}
    .print-header p{font-size:10px;color:#555}
    .zona-hdr{padding:5px 0 2px;font-size:9px;color:#555;background:none}
    .zona-hdr::after{background:#999}
    .ped-card{margin:0;border:none;border-radius:0;border-bottom:1px solid #ddd;break-inside:avoid}
    .ped-main{padding:3px 0}
    .ped-num,.ped-nm,.ped-dir{display:none!important}
    .ped-top{display:flex!important;align-items:baseline;flex-wrap:nowrap}
    .print-line{display:flex!important;align-items:baseline;gap:3px;font-size:24px;flex:1;flex-wrap:nowrap;overflow:hidden}
    .print-num{font-weight:700;white-space:nowrap;flex-shrink:0;min-width:44px}
    .print-nm{font-weight:700;white-space:nowrap;flex-shrink:0;max-width:140px;overflow:hidden;text-overflow:ellipsis}
    .print-sep{color:#bbb;flex-shrink:0}
    .print-dir{color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
    .print-tel{white-space:nowrap;flex-shrink:0;color:#555}
    .print-importe{font-weight:700;white-space:nowrap;flex-shrink:0;font-size:11px;text-align:right;min-width:72px}
    .print-saldo{font-size:9px;color:#c00;white-space:nowrap;flex-shrink:0}
  }
  @media(prefers-reduced-motion:no-preference){
    .cierre-card,.ped-card{animation:fd .15s ease}
    @keyframes fd{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script type="module">
import { supabase } from './src/supabase.js'
import { requireSession, tienePermiso } from './src/auth.js'
import { ars, fechaCorta, mostrarError } from './src/utils.js'

const { usuario } = await requireSession()
if (!tienePermiso('hoja_ruta')) { location.href = './login_home.html'; throw new Error('sin permiso') }
// puedeAdminCierre se calcula tras cargar la hoja:
//   - cualquiera con permiso hoja_ruta puede cerrar mientras la fecha de la hoja sea hoy o futura
//   - si la hoja es de un día pasado, solo admin
let puedeAdminCierre = true
let _motivoBloqueo = ''
let hojaFecha = HOY

// ── DATOS ─────────────────────────────────────────────────────────────
let pedidos  = []  // adaptados del mockup
let hojaId   = null
let qrToken  = null
let HOY      = new Intl.DateTimeFormat('en-CA',{timeZone:'America/Argentina/Cordoba'}).format(new Date())
const _hojaIdParam = new URLSearchParams(location.search).get('hoja_id')

async function cargarTodo() {
  let rows
  if (_hojaIdParam) {
    // Modo "cerrar hoja vieja": cargar pedidos de ESA hoja específica
    const { data, error } = await supabase
      .from('pedidos')
      .select(`id, hoja_ruta_id,
        clientes(id, nombre, direccion, telefono, posicion_zona, zonas(nombre, orden)),
        usuarios!pedidos_usuario_id_fkey(nombre)`)
      .eq('hoja_ruta_id', _hojaIdParam)
    if (error) throw error
    rows = (data || []).map(p => ({
      pedido_id:           p.id,
      empresa_id:          usuario.empresa_id,
      cliente_id:          p.clientes?.id,
      cliente_nombre:      p.clientes?.nombre,
      direccion:           p.clientes?.direccion,
      telefono:            p.clientes?.telefono,
      posicion_zona:       p.clientes?.posicion_zona,
      zona_nombre:         p.clientes?.zonas?.nombre,
      zona_orden:          p.clientes?.zonas?.orden,
      preventista_nombre:  p.usuarios?.nombre,
    }))
  } else {
    const { data, error } = await supabase
      .from('hoja_ruta_hoy')
      .select('*')
      .eq('empresa_id', usuario.empresa_id)
    if (error) throw error
    rows = data
  }

  if (!rows?.length) { pedidos = []; return }

  // Boletas para saldo_anterior y total_a_cobrar
  const pedidoIds = rows.map(r => r.pedido_id)
  const { data: boletas, error: e2 } = await supabase
    .from('boletas')
    .select('pedido_id, total, saldo_anterior, total_a_cobrar')
    .in('pedido_id', pedidoIds)
  if (e2) throw e2
  const mapBol = new Map((boletas||[]).map(b => [b.pedido_id, b]))

  pedidos = rows.map(r => {
    const b = mapBol.get(r.pedido_id) || {}
    return {
      id:          r.pedido_id,
      num:         '#' + r.pedido_id.slice(-4).toUpperCase(),
      zona:        r.zona_nombre || 'Sin zona',
      zonaOrden:   r.zona_orden  ?? 99,
      pos:         r.posicion_zona ?? 0,
      cliente:     r.cliente_nombre,
      dir:         r.direccion || '',
      tel:         r.telefono  || '',
      prev:        r.preventista_nombre || '',
      totalPedido: Number(b.total)          || 0,
      saldoAnt:    Number(b.saldo_anterior) || 0,
      tacobrar:    Number(b.total_a_cobrar) || 0,
    }
  })

  if (_hojaIdParam) {
    // Modo "cerrar hoja vieja"
    const { data: h, error } = await supabase.from('hojas_ruta')
      .select('id, qr_token, fecha, estado')
      .eq('id', _hojaIdParam).single()
    if (error) throw error
    if (h.estado === 'cerrada') { alert('Esta hoja ya está cerrada.'); confirmado = true; return }
    hojaId = h.id; qrToken = h.qr_token
    hojaFecha = h.fecha
    HOY = h.fecha  // mostrar la fecha real de la hoja
  } else {
    const { data: hojas, error: e3 } = await supabase
      .from('hojas_ruta')
      .select('id, qr_token, estado')
      .eq('empresa_id', usuario.empresa_id)
      .eq('fecha', HOY)
      .neq('estado', 'cerrada')
      .limit(1)
    if (e3) throw e3
    if (hojas?.length) {
      hojaId  = hojas[0].id
      qrToken = hojas[0].qr_token
    } else {
      const { data: nueva, error: e4 } = await supabase
        .from('hojas_ruta')
        .insert({ empresa_id: usuario.empresa_id, usuario_id: usuario.id,
                  fecha: HOY, estado: 'pendiente' })
        .select('id, qr_token').single()
      if (e4) throw e4
      hojaId  = nueva.id
      qrToken = nueva.qr_token
    }
    await supabase.from('pedidos')
      .update({ hoja_ruta_id: hojaId })
      .in('id', pedidoIds)
      .is('hoja_ruta_id', null)
  }

  // Inicializar cierres
  pedidos.forEach(p => {
    if (!cierres[p.id]) {
      cierres[p.id] = { noEntregado:false, motivo:'', usaEf:false, ef:'', usaTr:false, tr:'', usaCc:false, cc:'' }
    }
  })

  // permiso de cierre según fecha de la hoja
  const hoyArg = new Intl.DateTimeFormat('en-CA',{timeZone:'America/Argentina/Cordoba'}).format(new Date())
  const hojaPas = (typeof hojaFecha === 'string' ? hojaFecha : hoyArg).slice(0,10) < hoyArg
  if (hojaPas) {
    puedeAdminCierre = usuario.rol === 'admin'
    _motivoBloqueo = 'Hoja vencida — solo admin'
  } else {
    puedeAdminCierre = true
    _motivoBloqueo = ''
  }
}

// ── ESTADO ────────────────────────────────────────────────────────────
let tab        = 'hoja'
let confirmado = false
let cierres    = {}
window.cierres = cierres  // exponer para oninput inline

const totalACobrar = p => p.tacobrar || (p.totalPedido + p.saldoAnt)
const pagado  = id => { const c=cierres[id]; return (parseFloat(c.ef)||0)+(parseFloat(c.tr)||0)+(parseFloat(c.cc)||0) }
const procesado = id => { const c=cierres[id]; return c.noEntregado||c.usaEf||c.usaTr||c.usaCc }

// ── RENDER ─────────────────────────────────────────────────────────────
function render() {
  const el = document.getElementById('root')
  el.innerHTML = ''
  if (confirmado) { renderDone(el); return }

  const hoyCorto = HOY.split('-').reverse().join('/')
  el.innerHTML = `
    <div class="hdr">
      <div class="brand"><span class="crown">&#9818;</span>
        <div>El Rey<small>Hoja de ruta</small></div>
      </div>
      <div class="hdr-right">
        <span style="font-size:13px;color:var(--ink-soft)">${hoyCorto}</span>
        ${tab==='hoja' ? `<button class="hdr-btn" onclick="abrirModalBoletas()">🧾 Boletas</button>
          <button class="hdr-btn gold" onclick="imprimirHoja()">🖨 Hoja</button>` : ''}
      </div>
    </div>
    <div class="tabs no-print">
      <div class="tab ${tab==='hoja'?'active':''}"   onclick="setTab('hoja')">Hoja del día</div>
      <div class="tab ${tab==='cierre'?'active':''}" onclick="setTab('cierre')">Cerrar ruta</div>
    </div>`

  if (tab === 'hoja') renderHoja(el)
  else                renderCierre(el)
}

// ── HOJA ───────────────────────────────────────────────────────────────
function renderHoja(el) {
  const printHdr = document.createElement('div')
  printHdr.className = 'print-header'
  printHdr.innerHTML = `<h1>Distribuidora El Rey — Hoja de ruta</h1><p>${HOY.split('-').reverse().join('/')} · ${pedidos.length} pedidos</p>`
  el.appendChild(printHdr)

  if (!pedidos.length) {
    el.innerHTML += `<div style="text-align:center;padding:60px 20px;color:var(--ink-soft);font-size:15px">
      No hay pedidos confirmados para hoy.</div>`
    return
  }

  const totPedidos = pedidos.reduce((s,p) => s + p.totalPedido, 0)
  const totSaldos  = pedidos.reduce((s,p) => s + p.saldoAnt, 0)
  const totACobrar = pedidos.reduce((s,p) => s + totalACobrar(p), 0)
  const conSaldo   = pedidos.filter(p => p.saldoAnt > 0).length

  const resDiv = document.createElement('div')
  resDiv.className = 'resumen-hoja'
  resDiv.innerHTML = `
    <div class="rh-title">Resumen del día</div>
    <div class="rh-row"><span class="k">Pedidos</span><span class="v">${pedidos.length}</span></div>
    <div class="rh-row"><span class="k">Total pedidos</span><span class="v">${ars(totPedidos)}</span></div>
    ${conSaldo ? `<div class="rh-row"><span class="k" style="color:var(--red-tx)">Saldos anteriores (${conSaldo} clientes)</span>
      <span class="v" style="color:var(--red-tx)">${ars(totSaldos)}</span></div>` : ''}
    <div class="rh-row total"><span class="k">Total a cobrar</span><span class="v">${ars(totACobrar)}</span></div>`
  el.appendChild(resDiv)

  // Agrupar por zona
  const zonaMap = new Map()
  pedidos.forEach(p => {
    if (!zonaMap.has(p.zona)) zonaMap.set(p.zona, { orden: p.zonaOrden, lista: [] })
    zonaMap.get(p.zona).lista.push(p)
  })
  const zonasOrdenadas = [...zonaMap.entries()].sort((a,b) => a[1].orden - b[1].orden)

  zonasOrdenadas.forEach(([zonaNombre, { lista }]) => {
    lista.sort((a,b) => a.pos - b.pos)
    const d = document.createElement('div')
    d.innerHTML = `<div class="zona-hdr">${zonaNombre}</div>
      ${lista.map(p => `
        <div class="ped-card">
          <div class="ped-main">
            <div class="ped-top">
              <div>
                <div class="ped-num">${p.num} · ${p.prev}</div>
                <div class="ped-nm">${p.cliente}</div>
                <div class="ped-dir">📍 ${p.dir} · 📞 ${p.tel}</div>
              </div>
              <div class="print-line">
                <span class="print-num">${p.num}</span>
                <span class="print-sep">·</span>
                <span class="print-nm">${p.cliente}</span>
                <span class="print-sep">·</span>
                <span class="print-dir">${p.dir}</span>
                <span class="print-tel"> ${p.tel}</span>
                <span class="print-importe">${ars(totalACobrar(p))}</span>
                ${p.saldoAnt > 0 ? `<span class="print-saldo">(s.${ars(p.saldoAnt)})</span>` : ''}
              </div>
            </div>
            <div><span class="pos-badge">Posición ${p.pos}</span></div>
          </div>
          <div class="ped-totales">
            <div class="ped-tot-row"><span class="k">Pedido</span><span class="v">${ars(p.totalPedido)}</span></div>
            ${p.saldoAnt > 0 ? `
              <div class="ped-tot-row saldo"><span class="k">⚠ Saldo anterior</span><span class="v">+ ${ars(p.saldoAnt)}</span></div>
              <div class="ped-tot-row cobrar"><span class="k">Total a cobrar</span><span class="v">${ars(totalACobrar(p))}</span></div>`
            : `<div class="ped-tot-row cobrar"><span class="k">Total a cobrar</span><span class="v">${ars(totalACobrar(p))}</span></div>`}
          </div>
        </div>`).join('')}`
    el.appendChild(d)
  })

  // QR
  const qrDiv = document.createElement('div')
  qrDiv.className = 'qr-wrap'
  qrDiv.innerHTML = `
    <div style="font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:12px;
      letter-spacing:.05em;text-transform:uppercase">Escanear para cerrar la ruta</div>
    <div id="qr-canvas" style="display:inline-block"></div>
    <p>${pedidos.length} pedidos · Total a cobrar ${ars(totACobrar)}</p>
    <div class="qr-code">${qrToken || ''}</div>`
  el.appendChild(qrDiv)

  const bar = document.createElement('div')
  bar.className = 'bar no-print'
  bar.innerHTML = `<button class="bar-btn" onclick="setTab('cierre')">Iniciar cierre →</button>`
  el.appendChild(bar)

  setTimeout(() => {
    const qc = document.getElementById('qr-canvas')
    if (!qc || !qrToken) return
    if (typeof QRCode !== 'undefined') {
      new QRCode(qc, { text: `${location.origin}/hoja_ruta.html?token=${qrToken}`,
        width:180, height:180, colorDark:'#1C2B27', colorLight:'#FFFFFF',
        correctLevel: QRCode.CorrectLevel.M })
    } else {
      qc.innerHTML = `<div style="width:180px;height:180px;background:var(--line-soft);
        border-radius:8px;display:flex;align-items:center;justify-content:center;
        font-size:12px;color:var(--ink-soft)">QR aquí</div>`
    }
  }, 100)
}

// ── CIERRE ─────────────────────────────────────────────────────────────
function renderCierre(el) {
  const proc = pedidos.filter(p => procesado(p.id)).length
  const tot  = pedidos.length

  const prog = document.createElement('div')
  prog.className = 'prog-bar-wrap'
  prog.innerHTML = `
    <div class="prog-lbl">${proc} de ${tot} pedidos procesados</div>
    <div class="prog-track"><div class="prog-fill" style="width:${tot ? Math.round(proc/tot*100) : 0}%"></div></div>`
  el.appendChild(prog)

  pedidos.forEach(p => {
    const c   = cierres[p.id]
    const pg  = pagado(p.id)
    const tac = totalACobrar(p)
    const restante = Math.max(0, tac - pg)
    const chipCl  = c.noEntregado ? 'no' : procesado(p.id) ? 'ok' : 'pend'
    const chipTxt = c.noEntregado ? '✗ No entregado' : procesado(p.id) ? '✓ Procesado' : 'Pendiente'

    const card = document.createElement('div')
    card.className = `cierre-card ${chipCl==='ok'?'ok':chipCl==='no'?'no':''}`
    card.innerHTML = `
      <div class="cierre-hdr">
        <div class="nm">${p.cliente}</div>
        <div class="sub">${p.num} · ${p.dir}</div>
        <div class="montos">
          <span class="monto-tag pedido">Pedido ${ars(p.totalPedido)}</span>
          ${p.saldoAnt > 0 ? `<span class="monto-tag saldo">+ Saldo ${ars(p.saldoAnt)}</span>` : ''}
          <span class="monto-tag cobrar">= Cobrar ${ars(tac)}</span>
        </div>
        <span class="estado-chip ${chipCl}">${chipTxt}</span>
      </div>
      <div class="cierre-body">
        <div class="op-grid">
          <div class="op-btn ${c.noEntregado?'sel-red':''}" onclick="toggleNoEnt('${p.id}')">
            <span class="op-icon">❌</span><span class="op-lbl">No entregado</span>
          </div>
          <div class="op-btn ${c.usaCc?'sel':''}" onclick="toggleCc('${p.id}')">
            <span class="op-icon">📒</span><span class="op-lbl">Saldo en cuenta</span>
          </div>
          <div class="op-btn ${c.usaEf?'sel':''}" onclick="activarEf('${p.id}')">
            <span class="op-icon">💵</span><span class="op-lbl">Efectivo</span>
          </div>
          <div class="op-btn ${c.usaTr?'sel':''}" onclick="activarTr('${p.id}')">
            <span class="op-icon">📲</span><span class="op-lbl">Transferencia</span>
          </div>
        </div>
        ${c.noEntregado ? `<input class="motivo-input" placeholder="Motivo (opcional)"
          value="${c.motivo}" oninput="cierres['${p.id}'].motivo=this.value">` : ''}
        ${!c.noEntregado && c.usaEf ? `
          <div class="monto-row">
            <span class="monto-lbl">💵 Efectivo</span>
            <input class="monto-input" id="ef-${p.id}" type="number" min="0"
              value="${c.ef}" oninput="cierres['${p.id}'].ef=this.value;actualizarResumen()">
          </div>` : ''}
        ${!c.noEntregado && c.usaTr ? `
          <div class="monto-row">
            <span class="monto-lbl">📲 Transferencia</span>
            <input class="monto-input" id="tr-${p.id}" type="number" min="0"
              value="${c.tr}" oninput="cierres['${p.id}'].tr=this.value;actualizarResumen()">
          </div>` : ''}
        ${!c.noEntregado && c.usaCc ? `
          <div class="monto-row">
            <span class="monto-lbl">📒 En cuenta</span>
            <input class="monto-input" id="cc-${p.id}" type="number" min="0"
              value="${c.cc}" oninput="cierres['${p.id}'].cc=this.value;actualizarResumen()">
          </div>` : ''}
        ${!c.noEntregado && (c.usaEf||c.usaTr||c.usaCc) ? `
          ${p.saldoAnt > 0 ? renderImputacion(p, pg) : ''}
          <div class="saldo-row ${restante<=0?'ok':'warn'}">
            <span>Cobrado ${ars(pg)} / ${ars(tac)}</span>
            ${restante > 0 ? `<b>Resta ${ars(restante)}</b>` : `<b>✓ Total</b>`}
          </div>` : ''}
      </div>`
    el.appendChild(card)
  })

  const resBox = document.createElement('div')
  resBox.className = 'resumen-cierre'; resBox.id = 'resumen-cierre'
  el.appendChild(resBox)
  actualizarResumen()

  const puede = pedidos.length > 0 && pedidos.filter(p => procesado(p.id)).length === pedidos.length
  const bar = document.createElement('div')
  bar.className = 'bar'
  bar.innerHTML = `<button class="bar-btn" ${puede && puedeAdminCierre ? '' : 'disabled'} onclick="confirmarCierre()">
    ${!puedeAdminCierre ? _motivoBloqueo : puede ? 'Confirmar cierre' : 'Faltan ' + (pedidos.length - pedidos.filter(p=>procesado(p.id)).length) + ' pedidos'}
  </button>`
  el.appendChild(bar)
}

function renderImputacion(p, cobrado) {
  if (!cobrado || cobrado <= 0) return ''
  const contra_saldo  = Math.min(cobrado, p.saldoAnt)
  const contra_pedido = Math.max(0, cobrado - p.saldoAnt)
  const lineas = []
  if (contra_saldo > 0)   lineas.push(`<span class="ok-line">✓ Cancela saldo anterior: ${ars(contra_saldo)}</span>`)
  if (contra_pedido > 0)  lineas.push(`<span class="ok-line">✓ Abona pedido actual: ${ars(contra_pedido)}</span>`)
  if (cobrado < p.saldoAnt) lineas.push(`<span class="warn-line">⚠ Saldo anterior restante: ${ars(p.saldoAnt - cobrado)}</span>`)
  return `<div class="imput-wrap">${lineas.join('<br>')}</div>`
}

function actualizarResumen() {
  const box = document.getElementById('resumen-cierre'); if (!box) return
  let ef=0, tr=0, cc=0, ne=0
  pedidos.forEach(p => {
    const c = cierres[p.id]
    if (c.noEntregado) { ne += totalACobrar(p); return }
    ef += parseFloat(c.ef) || 0
    tr += parseFloat(c.tr) || 0
    cc += parseFloat(c.cc) || 0
  })
  box.innerHTML = `
    <div class="rc-title">Recaudación del día</div>
    <div class="rc-row"><span class="k">💵 Efectivo</span><span class="v">${ars(ef)}</span></div>
    <div class="rc-row"><span class="k">📲 Transferencias</span><span class="v">${ars(tr)}</span></div>
    <div class="rc-row"><span class="k">📒 Quedó en cuenta</span><span class="v">${ars(cc)}</span></div>
    ${ne ? `<div class="rc-row"><span class="k" style="color:var(--red-tx)">❌ No entregado</span>
      <span class="v" style="color:var(--red-tx)">${ars(ne)}</span></div>` : ''}
    <div class="rc-row total"><span class="k">Total recaudado</span><span class="v">${ars(ef+tr)}</span></div>`
}

// ── ACCIONES ───────────────────────────────────────────────────────────
function toggleNoEnt(id) {
  const c = cierres[id]
  c.noEntregado = !c.noEntregado
  if (c.noEntregado) { c.usaEf=false; c.ef=''; c.usaTr=false; c.tr=''; c.usaCc=false; c.cc='' }
  render()
}
function activarEf(id) {
  const c = cierres[id]; const p = pedidos.find(x => x.id === id)
  c.noEntregado = false
  if (c.usaEf) { c.usaEf=false; c.ef=''; render(); return }
  c.usaEf = true
  c.ef = Math.max(0, totalACobrar(p) - (parseFloat(c.tr)||0) - (parseFloat(c.cc)||0)).toString()
  render(); setTimeout(() => document.getElementById(`ef-${id}`)?.select(), 80)
}
function activarTr(id) {
  const c = cierres[id]; const p = pedidos.find(x => x.id === id)
  c.noEntregado = false
  if (c.usaTr) { c.usaTr=false; c.tr=''; render(); return }
  c.usaTr = true
  c.tr = Math.max(0, totalACobrar(p) - (parseFloat(c.ef)||0) - (parseFloat(c.cc)||0)).toString()
  render(); setTimeout(() => document.getElementById(`tr-${id}`)?.select(), 80)
}
function toggleCc(id) {
  const c = cierres[id]; const p = pedidos.find(x => x.id === id)
  c.noEntregado = false
  if (c.usaCc) { c.usaCc=false; c.cc=''; render(); return }
  c.usaCc = true
  c.cc = Math.max(0, totalACobrar(p) - (parseFloat(c.ef)||0) - (parseFloat(c.tr)||0)).toString()
  render(); setTimeout(() => document.getElementById(`cc-${id}`)?.select(), 80)
}

async function confirmarCierre() {
  const btn = document.querySelector('.bar .bar-btn')
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando…' }

  try {
    // Actualizar cada pedido con cobros/entrega
    for (const p of pedidos) {
      const c = cierres[p.id]
      await supabase.from('pedidos').update({
        entregado:          !c.noEntregado,
        motivo_no_entrega:  c.motivo || null,
        monto_efectivo:     parseFloat(c.ef)  || 0,
        monto_transf:       parseFloat(c.tr)  || 0,
        monto_cuenta:       parseFloat(c.cc)  || 0,
      }).eq('id', p.id)
    }
    // Cerrar hoja — genera mov_cuenta
    const { error } = await supabase.rpc('cerrar_hoja_ruta', { p_hoja_id: hojaId })
    if (error) throw error
    confirmado = true; render()
  } catch(e) {
    mostrarError('Error al cerrar: ' + e.message)
    if (btn) { btn.disabled = false; btn.textContent = 'Confirmar cierre' }
  }
}

// ── DONE ───────────────────────────────────────────────────────────────
function renderDone(el) {
  let ef=0, tr=0, cc=0
  const noEnt = pedidos.filter(p => cierres[p.id]?.noEntregado).length
  pedidos.forEach(p => {
    const c = cierres[p.id]; if (!c || c.noEntregado) return
    ef += parseFloat(c.ef)||0; tr += parseFloat(c.tr)||0; cc += parseFloat(c.cc)||0
  })
  el.innerHTML = `
    <div class="hdr">
      <div class="brand"><span class="crown">&#9818;</span>
        <div>El Rey<small>Hoja de ruta</small></div>
      </div>
    </div>
    <div class="done">
      <div class="check">&#10003;</div>
      <h2>Ruta cerrada</h2>
      <p>${HOY.split('-').reverse().join('/')} · ${pedidos.length - noEnt} entregados</p>
      <div class="rules">
        <div>&#10003;&nbsp; <b>Efectivo</b> ${ars(ef)}</div>
        <div>&#10003;&nbsp; <b>Transferencias</b> ${ars(tr)}</div>
        <div>&#10003;&nbsp; <b>Cuenta corriente</b> ${ars(cc)}</div>
        <div>&#10003;&nbsp; <b>Saldos anteriores imputados</b> automáticamente</div>
        ${noEnt ? `<div style="color:var(--amber-tx)">⚠&nbsp; <b>${noEnt} pedido${noEnt>1?'s':''} no entregado${noEnt>1?'s':''}</b></div>` : ''}
      </div>
      <button class="ghost" onclick="location.href='./login_home.html'">Volver al inicio</button>
    </div>`
}

// ── HELPERS GLOBALES ──────────────────────────────────────────────────
function setTab(t) { tab = t; render() }
function imprimirHoja() { window.print() }

function abrirModalBoletas() {
  if (!pedidos.length) { alert('No hay pedidos en la hoja.'); return }
  const ov = document.createElement('div')
  ov.id = 'modal-boletas-ov'
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;'
    + 'display:flex;align-items:center;justify-content:center;padding:18px'
  ov.innerHTML = `
    <div style="background:var(--paper);border-radius:16px;max-width:420px;width:100%;
      max-height:85vh;display:flex;flex-direction:column;overflow:hidden">
      <div style="padding:14px 18px;border-bottom:1px solid var(--line);
        display:flex;justify-content:space-between;align-items:center">
        <strong style="font-size:16px">Imprimir boletas</strong>
        <button onclick="cerrarModalBoletas()" style="background:none;border:none;
          font-size:22px;cursor:pointer;color:var(--ink-soft);font-family:inherit">×</button>
      </div>
      <div style="padding:8px 18px;border-bottom:1px solid var(--line-soft);
        display:flex;gap:12px;font-size:13px">
        <a onclick="window._togBoletas(true)" style="color:var(--gold);cursor:pointer;font-weight:600">Todas</a>
        <a onclick="window._togBoletas(false)" style="color:var(--ink-soft);cursor:pointer;font-weight:600">Ninguna</a>
      </div>
      <div id="modal-boletas-list" style="overflow-y:auto;flex:1;padding:6px 0"></div>
      <div style="padding:14px 18px;border-top:1px solid var(--line);display:flex;gap:10px">
        <button onclick="cerrarModalBoletas()" style="flex:1;padding:12px;border:1px solid var(--line);
          border-radius:12px;background:var(--card);font-size:15px;font-weight:600;
          cursor:pointer;font-family:inherit;color:var(--ink)">Cancelar</button>
        <button onclick="confirmarImprBoletas()" style="flex:1;padding:12px;border:none;
          border-radius:12px;background:var(--gold);color:#fff;font-size:15px;font-weight:600;
          cursor:pointer;font-family:inherit">🖨 Imprimir</button>
      </div>
    </div>`
  document.body.appendChild(ov)
  const list = ov.querySelector('#modal-boletas-list')
  list.innerHTML = pedidos.map(p => `
    <label style="display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;
      border-bottom:1px solid var(--line-soft)">
      <input type="checkbox" data-pid="${p.id}" checked
        style="width:18px;height:18px;accent-color:var(--gold)">
      <div style="flex:1">
        <div style="font-size:14px;font-weight:600">${p.cliente}</div>
        <div style="font-size:12px;color:var(--ink-soft)">${p.num} · ${p.dir || ''}</div>
      </div>
      <div style="font-size:13px;font-weight:700;color:var(--gold)">${ars(p.totalPedido)}</div>
    </label>
  `).join('')
}

function cerrarModalBoletas() {
  document.getElementById('modal-boletas-ov')?.remove()
}

window._togBoletas = (val) => {
  document.querySelectorAll('#modal-boletas-list input[type=checkbox]')
    .forEach(c => c.checked = val)
}

function confirmarImprBoletas() {
  const ids = [...document.querySelectorAll('#modal-boletas-list input[type=checkbox]:checked')]
    .map(c => c.dataset.pid)
  if (!ids.length) { alert('Marcá al menos una boleta.'); return }
  cerrarModalBoletas()
  window.open('./boletas_lote.html?ids=' + ids.join(','), '_blank')
}

Object.assign(window, {
  render, setTab, imprimirHoja, confirmarCierre,
  toggleNoEnt, activarEf, activarTr, toggleCc, actualizarResumen,
  abrirModalBoletas, cerrarModalBoletas, confirmarImprBoletas
})

// ── INIT ──────────────────────────────────────────────────────────────
document.getElementById('root').innerHTML =
  `<div style="text-align:center;padding:60px 20px;color:var(--ink-soft)">Cargando hoja de ruta…</div>`
try {
  await cargarTodo()
  render()
} catch(e) {
  mostrarError('Error al cargar: ' + e.message)
}
</script>
</body>
</html>
