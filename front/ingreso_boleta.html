<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="./src/logger.js"></script>
<title>El Rey · Nuevo ingreso</title>
<style>
  :root{
    --paper:#FBF9F2; --ink:#1C2B27; --ink-soft:#5B665F;
    --line:#E4DECF; --line-soft:#EEEADD;
    --gold:#A9760E; --gold-dk:#8A5F09;
    --green-bg:#E7F0E8; --green-tx:#2C6B3F;
    --amber-bg:#FDF2DC; --amber-tx:#8A5F09;
    --red-bg:#F6E5E2; --red-tx:#A8392B;
    --card:#FFFFFF; --ai-bg:#F4EEFB; --ai-tx:#5E3A98;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{overscroll-behavior-y:contain;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px;line-height:1.4}
  body{max-width:480px;margin:0 auto;padding-bottom:160px}

  .hdr{display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:1px solid var(--line);background:var(--paper);
    position:sticky;top:0;z-index:20}
  .back{display:flex;align-items:center;gap:6px;background:none;border:none;
    font-size:16px;font-weight:600;color:var(--gold);cursor:pointer;padding:0}
  .back svg{width:20px;height:20px}
  .hdr-title{font-size:17px;font-weight:600;flex:1;text-align:center}
  .hdr-right{min-width:60px}

  section{padding:18px}
  .lbl{font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
    color:var(--ink-soft);margin-bottom:8px}
  .lbl-sub{text-transform:none;font-weight:500;color:var(--ink-soft);letter-spacing:0}
  .field{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:12px;
    background:var(--card);font-size:16px;font-family:inherit;color:var(--ink);appearance:none}
  .field:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:transparent}
  select.field{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' fill='none' stroke='%235B665F' stroke-width='2'><path d='M5 8l5 5 5-5'/></svg>");
    background-repeat:no-repeat;background-position:right 14px center;padding-right:42px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .divider{height:1px;background:var(--line-soft);margin:0 18px}

  .ai-btn{display:flex;align-items:center;gap:10px;width:100%;
    padding:13px 14px;border:1px dashed var(--ai-tx);background:var(--ai-bg);
    color:var(--ai-tx);border-radius:12px;font-size:15px;font-weight:600;
    font-family:inherit;cursor:pointer;margin-bottom:14px}
  .ai-btn svg{width:18px;height:18px;flex-shrink:0}
  .ai-btn:active{filter:brightness(.95)}

  .item{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:13px 14px;margin-bottom:10px}
  .item .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .item .nm{font-size:15px;font-weight:600;flex:1}
  .item .lt{font-size:15px;font-weight:700;white-space:nowrap}
  .item .x{border:none;background:none;color:var(--ink-soft);font-size:20px;
    line-height:1;padding:0 0 0 6px;cursor:pointer}
  .ctrls{display:flex;align-items:center;gap:10px;margin-top:11px;flex-wrap:wrap}
  .stepper{display:flex;align-items:center;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .stepper button{width:34px;height:34px;border:none;background:var(--card);font-size:18px;
    color:var(--gold);cursor:pointer}
  .stepper button:active{background:var(--line-soft)}
  .stepper .qty{min-width:30px;text-align:center;font-weight:600;font-size:15px}
  .bulto-mult{display:flex;align-items:center;gap:4px;font-size:13px;color:var(--ink-soft);font-weight:500}
  .bulto-mult input{width:42px;padding:6px 6px;border:1px solid var(--line);border-radius:8px;
    text-align:center;font-family:inherit;font-size:14px;color:var(--ink)}
  .mini{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--ink-soft)}
  .mini input{width:78px;padding:7px 8px;border:1px solid var(--line);border-radius:8px;
    text-align:right;font-family:inherit;font-size:14px;color:var(--ink)}
  .item-meta{margin-top:8px;font-size:13px;color:var(--ink-soft);display:flex;
    justify-content:space-between;gap:10px;flex-wrap:wrap}
  .item-meta .units{font-weight:600;color:var(--ink)}
  .item-meta .final{color:var(--ai-tx);font-weight:500}
  .add-prod{width:100%;padding:13px;border:1px solid var(--line);border-radius:12px;
    background:var(--card);font-size:15px;font-weight:600;color:var(--gold);cursor:pointer;
    font-family:inherit}
  .add-prod:active{background:var(--line-soft)}
  .empty-items{text-align:center;color:var(--ink-soft);font-size:14px;
    padding:24px 10px;border:1px dashed var(--line);border-radius:12px;margin-bottom:10px}

  /* IA — cargar desde foto */
  .ia-btn{width:100%;padding:13px;border:1px dashed var(--ai-tx);background:var(--ai-bg);
    color:var(--ai-tx);border-radius:12px;font-size:15px;font-weight:600;
    font-family:inherit;cursor:pointer;margin-bottom:10px;display:flex;
    align-items:center;justify-content:center;gap:8px}
  .ia-btn:active{filter:brightness(.95)}
  .ia-btn:disabled{opacity:.6;cursor:wait}
  .ia-pend-box{background:var(--amber-bg);border:1px solid var(--amber-tx);
    border-radius:12px;padding:12px;margin-bottom:10px}
  .ia-pend-title{font-size:13px;font-weight:700;color:var(--amber-tx);margin-bottom:8px}
  .ia-pend-row{background:#fff;border:1px solid var(--line);border-radius:10px;
    padding:10px;margin-bottom:8px}
  .ia-pend-row:last-child{margin-bottom:0}
  .ia-pend-orig{font-size:13px;font-weight:600;color:var(--ink)}
  .ia-pend-meta{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .ia-search-wrap{position:relative;margin-top:8px}
  .ia-search{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;
    font-size:14px;font-family:inherit}
  .ia-results{margin-top:4px;border:1px solid var(--line);border-radius:8px;
    max-height:160px;overflow-y:auto;background:#fff}
  .ia-results .r{padding:8px 10px;font-size:13px;cursor:pointer;
    border-bottom:1px solid var(--line-soft)}
  .ia-results .r:last-child{border-bottom:none}
  .ia-results .r:active{background:var(--line-soft)}
  .ia-results .r.sel{background:var(--green-bg);color:var(--green-tx);font-weight:600}
  .ia-pend-edit{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
  .ia-pend-edit input{padding:7px 8px;border:1px solid var(--line);border-radius:7px;
    font-family:inherit;font-size:13px;width:100%}
  .ia-pend-edit label{font-size:10px;color:var(--ink-soft);font-weight:600;
    text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:2px}
  .ia-pend-btns{display:flex;gap:6px;margin-top:8px}
  .ia-pend-btns button{flex:1;padding:8px;border-radius:8px;font-size:13px;
    font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--line);background:#fff}
  .ia-pend-btns .ok{background:var(--gold);color:#fff;border-color:var(--gold)}
  .ia-pend-btns .ok:disabled{background:var(--line);color:var(--ink-soft);cursor:not-allowed;border-color:var(--line)}

  /* REVISIÓN DE PRECIOS */
  .rev-overlay{position:fixed;inset:0;background:var(--paper);z-index:60;overflow-y:auto;
    max-width:480px;margin:0 auto;padding-bottom:120px}
  .rev-hdr{display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:1px solid var(--line);background:var(--paper);
    position:sticky;top:0;z-index:5}
  .rev-hdr h2{font-size:17px;font-weight:700}
  .rev-hdr button{background:none;border:none;font-size:22px;color:var(--ink-soft);cursor:pointer;font-family:inherit}
  .rev-sec-title{padding:14px 18px 6px;font-size:13px;font-weight:700;
    letter-spacing:.04em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
  .rev-sec-title.rojo{color:var(--red-tx)}
  .rev-sec-title.amarillo{color:var(--amber-tx)}
  .rev-sec-title.sug{color:var(--ink-soft)}
  .rev-list{padding:0 18px}
  .rev-row{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:12px;margin-bottom:10px}
  .rev-row.rojo{border-color:var(--red-tx);background:#FFF6F4}
  .rev-row.amarillo{border-color:var(--amber-tx);background:#FFFBF1}
  .rev-row .nm{font-size:14px;font-weight:700;margin-bottom:2px}
  .rev-row .cat{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em}
  .rev-row .costos{display:flex;gap:14px;margin-top:8px;font-size:13px}
  .rev-row .costos .lbl{font-size:10px;color:var(--ink-soft);text-transform:uppercase;
    letter-spacing:.05em;display:block;margin-bottom:1px}
  .rev-row .costos .val{font-weight:700}
  .rev-row .costos .delta{font-size:11px;font-weight:600}
  .rev-row .costos .delta.up{color:var(--red-tx)}
  .rev-row .costos .delta.down{color:var(--green-tx)}
  .rev-precio-box{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;
    align-items:end}
  .rev-precio-box label{font-size:10px;color:var(--ink-soft);text-transform:uppercase;
    letter-spacing:.05em;display:block;margin-bottom:3px}
  .rev-precio-box .actual{font-size:14px;font-weight:600;padding:9px 11px;
    border:1px dashed var(--line);border-radius:9px;background:var(--line-soft)}
  .rev-precio-box input{width:100%;padding:9px 11px;border:1px solid var(--line);
    border-radius:9px;font-family:inherit;font-size:14px;font-weight:600;color:var(--ink)}
  .rev-precio-box input:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:transparent}
  .rev-margenes{display:flex;justify-content:space-between;margin-top:8px;font-size:12px}
  .rev-margenes .lbl{color:var(--ink-soft)}
  .rev-margenes .val{font-weight:700}
  .rev-margenes .val.rojo{color:var(--red-tx)}
  .rev-margenes .val.amarillo{color:var(--amber-tx)}
  .rev-margenes .val.ok{color:var(--green-tx)}
  .rev-sug-btn{margin-top:8px;display:flex;gap:6px}
  .rev-sug-btn button{flex:1;padding:8px;border:1px solid var(--line);border-radius:8px;
    background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--ink)}
  .rev-sug-btn .aplicar{background:var(--gold-lt);border-color:var(--gold);color:var(--gold-dk)}
  .rev-bar{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;
    padding:12px 18px 18px;border-top:1px solid var(--line);background:var(--paper);z-index:8}
  .rev-bar-row{display:flex;gap:10px}
  .rev-bar-row button{flex:1;padding:13px;border-radius:13px;font-size:15px;font-weight:600;
    cursor:pointer;font-family:inherit;border:1px solid var(--line);background:#fff;color:var(--ink)}
  .rev-bar-row .confirm{background:var(--gold);color:#fff;border-color:var(--gold)}
  .rev-bar-row .confirm:disabled{background:var(--line);color:var(--ink-soft);border-color:var(--line);cursor:not-allowed}
  .rev-aplicar-todos{width:100%;padding:10px;border-radius:10px;font-size:13px;font-weight:600;
    cursor:pointer;font-family:inherit;border:1px solid var(--gold);color:var(--gold-dk);
    background:var(--gold-lt);margin-bottom:10px}

  /* CARGOS */
  .cargos{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .cargo-row{display:flex;align-items:center;gap:12px;padding:11px 14px;
    border-bottom:1px solid var(--line-soft)}
  .cargo-row:last-child{border-bottom:none}
  .cb{position:relative;flex-shrink:0}
  .cb input{appearance:none;width:22px;height:22px;border:2px solid var(--line);
    border-radius:6px;cursor:pointer;margin:0;background:#fff}
  .cb input:checked{background:var(--gold);border-color:var(--gold)}
  .cb input:checked::after{content:'✓';position:absolute;inset:0;color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;pointer-events:none}
  .cargo-nm{flex:1;font-size:14px;color:var(--ink-soft);font-weight:500}
  .cargo-row.on .cargo-nm{color:var(--ink);font-weight:600}
  .pct-input{display:flex;align-items:center;gap:3px;font-size:13px;color:var(--ink-soft)}
  .pct-input input{width:56px;padding:6px 8px;border:1px solid var(--line);border-radius:8px;
    text-align:right;font-family:inherit;font-size:14px;color:var(--ink)}
  .cargo-monto{font-size:13px;font-weight:600;color:var(--ink-soft);
    min-width:78px;text-align:right}

  /* RESUMEN */
  .resume{margin:0 18px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:14px 16px;margin-bottom:18px}
  .resume .line{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0}
  .resume .line .k{font-size:14px;color:var(--ink-soft)}
  .resume .line .v{font-size:15px;font-weight:600}
  .resume .line.total{padding-top:10px;margin-top:6px;border-top:1px solid var(--line-soft)}
  .resume .line.total .k{font-size:14px;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.05em}
  .resume .line.total .v{font-size:18px;font-weight:700}
  .resume .total-input{display:flex;justify-content:space-between;align-items:center;
    margin-top:14px;padding-top:14px;border-top:1px solid var(--line-soft)}
  .resume .total-input label{font-size:14px;font-weight:600}
  .resume .total-input input{width:140px;padding:11px 12px;border:1px solid var(--line);
    border-radius:10px;font-size:17px;font-weight:700;text-align:right;
    font-family:inherit;color:var(--ink)}
  .resume .total-input input:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:transparent}

  .verify{margin:0 18px 18px;padding:14px;border-radius:12px;display:flex;
    align-items:center;gap:10px;font-size:14px;font-weight:600}
  .verify.ok{background:var(--green-bg);color:var(--green-tx)}
  .verify.bad{background:var(--red-bg);color:var(--red-tx)}
  .verify.idle{background:var(--line-soft);color:var(--ink-soft)}
  .verify svg{width:18px;height:18px;flex-shrink:0}

  .bar{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;
    background:var(--paper);border-top:1px solid var(--line);padding:12px 18px 18px;z-index:20}
  .bar-btn{width:100%;padding:15px;border:none;border-radius:14px;background:var(--gold);
    color:#fff;font-size:17px;font-weight:600;cursor:pointer;font-family:inherit}
  .bar-btn:active{background:var(--gold-dk)}
  .bar-btn:disabled{background:var(--line);color:var(--ink-soft);cursor:not-allowed}

  .overlay{position:fixed;inset:0;background:rgba(28,43,39,.4);z-index:30;
    display:flex;align-items:flex-end;max-width:480px;margin:0 auto}
  .panel{background:var(--paper);border-radius:22px 22px 0 0;
    padding:22px 20px 30px;width:100%;max-height:80vh;overflow-y:auto}
  .panel h3{font-size:18px;font-weight:700;margin-bottom:14px}
  .panel .fl{display:block;font-size:12px;font-weight:600;letter-spacing:.07em;
    text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px;margin-top:14px}
  .panel .fl:first-of-type{margin-top:0}
  .sel-prod-info{background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;margin-top:8px;font-size:13px;color:var(--ink-soft)}
  .sel-prod-info b{color:var(--ink);font-weight:600}
  .results{margin-top:6px;border:1px solid var(--line);border-radius:12px;
    overflow:hidden;background:var(--card);max-height:200px;overflow-y:auto}
  .results .r{padding:12px 14px;border-bottom:1px solid var(--line-soft);cursor:pointer;font-size:15px;
    display:flex;justify-content:space-between;align-items:center;gap:10px}
  .results .r:last-child{border-bottom:none}
  .results .r:active{background:var(--line-soft)}
  .results .r.sel{background:var(--green-bg);color:var(--green-tx);font-weight:600}
  .results .r .ub{font-size:12px;color:var(--ink-soft);font-weight:500}
  .panel-btns{display:flex;gap:10px;margin-top:18px}
  .panel-btns .bar-btn{flex:2}
  .panel-btns .cancel{flex:1;padding:14px;border:1px solid var(--line);border-radius:14px;
    background:var(--card);font-size:16px;font-weight:600;cursor:pointer;color:var(--ink);font-family:inherit}

  .done{text-align:center;padding:50px 24px}
  .done .check{width:64px;height:64px;border-radius:50%;background:var(--green-bg);
    color:var(--green-tx);font-size:34px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
  .done h2{font-size:20px;font-weight:600;margin-bottom:6px}
  .done p{color:var(--ink-soft);font-size:15px;margin-bottom:4px}
  .done .rules{background:var(--card);border:1px solid var(--line);border-radius:14px;
    text-align:left;padding:14px 16px;margin:22px 0;font-size:14px}
  .done .rules div{display:flex;gap:9px;padding:4px 0;color:var(--green-tx)}
  .done .rules b{color:var(--ink);font-weight:600}
  .ghost{width:100%;padding:14px;border:1px solid var(--line);border-radius:14px;
    background:var(--card);font-size:16px;font-weight:600;color:var(--ink);cursor:pointer;font-family:inherit}

  @media(prefers-reduced-motion:no-preference){
    .item,.panel{animation:fd .15s ease}
    @keyframes fd{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  }
</style>

<body>
<div id="root"></div>

<script type="module">
import { supabase } from './src/supabase.js'
import { requireSession } from './src/auth.js'
import { ars, mostrarError } from './src/utils.js?v=2'

const { usuario } = await requireSession()
if (usuario.rol === 'preventista') {
  alert('Solo depósito y admin pueden registrar ingresos.')
  location.replace('./login_home.html')
}

// ── DATOS ─────────────────────────────────────────────────────────────
let proveedoresList = []  // [{id, nombre, cargos_default:[]}]
let productos = []        // [{id, nombre, u_bulto, costo, precio, categoria, markup_objetivo_pct, proveedor_id}]
let markupCategorias = {} // { 'Tinturas': 27.5, ... }
let markupDefault = 33
let markupMinimo = 20

async function cargarDatos() {
  const [
    { data: provs, error: e1 },
    { data: prods, error: e2 },
    { data: cats, error: e3 },
    { data: emp,  error: e4 },
  ] = await Promise.all([
    supabase.from('proveedores').select('id, nombre, cargos_default')
      .eq('empresa_id', usuario.empresa_id).eq('activo', true).order('nombre'),
    supabase.from('productos').select('id, nombre, u_bulto, costo, precio, categoria, markup_objetivo_pct, proveedor_id')
      .eq('empresa_id', usuario.empresa_id).eq('activo', true).order('nombre'),
    supabase.from('categorias_markup').select('categoria, markup_pct')
      .eq('empresa_id', usuario.empresa_id),
    supabase.from('empresas').select('markup_default_pct, markup_minimo_pct')
      .eq('id', usuario.empresa_id).single(),
  ])
  if (e1) throw e1; if (e2) throw e2; if (e3) throw e3; if (e4) throw e4
  proveedoresList = (provs || []).map(p => ({
    ...p, cargos_default: Array.isArray(p.cargos_default) ? p.cargos_default : []
  }))
  productos = (prods || []).map(p => ({
    ...p,
    u_bulto: p.u_bulto || 1,
    costo: Number(p.costo) || 0,
    precio: Number(p.precio) || 0,
    markup_objetivo_pct: p.markup_objetivo_pct != null ? Number(p.markup_objetivo_pct) : null,
  }))
  markupCategorias = {}
  for (const c of (cats || [])) markupCategorias[c.categoria] = Number(c.markup_pct)
  markupDefault = Number(emp?.markup_default_pct) || 33
  markupMinimo  = Number(emp?.markup_minimo_pct)  || 20
  if (proveedoresList.length) {
    proveedorId = proveedoresList[0].id
    aplicarCargosDefault()
    await cargarAliases()
  }
}

// Normalización del alias_text para que pequeñas variaciones del OCR/IA
// no rompan el match (mayúsculas, acentos, espacios múltiples, puntuación).
function normAlias(s) {
  return String(s || '')
    .toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')  // saca acentos
    .replace(/[.,;:()\[\]{}'"`´]/g, ' ')               // puntuación → espacio
    .replace(/\s+/g, ' ')                              // espacios múltiples
    .trim()
}

async function cargarAliases() {
  if (!proveedorId) { iaAliases = []; return }
  const { data, error } = await supabase
    .from('alias_productos')
    .select('id, alias_text, producto_id, factor_conversion')
    .eq('empresa_id', usuario.empresa_id)

}

const provActual = () => proveedoresList.find(p => p.id === proveedorId)
const prod = id => productos.find(p => p.id === id)
const cantTotal = it => it.bultos * it.uPorBulto
const subNeto = it => cantTotal(it) * it.costo
const subtotalNeto = () => items.reduce((s,it) => s + subNeto(it), 0)
const totalCargosPct = () => cargos.filter(c => c.on).reduce((s,c) => s + c.pct, 0)
const multiplicador = () => 1 + totalCargosPct() / 100
const totalCalculado = () => subtotalNeto() * multiplicador()

function diff() {
  const dec = parseFloat(totalDeclarado)
  if (!dec || isNaN(dec)) return null
  return dec - totalCalculado()
}

function aplicarCargosDefault() {
  const prov = provActual()
  const def = prov?.cargos_default || []
  cargos.forEach(c => c.on = def.includes(c.nombre))

// ── MARKUP / SUGERENCIA DE PRECIOS ────────────────────────────────────
function markupPara(producto) {
  if (producto.markup_objetivo_pct != null) return Number(producto.markup_objetivo_pct)
  if (producto.categoria && markupCategorias[producto.categoria] != null)
    return Number(markupCategorias[producto.categoria])
  return markupDefault
}

function redondearPrecio50_90(p) {
  // Grilla unificada 50/00 (el nombre quedó por legacy)
  if (p == null || p <= 0) return 0
  const base = Math.ceil(p)
  const ult2 = base % 100
  const cien = base - ult2
  if (ult2 === 0)  return base
  if (ult2 <= 50)  return cien + 50
  return cien + 100
}

function calcMargen(precio, costo) {
  if (!costo || costo <= 0) return 0
  return (precio - costo) / costo * 100
}

function construirRevisionPrecios() {
  const mult = multiplicador()
  const out = []
  for (const it of items) {
    const p = prod(it.prodId); if (!p) continue
    const costoNuevo = Math.round(it.costo * mult)
    if (costoNuevo === Math.round(Number(p.costo))) continue  // sin cambio
    const markup = markupPara(p)
    const precioCrudo = costoNuevo * (1 + markup / 100)
    const precioSugerido = redondearPrecio50_90(precioCrudo)
    const margenActual = calcMargen(p.precio, costoNuevo)
    const margenSugerido = calcMargen(precioSugerido, costoNuevo)
    let nivel = 'sug'
    if (margenActual < markupMinimo) nivel = 'rojo'
    else if (margenActual < 25)      nivel = 'amarillo'
    out.push({
      prodId: it.prodId,
      nombre: p.nombre,
      categoria: p.categoria || '—',
      costoViejo: Number(p.costo) || 0,
      costoNuevo,
      precioActual: Number(p.precio) || 0,
      precioSugerido,
      precioNuevo: String(p.precio || ''),   // input editable; arranca en el actual
      markupUsado: markup,
      margenActual,
      margenSugerido,
      nivel,
    })
  }
  // Ordenar: rojos primero, amarillos, sugerencias
  out.sort((a, b) => {
    const ord = { rojo: 0, amarillo: 1, sug: 2 }
    return (ord[a.nivel] - ord[b.nivel])
  })
  return out
}

function renderRevision() {

  const bloqueado = rojos.some(r => {
    const n = parseFloat(r.precioNuevo) || 0

  })

    <div class="rev-list">${lista.map(r => renderRevRow(r, revisionItems.indexOf(r))).join('')}</div>`
  ov.innerHTML = `
    <div class="rev-hdr">
      <h2>Revisión de precios</h2>
      <button onclick="window.cerrarRevision()" title="Volver">×</button>
    </div>

function renderRevRow(r, i) {
  const delta = r.costoNuevo - r.costoViejo
  const deltaPct = r.costoViejo > 0 ? (delta / r.costoViejo * 100) : 0
  const margenNuevo = calcMargen(parseFloat(r.precioNuevo) || 0, r.costoNuevo)
  const claseM = margenNuevo < markupMinimo ? 'rojo' : margenNuevo < 25 ? 'amarillo' : 'ok'
  return `<div class="rev-row ${r.nivel}">
    <div class="nm">${r.nombre}</div>
    <div class="cat">${r.categoria}</div>
    <div class="costos">
      <div>
        <span class="lbl">Costo</span>
        <span class="val">$${r.costoViejo.toLocaleString('es-AR')} → $${r.costoNuevo.toLocaleString('es-AR')}</span>
        <span class="delta ${delta >= 0 ? 'up' : 'down'}">${delta >= 0 ? '+' : ''}${deltaPct.toFixed(1)}%</span>
      </div>
    </div>
    <div class="rev-precio-box">
      <div>
        <label>Precio actual</label>
        <div class="actual">$${r.precioActual.toLocaleString('es-AR')}</div>
      </div>
      <div>
        <label>Precio nuevo</label>
        <input type="number" min="0" value="${r.precioNuevo}"
          onchange="window.setPrecioRev(${i}, this.value)" onfocus="this.select()">
      </div>
    </div>
    <div class="rev-margenes">
      <span><span class="lbl">Margen actual: </span><span class="val ${calcMargen(r.precioActual,r.costoNuevo) < markupMinimo ? 'rojo' : 'ok'}">${calcMargen(r.precioActual, r.costoNuevo).toFixed(1)}%</span></span>
      <span><span class="lbl">Margen nuevo: </span><span class="val ${claseM}">${margenNuevo.toFixed(1)}%</span></span>
    </div>
    <div class="rev-sug-btn">
      <button onclick="window.usarSugerencia(${i})" class="aplicar">
        Sugerido: $${r.precioSugerido.toLocaleString('es-AR')} (${r.margenSugerido.toFixed(1)}%)
      </button>
    </div>
  </div>`
}

// ── CONFIRMAR → SUPABASE ──────────────────────────────────────────────
async function confirmar() {
  if (!items.length) return
  // Paso 1: si hay productos con cambio de costo, abrir revisión de precios
  if (!revisionAbierta) {
    const rev = construirRevisionPrecios()
    if (rev.length) {
      revisionItems = rev
      revisionAbierta = true
      render()
      return
    }
  }
  // Si no hay cambios o ya pasamos la revisión, confirmar directo
  await confirmarFinal()
}

async function confirmarFinal() {
  const btn = document.getElementById('bar-fixed')?.querySelector('button')
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando…' }

  const mult = multiplicador()
  const totCalc = totalCalculado()
  const totDecl = parseFloat(totalDeclarado) || totCalc
  const cargosAplicados = cargos.filter(c => c.on).map(c => ({ nombre: c.nombre, pct: c.pct }))

  try {
    // 1. Crear ingreso
    const { data: ingreso, error: e1 } = await supabase
      .from('ingresos')
      .insert({
        empresa_id: usuario.empresa_id,
        proveedor_id: proveedorId,
        usuario_id: usuario.id,
        numero_boleta: numBoleta || null,
        fecha,
        cargos_aplicados: cargosAplicados,
        total_declarado: totDecl,
        total_calculado: totCalc
      })
      .select('id').single()
    if (e1) throw e1

    // 2. Insertar items
    const { error: e2 } = await supabase.from('ingreso_items').insert(
      items.map(it => ({
        empresa_id: usuario.empresa_id,
        ingreso_id: ingreso.id,
        producto_id: it.prodId,
        bultos: it.bultos,
        u_por_bulto: it.uPorBulto,
        cantidad: cantTotal(it),
        costo_unit_neto: it.costo,
        costo_unit_final: Math.round(it.costo * mult)
      }))
    )
    if (e2) throw e2

    // 3. Confirmar (actualiza costos + genera mov_stock)
    const { error: e3 } = await supabase.rpc('confirmar_ingreso', { p_ingreso_id: ingreso.id })
    if (e3) throw e3

    // 4. Aplicar los precios nuevos aceptados en la revisión.
    //    (Se hace después del RPC: el RPC pisa productos.costo con el costo final;
    //    el precio lo manejamos solo nosotros.)
    if (revisionItems.length) {
      const updates = revisionItems
        .filter(r => {
          const nuevo = Math.round(parseFloat(r.precioNuevo) || 0)
          return nuevo > 0 && nuevo !== Math.round(r.precioActual)
        })
        .map(r => supabase.from('productos')
          .update({ precio: Math.round(parseFloat(r.precioNuevo) || 0) })
          .eq('id', r.prodId))
      if (updates.length) await Promise.all(updates)
    }

    // 5. Si veniamos de una orden de compra, marcarla como recibida.
    if (typeof ordenIdSrc !== 'undefined' && ordenIdSrc) {
      try {
        await supabase.from('ordenes_compra').update({
          estado: 'recibida',
          fecha_recibida: new Date().toISOString(),
          ingreso_id: ingreso.id,
        }).eq('id', ordenIdSrc)
        // Marcar items como recibidos completos (cantidad_recibida = cantidad)
        const { data: oItems } = await supabase.from('orden_compra_items')
          .select('id, cantidad').eq('orden_id', ordenIdSrc)
        if (oItems?.length) {
          await Promise.all(oItems.map(oi =>
            supabase.from('orden_compra_items')
              .update({ cantidad_recibida: oi.cantidad })
              .eq('id', oi.id)))
        }
      } catch (eOrd) { console.warn('No se pudo marcar orden recibida:', eOrd) }
    }

    resumenDone = {
      provNombre: provActual()?.nombre || '',
      totalUnidades: items.reduce((s, it) => s + cantTotal(it), 0),
      itemsCount: items.length,
      total: totCalc,
      cargosOn: [...cargosAplicados],
      checksumOk: Math.abs(totDecl - totCalc) < 1
    }
    confirmado = true
    render()
  } catch (e) {
    mostrarError('Error al confirmar: ' + e.message)
    if (btn) { btn.disabled = false; btn.textContent = 'Confirmar ingreso' }
  }
}

function renderDone() {
  const r = resumenDone
  document.getElementById('root').innerHTML = `
    <div class="hdr">
      <div class="hdr-right"></div>
      <span class="hdr-title">Ingreso registrado</span>
      <div class="hdr-right"></div>
    </div>
    <div class="done">
      <div class="check">&#10003;</div>
      <h2>Ingreso confirmado</h2>
      <p>${r.provNombre}${numBoleta ? ` · Boleta N° ${numBoleta}` : ''}</p>
      <p>${r.itemsCount} ${r.itemsCount===1?'ítem':'ítems'} · ${r.totalUnidades} unidades · ${ars(r.total)}</p>
      <div class="rules">
        <div>&#10003;&nbsp; <b>Stock actualizado</b> (+${r.totalUnidades} unidades)</div>
        ${r.cargosOn.length ? `<div>&#10003;&nbsp; <b>Cargos:</b> ${r.cargosOn.map(c=>c.nombre).join(', ')}</div>` : ''}
        ${r.checksumOk ? `<div>&#10003;&nbsp; <b>Total coincide</b> con la boleta</div>` : ''}
      </div>
      <button class="ghost" onclick="reset()">Cargar otro ingreso</button>
    </div>`
  const bar = document.getElementById('bar-fixed')
  if (bar) bar.remove()
}

async function reset() {
  numBoleta = ''; items = []; totalDeclarado = ''; confirmado = false
  fecha = new Intl.DateTimeFormat('en-CA', { timeZone: 'America/Argentina/Cordoba' }).format(new Date())
  iaPendientes = []
  revisionAbierta = false
  revisionItems = []
  await cargarDatos()
  render()
}

// ── IA: cargar desde foto ─────────────────────────────────────────────

async function iaCargarFotos(fileList) {
  if (!proveedorId) { alert('Elegí primero el proveedor.'); return }
  const files = Array.from(fileList || [])
  if (!files.length) return
  if (files.length > 8) { alert('Máximo 8 fotos por boleta.'); return }
  document.getElementById('ia-file').value = ''

  iaProcesando = true
  render()
  try {
    // Subir cada archivo a Storage; en paralelo construir base64 de respaldo
    const imagenes = []
    for (const f of files) {
      const ext = (f.name.split('.').pop() || 'jpg').toLowerCase()
      const path = `${usuario.empresa_id}/${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`
      const up = await supabase.storage.from('ingresos_fotos').upload(path, f, { upsert: false })
      if (up.error) throw up.error
      // signed URL para que la Edge Function la baje
      const { data: signed, error: eS } = await supabase.storage
        .from('ingresos_fotos').createSignedUrl(path, 600)
      if (eS) throw eS
      imagenes.push(signed.signedUrl)
    }

    // Llamar a la Edge Function
    const { data, error } = await supabase.functions.invoke('extraer-ingreso', {
      body: { imagenes }
    })
    if (error) {
      // Cuando la función devuelve no-2xx, supabase-js mete el body en error.context
      let detalle = error.message || 'Error desconocido'
      try {
        const ctx = error.context
        if (ctx && typeof ctx.json === 'function') {
          const body = await ctx.json()
          if (body?.error) detalle = body.error
        } else if (ctx && typeof ctx.text === 'function') {
          detalle = await ctx.text()
        }
      } catch {}
      throw new Error(detalle)
    }
    if (data?.error) throw new Error(data.error)
    const detectados = data?.items || []
    if (!detectados.length) {
      alert('La IA no detectó productos en la(s) foto(s). Probá con otra foto o cargá manual.')
      iaProcesando = false; render(); return
    }

    procesarDetectados(detectados)
  } catch (e) {
    alert('Error procesando: ' + (e.message || e))
  } finally {
    iaProcesando = false
    render()
  }
}

// Matchea los items detectados contra alias_productos, agrega los que matchean
// directo a `items` y deja en `iaPendientes` los que el usuario tiene que asignar.
function procesarDetectados(detectados) {
  const sinMatch = []
  for (const d of detectados) {
    const target = normAlias(d.texto_original || '')
    const a = iaAliases.find(x => normAlias(x.alias_text) === target)
    if (a) {
      const p = prod(a.producto_id)
      if (!p) { sinMatch.push(d); continue }
      const factor = Number(a.factor_conversion) || 1
      const costoUnit = d.costo_unit != null
        ? Number(d.costo_unit) / factor
        : (d.costo_total_linea && d.cantidad ? (Number(d.costo_total_linea) / Number(d.cantidad)) / factor : 0)
      const cantInterna = Number(d.cantidad) * factor
      items.push({
        prodId: a.producto_id,
        bultos: p.u_bulto > 1 ? Math.max(1, Math.round(cantInterna / p.u_bulto)) : Math.max(1, Math.round(cantInterna)),
        uPorBulto: p.u_bulto > 1 ? p.u_bulto : 1,
        costo: Math.round(costoUnit)
      })
    } else {
      sinMatch.push(d)
    }
  }
  iaPendientes = sinMatch.map(d => ({
    ...d,
    selProdId: '',
    selBusq: '',
    cantReal: String(d.cantidad ?? ''),
    costoReal: String(
      d.costo_unit != null ? d.costo_unit
      : (d.costo_total_linea && d.cantidad ? Math.round(Number(d.costo_total_linea)/Number(d.cantidad)) : '')
    ),
  }))
}

// ── IA: cargar desde texto plano (Haiku) ──────────────────────────────
async function iaCargarTexto() {
  if (!proveedorId) { alert('Elegí primero el proveedor.'); return }
  const texto = (iaTexto || '').trim()
  if (!texto) { alert('Pegá la lista de productos en el cuadro de texto.'); return }

  iaProcesando = true
  render()
  try {
    const { data, error } = await supabase.functions.invoke('extraer-ingreso', {
      body: { texto }
    })
    if (error) {
      let detalle = error.message || 'Error desconocido'
      try {
        const ctx = error.context
        if (ctx && typeof ctx.json === 'function') {
          const body = await ctx.json()
          if (body?.error) detalle = body.error
        } else if (ctx && typeof ctx.text === 'function') {
          detalle = await ctx.text()
        }
      } catch {}
      throw new Error(detalle)
    }
    if (data?.error) throw new Error(data.error)
    const detectados = data?.items || []
    if (!detectados.length) {
      alert('La IA no detectó productos en el texto.')
      iaProcesando = false; render(); return
    }
    procesarDetectados(detectados)
    iaTexto = ''  // limpiar para no procesar dos veces
  } catch (e) {
    alert('Error procesando: ' + (e.message || e))
  } finally {
    iaProcesando = false
    render()
  }
}

function renderPendientes() {
  const box = document.getElementById('ia-pend-box')
  if (!box) return
  if (!iaPendientes.length) { box.innerHTML = ''; return }
  box.innerHTML = `<div class="ia-pend-box">
    <div class="ia-pend-title">📌 ${iaPendientes.length} ítem(s) sin producto asignado</div>
    ${iaPendientes.map((p,i) => {
      const sel = p.selProdId ? prod(p.selProdId) : null
      return `<div class="ia-pend-row">
        <div class="ia-pend-orig">📄 ${p.texto_original}</div>
        <div class="ia-pend-meta">Cant: ${p.cantidad ?? '?'} · Costo unit: ${p.costo_unit ?? '?'} · Total: ${p.costo_total_linea ?? '?'}</div>
        <div class="ia-search-wrap">
          <input class="ia-search" placeholder="Buscar tu producto…" value="${p.selBusq}"
            oninput="window.iaSetBusq(${i}, this.value)" autocomplete="off">
          <div id="ia-results-${i}" class="ia-results-container"></div>
        </div>
        ${sel ? `<div class="ia-pend-meta" style="margin-top:6px">✓ ${sel.nombre}${sel.u_bulto>1?` (${sel.u_bulto} u/bulto)`:''}</div>` : ''}
        <div class="ia-pend-edit">
          <div>
            <label>Cantidad real</label>
            <input type="number" min="1" value="${p.cantReal}" onchange="window.iaSetCantReal(${i}, this.value)">
          </div>
          <div>
            <label>Costo unit. real</label>
            <input type="number" min="0" value="${p.costoReal}" onchange="window.iaSetCostoReal(${i}, this.value)">
          </div>
        </div>
        <div class="ia-pend-btns">
          <button onclick="window.iaDescartar(${i})">Descartar</button>
          <button class="ok" ${sel ? '' : 'disabled'} onclick="window.iaConfirmar(${i})">Aceptar y recordar</button>
        </div>
      </div>`
    }).join('')}
  </div>`
  iaPendientes.forEach((_, i) => renderIaResults(i))
}

function renderIaResults(i) {
  const cont = document.getElementById(`ia-results-${i}`)
  if (!cont) return
  const p = iaPendientes[i]; if (!p) return
  const q = p.selBusq.trim().toLowerCase()
  const matches = q.length > 1
    ? productos.filter(x => x.nombre.toLowerCase().includes(q)).slice(0,5)
    : []
  cont.innerHTML = matches.length ? `<div class="ia-results">
    ${matches.map(m => `<div class="r ${p.selProdId===m.id?'sel':''}" onclick="window.iaSelProd(${i}, '${m.id}')">${m.nombre}</div>`).join('')}
  </div>` : ''
}

async function iaConfirmar(i) {
  const p = iaPendientes[i]; if (!p || !p.selProdId) return
  const prodInt = prod(p.selProdId); if (!prodInt) return
  const cantProv = Number(p.cantidad) || 0
  const cantReal = Number(p.cantReal) || cantProv
  const factor = cantProv > 0 ? cantReal / cantProv : 1
  const costoUnit = Number(p.costoReal) || 0

  // Agregar al items
  items.push({
    prodId: p.selProdId,
    bultos: prodInt.u_bulto > 1 ? Math.max(1, Math.round(cantReal / prodInt.u_bulto)) : Math.max(1, cantReal),
    uPorBulto: prodInt.u_bulto > 1 ? prodInt.u_bulto : 1,
    costo: Math.round(costoUnit)
  })

  // Guardar alias para la próxima vez (normalizado fuerte)
  const aliasNorm = normAlias(p.texto_original || '')
  const { error } = await supabase.from('alias_productos').upsert({
    empresa_id: usuario.empresa_id,
    proveedor_id: proveedorId,
    alias_text: aliasNorm,
    producto_id: p.selProdId,
    factor_conversion: factor,
    updated_at: new Date().toISOString(),
  }, { onConflict: 'empresa_id,proveedor_id,alias_text' })
  if (error) {
    console.warn('alias upsert:', error.message)
    alert('No se pudo guardar el alias para futuras boletas: ' + error.message)
  }
  await cargarAliases()

  iaPendientes.splice(i, 1)
  render()
}

// Funciones setter para primitivos usados en oninput inline
window.setNumBoleta      = v => { numBoleta = v }
window.setFecha          = v => { fecha = v }
window.setTotalDeclarado = v => { totalDeclarado = v; renderVerify() }

window.setPanelBultos    = v => { panelProd.bultos = v }

window.setPanelUb        = v => { panelProd.uPorBulto = v }
window.setCargoPct       = (i, v) => { cargos[i].pct = parseFloat(v) || 0; render() }
window.setCargoOn        = (i, v) => { cargos[i].on = v; render() }

Object.assign(window, {
  render, setProveedor, abrirPanel, cerrarPanel,
  confirmarPanelItem, rerenderPanel, selProd, confirmar, reset, quitar,
  setBultos, setUporBulto, setCosto, cargos, panelProd,

})

window.iaSetBusq = (i, v) => { iaPendientes[i].selBusq = v; renderIaResults(i) }
window.iaSelProd = (i, id) => {
  iaPendientes[i].selProdId = id
  const p = prod(id)
  if (p && !iaPendientes[i].costoReal && p.costo) iaPendientes[i].costoReal = String(p.costo)
  renderPendientes()
}
window.iaSetCantReal  = (i, v) => { iaPendientes[i].cantReal = v }
window.iaSetCostoReal = (i, v) => { iaPendientes[i].costoReal = v }
window.iaDescartar    = (i) => { iaPendientes.splice(i,1); renderPendientes() }

// Revisión de precios
window.setPrecioRev = (i, v) => {
  revisionItems[i].precioNuevo = v
  renderRevision()
}
window.usarSugerencia = (i) => {
  revisionItems[i].precioNuevo = String(revisionItems[i].precioSugerido)
  renderRevision()
}
window.aplicarTodasSugerencias = () => {
  for (const r of revisionItems) {
    if (r.nivel === 'sug') r.precioNuevo = String(r.precioSugerido)
  }
  renderRevision()
}
window.cerrarRevision = () => {
  revisionAbierta = false
  revisionItems = []
  document.getElementById('rev-ov')?.remove()
  render()
}
window.confirmarRevision = async () => {
  document.getElementById('rev-ov')?.remove()
  await confirmarFinal()
}

// ── INIT ──────────────────────────────────────────────────────────────
// Si viene ?orden_id=... pre-armamos el ingreso desde la orden de compra.
let ordenIdSrc = null
async function prefillDesdeOrden(ordenId) {
  const [{ data: orden }, { data: oItems }] = await Promise.all([
    supabase.from('ordenes_compra').select('id, proveedor_id, fecha_enviada, total_estimado, estado').eq('id', ordenId).single(),
    supabase.from('orden_compra_items').select('producto_id, cantidad, costo_unit_estimado').eq('orden_id', ordenId),
  ])
  if (!orden) return false
  if (orden.estado === 'recibida' || orden.estado === 'cancelada') {
    alert('Esta orden ya fue ' + orden.estado + '.')
    return false
  }
  if (orden.proveedor_id) proveedorId = orden.proveedor_id
  aplicarCargosDefault()
  await cargarAliases()
  for (const oi of (oItems || [])) {
    const p = prod(oi.producto_id)
    if (!p) continue
    items.push({
      prodId: oi.producto_id,
      bultos: oi.cantidad,
      uPorBulto: 1,
      costo: Number(oi.costo_unit_estimado) || Number(p.costo) || 0,
    })
  }
  ordenIdSrc = ordenId
  return true
}

document.getElementById('root').innerHTML =
  `<div style="text-align:center;padding:60px 20px;color:var(--ink-soft)">Cargando…</div>`
try {
  await cargarDatos()
  const params = new URLSearchParams(location.search)
  const ordenId = params.get('orden_id')
  if (ordenId) await prefillDesdeOrden(ordenId)
  render()
} catch(e) {
  mostrarError('Error al cargar datos: ' + e.message)
}
