<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="./src/logger.js"></script>
<title>El Rey · Comisiones</title>
<style>
  :root{
    --paper:#FBF9F2; --ink:#1C2B27; --ink-soft:#5B665F;
    --line:#E4DECF;  --line-soft:#EEEADD;
    --gold:#A9760E;  --gold-dk:#8A5F09; --gold-lt:#F5E9D0;
    --green-bg:#E7F0E8; --green-tx:#2C6B3F;
    --amber-bg:#FDF2DC; --amber-tx:#8A5F09;
    --red-bg:#F6E5E2;   --red-tx:#A8392B;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{overscroll-behavior-y:contain;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px;line-height:1.4}
  body{max-width:480px;margin:0 auto;padding-bottom:60px}

  .hdr{display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:1px solid var(--line);background:var(--paper);
    position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:8px;font-weight:600}
  .crown{color:var(--gold);font-size:20px}
  .brand small{display:block;font-size:11px;font-weight:500;color:var(--ink-soft);
    letter-spacing:.06em;text-transform:uppercase}
  .back{background:none;border:none;font-size:13px;color:var(--gold);font-weight:600;cursor:pointer;font-family:inherit}

  .help{font-size:12px;color:var(--ink-soft);padding:14px 18px;line-height:1.5}
  .list{padding:6px 18px}
  .usr-card{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;margin-bottom:10px}
  .usr-top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
  .usr-nm{font-size:15px;font-weight:700}
  .usr-rol{font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;background:var(--line-soft);color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em}

  .row{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:end}
  .fl{display:block;font-size:11px;font-weight:600;letter-spacing:.05em;
    text-transform:uppercase;color:var(--ink-soft);margin-bottom:4px}
  .field{width:100%;padding:10px;border:1px solid var(--line);border-radius:9px;
    background:#fff;font-size:14px;font-family:inherit;color:var(--ink);appearance:none}
  .field:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:transparent}

  .resumen-chip{font-size:12px;color:var(--ink-soft);margin-top:8px;font-weight:500}

  .save-btn{width:100%;padding:11px;margin-top:10px;background:var(--gold);color:#fff;border:none;
    border-radius:9px;font-weight:600;cursor:pointer;font-family:inherit;font-size:14px}
  .save-btn:active{background:var(--gold-dk)}
  .save-btn:disabled{opacity:.5;cursor:default}
  .saved{color:var(--green-tx);font-size:12px;font-weight:600;margin-top:6px;text-align:center;display:none}
  .saved.show{display:block}

  .empty{text-align:center;padding:40px 18px;color:var(--ink-soft);font-size:14px}
  .loading{text-align:center;padding:48px 18px;color:var(--ink-soft);font-size:15px}
  .err-box{margin:18px;padding:14px;background:var(--red-bg);border:1px solid var(--red-tx);
    border-radius:12px;color:var(--red-tx);font-size:14px}
</style>
</head>
<body>
<div id="root"><div class="loading">Cargando…</div></div>

<script type="module">
import { supabase } from './src/supabase.js'
import { requireSession } from './src/auth.js'
import { ars } from './src/utils.js?v=2'

const { usuario } = await requireSession()
if (usuario.rol !== 'admin') { location.href = './login_home.html'; throw new Error('sin permiso') }

let usuarios = []

async function cargar() {
  const { data, error } = await supabase
    .from('usuarios')
    .select('id, nombre, rol, activo, comision_tipo, comision_valor')
    .eq('empresa_id', usuario.empresa_id)
    .eq('activo', true)
    .order('nombre')
  if (error) {
    document.getElementById('root').innerHTML = `<div class="err-box">Error: ${error.message}</div>`
    return
  }
  usuarios = (data || []).map(u => ({
    ...u,
    comision_tipo: u.comision_tipo || 'ninguno',
    comision_valor: Number(u.comision_valor) || 0,
    _dirty: false,
    _saving: false,
  }))
  render()
}

function render() {
  const el = document.getElementById('root')
  el.innerHTML = `
    <div class="hdr">
      <div class="brand"><span class="crown">&#9818;</span>
        <div>El Rey<small>Comisiones</small></div>
      </div>
      <button class="back" onclick="location.href='./login_home.html'">Inicio ›</button>
    </div>
    <div class="help">
      Configurá cómo se calcula la comisión de cada usuario. Las comisiones se
      descuentan automáticamente en el cálculo de ganancia neta del reporte de
      ventas y se muestran en "Mis números" de cada uno.
    </div>
    <div class="list">
      ${!usuarios.length ? `<div class="empty">Sin usuarios.</div>` :
        usuarios.map((u, i) => renderCard(u, i)).join('')}
    </div>`
}

function renderCard(u, i) {
  const resumen = u.comision_tipo === 'ninguno' ? 'No cobra comisión'
    : u.comision_tipo === 'porcentaje' ? `${u.comision_valor}% sobre sus ventas`
    : `${ars(u.comision_valor)} fijo por mes (prorrateado por días)`
  return `<div class="usr-card">
    <div class="usr-top">
      <div class="usr-nm">${u.nombre}</div>
      <span class="usr-rol">${u.rol}</span>
    </div>
    <div class="row">
      <div>
        <label class="fl">Tipo</label>
        <select class="field" onchange="window._setTipo(${i}, this.value)">
          <option value="ninguno"    ${u.comision_tipo==='ninguno'?'selected':''}>Ninguno</option>
          <option value="porcentaje" ${u.comision_tipo==='porcentaje'?'selected':''}>% sobre ventas</option>
          <option value="fijo"       ${u.comision_tipo==='fijo'?'selected':''}>Fijo mensual</option>
        </select>
      </div>
      <div>
        <label class="fl">${u.comision_tipo === 'porcentaje' ? 'Porcentaje (%)' : u.comision_tipo === 'fijo' ? 'Monto mensual ($)' : 'Valor'}</label>
        <input class="field" type="number" min="0" step="0.01"
          value="${u.comision_valor}"
          ${u.comision_tipo === 'ninguno' ? 'disabled' : ''}
          oninput="window._setValor(${i}, this.value)">
      </div>
    </div>
    <div class="resumen-chip">→ ${resumen}</div>
    <button class="save-btn" ${(!u._dirty || u._saving) ? 'disabled' : ''} onclick="window._guardar(${i})">
      ${u._saving ? 'Guardando…' : (u._dirty ? 'Guardar' : 'Sin cambios')}
    </button>
    <div class="saved ${u._saved ? 'show' : ''}" id="saved-${i}">✓ Guardado</div>
  </div>`
}

window._setTipo = (i, v) => {
  usuarios[i].comision_tipo = v
  if (v === 'ninguno') usuarios[i].comision_valor = 0
  usuarios[i]._dirty = true
  usuarios[i]._saved = false
  render()
}
window._setValor = (i, v) => {
  usuarios[i].comision_valor = Math.max(0, parseFloat(v) || 0)
  usuarios[i]._dirty = true
  usuarios[i]._saved = false
  // no re-render para preservar foco
  const btn = document.querySelectorAll('.save-btn')[i]
  if (btn) { btn.disabled = false; btn.textContent = 'Guardar' }
}
window._guardar = async (i) => {
  const u = usuarios[i]
  u._saving = true; render()
  const { error } = await supabase.from('usuarios')
    .update({ comision_tipo: u.comision_tipo, comision_valor: u.comision_valor })
    .eq('id', u.id)
  u._saving = false
  if (error) { alert('Error: ' + error.message); render(); return }
  u._dirty = false; u._saved = true; render()
  setTimeout(() => { u._saved = false; render() }, 2000)
}

await cargar()
</script>
</body>
</html>
