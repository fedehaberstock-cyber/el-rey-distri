<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="./src/logger.js"></script>
<title>El Rey · Mis números</title>
<link rel="stylesheet" href="./src/theme.css">
<style>
  /* específicos de esta pantalla */
  body{ max-width:520px; padding-bottom:30px; font-size:15px }
  .hdr{ justify-content:space-between }
  .back{ background:none; border:none; font-size:13px; color:var(--gold); font-weight:600; cursor:pointer; font-family:inherit }

  .tabs{ position:sticky; top:57px; z-index:19; border-bottom:1px solid var(--line) }
  .tab{ border-bottom-width:2px; margin-bottom:-1px }

  .periodo{ padding:14px 18px; border-bottom:1px solid var(--line-soft);
    display:flex; gap:6px; align-items:center; font-size:13px }
  .periodo button{ padding:6px 12px; border:1px solid var(--line); background:#fff;
    border-radius:999px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit;
    color:var(--ink-soft) }
  .periodo button.active{ background:var(--gold); color:#fff; border-color:var(--gold) }

  section{ padding:14px 18px }
  .kpi-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px }
  .kpi.dst{ background:var(--gold-lt); border-color:var(--gold) }
  .kpi .nro{ font-size:24px; font-weight:700; color:var(--ink); line-height:1.1 }
  .kpi.dst .nro{ color:var(--gold-dk) }
  .kpi .desc{ font-size:12px; color:var(--ink-soft); margin-top:4px;
    text-transform:uppercase; letter-spacing:.04em }

  .sec-title{ font-size:13px; font-weight:700; margin:14px 0 8px; padding:0 }

  .bar-row{ display:flex; align-items:center; gap:10px; padding:8px 0;
    border-bottom:1px solid var(--line-soft); font-size:14px }
  .bar-row:last-child{ border-bottom:none }
  .bar-row .nm{ flex:1; min-width:0; font-weight:600; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis }
  .bar-row .bar-wrap{ flex:2; height:8px; background:var(--line-soft);
    border-radius:4px; overflow:hidden }
  .bar-row .bar-fill{ height:100%; background:var(--gold) }
  .bar-row .val{ flex-shrink:0; font-size:13px; font-weight:600;
    text-align:right; min-width:70px }

  .ranking-row{ display:flex; align-items:center; gap:10px; padding:10px 0;
    border-bottom:1px solid var(--line-soft) }
  .ranking-row .pos{ width:28px; height:28px; border-radius:8px;
    background:var(--gold-lt); color:var(--gold-dk); font-weight:700;
    display:flex; align-items:center; justify-content:center; font-size:14px }
  .ranking-row .nm{ flex:1; font-weight:600 }
  .ranking-row .val{ font-weight:700 }
  .ranking-row.me{ background:var(--gold-lt); margin:0 -8px; padding-left:8px;
    padding-right:8px; border-radius:8px }

  .err{ margin:18px; padding:14px; background:var(--red-bg);
    border:1px solid var(--red-tx); border-radius:12px; color:var(--red-tx) }
</style>
</head>
<body>
<div id="root"><div class="loading">Cargando…</div></div>

<script type="module">
import { supabase } from './src/supabase.js'
import { requireSession, tienePermiso } from './src/auth.js'
import { ars } from './src/utils.js?v=2'

const { usuario } = await requireSession()
if (!tienePermiso('mis_numeros')) { location.href = './login_home.html'; throw new Error('sin permiso') }

// admin puede elegir preventista; el resto solo ve lo suyo
const esAdmin = usuario.rol === 'admin'

let periodo = 'mes'    // 'sem' | 'mes' | 'anio'
let tab = 'kpi'        // 'kpi' | 'cats' | 'ranking'
let usuarioId = usuario.id
let preventistasList = []
let pedidos = []
let pedidosPrev = []
let visitas = []
let visitasPrev = []
let itemsPedidos = []  // pedido_items con join al producto
let rankingMes = []    // [{usuario_id, nombre, total, pedidos}]
let cargando = true

function rangoFechas() {
  const hoy = new Date()
  let desde
  if (periodo === 'dia') {
    desde = new Date(hoy); desde.setHours(0, 0, 0, 0)
  } else if (periodo === 'sem') {
    // Esta semana: sabado a viernes (sabado mas reciente <= hoy)
    desde = new Date(hoy)
    const dow = desde.getDay()
    const diff = (dow - 6 + 7) % 7
    desde.setDate(desde.getDate() - diff)
    desde.setHours(0, 0, 0, 0)
  } else if (periodo === 'mes') {
    desde = new Date(hoy.getFullYear(), hoy.getMonth(), 1)
  } else {
    desde = new Date(hoy.getFullYear(), 0, 1)
  }
  return { desde: desde.toISOString(), hasta: hoy.toISOString() }
}

// Periodo anterior de igual duracion
function rangoFechasPrev() {
  const { desde, hasta } = rangoFechas()
  const d1 = new Date(desde), d2 = new Date(hasta)
  const dur = d2 - d1
  const prevHasta = new Date(d1.getTime() - 1)
  const prevDesde = new Date(prevHasta.getTime() - dur)
  return { desde: prevDesde.toISOString(), hasta: prevHasta.toISOString() }
}

function delta(actual, anterior) {
  if (anterior === 0 && actual === 0) return ''
  if (anterior === 0) return `<span class="delta up">nuevo</span>`
  const pct = (actual - anterior) / Math.abs(anterior) * 100
  const dir = Math.abs(pct) < 0.5 ? 'flat' : (pct > 0 ? 'up' : 'down')
  const sig = pct > 0 ? '+' : ''
  return `<span class="delta ${dir}">${sig}${pct.toFixed(0)}% vs ant.</span>`
}

async function cargar() {
  cargando = true; render()
  const { desde, hasta } = rangoFechas()

  // preventistas (solo admin)
  if (esAdmin && !preventistasList.length) {
    const { data: prevs } = await supabase
      .from('usuarios')
      .select('id, nombre, rol, activo')
      .eq('empresa_id', usuario.empresa_id)
      .eq('activo', true)
      .order('nombre')
    preventistasList = prevs || []
  }

  // pedidos del usuario seleccionado en el rango
  const { data: peds, error: e1 } = await supabase
    .from('pedidos')
    .select(`id, fecha, cliente_id, estado, descuento,
      clientes(nombre),
      pedido_items(cantidad, precio_unit, descuento, es_bulto, productos(nombre, categoria))`)
    .eq('empresa_id', usuario.empresa_id)
    .eq('usuario_id', usuarioId)
    .neq('estado', 'anulado')
    .gte('fecha', desde).lte('fecha', hasta)
  if (e1) { document.getElementById('root').innerHTML = `<div class="err">${e1.message}</div>`; return }
  pedidos = peds || []

  // visitas (preventista solo ve las suyas por RLS)
  const { data: vis, error: e2 } = await supabase
    .from('visitas_clientes')
    .select('id, fecha, resultado, motivo, cliente_id')
    .eq('empresa_id', usuario.empresa_id)
    .eq('usuario_id', usuarioId)
    .gte('fecha', desde.split('T')[0])
    .lte('fecha', hasta.split('T')[0])
  if (e2) console.warn('visitas:', e2.message)
  visitas = vis || []

  // Periodo anterior (para deltas) — solo lo minimo necesario
  const { desde: pDesde, hasta: pHasta } = rangoFechasPrev()
  const [{ data: pedsP }, { data: visP }] = await Promise.all([
    supabase.from('pedidos')
      .select(`id, fecha, cliente_id, descuento,
        pedido_items(cantidad, precio_unit, descuento)`)
      .eq('empresa_id', usuario.empresa_id)
      .eq('usuario_id', usuarioId)
      .neq('estado', 'anulado')
      .gte('fecha', pDesde).lte('fecha', pHasta),
    supabase.from('visitas_clientes')
      .select('cliente_id, resultado')
      .eq('empresa_id', usuario.empresa_id)
      .eq('usuario_id', usuarioId)
      .gte('fecha', pDesde.split('T')[0])
      .lte('fecha', pHasta.split('T')[0]),
  ])
  pedidosPrev = pedsP || []
  visitasPrev = visP || []

  // ranking de preventistas — solo admin lo ve completo;
  // el preventista ve solo "tu posición de N" sin nombres
  if (esAdmin) {
    const { data: rank } = await supabase
      .from('pedidos')
      .select('usuario_id, descuento, pedido_items(cantidad, precio_unit, descuento, productos(categoria))')
      .eq('empresa_id', usuario.empresa_id)
      .neq('estado', 'anulado')
      .gte('fecha', desde).lte('fecha', hasta)
    const map = new Map()
    for (const p of (rank || [])) {
      const descGral = 1 - Number(p.descuento || 0) / 100
      const prev = map.get(p.usuario_id) || { total: 0, pedidos: 0, cats: {} }
      let totalPedido = 0
      for (const it of (p.pedido_items || [])) {
        const monto = Number(it.cantidad) * Number(it.precio_unit) * (1 - Number(it.descuento||0)/100) * descGral
        totalPedido += monto
        const cat = it.productos?.categoria || 'Sin categoría'
        prev.cats[cat] = (prev.cats[cat] || 0) + monto
      }
      prev.total += totalPedido
      prev.pedidos += 1
      map.set(p.usuario_id, prev)
    }
    rankingMes = [...map.entries()].map(([uid, v]) => ({
      usuario_id: uid,
      nombre: preventistasList.find(u => u.id === uid)?.nombre || '?',
      ...v,
    })).sort((a,b) => b.total - a.total)
  }

  cargando = false; render()
}

function calcularKPIs(peds = pedidos, vis = visitas) {
  const totalMonto = peds.reduce((s, p) => {
    const sub = (p.pedido_items || []).reduce((ss, it) =>
      ss + Number(it.cantidad) * Number(it.precio_unit) * (1 - Number(it.descuento||0)/100), 0)
    return s + sub * (1 - Number(p.descuento||0)/100)
  }, 0)
  const cantPedidos = peds.length
  const ticketProm = cantPedidos ? totalMonto / cantPedidos : 0
  const comisionEstim = totalMonto * 0.05

  const clientesConPedido = new Set(peds.map(p => p.cliente_id).filter(Boolean))
  const clientesSinPedido = new Set(
    vis
      .filter(v => v.resultado === 'sin_pedido' && !clientesConPedido.has(v.cliente_id))
      .map(v => v.cliente_id)
  )
  const cantPedidosUnicos      = clientesConPedido.size
  const cantVisitasSinPedido   = clientesSinPedido.size
  const totalIntentos          = cantPedidosUnicos + cantVisitasSinPedido
  const conversion = totalIntentos ? (cantPedidosUnicos / totalIntentos * 100) : null

  return { totalMonto, cantPedidos, ticketProm, comisionEstim, cantVisitasSinPedido, conversion }
}

// Lista de descuentos aplicados manualmente (excluye descuentos automáticos de bulto).
// Un descuento general del pedido cuenta como una sola entrada.
// Un descuento por item solo cuenta si NO es bulto (los de bulto son automáticos del producto).
function descuentosAplicados() {
  const out = []
  for (const p of pedidos) {
    const cliente = p.clientes?.nombre || 'Sin cliente'
    const fecha = (p.fecha || '').slice(0, 10)
    const subPedido = (p.pedido_items || []).reduce((s, it) =>
      s + Number(it.cantidad) * Number(it.precio_unit) * (1 - Number(it.descuento||0)/100), 0)

    if (Number(p.descuento) > 0) {
      const pct = Number(p.descuento)
      const monto = subPedido * (pct / 100)
      out.push({
        pedido_id: p.id, fecha, cliente,
        tipo: 'general', producto: '— Descuento general del pedido —',
        pct, monto,
      })
    }
    for (const it of (p.pedido_items || [])) {
      if (it.es_bulto) continue                       // descuentos de bulto son automáticos
      const pct = Number(it.descuento || 0)
      if (pct <= 0) continue
      const bruto = Number(it.cantidad) * Number(it.precio_unit)
      const monto = bruto * (pct / 100)
      out.push({
        pedido_id: p.id, fecha, cliente,
        tipo: 'item', producto: it.productos?.nombre || '?',
        pct, monto,
      })
    }
  }
  return out.sort((a, b) => b.fecha.localeCompare(a.fecha) || b.monto - a.monto)
}

function topCategorias() {
  const map = new Map()
  for (const p of pedidos) {
    for (const it of (p.pedido_items || [])) {
      const cat = it.productos?.categoria || 'Sin categoría'
      const monto = Number(it.cantidad) * Number(it.precio_unit) * (1 - Number(it.descuento||0)/100)
      map.set(cat, (map.get(cat) || 0) + monto)
    }
  }
  return [...map.entries()]
    .map(([cat, total]) => ({ cat, total }))
    .sort((a,b) => b.total - a.total)
}

function render() {
  const el = document.getElementById('root')
  if (cargando) { el.innerHTML = `<div class="loading">Cargando…</div>`; return }

  el.innerHTML = `
    <div class="hdr">
      <div class="brand"><span class="crown">&#9818;</span>
        <div>El Rey<small>Mis números</small></div>
      </div>
      <button class="back" onclick="location.href='./login_home.html'">Inicio ›</button>
    </div>
    ${esAdmin && preventistasList.length ? `
      <div style="padding:10px 18px;border-bottom:1px solid var(--line-soft);background:var(--line-soft)">
        <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin-bottom:6px">Ver datos de</div>
        <select style="width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:14px"
          onchange="window._setUsr(this.value)">
          ${preventistasList.map(u => `<option value="${u.id}" ${u.id===usuarioId?'selected':''}>${u.nombre} (${u.rol})</option>`).join('')}
        </select>
      </div>` : ''}
    <div class="periodo">
      <span style="color:var(--ink-soft)">Período:</span>
      <button class="${periodo==='dia'?'active':''}" onclick="window._setPer('dia')">Día</button>
      <button class="${periodo==='sem'?'active':''}" onclick="window._setPer('sem')">Semana</button>
      <button class="${periodo==='mes'?'active':''}" onclick="window._setPer('mes')">Mes</button>
      <button class="${periodo==='anio'?'active':''}" onclick="window._setPer('anio')">Año</button>
    </div>
    <div class="tabs">
      <div class="tab ${tab==='kpi'?'active':''}" onclick="window._setTab('kpi')">KPIs</div>
      <div class="tab ${tab==='cats'?'active':''}" onclick="window._setTab('cats')">Categorías</div>
      <div class="tab ${tab==='desc'?'active':''}" onclick="window._setTab('desc')">Descuentos</div>
      ${esAdmin ? `<div class="tab ${tab==='ranking'?'active':''}" onclick="window._setTab('ranking')">Ranking</div>` : ''}
    </div>
    <div id="tab-body"></div>`
  renderBody()
}

function renderBody() {
  const el = document.getElementById('tab-body'); if (!el) return
  if (tab === 'kpi') {
    const k = calcularKPIs()
    const kp = calcularKPIs(pedidosPrev, visitasPrev)
    el.innerHTML = `
      <section>
        <div class="kpi-grid">
          <div class="kpi dst">
            <div class="nro">${ars(k.totalMonto)}</div>
            <div class="desc">Ventas del período</div>
            ${delta(k.totalMonto, kp.totalMonto)}
          </div>
          <div class="kpi dst">
            <div class="nro">${ars(k.comisionEstim)}</div>
            <div class="desc">Comisión estimada (5%)</div>
            ${delta(k.comisionEstim, kp.comisionEstim)}
          </div>
          <div class="kpi">
            <div class="nro">${k.cantPedidos}</div>
            <div class="desc">Pedidos tomados</div>
            ${delta(k.cantPedidos, kp.cantPedidos)}
          </div>
          <div class="kpi">
            <div class="nro">${ars(k.ticketProm)}</div>
            <div class="desc">Ticket promedio</div>
            ${delta(k.ticketProm, kp.ticketProm)}
          </div>
          ${k.conversion !== null ? `<div class="kpi">
            <div class="nro">${k.conversion.toFixed(0)}%</div>
            <div class="desc">% conversión</div>
            ${kp.conversion !== null ? delta(k.conversion, kp.conversion) : ''}
          </div>` : ''}
          ${k.cantVisitasSinPedido ? `<div class="kpi">
            <div class="nro">${k.cantVisitasSinPedido}</div>
            <div class="desc">Visitas sin pedido</div>
            ${delta(k.cantVisitasSinPedido, kp.cantVisitasSinPedido)}
          </div>` : ''}
        </div>
        ${k.conversion === null ? `<div style="background:var(--amber-bg);border:1px solid var(--amber-tx);border-radius:10px;padding:10px;font-size:12px;color:var(--amber-tx)">
          💡 Para ver tu % de conversión, registrá las visitas en las que no tomaste pedido desde la pantalla de tomar pedido (botón "No compró").
        </div>` : ''}
      </section>`
  } else if (tab === 'cats') {
    const cats = topCategorias().slice(0, 10)
    if (!cats.length) { el.innerHTML = `<div class="empty">Sin ventas en el período</div>`; return }
    const max = cats[0].total
    const totalCats = cats.reduce((s, c) => s + c.total, 0)
    el.innerHTML = `<section>
      <div class="sec-title">Top categorías vendidas</div>
      ${cats.map(c => {
        const pct = totalCats ? (c.total / totalCats * 100) : 0
        return `<div class="bar-row">
          <span class="nm">${c.cat}</span>
          <div class="bar-wrap"><div class="bar-fill" style="width:${(c.total/max*100).toFixed(0)}%"></div></div>
          <span class="val">${ars(c.total)} <span style="color:var(--ink-soft);font-weight:600">· ${pct.toFixed(0)}%</span></span>
        </div>`
      }).join('')}
    </section>`
  } else if (tab === 'desc') {
    const lista = descuentosAplicados()
    const totalDesc = lista.reduce((s, d) => s + d.monto, 0)
    const cantDesc = lista.length
    const pctProm = cantDesc ? lista.reduce((s, d) => s + d.pct, 0) / cantDesc : 0
    el.innerHTML = `
      <section>
        <div class="kpi-grid">
          <div class="kpi dst">
            <div class="nro">${ars(totalDesc)}</div>
            <div class="desc">Total descontado</div>
          </div>
          <div class="kpi">
            <div class="nro">${cantDesc}</div>
            <div class="desc">Descuentos aplicados</div>
          </div>
          <div class="kpi">
            <div class="nro">${pctProm.toFixed(1)}%</div>
            <div class="desc">% promedio aplicado</div>
          </div>
        </div>
        <div style="background:var(--amber-bg);border:1px solid var(--amber-tx);border-radius:10px;padding:10px;font-size:12px;color:var(--amber-tx);margin-bottom:14px">
          💡 No se cuentan los descuentos automáticos por bulto.
        </div>
        <div class="sec-title">Detalle</div>
        ${!cantDesc ? `<div class="empty">Sin descuentos manuales en el período.</div>` :
          lista.map(d => `
            <div style="background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px">
              <div style="display:flex;justify-content:space-between;gap:8px">
                <div style="flex:1;min-width:0">
                  <div style="font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.cliente}</div>
                  <div style="font-size:12px;color:var(--ink-soft);margin-top:1px">
                    ${d.fecha.split('-').reverse().join('/')} ·
                    ${d.tipo === 'general' ? '<b>Desc. general</b>' : d.producto}
                  </div>
                </div>
                <div style="text-align:right;flex-shrink:0">
                  <div style="font-weight:700;color:var(--red-tx);font-size:14px">−${ars(d.monto)}</div>
                  <div style="font-size:12px;color:var(--ink-soft)">${d.pct}%</div>
                </div>
              </div>
            </div>`).join('')}
      </section>`
  } else if (tab === 'ranking' && esAdmin) {
    if (!rankingMes.length) { el.innerHTML = `<div class="empty">Sin datos</div>`; return }
    el.innerHTML = `<section>
      <div class="sec-title">Ranking del período</div>
      ${rankingMes.map((r,i) => {
        const cats = Object.entries(r.cats || {}).sort((a,b) => b[1] - a[1])
        const totCats = cats.reduce((s,[,v]) => s + v, 0) || 1
        return `
        <div style="background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:10px;${r.usuario_id===usuarioId?'background:var(--gold-lt);border-color:var(--gold)':''}">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="pos">${i+1}</div>
            <div class="nm" style="flex:1">${r.nombre}</div>
            <div style="font-size:12px;color:var(--ink-soft);margin-right:8px">${r.pedidos} pedidos</div>
            <div class="val">${ars(r.total)}</div>
          </div>
          ${cats.length ? `
            <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--line-soft)">
              <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin-bottom:5px">Mix por categoría</div>
              ${cats.map(([cat, monto]) => {
                const pct = monto / totCats * 100
                return `<div style="display:flex;align-items:center;gap:8px;font-size:12px;padding:2px 0">
                  <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cat}</span>
                  <div style="flex:1;height:5px;background:var(--line-soft);border-radius:999px;overflow:hidden">
                    <div style="height:100%;background:var(--gold);width:${pct.toFixed(0)}%"></div>
                  </div>
                  <span style="font-weight:600;min-width:36px;text-align:right">${pct.toFixed(0)}%</span>
                </div>`
              }).join('')}
            </div>` : ''}
        </div>`
      }).join('')}
    </section>`
  }
}

window._setUsr = v => { usuarioId = v; cargar() }
window._setPer = v => { periodo = v; cargar() }
window._setTab = v => { tab = v; renderBody() }

await cargar()
</script>
</body>
</html>
