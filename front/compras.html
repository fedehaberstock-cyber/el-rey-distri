<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="./src/logger.js"></script>
<title>El Rey · Compras a proveedores</title>
<style>
  :root{
    --paper:#FBF9F2; --ink:#1C2B27; --ink-soft:#5B665F;
    --line:#E4DECF;  --line-soft:#EEEADD;
    --gold:#A9760E;  --gold-dk:#8A5F09; --gold-lt:#F5E9D0;
    --green-bg:#E7F0E8; --green-tx:#2C6B3F;
    --amber-bg:#FDF2DC; --amber-tx:#8A5F09;
    --red-bg:#F6E5E2;  --red-tx:#A8392B;
    --blue-bg:#E8F0FB; --blue-tx:#2A4E9A;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{overscroll-behavior-y:contain;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px;line-height:1.4}
  body{max-width:720px;margin:0 auto;padding-bottom:90px}

  .hdr{display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:1px solid var(--line);background:var(--paper);
    position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:8px;font-weight:600}
  .crown{color:var(--gold);font-size:20px}
  .brand small{display:block;font-size:11px;font-weight:500;color:var(--ink-soft);
    letter-spacing:.06em;text-transform:uppercase}
  .back{background:none;border:none;font-size:13px;color:var(--gold);font-weight:600;cursor:pointer;font-family:inherit}

  .tabs{display:flex;border-bottom:1px solid var(--line);background:var(--paper);
    position:sticky;top:57px;z-index:19}
  .tab{flex:1;padding:11px 6px;text-align:center;font-size:13px;font-weight:600;
    color:var(--ink-soft);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold)}

  section{padding:14px 18px}
  .lbl{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
    color:var(--ink-soft);margin-bottom:6px}
  .help{font-size:12px;color:var(--ink-soft);margin-bottom:12px;line-height:1.5}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 10px}
  .stat .nro{font-size:16px;font-weight:700;color:var(--gold-dk);line-height:1.1}
  .stat .desc{font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
  .stat.amb .nro{color:var(--amber-tx)}
  .stat.red .nro{color:var(--red-tx)}

  .filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .chip{padding:6px 11px;border-radius:999px;font-size:12px;font-weight:600;
    border:1px solid var(--line);background:var(--card);color:var(--ink-soft);
    white-space:nowrap;cursor:pointer}
  .chip.active{background:var(--gold);color:#fff;border-color:var(--gold)}
  .search-input{width:100%;padding:10px 12px 10px 36px;border:1px solid var(--line);
    border-radius:10px;background:var(--card);font-size:14px;font-family:inherit;color:var(--ink);
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' fill='none' stroke='%235B665F' stroke-width='2'><circle cx='6.5' cy='6.5' r='4'/><path d='M11 11l-2.5-2.5'/></svg>");
    background-repeat:no-repeat;background-position:12px center;margin-bottom:10px}

  .prov-card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    margin-bottom:14px;overflow:hidden}
  .prov-hdr{padding:12px 14px;background:var(--line-soft)}
  .prov-hdr .top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
  .prov-hdr .nm{font-size:15px;font-weight:700}
  .prov-hdr .meta{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .prov-hdr .btns{display:flex;gap:6px;flex-wrap:wrap}
  .prov-hdr button{background:var(--gold);color:#fff;border:none;padding:7px 12px;
    border-radius:8px;font-weight:600;cursor:pointer;font-family:inherit;font-size:12px;white-space:nowrap}
  .prov-hdr button:active{background:var(--gold-dk)}
  .prov-hdr .wa{background:#25D366}
  .prov-hdr .alt{background:var(--card);color:var(--ink);border:1px solid var(--line)}

  .item-row{padding:10px 12px;border-bottom:1px solid var(--line-soft);
    display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start}
  .item-row:last-child{border-bottom:none}
  .item-row.excluido{opacity:.45}
  .item-row.excluido .nm{text-decoration:line-through}
  .item-info .nm{font-size:14px;font-weight:600;line-height:1.3}
  .item-info .sub{font-size:11px;color:var(--ink-soft);margin-top:2px;line-height:1.3}
  .item-info .chips-line{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
  .mini-chip{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;white-space:nowrap}
  .mini-chip.urg{background:var(--red-bg);color:var(--red-tx)}
  .mini-chip.baja{background:var(--amber-bg);color:var(--amber-tx)}
  .mini-chip.ok{background:var(--line-soft);color:var(--ink-soft)}
  .mini-chip.mult{background:var(--blue-bg);color:var(--blue-tx)}
  .mini-chip.pend{background:var(--gold-lt);color:var(--gold-dk)}
  .mini-chip.up{background:var(--red-bg);color:var(--red-tx)}
  .mini-chip.down{background:var(--green-bg);color:var(--green-tx)}
  .mini-chip.cheap{background:var(--green-bg);color:var(--green-tx);cursor:pointer}

  .item-cant{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
  .stepper{display:flex;align-items:center;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
  .stepper button{background:var(--paper);border:none;width:26px;height:30px;font-size:16px;font-weight:700;cursor:pointer;color:var(--ink);font-family:inherit}
  .stepper button:active{background:var(--line)}
  .stepper input{width:48px;height:30px;border:none;border-left:1px solid var(--line);border-right:1px solid var(--line);
    text-align:center;font-family:inherit;font-size:13px;font-weight:600;background:#fff;-moz-appearance:textfield}
  .stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .subtotal{font-size:11px;color:var(--ink-soft);font-weight:600}
  .cob{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px}
  .cob.ok{background:var(--green-bg);color:var(--green-tx)}
  .cob.med{background:var(--amber-bg);color:var(--amber-tx)}
  .cob.lo{background:var(--red-bg);color:var(--red-tx)}

  .cb{width:18px;height:18px;accent-color:var(--gold);cursor:pointer;margin-top:2px}

  .add-btn{width:100%;padding:9px;border:1px dashed var(--gold);background:var(--gold-lt);
    color:var(--gold-dk);border-radius:0 0 14px 14px;font-weight:600;cursor:pointer;font-family:inherit;font-size:13px;border-top:1px solid var(--line)}

  .ord-pend-card{background:var(--card);border:1px solid var(--gold);border-radius:12px;
    padding:12px 14px;margin-bottom:10px}
  .ord-pend-card .nm{font-size:14px;font-weight:700}
  .ord-pend-card .meta{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .ord-pend-card .items{font-size:12px;margin-top:6px;color:var(--ink)}
  .ord-pend-card .acciones{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
  .ord-pend-card button{padding:7px 12px;border-radius:8px;font-weight:600;cursor:pointer;font-family:inherit;font-size:12px;border:none}
  .ord-pend-card .recv{background:var(--gold);color:#fff}
  .ord-pend-card .ver{background:var(--card);color:var(--ink);border:1px solid var(--line)}
  .ord-pend-card .cancel{background:var(--red-bg);color:var(--red-tx);border:1px solid var(--red-tx)}

  .sticky-bar{position:fixed;bottom:0;left:0;right:0;max-width:720px;margin:0 auto;
    background:#fff;border-top:1px solid var(--line);padding:11px 16px;
    display:flex;align-items:center;gap:12px;z-index:25;
    box-shadow:0 -4px 12px rgba(0,0,0,.05)}
  .sticky-bar .tot{flex:1}
  .sticky-bar .tot .l{font-size:11px;color:var(--ink-soft);text-transform:uppercase;font-weight:600;letter-spacing:.04em}
  .sticky-bar .tot .v{font-size:18px;font-weight:700;color:var(--gold-dk)}
  .sticky-bar button{padding:11px 16px;background:var(--gold);color:#fff;border:none;
    border-radius:10px;font-weight:600;cursor:pointer;font-family:inherit;font-size:14px}

  .empty{text-align:center;padding:40px 18px;color:var(--ink-soft)}
  .loading{text-align:center;padding:48px 18px;color:var(--ink-soft)}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;
    font-size:13px;font-weight:600;z-index:50}

  /* overlay buscador productos / orden detail */
  .overlay{position:fixed;inset:0;background:rgba(28,43,39,.4);z-index:30;
    display:flex;align-items:flex-end;max-width:720px;margin:0 auto}
  .panel{background:var(--paper);border-radius:22px 22px 0 0;
    padding:22px 18px 26px;width:100%;max-height:85vh;overflow-y:auto}
  .panel h3{font-size:17px;font-weight:700;margin-bottom:14px}
  .search-prod{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:14px;margin-bottom:10px}
  .pres{padding:9px 10px;border-bottom:1px solid var(--line-soft);cursor:pointer;font-size:14px}
  .pres:active{background:var(--line-soft)}
  .pres .pn{font-weight:600}
  .pres .ps{font-size:11px;color:var(--ink-soft);margin-top:1px}
  .cancel-btn{width:100%;padding:13px;border:1px solid var(--line);border-radius:10px;
    background:var(--card);font-weight:600;cursor:pointer;font-family:inherit;margin-top:10px;font-size:14px}

  @media print {
    .no-print, button, input { display:none !important }
    body { max-width:none !important; padding:0 !important }
    .prov-card { page-break-after:always; border:none }
  }
</style>
</head>
<body>
<div id="root"><div class="loading">Cargando…</div></div>

<script type="module">
import { supabase } from './src/supabase.js'
import { requireSession, tienePermiso } from './src/auth.js'
import { ars, imprimirPagina } from './src/utils.js?v=2'

const { usuario } = await requireSession()
if (!tienePermiso('catalogo', 'vista')) { location.href = './login_home.html'; throw new Error('sin permiso') }

const BORRADOR_KEY = `elrey_compras_borrador_v1_${usuario.empresa_id}`
const HORIZONTE_DEFAULT = null  // null = usar dias_objetivo del proveedor

// ── ESTADO ─────────────────────────────────────────────────────────────────
let sugerencias = []          // sugerencia_compra (filtradas activas)
let proveedoresInfo = {}      // id → {nombre, telefono, dias_credito, dias_objetivo}
let productoProveedores = {}  // producto_id → [{proveedor_id, nombre, costo}]
let ordenesAbiertas = []      // ordenes_compra estado=enviada|recibida_parcial + items
let ultimoCostoMap = {}       // `${prod_id}_${prov_id}` → ultimo_costo_anterior
let catalogoProds = []        // para "+ agregar producto" — productos activos
let tab = 'sugeridos'         // 'sugeridos' | 'pendientes' | 'historial'
let vista = 'agrupado'        // 'agrupado' | 'urgentes'
let busqueda = ''
let filtroProv = null  // null = todos, sino proveedor_id
let horizonte = HORIZONTE_DEFAULT  // null | 7 | 14 | 30 | 45
let borrador = cargarBorrador()
let agregadosManual = []      // [{producto_id, proveedor_id, nombre, categoria, costo, unidad_compra}]
let historicoCache = null     // {total, mes, trim, anio, porProveedor: [...]}
let panelProd = null          // {provId, mode:'sug'|'edit'} para buscador de productos
let editingOrden = null       // {id, proveedor_id, proveedor_nombre, items:[...], removedIds:[], buscadorAbierto, busqEdit}
let savingOrden = false
let editandoNotas = null      // producto_id

// ── HELPERS DE BORRADOR ────────────────────────────────────────────────────
function cargarBorrador() {
  try {
    const raw = localStorage.getItem(BORRADOR_KEY)
    if (!raw) return { cantidades: {}, excluidos: {}, reasignados: {}, ts: 0 }
    const b = JSON.parse(raw)
    return { cantidades: b.cantidades || {}, excluidos: b.excluidos || {}, reasignados: b.reasignados || {}, ts: b.ts || 0 }
  } catch { return { cantidades: {}, excluidos: {}, reasignados: {}, ts: 0 } }
}
function guardarBorrador() {
  borrador.ts = Date.now()
  try { localStorage.setItem(BORRADOR_KEY, JSON.stringify(borrador)) } catch {}
}
function limpiarBorrador() {
  borrador = { cantidades: {}, excluidos: {}, reasignados: {}, ts: 0 }
  try { localStorage.removeItem(BORRADOR_KEY) } catch {}
}

// ── CARGA ──────────────────────────────────────────────────────────────────
async function cargar() {
  const [
    { data: sug, error: errSug },
    { data: provs },
    { data: pp },
    { data: ord },
    { data: ordItems },
    { data: cat },
  ] = await Promise.all([
    supabase.from('sugerencia_compra').select('*')
      .eq('empresa_id', usuario.empresa_id)
      .order('proveedor_nombre, dias_restantes'),
    supabase.from('proveedores').select('id, nombre, telefono, dias_credito, dias_objetivo')
      .eq('empresa_id', usuario.empresa_id),
    supabase.from('producto_proveedor')
      .select('producto_id, proveedor_id, costo, proveedores(nombre)')
      .eq('empresa_id', usuario.empresa_id),
    supabase.from('ordenes_compra')
      .select('id, proveedor_id, estado, fecha_enviada, fecha_estimada_llegada, total_estimado, observaciones, proveedores(nombre, dias_credito)')
      .eq('empresa_id', usuario.empresa_id)
      .in('estado', ['enviada','recibida_parcial'])
      .order('fecha_enviada', { ascending: false }),
    supabase.from('orden_compra_items')
      .select('id, orden_id, producto_id, cantidad, cantidad_recibida, costo_unit_estimado, productos(nombre)')
      .eq('empresa_id', usuario.empresa_id),
    supabase.from('productos')
      .select('id, nombre, categoria, costo, proveedor_id, unidad_compra, notas_compra')
      .eq('empresa_id', usuario.empresa_id).eq('activo', true).order('nombre'),
  ])
  if (errSug) {
    document.getElementById('root').innerHTML =
      `<div style="margin:18px;padding:14px;background:var(--red-bg);border:1px solid var(--red-tx);border-radius:12px;color:var(--red-tx)">Error: ${errSug.message}</div>`
    return
  }

  proveedoresInfo = {}
  for (const p of (provs || [])) proveedoresInfo[p.id] = p

  productoProveedores = {}
  for (const x of (pp || [])) {
    (productoProveedores[x.producto_id] ||= []).push({
      proveedor_id: x.proveedor_id, nombre: x.proveedores?.nombre, costo: Number(x.costo),
    })
  }

  catalogoProds = cat || []

  // Reunir ordenes abiertas con sus items
  const itemsPorOrden = {}
  for (const it of (ordItems || [])) {
    (itemsPorOrden[it.orden_id] ||= []).push(it)
  }
  ordenesAbiertas = (ord || []).map(o => ({ ...o, items: itemsPorOrden[o.id] || [] }))

  // Último costo previo por producto+proveedor (para variación)
  // — tomamos el penúltimo costo desde items historicos
  const { data: histItems } = await supabase
    .from('orden_compra_items')
    .select('producto_id, costo_unit_estimado, ordenes_compra!inner(proveedor_id, fecha_enviada, estado)')
    .eq('empresa_id', usuario.empresa_id)
    .neq('ordenes_compra.estado', 'cancelada')
    .order('producto_id')
  const masReciente = {}
  for (const h of (histItems || [])) {
    const provId = h.ordenes_compra?.proveedor_id
    const key = `${h.producto_id}_${provId}`
    const f = h.ordenes_compra?.fecha_enviada
    if (!masReciente[key] || (f && f > masReciente[key].fecha)) {
      masReciente[key] = { fecha: f, costo: Number(h.costo_unit_estimado) }
    }
  }
  ultimoCostoMap = {}
  for (const [k, v] of Object.entries(masReciente)) ultimoCostoMap[k] = v.costo

  sugerencias = (sug || []).map(s => {
    const reasignProvId = borrador.reasignados[s.producto_id] || null
    return {
      ...s,
      unidad_compra: Number(s.unidad_compra) || 1,
      cantidad: borrador.cantidades[s.producto_id] != null
        ? borrador.cantidades[s.producto_id]
        : redondearAlMultiplo(s.cantidad_sugerida, Number(s.unidad_compra) || 1),
      excluido: !!borrador.excluidos[s.producto_id],
      reasignado_a: reasignProvId,
      manual: false,
    }
  })

  render()
}

function redondearAlMultiplo(n, m) {
  if (!m || m <= 1) return Math.max(0, Math.round(n))
  return Math.max(0, Math.ceil(n / m) * m)
}

// ── AGRUPACION ─────────────────────────────────────────────────────────────
function todosLosItems() {
  return [...sugerencias, ...agregadosManual]
}

function porProveedor() {
  const map = new Map()
  for (const s of todosLosItems()) {
    const provId = s.reasignado_a || s.proveedor_id || 'sin'
    const provNombre = proveedoresInfo[provId]?.nombre || s.proveedor_nombre || '— Sin proveedor —'
    if (!map.has(provId)) map.set(provId, {
      proveedor_id: provId, nombre: provNombre, items: [],
      dias_credito: proveedoresInfo[provId]?.dias_credito || 0,
    })
    map.get(provId).items.push(s)
  }
  return [...map.values()].sort((a,b) => (a.nombre||'').localeCompare(b.nombre||''))
}

function diasUrgencia() {
  return horizonte != null ? horizonte : 7
}
function aplanarUrgentes() {
  const lim = diasUrgencia()
  return todosLosItems()
    .filter(s => s.dias_restantes !== null && s.dias_restantes <= lim)
    .sort((a,b) => (a.dias_restantes ?? 999) - (b.dias_restantes ?? 999))
}

function filtroBusqueda(items) {
  if (!busqueda.trim()) return items
  const q = busqueda.toLowerCase()
  return items.filter(i => (i.nombre || '').toLowerCase().includes(q))
}

// ── CALCULOS ───────────────────────────────────────────────────────────────
function cantidadEfectiva(it) {
  if (horizonte == null) return it.cantidad
  // Recalcular sugerencia segun horizonte si no hay borrador para este item
  if (borrador.cantidades[it.producto_id] != null) return it.cantidad
  const sug = Math.max(0, Math.ceil(horizonte * (Number(it.velocidad) || 0) - Number(it.stock_actual || 0)))
  return redondearAlMultiplo(sug, it.unidad_compra)
}

function totalProveedor(grupo) {
  return grupo.items
    .filter(it => !it.excluido)
    .reduce((s, it) => s + cantidadEfectiva(it) * Number(it.ultimo_costo || 0), 0)
}

function totalGeneral() {
  return todosLosItems()
    .filter(it => !it.excluido)
    .reduce((s, it) => s + cantidadEfectiva(it) * Number(it.ultimo_costo || 0), 0)
}

function comprometidoEnPendientes() {
  return ordenesAbiertas.reduce((s, o) => {
    const pend = (o.items || []).reduce((ss, it) =>
      ss + (it.cantidad - it.cantidad_recibida) * Number(it.costo_unit_estimado || 0), 0)
    return s + pend
  }, 0)
}

function diasCobertura(it, cantPropuesta) {
  const v = Number(it.velocidad) || 0
  if (v === 0) return null
  const stockPost = Number(it.stock_actual || 0) + cantPropuesta
  return Math.floor(stockPost / v)
}

function mejorPrecio(it) {
  const alts = productoProveedores[it.producto_id] || []
  if (alts.length < 2) return null
  const provActual = it.reasignado_a || it.proveedor_id
  const costoActual = alts.find(a => a.proveedor_id === provActual)?.costo
  const cheapest = alts.reduce((m, a) => (a.costo < (m?.costo ?? Infinity) ? a : m), null)
  if (!cheapest || !costoActual) return null
  if (cheapest.proveedor_id === provActual) return null
  if (cheapest.costo >= costoActual) return null
  return { ...cheapest, ahorroUnit: costoActual - cheapest.costo }
}

function variacionPrecio(it) {
  const provId = it.reasignado_a || it.proveedor_id
  const key = `${it.producto_id}_${provId}`
  const ant = ultimoCostoMap[key]
  if (!ant || !it.ultimo_costo) return null
  const dif = (Number(it.ultimo_costo) - ant) / ant * 100
  if (Math.abs(dif) < 1) return null
  return { pct: dif }
}

// ── ARMAR MENSAJE / ORDEN ──────────────────────────────────────────────────
function lineasDeProveedor(grupo) {
  return grupo.items
    .filter(it => !it.excluido && cantidadEfectiva(it) > 0)
    .map(it => ({ ...it, cantidadFinal: cantidadEfectiva(it) }))
}
function mensajeTexto(grupo) {
  const items = lineasDeProveedor(grupo)
  if (!items.length) return null
  const lineas = items.map(it => `${it.cantidadFinal}u  ${it.nombre}`)
  const total = items.reduce((s,it) => s + it.cantidadFinal * Number(it.ultimo_costo || 0), 0)
  return `Buen día!\nPedido para ${grupo.nombre}:\n\n${lineas.join('\n')}\n\nTotal estimado: ${ars(total)}`
}

async function persistirOrden(grupo, canal) {
  const items = lineasDeProveedor(grupo)
  if (!items.length) return null
  const totalEst = items.reduce((s,it) => s + it.cantidadFinal * Number(it.ultimo_costo || 0), 0)
  const provId = grupo.proveedor_id !== 'sin' ? grupo.proveedor_id : null
  const ahora = new Date()
  const diasObj = proveedoresInfo[provId]?.dias_objetivo || 7
  const estim = new Date(ahora.getTime() + diasObj * 86400000).toISOString().slice(0,10)
  const { data: orden, error } = await supabase.from('ordenes_compra').insert({
    empresa_id: usuario.empresa_id,
    proveedor_id: provId,
    estado: 'enviada',
    canal,
    fecha_enviada: ahora.toISOString(),
    fecha_estimada_llegada: estim,
    total_estimado: totalEst,
    enviada_por_usuario_id: usuario.id,
  }).select('id').single()
  if (error) { console.error('orden insert error', error); toast('⚠ No se grabó la orden: ' + error.message); return null }

  const itemsPayload = items.map(it => ({
    empresa_id: usuario.empresa_id,
    orden_id: orden.id,
    producto_id: it.producto_id,
    cantidad: it.cantidadFinal,
    costo_unit_estimado: Number(it.ultimo_costo) || 0,
  }))
  const { error: errItems } = await supabase.from('orden_compra_items').insert(itemsPayload)
  if (errItems) { console.error('orden items error', errItems); toast('⚠ Items no grabados: ' + errItems.message); return null }

  // Limpiar borrador del proveedor (todos los items de este grupo)
  for (const it of items) {
    delete borrador.cantidades[it.producto_id]
    delete borrador.excluidos[it.producto_id]
    delete borrador.reasignados[it.producto_id]
  }
  guardarBorrador()
  return orden.id
}

async function copiarMensaje(grupo) {
  const txt = mensajeTexto(grupo)
  if (!txt) { alert('Sin productos para copiar'); return }
  navigator.clipboard.writeText(txt)
    .then(() => toast('✓ Copiado'))
    .catch(() => alert(txt))
  await persistirOrden(grupo, 'copia')
  await cargar()
}

async function whatsappMensaje(grupo) {
  const txt = mensajeTexto(grupo)
  if (!txt) { alert('Sin productos para enviar'); return }
  const tel = (proveedoresInfo[grupo.proveedor_id]?.telefono || '').replace(/[^0-9]/g, '')
  const url = tel
    ? `https://wa.me/${tel}?text=${encodeURIComponent(txt)}`
    : `https://wa.me/?text=${encodeURIComponent(txt)}`
  window.open(url, '_blank')
  if (!tel) toast('Sin teléfono — abrí un chat manual')
  await persistirOrden(grupo, 'whatsapp')
  await cargar()
}

async function emailMensaje(grupo) {
  const txt = mensajeTexto(grupo)
  if (!txt) { alert('Sin productos'); return }
  const subject = `Pedido para ${grupo.nombre}`
  const url = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(txt)}`
  window.location.href = url
  await persistirOrden(grupo, 'email')
  await cargar()
}

async function enviarTodo() {
  const grupos = porProveedor().filter(g => lineasDeProveedor(g).length > 0)
  if (!grupos.length) return
  if (!confirm(`Se van a enviar ${grupos.length} mensajes por WhatsApp (uno por proveedor). ¿Continuar?`)) return
  for (const g of grupos) await whatsappMensaje(g)
}

let ingresosCache = null       // [{id, fecha, numero_boleta, total_declarado, total_calculado, cargos_aplicados, proveedor_id, proveedores, usuarios}]
let ingresoItemsCache = {}     // ingreso_id -> [items]
let ingresoDetalle = null      // ingreso_id abierto

async function cargarUltimosIngresos() {
  if (ingresosCache) return
  const hace365 = new Date(Date.now() - 365 * 86400000).toISOString().slice(0, 10)
  const { data } = await supabase.from('ingresos')
    .select('id, fecha, numero_boleta, total_declarado, total_calculado, cargos_aplicados, proveedor_id, proveedores(nombre), usuarios:usuario_id(nombre)')
    .eq('empresa_id', usuario.empresa_id)
    .gte('fecha', hace365)
    .order('fecha', { ascending: false })
    .limit(200)
  ingresosCache = data || []
}

async function cargarItemsIngreso(id) {
  if (ingresoItemsCache[id]) return
  const { data } = await supabase.from('ingreso_items')
    .select('bultos, u_por_bulto, cantidad, costo_unit_neto, costo_unit_final, productos(nombre)')
    .eq('ingreso_id', id)
    .order('id')
  ingresoItemsCache[id] = data || []
}

async function cargarHistorico() {
  if (historicoCache) return
  const hoy = new Date()
  const dHace30 = new Date(hoy.getTime() - 30*86400000).toISOString().slice(0,10)
  const dHace90 = new Date(hoy.getTime() - 90*86400000).toISOString().slice(0,10)
  const dHace365 = new Date(hoy.getTime() - 365*86400000).toISOString().slice(0,10)

  const { data: ords } = await supabase.from('ordenes_compra')
    .select('id, proveedor_id, fecha_enviada, total_estimado, estado, proveedores(nombre)')
    .eq('empresa_id', usuario.empresa_id)
    .neq('estado', 'cancelada')
    .gte('fecha_enviada', dHace365 + 'T00:00:00')

  const tot = { mes: 0, trim: 0, anio: 0 }
  const porProv = {}
  for (const o of (ords || [])) {
    const f = (o.fecha_enviada || '').slice(0,10)
    const t = Number(o.total_estimado || 0)
    if (f >= dHace30) tot.mes += t
    if (f >= dHace90) tot.trim += t
    if (f >= dHace365) tot.anio += t
    const k = o.proveedor_id || 'sin'
    if (!porProv[k]) porProv[k] = { nombre: o.proveedores?.nombre || 'Sin proveedor', mes: 0, trim: 0, anio: 0, ordenes: 0 }
    if (f >= dHace30) porProv[k].mes += t
    if (f >= dHace90) porProv[k].trim += t
    if (f >= dHace365) porProv[k].anio += t
    porProv[k].ordenes += 1
  }
  historicoCache = { ...tot, porProveedor: Object.values(porProv).sort((a,b) => b.anio - a.anio) }
  render()
}

function toast(msg) {

}

function render() {
  // Preservar scroll de overlay abierto (panel de editar OC, buscador, notas)
  const _prevPanelScroll = document.querySelector('.overlay .panel')?.scrollTop
  const _prevWinScroll = window.scrollY
  const el = document.getElementById('root')
  el.innerHTML = `
    <div class="hdr">
      <div class="brand"><span class="crown">&#9818;</span>
        <div>El Rey<small>Compras a proveedores</small></div>
      </div>
      <button class="back" onclick="location.href='./login_home.html'">Inicio ›</button>

        .map(([id,lbl]) => `<div class="tab ${tab===id?'active':''}" onclick="window._setTab('${id}')">${lbl}</div>`).join('')}
    </div>
    <div id="body"></div>`

  if (tab === 'sugeridos')  renderSugeridos()
  else if (tab === 'pendientes') renderPendientes()
  else                       renderHistorico()

  // Orden: primero paneles base, después buscador para que quede arriba
  if (editingOrden) renderEditarOrden()
  if (editandoNotas) renderPanelNotas()
  if (panelProd) renderPanelBuscador()

  // Restaurar scroll para que las mutaciones (agregar item, cambiar cant/costo,
  // agregar producto desde el buscador de sugeridos) no tiren la vista al tope.
  // Doble restore: sync (antes del paint) + rAF (por si algo lo movió después).
  const restoreScroll = () => {
    if (_prevWinScroll) window.scrollTo(0, _prevWinScroll)
    const p = document.querySelector('.overlay .panel')
    if (p && _prevPanelScroll != null) p.scrollTop = _prevPanelScroll
  }
  restoreScroll()
  requestAnimationFrame(restoreScroll)
}

// Solo re-renderiza la lista (manteniendo el input de busqueda con su foco)
function renderListaSugeridos() {
  const lista = document.getElementById('lista-compras')
  if (!lista) return
  const allItems = todosLosItems()
  if (!allItems.length) {
    lista.innerHTML = `<div class="empty">🎉 Nada para comprar.<br><small>Todos los productos están por encima del umbral de reorden.</small></div>`
    return
  }
  if (vista === 'urgentes') {
    const items = filtroBusqueda(aplanarUrgentes()).filter(it =>
      !filtroProv || (it.reasignado_a || it.proveedor_id || 'sin') === filtroProv)
    lista.innerHTML = items.length
      ? `<div class="prov-card"><div class="prov-hdr"><div class="top"><div class="nm">Solo urgentes (≤ ${diasUrgencia()} días)</div></div></div>${items.map(it => renderItem(it)).join('')}</div>`
      : `<div class="empty">Sin urgentes que coincidan.</div>`
    return
  }
  const grupos = porProveedor()
    .filter(g => !filtroProv || g.proveedor_id === filtroProv)
    .map(g => ({ ...g, items: filtroBusqueda(g.items) }))
    .filter(g => g.items.length)

  // También agregar grupos "vacíos" para proveedores que solo tienen productos
  // alternativos (sin sugerencia), así se ven al final.
  const idsConGrupo = new Set(grupos.map(g => g.proveedor_id))
  const provsConAlts = new Set()
  for (const [prodId, arr] of Object.entries(productoProveedores)) {
    const prod = catalogoProds.find(p => p.id === prodId)
    if (!prod) continue
    for (const alt of arr) {
      if (alt.proveedor_id !== prod.proveedor_id) provsConAlts.add(alt.proveedor_id)
    }
  }
  for (const pid of provsConAlts) {
    if (idsConGrupo.has(pid)) continue
    if (filtroProv && filtroProv !== pid) continue
    const info = proveedoresInfo[pid]
    grupos.push({
      proveedor_id: pid,
      nombre: info?.nombre || 'Sin nombre',
      items: [],
      dias_credito: info?.dias_credito || 0,
    })
  }

  lista.innerHTML = grupos.length
    ? grupos.map(g => renderGrupo(g)).join('')
    : `<div class="empty">Sin resultados.</div>`
}

// Productos donde este proveedor es alternativo (no preferido). Se muestran al
// final de su grupo. Excluye los que ya están ASIGNADOS a este proveedor en la
// OC actual (sugerencia o manual). Si un producto está en otra sugerencia, al
// tocarlo se lo reasigna a este proveedor.
function renderAlternativos(provId) {
  if (!provId || provId === 'sin') return ''
  // producto_id -> proveedor efectivo actual en la OC (sug + manual + reasignaciones)
  const asignaciones = new Map()
  for (const s of todosLosItems()) {
    const eff = s.reasignado_a || s.proveedor_id || 'sin'
    asignaciones.set(s.producto_id, eff)
  }
  const alts = catalogoProds.filter(p => {
    if (asignaciones.get(p.id) === provId) return false  // ya en este grupo
    if (p.proveedor_id === provId) return false          // preferido → arriba
    return (productoProveedores[p.id] || []).some(x => x.proveedor_id === provId)
  })
  if (!alts.length) return ''
  return `
    <div style="border-top:1px dashed var(--line);margin-top:10px;padding-top:8px">
      <div class="lbl" style="padding:0 4px 6px;color:var(--gold-dk)">También le podés pedir a este proveedor (alternativos)</div>
      ${alts.slice(0, 40).map(p => {
        const alt = (productoProveedores[p.id] || []).find(x => x.proveedor_id === provId)
        const costo = alt ? alt.costo : p.costo
        const enOtro = asignaciones.has(p.id)
        // Si ya tiene sugerencia en otro proveedor, reasignamos; si no, alta manual
        const action = enOtro
          ? `window._reasignar('${p.id}','${provId}')`
          : `window._agregarProd('${p.id}','${provId}')`
        const nota = enOtro ? ` <span style="font-size:10px;color:var(--ink-soft);font-weight:500">(mover desde ${proveedoresInfo[asignaciones.get(p.id)]?.nombre || 'otro'})</span>` : ''
        return `<div class="pres" style="border:1px solid var(--line);border-radius:8px;margin:0 4px 6px;padding:8px 10px;cursor:pointer"
          onclick="${action}">
          <div class="pn" style="font-weight:600;font-size:13px">${p.nombre}
            <span style="font-size:10px;font-weight:700;background:var(--gold-lt);color:var(--gold-dk);padding:1px 6px;border-radius:4px;margin-left:4px">alternativo</span>${nota}
          </div>
          <div class="ps" style="font-size:11px;color:var(--ink-soft)">${p.categoria || '—'} · costo ${ars(costo)}</div>
        </div>`
      }).join('')}
    </div>`
}

function renderItem(it) {

  const um = it.unidad_compra > 1 ? `<span class="mini-chip mult">×${it.unidad_compra}</span>` : ''

      <div class="chips-line">

        ${vp ? `<span class="mini-chip ${vp.pct>0?'up':'down'}">${vp.pct>0?'▲':'▼'} ${Math.abs(vp.pct).toFixed(0)}%</span>` : ''}
        ${mp ? `<span class="mini-chip cheap" onclick="window._reasignar('${it.producto_id}','${mp.proveedor_id}')">💡 ${mp.nombre} ${ars(mp.costo)} (ahorrás ${ars(mp.ahorroUnit)}/u)</span>` : ''}

      ${cob !== null ? `<div class="cob ${cobClass}">${cob}d cobertura</div>` : ''}
    </div>
  </div>`
}

        const diffOk = diff < 1
        const cargos = Array.isArray(i.cargos_aplicados) ? i.cargos_aplicados : []

function renderPanelBuscador() {
  const root = document.getElementById('root')
  const ov = document.createElement('div')
  ov.className = 'overlay'
  ov.onclick = e => { if (e.target === ov) window._cerrarBuscador() }
  const provFiltrado = panelProd.provId === 'sin' ? null : panelProd.provId
  const q = (window._busqProd || '').toLowerCase().trim()
  // Mostrar TODOS los productos — no filtramos por proveedor. Si el proveedor
  // no era preferido ni alternativo, al recibir la boleta confirmar_ingreso
  // hace el upsert en producto_proveedor y queda registrada la relación.
  const listaTodos = catalogoProds
    .filter(p => !q || p.nombre.toLowerCase().includes(q))
    .filter(p => !todosLosItems().some(s => s.producto_id === p.id))
  // Ordenar: preferido del proveedor primero, después alternativos, después el resto
  const rank = p => {
    if (!provFiltrado) return 2
    if (p.proveedor_id === provFiltrado) return 0
    if ((productoProveedores[p.id] || []).some(x => x.proveedor_id === provFiltrado)) return 1
    return 2
  }
  const lista = listaTodos.sort((a, b) => rank(a) - rank(b) || a.nombre.localeCompare(b.nombre)).slice(0, 40)
  const costoParaProv = p => {
    if (!provFiltrado) return p.costo
    const alt = (productoProveedores[p.id] || []).find(x => x.proveedor_id === provFiltrado)
    return alt ? alt.costo : p.costo
  }
  const badgeParaProv = p => {
    if (!provFiltrado) return ''
    if (p.proveedor_id === provFiltrado)
      return ' <span style="font-size:10px;font-weight:700;background:var(--gold);color:#fff;padding:1px 6px;border-radius:4px;margin-left:4px">preferido</span>'
    if ((productoProveedores[p.id] || []).some(x => x.proveedor_id === provFiltrado))
      return ' <span style="font-size:10px;font-weight:700;background:var(--gold-lt);color:var(--gold-dk);padding:1px 6px;border-radius:4px;margin-left:4px">alternativo</span>'
    return ' <span style="font-size:10px;font-weight:700;background:#EEEADD;color:#5B665F;padding:1px 6px;border-radius:4px;margin-left:4px">nuevo p/ este prov</span>'
  }
  ov.innerHTML = `<div class="panel">
    <h3>Agregar producto</h3>
    <input id="busq-prod-input" class="search-prod" placeholder="Buscar…" value="${window._busqProd || ''}" oninput="window._setBusqProd(this.value)" autofocus>
    <div id="busq-prod-res"></div>
    <button class="cancel-btn" onclick="window._cerrarBuscador()">Cancelar</button>
  </div>`
  root.appendChild(ov)
  renderBusqProdResultados()
  setTimeout(() => document.getElementById('busq-prod-input')?.focus(), 30)
}

function renderEditBusqResultados() {
  const box = document.getElementById('edit-busq-res')
  if (!box || !editingOrden) return
  const provId = editingOrden.proveedor_id
  const q = (editingOrden.busqEdit || '').toLowerCase().trim()
  const yaEn = new Set(editingOrden.items.map(x => x.producto_id))
  const lista = catalogoProds
    .filter(p => !yaEn.has(p.id))
    .filter(p => !q || p.nombre.toLowerCase().includes(q))
    .sort((a, b) => {
      const ra = a.proveedor_id === provId ? 0
               : (productoProveedores[a.id] || []).some(x => x.proveedor_id === provId) ? 1 : 2
      const rb = b.proveedor_id === provId ? 0
               : (productoProveedores[b.id] || []).some(x => x.proveedor_id === provId) ? 1 : 2
      return ra - rb || a.nombre.localeCompare(b.nombre)
    })
    .slice(0, 40)
  const costoDe = p => {
    const alt = (productoProveedores[p.id] || []).find(x => x.proveedor_id === provId)
    return alt ? alt.costo : p.costo
  }
  const badgeDe = p => {
    if (p.proveedor_id === provId)
      return ' <span style="font-size:10px;font-weight:700;background:var(--gold);color:#fff;padding:1px 6px;border-radius:4px;margin-left:4px">preferido</span>'
    if ((productoProveedores[p.id] || []).some(x => x.proveedor_id === provId))
      return ' <span style="font-size:10px;font-weight:700;background:var(--gold-lt);color:var(--gold-dk);padding:1px 6px;border-radius:4px;margin-left:4px">alternativo</span>'
    return ' <span style="font-size:10px;font-weight:700;background:#EEEADD;color:#5B665F;padding:1px 6px;border-radius:4px;margin-left:4px">nuevo p/ este prov</span>'
  }
  box.innerHTML = lista.length ? lista.map(p => `
    <div class="pres" onclick="window._agregarProdEdit('${p.id}')">
      <div class="pn">${p.nombre}${badgeDe(p)}</div>
      <div class="ps">${p.categoria || '—'} · costo ${ars(costoDe(p))}</div>
    </div>`).join('') : '<div class="empty">Sin coincidencias.</div>'
}

  const it = todosLosItems().find(s => s.producto_id === id)
  if (!it) return
  it.excluido = !it.excluido
  if (it.excluido) borrador.excluidos[id] = true
  else delete borrador.excluidos[id]
  guardarBorrador(); render()
}
window._setCant = (id, v) => {
  const it = todosLosItems().find(s => s.producto_id === id)
  if (!it) return
  const n = Math.max(0, parseInt(v) || 0)
  it.cantidad = n
  borrador.cantidades[id] = n
  guardarBorrador(); render()
}
window._stepper = (id, delta) => {
  const it = todosLosItems().find(s => s.producto_id === id)
  if (!it) return
  const cur = cantidadEfectiva(it)
  const step = it.unidad_compra || 1
  const next = Math.max(0, cur + delta * step)
  it.cantidad = next
  borrador.cantidades[id] = next
  guardarBorrador(); render()
}
window._reasignar = (prodId, nuevoProvId) => {
  const it = todosLosItems().find(s => s.producto_id === prodId)
  if (!it) return
  it.reasignado_a = nuevoProvId
  borrador.reasignados[prodId] = nuevoProvId
  guardarBorrador(); render()
}
window._waProv = id => { const g = porProveedor().find(x=>x.proveedor_id===id); if(g) whatsappMensaje(g) }
window._copiarProv = id => { const g = porProveedor().find(x=>x.proveedor_id===id); if(g) copiarMensaje(g) }
window._emailProv = id => { const g = porProveedor().find(x=>x.proveedor_id===id); if(g) emailMensaje(g) }
window._imprimirProv = id => {
  const g = porProveedor().find(x=>x.proveedor_id===id); if(!g) return
  imprimirPagina()
}
window._enviarTodo = () => enviarTodo()
window._recibir = id => abrirRecepcion(id)
window._cancelar = id => cancelarOrden(id)
window._abrirBuscador = provId => { panelProd = { provId, mode: 'sug' }; window._busqProd = ''; render() }
window._abrirBuscadorEdit = () => {
  if (!editingOrden) return
  panelProd = { provId: editingOrden.proveedor_id, mode: 'edit' }
  window._busqProd = ''
  render()
}
window._cerrarBuscador = () => { panelProd = null; window._busqProd = ''; render() }
window._setBusqProd = v => { window._busqProd = v; renderBusqProdResultados() }
window._agregarProd = (prodId, provId) => {
  const p = catalogoProds.find(x => x.id === prodId)
  if (!p) return
  const modo = panelProd?.mode || 'sug'
  if (modo === 'edit' && editingOrden) {
    // agregar item al editingOrden
    const altCosto = (productoProveedores[p.id] || []).find(x => x.proveedor_id === provId)?.costo
    editingOrden.items.push({
      producto_id: p.id, nombre: p.nombre,
      cantidad: p.unidad_compra || 1,
      costo_unit_estimado: altCosto ?? p.costo ?? 0,
      cantidad_recibida: 0,
      isNew: true,
    })
    panelProd = null; render()
    return
  }
  agregadosManual.push({
    producto_id: p.id, nombre: p.nombre, categoria: p.categoria,
    proveedor_id: provId === 'sin' ? null : provId,
    proveedor_nombre: proveedoresInfo[provId]?.nombre,
    ultimo_costo: p.costo, unidad_compra: p.unidad_compra || 1,
    dias_restantes: null, velocidad: 0, stock_actual: 0, pendiente_compra: 0,
    cantidad: p.unidad_compra || 1, excluido: false, manual: true,
    notas_compra: p.notas_compra,
  })
  panelProd = null; render()
}

// ── EDIT ORDEN ─────────────────────────────────────────────────────────────
window._editarOrden = id => {
  const o = ordenesAbiertas.find(x => x.id === id); if (!o) return
  editingOrden = {
    id: o.id,
    proveedor_id: o.proveedor_id,
    proveedor_nombre: o.proveedores?.nombre || 'Sin proveedor',
    items: (o.items || []).map(it => ({
      id: it.id,
      producto_id: it.producto_id,
      nombre: it.productos?.nombre || '?',
      cantidad: it.cantidad,
      costo_unit_estimado: Number(it.costo_unit_estimado) || 0,
      cantidad_recibida: Number(it.cantidad_recibida) || 0,
    })),
    removedIds: [],
    buscadorAbierto: false,
    busqEdit: '',
  }
  render()
}
window._cerrarEditar = () => { editingOrden = null; savingOrden = false; render() }
window._toggleBuscadorEdit = () => {
  if (!editingOrden) return
  editingOrden.buscadorAbierto = !editingOrden.buscadorAbierto
  editingOrden.busqEdit = ''
  render()
}
window._setBusqEdit = v => {
  if (!editingOrden) return
  editingOrden.busqEdit = v
  renderEditBusqResultados()   // solo actualiza resultados — preserva foco
}
window._agregarProdEdit = prodId => {
  if (!editingOrden) return
  const p = catalogoProds.find(x => x.id === prodId); if (!p) return
  const altCosto = (productoProveedores[p.id] || []).find(x => x.proveedor_id === editingOrden.proveedor_id)?.costo
  editingOrden.items.push({
    producto_id: p.id, nombre: p.nombre,
    cantidad: p.unidad_compra || 1,
    costo_unit_estimado: altCosto ?? p.costo ?? 0,
    cantidad_recibida: 0,
    isNew: true,
  })
  editingOrden.buscadorAbierto = false
  editingOrden.busqEdit = ''
  render()
}
window._setItemCant  = (i, v) => {
  if (!editingOrden) return
  const it = editingOrden.items[i]
  const n = Math.max(it.cantidad_recibida || 1, parseInt(v) || 0)
  it.cantidad = n
  // rerender solo el subtotal / total (simple: full render)
  render()
}
window._setItemCosto = (i, v) => {
  if (!editingOrden) return
  editingOrden.items[i].costo_unit_estimado = Math.max(0, Number(v) || 0)
  render()
}
window._quitarItemEdit = i => {
  if (!editingOrden) return
  const it = editingOrden.items[i]
  if ((it.cantidad_recibida || 0) > 0) {
    alert('Este item ya tiene recepción parcial. No se puede quitar; solo ajustar cantidad al mínimo recibido.')
    return
  }
  if (it.id) editingOrden.removedIds.push(it.id)
  editingOrden.items.splice(i, 1)
  render()
}
window._guardarEditar = async () => {
  if (!editingOrden || savingOrden) return
  if (!editingOrden.items.length) { alert('La orden debe tener al menos un item.'); return }
  savingOrden = true; render()
  try {
    // 1) DELETE items removidos
    if (editingOrden.removedIds.length) {
      const { error } = await supabase.from('orden_compra_items')
        .delete().in('id', editingOrden.removedIds)
      if (error) throw error
    }
    // 2) UPDATE items existentes
    for (const it of editingOrden.items.filter(x => x.id)) {
      const { error } = await supabase.from('orden_compra_items')
        .update({ cantidad: it.cantidad, costo_unit_estimado: it.costo_unit_estimado })
        .eq('id', it.id)
      if (error) throw error
    }
    // 3) INSERT items nuevos
    const nuevos = editingOrden.items.filter(x => x.isNew)
    if (nuevos.length) {
      const { error } = await supabase.from('orden_compra_items').insert(
        nuevos.map(it => ({
          empresa_id: usuario.empresa_id,
          orden_id: editingOrden.id,
          producto_id: it.producto_id,
          cantidad: it.cantidad,
          costo_unit_estimado: it.costo_unit_estimado,
          cantidad_recibida: 0,
        })))
      if (error) throw error
    }
    // 4) Recalcular total y actualizar orden
    const totNuevo = editingOrden.items.reduce((s, it) => s + it.cantidad * it.costo_unit_estimado, 0)
    const { error: eOrd } = await supabase.from('ordenes_compra')
      .update({ total_estimado: totNuevo })
      .eq('id', editingOrden.id)
    if (eOrd) throw eOrd
    editingOrden = null; savingOrden = false
    await cargar()
  } catch (e) {
    alert('Error al guardar: ' + (e.message || e))
    savingOrden = false; render()
  }
}
window._editarNotas = id => { editandoNotas = id; render() }
window._cerrarNotas = () => { editandoNotas = null; render() }
window._guardarNotas = id => {
  const txt = document.getElementById('notasInput')?.value || ''
  guardarNotas(id, txt.trim() || null)
}

await cargar()
</script>
