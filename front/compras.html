<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="./src/logger.js"></script>
<title>El Rey · Compras a proveedores</title>
<style>
  :root{
    --paper:#FBF9F2; --ink:#1C2B27; --ink-soft:#5B665F;
    --line:#E4DECF;  --line-soft:#EEEADD;
    --gold:#A9760E;  --gold-dk:#8A5F09; --gold-lt:#F5E9D0;
    --green-bg:#E7F0E8; --green-tx:#2C6B3F;
    --amber-bg:#FDF2DC; --amber-tx:#8A5F09;
    --red-bg:#F6E5E2;  --red-tx:#A8392B;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{overscroll-behavior-y:contain;background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px;line-height:1.4}
  body{max-width:720px;margin:0 auto;padding-bottom:40px}

  .hdr{display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:1px solid var(--line);background:var(--paper);
    position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:8px;font-weight:600}
  .crown{color:var(--gold);font-size:20px}
  .brand small{display:block;font-size:11px;font-weight:500;color:var(--ink-soft);
    letter-spacing:.06em;text-transform:uppercase}
  .back{background:none;border:none;font-size:13px;color:var(--gold);font-weight:600;cursor:pointer;font-family:inherit}

  section{padding:14px 18px}
  .lbl{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
    color:var(--ink-soft);margin-bottom:6px}
  .help{font-size:12px;color:var(--ink-soft);margin-bottom:12px;line-height:1.5}

  .prov-card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    margin-bottom:14px;overflow:hidden}
  .prov-hdr{padding:12px 14px;background:var(--line-soft);
    display:flex;align-items:center;justify-content:space-between;gap:10px}
  .prov-hdr .nm{font-size:15px;font-weight:700;flex:1}
  .prov-hdr .meta{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .prov-hdr .total{font-size:14px;font-weight:700;color:var(--gold-dk);text-align:right}
  .prov-hdr button{background:var(--gold);color:#fff;border:none;padding:8px 14px;
    border-radius:8px;font-weight:600;cursor:pointer;font-family:inherit;font-size:13px;flex-shrink:0}
  .prov-hdr button:active{background:var(--gold-dk)}

  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{padding:8px 6px;text-align:left;font-size:10px;font-weight:700;
    letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);
    border-bottom:1px solid var(--line)}
  tbody td{padding:8px 6px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
  tbody tr.excluido{opacity:.4;text-decoration:line-through}
  td.r{text-align:right}
  td.c{text-align:center}
  td input.cant{width:64px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;
    text-align:right;font-family:inherit;font-size:13px;font-weight:600;background:#fff}
  .cb{width:18px;height:18px;accent-color:var(--gold);cursor:pointer}
  .urg{color:var(--red-tx);font-weight:700;font-size:11px}
  .baja{color:var(--amber-tx);font-weight:600;font-size:11px}

  .empty{text-align:center;padding:40px 18px;color:var(--ink-soft)}
  .loading{text-align:center;padding:48px 18px;color:var(--ink-soft)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;
    font-size:13px;font-weight:600;z-index:50}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .stat .nro{font-size:18px;font-weight:700;color:var(--gold-dk)}
  .stat .desc{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em}
</style>
</head>
<body>
<div id="root"><div class="loading">Cargando…</div></div>

<script type="module">
import { supabase } from './src/supabase.js'
import { requireSession, tienePermiso } from './src/auth.js'
import { ars } from './src/utils.js'

const { usuario } = await requireSession()
if (!tienePermiso('catalogo', 'vista')) { location.href = './login_home.html'; throw new Error('sin permiso') }

let sugerencias = []   // [{producto_id, nombre, categoria, proveedor_id, proveedor_nombre, stock_actual,
                       //   velocidad, dias_restantes, cantidad_sugerida, ultimo_costo, cantidad, excluido}]

let telefonosProv = {}  // proveedor_id -> telefono

async function cargar() {
  const [{ data, error }, { data: provs }] = await Promise.all([
    supabase.from('sugerencia_compra').select('*')
      .eq('empresa_id', usuario.empresa_id)
      .order('proveedor_nombre, dias_restantes'),
    supabase.from('proveedores').select('id, telefono')
      .eq('empresa_id', usuario.empresa_id),
  ])
  if (error) {
    document.getElementById('root').innerHTML =
      `<div style="margin:18px;padding:14px;background:var(--red-bg);border:1px solid var(--red-tx);border-radius:12px;color:var(--red-tx)">Error: ${error.message}</div>`
    return
  }
  telefonosProv = Object.fromEntries((provs || []).map(p => [p.id, p.telefono || '']))
  sugerencias = (data || []).map(s => ({
    ...s,
    cantidad: s.cantidad_sugerida,
    excluido: false,
  }))
  render()
}

function porProveedor() {
  const map = new Map()
  for (const s of sugerencias) {
    const k = s.proveedor_id || 'sin'
    if (!map.has(k)) map.set(k, {
      proveedor_id: s.proveedor_id,
      nombre: s.proveedor_nombre || '— Sin proveedor —',
      items: [],
    })
    map.get(k).items.push(s)
  }
  return [...map.values()].sort((a,b) => (a.nombre||'').localeCompare(b.nombre||''))
}

function armarMensaje(provId) {
  const grupo = porProveedor().find(g => g.proveedor_id === provId)
  if (!grupo) return null
  const lineas = grupo.items
    .filter(it => !it.excluido && it.cantidad > 0)
    .map(it => `${it.cantidad}u  ${it.nombre}`)
  if (!lineas.length) return null
  const total = grupo.items
    .filter(it => !it.excluido && it.cantidad > 0)
    .reduce((s, it) => s + it.cantidad * Number(it.ultimo_costo || 0), 0)
  return {
    grupo,
    texto: `Buen día!\nPedido para ${grupo.nombre}:\n\n${lineas.join('\n')}\n\nTotal estimado: ${ars(total)}`,
  }
}

function copiarMensaje(provId) {
  const m = armarMensaje(provId)
  if (!m) { alert('Sin productos para copiar'); return }
  navigator.clipboard.writeText(m.texto)
    .then(() => toast('✓ Copiado al portapapeles'))
    .catch(() => { alert(m.texto) })
}

function whatsappMensaje(provId) {
  const m = armarMensaje(provId)
  if (!m) { alert('Sin productos para enviar'); return }
  const tel = (telefonosProv[provId] || '').replace(/[^0-9]/g, '')
  const url = tel
    ? `https://wa.me/${tel}?text=${encodeURIComponent(m.texto)}`
    : `https://wa.me/?text=${encodeURIComponent(m.texto)}`
  window.open(url, '_blank')
  if (!tel) toast('Sin teléfono cargado — abrí un chat manualmente')
}

function toast(msg) {
  const t = document.createElement('div')
  t.className = 'toast'; t.textContent = msg
  document.body.appendChild(t)
  setTimeout(() => t.remove(), 2200)
}

function render() {
  const el = document.getElementById('root')
  const grupos = porProveedor()
  const totalProductos = sugerencias.filter(s => !s.excluido && s.cantidad > 0).length
  const totalMonto = sugerencias
    .filter(s => !s.excluido && s.cantidad > 0)
    .reduce((s, it) => s + it.cantidad * Number(it.ultimo_costo || 0), 0)
  const urgentes = sugerencias.filter(s => s.dias_restantes !== null && s.dias_restantes <= 3).length

  el.innerHTML = `
    <div class="hdr">
      <div class="brand"><span class="crown">&#9818;</span>
        <div>El Rey<small>Compras a proveedores</small></div>
      </div>
      <button class="back" onclick="location.href='./login_home.html'">Inicio ›</button>
    </div>

    <section>
      <div class="help">
        Productos cuyo stock alcanza para menos días de los configurados como
        <b>reorden</b> en cada proveedor. La cantidad sugerida cubre los días
        <b>objetivo</b>, calculada sobre la velocidad de venta de las últimas
        4 semanas.
      </div>
      <div class="stats">
        <div class="stat"><div class="nro">${totalProductos}</div><div class="desc">Productos</div></div>
        <div class="stat"><div class="nro">${urgentes}</div><div class="desc">Urgentes (≤3 días)</div></div>
        <div class="stat"><div class="nro">${ars(totalMonto)}</div><div class="desc">Total estimado</div></div>
      </div>
    </section>

    ${!sugerencias.length ? `<div class="empty">
      🎉 Nada para comprar.<br>
      <small>Todos los productos tienen stock por encima del umbral de reorden.</small>
    </div>` : ''}

    ${grupos.map(g => `
      <section style="padding:0 18px 14px">
        <div class="prov-card">
          <div class="prov-hdr">
            <div style="flex:1">
              <div class="nm">${g.nombre}</div>
              <div class="meta">${g.items.length} ítem${g.items.length===1?'':'s'} · total ${ars(g.items.filter(it=>!it.excluido && it.cantidad>0).reduce((s,it)=>s+it.cantidad*Number(it.ultimo_costo||0),0))}</div>
            </div>
            <div style="display:flex;flex-direction:column;gap:6px">
              <button onclick="window._whatsapp('${g.proveedor_id||''}')" style="background:#25D366;color:#fff;border:none;padding:8px 14px;border-radius:8px;font-weight:600;cursor:pointer;font-family:inherit;font-size:13px;white-space:nowrap">
                📤 WhatsApp${telefonosProv[g.proveedor_id] ? '' : ' (sin tel)'}
              </button>
              <button onclick="window._copiar('${g.proveedor_id||''}')">📋 Copiar</button>
            </div>
          </div>
          <table>
            <thead>
              <tr>
                <th style="width:24px"></th>
                <th>Producto</th>
                <th class="c">Stock</th>
                <th class="c">Días</th>
                <th class="c">Comprar</th>
                <th class="r">Subtotal</th>
              </tr>
            </thead>
            <tbody>
              ${g.items.map((it,gi) => {
                const idx = sugerencias.indexOf(it)
                const dRest = it.dias_restantes
                const urg = dRest !== null && dRest <= 3
                const baja = dRest !== null && dRest <= 7 && !urg
                const subtotal = it.cantidad * Number(it.ultimo_costo || 0)
                return `<tr class="${it.excluido?'excluido':''}">
                  <td><input class="cb" type="checkbox" ${it.excluido?'':'checked'} onchange="window._toggleExcl(${idx})"></td>
                  <td>
                    <div style="font-weight:600">${it.nombre}</div>
                    <div style="font-size:11px;color:var(--ink-soft)">${it.categoria || '—'}${it.subcategoria?` · ${it.subcategoria}`:''} · costo ${ars(Number(it.ultimo_costo)||0)}</div>
                  </td>
                  <td class="c">${Math.round(Number(it.stock_actual))}</td>
                  <td class="c">${dRest === null ? '—' :
                    urg  ? `<span class="urg">${dRest}d</span>` :
                    baja ? `<span class="baja">${dRest}d</span>` :
                    `${dRest}d`}</td>
                  <td class="c">
                    <input class="cant" type="number" min="0" value="${it.cantidad}"
                      onchange="window._setCant(${idx}, this.value)">
                  </td>
                  <td class="r" style="font-weight:600">${ars(subtotal)}</td>
                </tr>`
              }).join('')}
            </tbody>
          </table>
        </div>
      </section>`).join('')}
  `
}

window._toggleExcl = i => { sugerencias[i].excluido = !sugerencias[i].excluido; render() }
window._setCant = (i,v) => { sugerencias[i].cantidad = Math.max(0, parseInt(v)||0); render() }
window._copiar = provId => copiarMensaje(provId || null)
window._whatsapp = provId => whatsappMensaje(provId || null)

await cargar()
</script>
</body>
</html>
